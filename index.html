<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skin Upgrader Simulator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap');

        :root {
            --bg-main: #0c0f16;
            --bg-panel: #141822;
            --bg-card: #1c202d;
            --text-main: #ffffff;
            --text-muted: #6e7587;
            --accent-yellow: #f8c021;
            --accent-green: #21f852;
            --accent-red: #f82142;
            
            --border-color: #272c3d;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            box-sizing: border-box;
            user-select: none;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 1300px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* --- ВЕРХНЯЯ СЕКЦИЯ (Апгрейдер) --- */
        .top-section {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            height: 320px;
        }

        .panel {
            background-color: var(--bg-panel);
            border-radius: 12px;
            position: relative;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255,255,255,0.02);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Левая панель - Выбор скина */
        .input-panel {
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .input-panel .info-text {
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 20px;
            position: absolute;
            top: 30px;
        }
        .chevron-icon {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: -5px;
        }
        .chevron-icon svg { width: 60px; height: auto; fill: var(--accent-yellow); opacity: 0.8;}

        .balance-slider-container {
            position: absolute;
            bottom: 20px;
            width: 90%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .slider-labels {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
        }
        .slider-labels span.yellow { color: var(--accent-yellow); }
        .slider-bar {
            height: 4px;
            background: #252a3a;
            border-radius: 2px;
            position: relative;
        }
        .slider-handle {
            position: absolute;
            left: 0; top: -4px;
            width: 12px; height: 12px;
            background: var(--accent-yellow);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(248, 192, 33, 0.5);
        }

        /* Центральная панель - Круг */
        .center-panel {
            background: transparent;
            box-shadow: none;
            border: none;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 0;
        }

        .circle-container {
            position: relative;
            width: 240px;
            height: 240px;
            margin-bottom: 20px;
        }

        /* Внешние отметки (50%, 100%) */
        .circle-ticks {
            position: absolute;
            top: -20px; left: -20px; right: -20px; bottom: -20px;
            border: 2px dashed #212533;
            border-radius: 50%;
            z-index: 1;
        }
        .tick-label {
            position: absolute;
            font-size: 10px;
            color: #4a5063;
            font-weight: 700;
        }
        .tick-50-l { top: 50%; left: -25px; transform: translateY(-50%); }
        .tick-50-r { top: 50%; right: -25px; transform: translateY(-50%); }
        .tick-100 { top: -20px; left: 50%; transform: translateX(-50%); }

        /* Сам круг с шансом */
        .upgrader-wheel {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%;
            background: conic-gradient(from 90deg, #181b24 0deg, #181b24 360deg);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .wheel-inner {
            width: 190px;
            height: 190px;
            background: var(--bg-main);
            border-radius: 50%;
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .wheel-percent {
            font-size: 32px;
            font-weight: 800;
            color: var(--accent-green);
            text-shadow: 0 0 15px rgba(33, 248, 82, 0.4);
            margin-bottom: 5px;
        }
        .wheel-percent-yellow {
            color: var(--accent-yellow);
            text-shadow: 0 0 15px rgba(248, 192, 33, 0.4);
        }
        .wheel-text {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        /* Стрелка внизу */
        .arrow-indicator {
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 16px solid var(--accent-yellow);
            z-index: 10;
            filter: drop-shadow(0 0 5px var(--accent-yellow));
        }

        .btn-upgrade {
            width: 100%;
            background: var(--accent-yellow);
            color: #000;
            border: none;
            padding: 16px;
            font-size: 16px;
            font-weight: 800;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 5px 20px rgba(248, 192, 33, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.2s;
        }
        .btn-upgrade:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(248, 192, 33, 0.5); }
        .btn-upgrade svg { width: 16px; fill: #000; }

        .multipliers {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-top: 15px;
        }
        .multipliers div {
            font-size: 11px;
            color: var(--text-muted);
            background: var(--bg-panel);
            padding: 6px 10px;
            border-radius: 4px;
            font-weight: 700;
            cursor: pointer;
            border: 1px solid var(--border-color);
        }

        /* Правая панель - Выбиваемый скин */
        .target-panel {
            background: linear-gradient(180deg, #2a2015 0%, var(--bg-panel) 100%);
            padding: 20px;
            text-align: center;
            position: relative;
        }
        .target-panel .item-type { color: var(--text-muted); font-size: 12px; font-weight: 600; margin-top: 10px;}
        .target-panel .item-name { color: #fff; font-size: 22px; font-weight: 800; margin-top: 5px;}
        .target-panel img { width: 80%; margin-top: 20px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5)); }
        .target-panel .item-price {
            position: absolute; bottom: 25px; left: 0; width: 100%;
            font-size: 20px; font-weight: 800; color: var(--accent-yellow);
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }

        /* --- НИЖНЯЯ СЕКЦИЯ (Инвентари) --- */
        .bottom-section {
            display: grid;
            grid-template-columns: 4fr 6fr;
            gap: 20px;
            height: 500px;
        }

        .inventory-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(0,0,0,0.2);
            border-bottom: 1px solid var(--border-color);
        }
        .inventory-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 14px;
        }
        .inventory-title svg { width: 18px; fill: var(--accent-yellow); }
        .inventory-stats {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .inventory-stats span { color: var(--text-main); font-weight: 700; }
        .inventory-stats .price { color: var(--accent-yellow); display: flex; align-items: center; gap: 4px;}

        .grid-container {
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px;
            overflow-y: auto;
            height: calc(100% - 60px);
            align-content: start;
        }

        /* Карточки скинов */
        .skin-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            position: relative;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.2s;
            height: 120px;
        }
        .skin-card:hover { background: #232838; }
        .skin-card.selected { border-color: var(--accent-yellow); box-shadow: inset 0 0 0 1px var(--accent-yellow); }
        
        .card-top {
            width: 100%;
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            font-weight: 700;
            z-index: 2;
        }
        .card-top .price { color: var(--accent-yellow); }
        .card-top .condition { color: var(--text-muted); }
        
        .skin-card img {
            width: 80%;
            height: 60px;
            object-fit: contain;
            margin-top: 5px;
            z-index: 2;
        }
        
        .skin-card .name {
            font-size: 10px;
            color: var(--text-main);
            font-weight: 600;
            margin-top: auto;
            text-align: center;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            z-index: 2;
        }

        /* Цвета редкостей (полоски сверху как на фото) */
        .rarity-line {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 3px;
            border-radius: 8px 8px 0 0;
        }
        .rarity-covert { background: #eb4b4b; } /* Красное */
        .rarity-classified { background: #d32ce6; } /* Розовое */
        .rarity-restricted { background: #8847ff; } /* Фиолетовое */
        .rarity-milspec { background: #4b69ff; } /* Синее */
        .rarity-industrial { background: #5e98d9; } /* Голубое */
        .rarity-yellow { background: var(--accent-yellow); } /* Золотое/Ножи */

        /* Пустые слоты в левом инвентаре */
        .empty-slot {
            background: rgba(28, 32, 45, 0.4);
            border: 1px dashed rgba(255,255,255,0.05);
            border-radius: 8px;
            height: 120px;
        }

        /* SVG Иконка Монетки */
        .coin-icon {
            display: inline-block;
            width: 12px; height: 12px;
            background: var(--accent-yellow);
            border-radius: 50%;
            position: relative;
        }
        .coin-icon::after {
            content: '';
            position: absolute;
            top: 2px; left: 2px; right: 2px; bottom: 2px;
            border: 1px solid rgba(0,0,0,0.3);
            border-radius: 50%;
        }

        /* Скроллбар */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-panel); }
        ::-webkit-scrollbar-thumb { background: #2a3042; border-radius: 4px; }
    </style>
</head>

        div.className = `skin-card ${skin.selected ? 'selected' : ''}`;
        div.innerHTML = `
            <div class="rarity-line ${skin.rarity}"></div>
            <div class="card-top">
                <span class="price">${skin.price} <i class="coin-icon"></i></span>
                <span class="condition">${skin.cond}</span>
            </div>
            <img src="${skin.img}" alt="${skin.name}">
            <div class="name">${skin.name}</div>
        `;
        shopGrid.appendChild(div);
    });

    // Логика отрисовки круга с сектором внизу (Как на 4-м скрине)
    function setWheelChance(percent) {
        const wheel = document.getElementById('wheel');
        
        // Переводим процент (0-100) в градусы (0-360)
        const degrees = (percent / 100) * 360;
        
        // Чтобы шанс рисовался снизу (от стрелки), начинаем дугу с (180 - половина градусов)
        const startDeg = 180 - (degrees / 2);
        const endDeg = 180 + (degrees / 2);
        
        // CSS фокус: закрашиваем нужный сектор цветом, остальное темным фоном
        wheel.style.background = `conic-gradient(from 0deg, 
            #181b24 0deg, 
            #181b24 ${startDeg}deg, 
            var(--accent-yellow) ${startDeg}deg, 
            var(--accent-yellow) ${endDeg}deg, 
            #181b24 ${endDeg}deg, 
            #181b24 360deg
        )`;
    }

    // Ставим ровно 50.00% как на скрине
    setWheelChance(50.00);

</script>
