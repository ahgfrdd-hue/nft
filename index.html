<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashUpgrader - Yellow Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&family=JetBrains+Mono:wght@700&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; user-select: none; }
        
        body { 
            background-color: #121318; 
            color: #ffffff; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1a1c24; }
        ::-webkit-scrollbar-thumb { background: #2a2d3a; border-radius: 3px; }

        /* --- ЛАЙВ ЛЕНТА СЛЕВА --- */
        .sidebar { width: 100px; height: 100vh; background: #16181f; border-right: 1px solid #1f222d; display: flex; flex-direction: column; align-items: center; padding-top: 10px; z-index: 100; overflow-y: auto; overflow-x: hidden; }
        .live-item { width: 80px; background: #1a1c24; border-radius: 6px; margin-bottom: 8px; display: flex; flex-direction: column; align-items: center; padding: 5px; animation: slideDown 0.6s ease; position: relative; border-top: 3px solid #6a718c; cursor: pointer; transition: 0.2s; }
        .live-item:hover { background: #212430; }
        .live-item.r-common { border-top-color: #8c92a6; }
        .live-item.r-rare { border-top-color: #0088ff; }
        .live-item.r-epic { border-top-color: #b000ff; }
        .live-item.r-legendary { border-top-color: #ffaa00; }
        .live-chance { font-size: 9px; color: #f9c80e; align-self: flex-start; margin-bottom: 2px; font-weight: 700; }
        .live-img { width: 45px; height: 45px; object-fit: contain; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5)); margin-bottom: 5px; }
        @keyframes slideDown { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* --- ОСНОВНАЯ ЗОНА --- */
        .main-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: radial-gradient(circle at 50% 0%, #1c1e28 0%, #121318 60%); }

        /* ХЕДЕР */
        header { height: 70px; padding: 0 30px; background: #16181f; border-bottom: 1px solid #1f222d; display: flex; justify-content: space-between; align-items: center; z-index: 50; }
        .logo-area { display: flex; align-items: center; gap: 20px; }
        .logo { color: #ffffff; font-size: 20px; font-weight: 900; letter-spacing: 2px; display: flex; align-items: center; gap: 10px; }
        .logo span { color: #f9c80e; }
        .logo-icon { width: 24px; height: 24px; background: #f9c80e; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); display: flex; justify-content: center; align-items: center; color: #121318; font-size: 14px; }
        
        .header-stats { display: flex; gap: 30px; margin-left: 40px; }
        .stat-block { display: flex; flex-direction: column; }
        .stat-lbl { color: #6a718c; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .stat-val { color: #fff; font-size: 14px; font-weight: 900; }

        .user-area { display: flex; align-items: center; gap: 15px; }
        .balance-box { background: #1a1c24; border: 1px solid #2a2d3a; padding: 8px 15px; border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 700; color: #f9c80e; display: flex; align-items: center; gap: 5px; }
        .btn-deposit { background: #f9c80e; color: #121318; border: none; padding: 10px 20px; border-radius: 6px; font-weight: 900; cursor: pointer; transition: 0.2s; font-size: 13px; text-transform: uppercase; display: flex; align-items: center; gap: 5px; }
        .btn-deposit:hover { background: #ffdf40; box-shadow: 0 0 15px rgba(249, 200, 14, 0.4); }
        .btn-daily { background: transparent; border: 1px solid #f9c80e; color: #f9c80e; padding: 8px 15px; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 11px; text-transform: uppercase; transition: 0.2s; }
        .btn-daily:hover { background: rgba(249, 200, 14, 0.1); }

        /* --- ВЕРХНЯЯ АРЕНА (АПГРЕЙДЕР) --- */
        .arena-section { display: flex; justify-content: center; align-items: center; gap: 50px; padding: 40px 0; height: 380px; flex-shrink: 0; }

        .item-box { width: 340px; height: 280px; background: #181a22; border-radius: 12px; display: flex; flex-direction: column; align-items: center; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); padding: 20px; border: 1px solid transparent; transition: 0.3s; }
        .item-box.active { border-color: #2a2d3a; background: #1c1e28; }
        .box-title { font-size: 13px; color: #fff; font-weight: 700; margin-bottom: 5px; width: 100%; text-align: center; }
        .box-sub { font-size: 10px; color: #6a718c; margin-bottom: auto; }
        .item-img { width: 120px; height: 120px; object-fit: contain; filter: drop-shadow(0 15px 20px rgba(0,0,0,0.4)); margin-bottom: auto; }
        .empty-icon { font-size: 60px; color: #f9c80e; opacity: 0.2; margin: auto 0; }
        .box-price { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 700; color: #f9c80e; width: 100%; text-align: center; }

        /* РУЛЕТКА */
        .center-module { display: flex; flex-direction: column; align-items: center; width: 300px; position: relative; }
        .roulette-circle { width: 240px; height: 240px; border-radius: 50%; background: #121318; position: relative; display: flex; justify-content: center; align-items: center; box-shadow: inset 0 0 40px rgba(0,0,0,0.8); margin-bottom: 25px; }
        
        .svg-progress { position: absolute; top: 0; left: 0; width: 240px; height: 240px; transform: rotate(-90deg); pointer-events: none; }
        .svg-track { fill: none; stroke: #1a1c24; stroke-width: 12; }
        .svg-fill { fill: none; stroke: #f9c80e; stroke-width: 12; stroke-linecap: butt; stroke-dasharray: 716; stroke-dashoffset: 716; transition: stroke-dashoffset 0.6s cubic-bezier(0.1, 0.9, 0.2, 1); filter: drop-shadow(0 0 8px rgba(249, 200, 14, 0.5)); }

        .inner-hole { position: absolute; width: 200px; height: 200px; background: #16181f; border-radius: 50%; z-index: 2; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .arrow-spinner { position: absolute; width: 100%; height: 100%; z-index: 3; transition: transform 8s cubic-bezier(0.05, 0.95, 0.1, 1); }
        .arrow-indicator { position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-bottom: 25px solid #f9c80e; filter: drop-shadow(0 0 10px rgba(249, 200, 14, 0.6)); }

        .chance-text { font-family: 'JetBrains Mono', monospace; font-size: 32px; font-weight: 900; z-index: 4; color: #fff; }
        .chance-sub { font-size: 11px; color: #8a92b6; z-index: 4; margin-top: 5px; }

        .btn-play { background: #f9c80e; color: #121318; border: none; padding: 18px 0; width: 100%; border-radius: 8px; font-size: 15px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.3s; letter-spacing: 1px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-play:hover:not(:disabled) { background: #ffdf40; box-shadow: 0 0 25px rgba(249, 200, 14, 0.4); transform: translateY(-2px); }
        .btn-play:disabled { background: #1a1c24; color: #4a506b; cursor: not-allowed; box-shadow: none; }

        .multiplier-bar { display: flex; justify-content: center; gap: 5px; margin-top: 15px; width: 100%; }
        .mult-btn { background: #1a1c24; border: 1px solid transparent; color: #8a92b6; padding: 8px 12px; border-radius: 4px; font-size: 11px; font-weight: 700; cursor: pointer; transition: 0.2s; font-family: 'JetBrains Mono', monospace; }
        .mult-btn:hover { background: #212430; color: #fff; }

        /* --- НИЖНЯЯ ЗОНА (ИНВЕНТАРИ) --- */
        .inventories-section { flex: 1; display: flex; gap: 20px; padding: 0 30px 20px 30px; min-height: 0; }
        .inv-panel { flex: 1; background: #16181f; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid #1f222d; }
        
        .inv-header { padding: 15px 20px; background: #1a1c24; border-bottom: 1px solid #1f222d; display: flex; justify-content: space-between; align-items: center; }
        .inv-title { font-size: 14px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 10px; }
        .inv-title i { color: #f9c80e; font-style: normal; }
        
        /* ФИЛЬТРЫ МАГАЗИНА */
        .filters { display: flex; gap: 10px; align-items: center; }
        .filter-lbl { color: #6a718c; font-size: 11px; font-weight: 700; }
        .filter-input { background: #121318; border: 1px solid #2a2d3a; color: #fff; padding: 6px 10px; border-radius: 4px; width: 80px; font-size: 12px; font-family: 'JetBrains Mono', monospace; outline: none; transition: 0.2s; }
        .filter-input:focus { border-color: #f9c80e; }
        .filter-search { background: #121318; border: 1px solid #2a2d3a; color: #fff; padding: 6px 12px; border-radius: 4px; cursor: pointer; }

        .inv-grid { flex: 1; overflow-y: auto; padding: 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; align-content: start; }
        
        .item-card { background: #1a1c24; border: 1px solid #1f222d; border-radius: 6px; padding: 10px; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.2s; position: relative; border-top: 3px solid #6a718c; }
        .item-card.r-common { border-top-color: #8c92a6; }
        .item-card.r-rare { border-top-color: #0088ff; }
        .item-card.r-epic { border-top-color: #b000ff; }
        .item-card.r-legendary { border-top-color: #ffaa00; }
        
        .item-card:hover { background: #212430; transform: translateY(-3px); }
        .item-card.selected { background: rgba(249, 200, 14, 0.1); border-color: #f9c80e; }
        
        .card-price { width: 100%; text-align: left; font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; color: #f9c80e; margin-bottom: 10px; display: flex; align-items: center; gap: 3px; }
        .card-img { width: 60px; height: 60px; object-fit: contain; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.4)); margin-bottom: 15px; transition: 0.2s; }
        .item-card:hover .card-img { transform: scale(1.1); }
        .card-name { font-size: 10px; color: #8a92b6; text-align: center; font-weight: 700; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    </style>
</head>
<body>

    <div class="sidebar" id="live-feed"></div>

    <div class="main-wrapper">
        <header>
            <div class="logo-area">
                <div class="logo">
                    <div class="logo-icon">▲</div>
                    FLASH<span>UPGRADER</span>
                </div>
                <div class="header-stats">
                    <div class="stat-block">
                        <div class="stat-lbl">Онлайн</div>
                        <div class="stat-val">1 878</div>
                    </div>
                    <div class="stat-block">
                        <div class="stat-lbl">Апгрейдов</div>
                        <div class="stat-val">105 725 086</div>
                    </div>
                </div>
            </div>
            
            <div class="user-area">
                <button class="btn-daily" onclick="claimDaily()">Ежедневный бонус 2500</button>
                <div class="balance-box" id="ui-balance">0 ⭐️</div>
                <button class="btn-deposit" onclick="alert('Пополнение от 5000 звезд. Напишите в поддержку Flashgram.')">
                    <span style="font-size: 16px;">+</span> Пополнить
                </button>
            </div>
        </header>

        <div class="arena-section">
            <div class="item-box" id="box-src">
                <div class="box-title">Выберите подарки или баланс</div>
                <div class="box-sub">Вы можете выбрать несколько (в разработке)</div>
                <div class="empty-icon" id="src-empty">📦</div>
                <img src="" class="item-img" id="src-img" style="display:none;">
                <div class="box-price" id="src-price">0.00 ⭐️</div>
            </div>

            <div class="center-module">
                <div class="roulette-circle">
                    <svg class="svg-progress">
                        <circle class="svg-track" cx="120" cy="120" r="114"></circle>
                        <circle class="svg-fill" id="chance-svg-fill" cx="120" cy="120" r="114"></circle>
                    </svg>
                    <div class="inner-hole">
                        <div class="chance-text" id="chance-val">0.00%</div>
                        <div class="chance-sub">средний шанс</div>
                    </div>
                    <div class="arrow-spinner" id="arrow">
                        <div class="arrow-indicator"></div>
                    </div>
                </div>
                
                <button class="btn-play" id="btn-play" onclick="startPlay()" disabled>
                    <span style="font-size: 20px;">▲</span> Прокачать
                </button>
                
                <div class="multiplier-bar">
                    <button class="mult-btn" onclick="calcTarget(2)">x2</button>
                    <button class="mult-btn" onclick="calcTarget(4)">x4</button>
                    <button class="mult-btn" onclick="calcTarget(6)">x6</button>
                    <button class="mult-btn" onclick="calcTargetMultiplier(0.25)">25%</button>
                    <button class="mult-btn" onclick="calcTargetMultiplier(0.35)">35%</button>
                    <button class="mult-btn" onclick="calcTargetMultiplier(0.45)">45%</button>
                </div>
            </div>

            <div class="item-box" id="box-tgt">
                <div class="box-title">Выберите подарок для апгрейда</div>
                <div class="box-sub">&nbsp;</div>
                <div class="empty-icon" id="tgt-empty">🎁</div>
                <img src="" class="item-img" id="tgt-img" style="display:none;">
                <div class="box-price" id="tgt-price">0.00 ⭐️</div>
            </div>
        </div>

        <div class="inventories-section">
            <div class="inv-panel">
                <div class="inv-header">
                    <div class="inv-title"><i>📦</i> Мои подарки</div>
                    <div class="filter-lbl" id="user-total">Всего: 0.00 ⭐️</div>
                </div>
                <div class="inv-grid" id="grid-user"></div>
            </div>

            <div class="inv-panel">
                <div class="inv-header">
                    <div class="inv-title"><i>▲</i> Выберите подарок</div>
                    <div class="filters">
                        <span class="filter-lbl">Цена</span>
                        <input type="number" class="filter-input" id="f-min" placeholder="от" oninput="renderShop()">
                        <input type="number" class="filter-input" id="f-max" placeholder="до" oninput="renderShop()">
                    </div>
                </div>
                <div class="inv-grid" id="grid-shop"></div>
            </div>
        </div>
    </div>

    <script>
        const DB = [
            { id: 1, name: "Telegram Star", price: 100, img: "https://img.icons8.com/3d-fluency/100/star.png", rarity: "common" },
            { id: 2, name: "Candy Box", price: 250, img: "https://img.icons8.com/3d-fluency/100/candy.png", rarity: "common" },
            { id: 3, name: "Cookie NFT", price: 500, img: "https://img.icons8.com/3d-fluency/100/cookie.png", rarity: "common" },
            { id: 4, name: "Golden Heart", price: 1113, img: "https://img.icons8.com/3d-fluency/100/heart-suit.png", rarity: "rare" },
            { id: 5, name: "Magic Potion", price: 2500, img: "https://img.icons8.com/3d-fluency/100/potion.png", rarity: "rare" },
            { id: 6, name: "Crypto Key", price: 5000, img: "https://img.icons8.com/3d-fluency/100/key.png", rarity: "epic" },
            { id: 7, name: "Cyber Frog", price: 9750, img: "https://img.icons8.com/3d-fluency/100/frog.png", rarity: "epic" },
            { id: 8, name: "Plasma Crystal", price: 15000, img: "https://img.icons8.com/3d-fluency/100/crystal.png", rarity: "epic" },
            { id: 9, name: "King Crown", price: 25000, img: "https://img.icons8.com/3d-fluency/100/crown.png", rarity: "legendary" },
            { id: 10, name: "Diamond NFT", price: 50000, img: "https://img.icons8.com/3d-fluency/100/diamond.png", rarity: "legendary" },
            { id: 11, name: "Space Rocket", price: 100000, img: "https://img.icons8.com/3d-fluency/100/rocket.png", rarity: "legendary" }
        ];

        let user = { balance: 25000, inv: [], lastBonus: 0 };
        let srcItem = null;
        let tgtItem = null;
        let spinning = false;
        let currentDeg = 0;
        const SVG_CIRCUMFERENCE = 716.28; // 2 * PI * 114

        window.onload = () => {
            let s = localStorage.getItem('upgYellow');
            if(s) { user = JSON.parse(s); } 
            else { 
                // Даем тестовые предметы
                user.inv.push({...DB[2], uid: Date.now()+1});
                user.inv.push({...DB[3], uid: Date.now()+2});
                user.inv.push({...DB[4], uid: Date.now()+3});
                save(); 
            }
            updateView();
            renderUserInv();
            renderShop();
        };

        function save() { localStorage.setItem('upgYellow', JSON.stringify(user)); }

        function claimDaily() {
            const now = Date.now();
            if (now - user.lastBonus >= 24 * 60 * 60 * 1000) {
                user.balance += 2500;
                user.lastBonus = now;
                save();
                updateView();
                alert("Ежедневный бонус 2500 ⭐️ получен!");
            } else {
                let hours = Math.ceil((24 * 60 * 60 * 1000 - (now - user.lastBonus)) / (1000 * 60 * 60));
                alert(`Бонус уже был получен. Приходите через ${hours} ч.`);
            }
        }

        function updateView() {
            document.getElementById('ui-balance').innerText = user.balance.toLocaleString() + " ⭐️";

            // Левый бокс (Исходный)
            if(srcItem) {
                document.getElementById('src-empty').style.display = 'none';
                document.getElementById('src-img').style.display = 'block';
                document.getElementById('src-img').src = srcItem.img;
                document.getElementById('src-price').innerText = srcItem.price.toLocaleString() + " ⭐️";
                document.getElementById('box-src').classList.add('active');
            } else {
                document.getElementById('src-empty').style.display = 'block';
                document.getElementById('src-img').style.display = 'none';
                document.getElementById('src-price').innerText = "0.00 ⭐️";
                document.getElementById('box-src').classList.remove('active');
            }

            // Правый бокс (Целевой)
            if(tgtItem) {
                document.getElementById('tgt-empty').style.display = 'none';
                document.getElementById('tgt-img').style.display = 'block';
                document.getElementById('tgt-img').src = tgtItem.img;
                document.getElementById('tgt-price').innerText = tgtItem.price.toLocaleString() + " ⭐️";
                document.getElementById('box-tgt').classList.add('active');
            } else {
                document.getElementById('tgt-empty').style.display = 'block';
                document.getElementById('tgt-img').style.display = 'none';
                document.getElementById('tgt-price').innerText = "0.00 ⭐️";
                document.getElementById('box-tgt').classList.remove('active');
            }

            // Шанс и круг
            const btn = document.getElementById('btn-play');
            const svgFill = document.getElementById('chance-svg-fill');
            
            if(srcItem && tgtItem) {
                let chance = (srcItem.price / tgtItem.price) * 100;
                if(chance > 100) chance = 100;
                document.getElementById('chance-val').innerText = chance.toFixed(2) + "%";
                
                let offset = SVG_CIRCUMFERENCE - (chance / 100) * SVG_CIRCUMFERENCE;
                svgFill.style.strokeDashoffset = offset;
                btn.disabled = srcItem.price >= tgtItem.price;
            } else {
                document.getElementById('chance-val').innerText = "0.00%";
                svgFill.style.strokeDashoffset = SVG_CIRCUMFERENCE;
                btn.disabled = true;
            }
        }

        function renderUserInv() {
            const grid = document.getElementById('grid-user');
            grid.innerHTML = '';
            let total = 0;

            user.inv.forEach(i => {
                total += i.price;
                const d = document.createElement('div');
                d.className = `item-card r-${i.rarity} ${srcItem && srcItem.uid === i.uid ? 'selected' : ''}`;
                d.innerHTML = `
                    <div class="card-price">${i.price.toLocaleString()} <span style="font-size:10px;">⭐️</span></div>
                    <img src="${i.img}" class="card-img">
                    <div class="card-name">${i.name}</div>
                `;
                d.onclick = () => { if(!spinning) { srcItem = i; updateView(); renderUserInv(); } };
                grid.appendChild(d);
            });
            document.getElementById('user-total').innerText = `Всего: ${total.toLocaleString()} ⭐️`;
        }

        function renderShop() {
            const grid = document.getElementById('grid-shop');
            grid.innerHTML = '';
            
            let minP = parseInt(document.getElementById('f-min').value) || 0;
            let maxP = parseInt(document.getElementById('f-max').value) || 9999999;

            let filtered = DB.filter(x => x.price >= minP && x.price <= maxP);

            filtered.forEach(i => {
                const d = document.createElement('div');
                d.className = `item-card r-${i.rarity} ${tgtItem && tgtItem.id === i.id ? 'selected' : ''}`;
                d.innerHTML = `
                    <div class="card-price">${i.price.toLocaleString()} <span style="font-size:10px;">⭐️</span></div>
                    <img src="${i.img}" class="card-img">
                    <div class="card-name">${i.name}</div>
                `;
                d.onclick = () => { if(!spinning) { tgtItem = i; updateView(); renderShop(); } };
                grid.appendChild(d);
            });
        }

        function calcTarget(mult) {
            if(!srcItem) return alert("Сначала выберите свой подарок слева!");
            const targetPrice = srcItem.price * mult;
            tgtItem = DB.reduce((prev, curr) => Math.abs(curr.price - targetPrice) < Math.abs(prev.price - targetPrice) ? curr : prev);
            updateView(); renderShop();
        }

        function calcTargetMultiplier(chance) {
            if(!srcItem) return alert("Сначала выберите свой подарок слева!");
            const targetPrice = srcItem.price / chance;
            tgtItem = DB.reduce((prev, curr) => Math.abs(curr.price - targetPrice) < Math.abs(prev.price - targetPrice) ? curr : prev);
            updateView(); renderShop();
        }

        function startPlay() {
            if(spinning || !srcItem || !tgtItem) return;
            spinning = true;
            document.getElementById('btn-play').disabled = true;

            let chanceVis = (srcItem.price / tgtItem.price) * 100;
            if(chanceVis > 100) chanceVis = 100;
            
            let isWin = (Math.random() * 100) <= chanceVis;

            const arrow = document.getElementById('arrow');
            const winSector = (chanceVis / 100) * 360;
            const stopDeg = isWin ? (Math.random() * winSector) : (winSector + Math.random() * (360 - winSector));
            
            currentDeg += (360 * 5) + stopDeg; 
            arrow.style.transform = `rotate(${currentDeg}deg)`;

            setTimeout(() => {
                if(isWin) {
                    user.inv.push({...tgtItem, uid: Date.now()});
                    user.inv = user.inv.filter(x => x.uid !== srcItem.uid);
                    srcItem = null;
                } else {
                    user.inv = user.inv.filter(x => x.uid !== srcItem.uid);
                    srcItem = null;
                }
                spinning = false;
                save(); updateView(); renderUserInv(); renderShop();
            }, 8200);
        }

        // Лайв лента
        setInterval(() => {
            const feed = document.getElementById('live-feed');
            const d = document.createElement('div');
            const rndItem = DB[Math.floor(Math.random() * DB.length)];
            let rndChance = (Math.random() * 80 + 5).toFixed(2);
            d.className = `live-item r-${rndItem.rarity}`;
            d.innerHTML = `
                <div class="live-chance">${rndChance}%</div>
                <img src="${rndItem.img}" class="live-img">
            `;
            feed.prepend(d);
            if(feed.children.length > 15) feed.lastChild.remove();
        }, 1500);
    </script>
</body>
</html>
