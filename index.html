<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standoff 2 Skin Upgrader Simulator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rowdies:wght@400;700&family=Rubik:wght@400;500;700&display=swap');

        :root {
            --bg-main: #07090e;
            --bg-panel: #0d111c;
            --bg-card: #121826;
            --text-main: #ffffff;
            --text-muted: #627293;
            --accent-gold: #ffb700;
            --accent-green: #00ff66;
            --accent-red: #ff3355;
            --border-color: #1f293d;

            /* Редкости скинов Standoff 2 */
            --rarity-common: #9da2b0;
            --rarity-uncommon: #4a69ff;
            --rarity-rare: #834aff;
            --rarity-epic: #d32eff;
            --rarity-legendary: #ff2e6b;
            --rarity-arcane: #ff3e3e;
        }

        body {
            margin: 0; padding: 20px;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Rubik', sans-serif;
            box-sizing: border-box; user-select: none;
            display: flex; flex-direction: column; align-items: center;
        }

        .app-container {
            width: 100%; max-width: 1200px;
            display: flex; flex-direction: column; gap: 20px;
        }

        /* ХЕДЕР С БАЛАНСОМ */
        .header-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--bg-panel); padding: 15px 25px; border-radius: 14px;
            border: 1px solid var(--border-color);
        }
        .logo { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 20px; letter-spacing: 2px; color: #fff; }
        .logo span { color: var(--accent-gold); }

        /* ВЕРХНЯЯ ЧАСТЬ (АПГРЕЙДЕР) */
        .upgrade-area {
            display: grid; grid-template-columns: 1fr 1.2fr 1fr; gap: 20px; min-height: 360px;
        }

        .panel {
            background-color: var(--bg-panel); border-radius: 16px;
            position: relative; display: flex; flex-direction: column;
            border: 1px solid var(--border-color);
            padding: 20px; box-sizing: border-box;
            justify-content: center; align-items: center;
        }

        .panel-header-title {
            position: absolute; top: 15px; font-size: 11px; font-weight: 700;
            color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px;
        }

        /* Слоты предметов */
        .slot-content {
            display: flex; flex-direction: column; align-items: center; text-align: center; width: 100%; margin-top: 20px;
        }
        .skin-icon-large {
            width: 150px; height: 110px; object-fit: contain; margin-bottom: 15px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }
        .skin-title { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 4px; }
        .skin-wear { font-size: 12px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; }
        .skin-value { font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 700; color: var(--accent-gold); }

        .placeholder-text { color: var(--text-muted); font-size: 13px; text-align: center; font-weight: 500; }

        /* ЦЕНТРАЛЬНЫЙ СЕКТОР С КОЛЕСОМ */
        .wheel-panel { background: transparent; border: none; padding: 0; position: relative; }
        
        .wheel-outer {
            position: relative; width: 240px; height: 240px; border-radius: 50%;
            background: #111522; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.6); margin-bottom: 20px;
            transition: background 0.3s ease;
        }

        .wheel-center {
            width: 190px; height: 190px; background: var(--bg-main); border-radius: 50%;
            z-index: 5; display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8); position: relative;
        }

        .wheel-runner {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%; z-index: 4; pointer-events: none; transform: rotate(0deg);
        }
        .wheel-runner::after {
            content: ''; position: absolute; top: -2px; left: calc(50% - 4px);
            width: 8px; height: 14px; background: #fff; border-radius: 4px;
            box-shadow: 0 0 12px #fff, 0 0 20px var(--accent-gold);
        }

        .chance-value { font-family: 'Orbitron', sans-serif; font-size: 34px; font-weight: 900; color: var(--accent-gold); }
        .chance-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

        .btn-action-upgrade {
            width: 100%; background: var(--accent-gold); color: #000; border: none;
            padding: 16px; font-size: 16px; font-weight: 700; border-radius: 12px; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s;
        }
        .btn-action-upgrade:hover:not(:disabled) { background: #ffca36; transform: translateY(-1px); }
        .btn-action-upgrade:disabled { background: #161b26; color: #3b455c; cursor: not-allowed; }

        .settings-trigger {
            position: absolute; right: -10px; bottom: 75px; background: var(--bg-card);
            border: 1px solid var(--border-color); color: #fff; width: 42px; height: 42px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s; z-index: 10;
        }
        .settings-trigger:hover { background: #1c2438; border-color: #313f5c; }

        /* ИНВЕНТАРНАЯ ЗОНА */
        .inventory-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .inv-title-container {
            display: flex; justify-content: space-between; width: 100%; align-items: center;
            margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;
        }
        .inv-title { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

        .skins-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px; overflow-y: auto; height: 360px; width: 100%; align-content: start;
        }
        .skins-grid::-webkit-scrollbar { width: 6px; }
        .skins-grid::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

        /* Элемент карточки скина */
        .skin-item-card {
            background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px;
            padding: 12px; position: relative; cursor: pointer; display: flex; flex-direction: column;
            justify-content: space-between; height: 135px; box-sizing: border-box; transition: all 0.2s;
        }
        .skin-item-card:hover { background: #171f30; border-color: #2b3954; transform: translateY(-2px); }
        .skin-item-card.selected { border-color: var(--accent-gold); background: #192236; box-shadow: 0 0 15px rgba(255,183,0,0.15); }

        .card-rarity-badge { position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; border-radius: 0 0 12px 12px; }
        .card-price-tag { font-family: 'Orbitron', sans-serif; font-size: 11px; font-weight: 700; color: var(--accent-gold); text-align: right; }
        .skin-img-small { width: 100%; height: 65px; object-fit: contain; margin: 4px 0; }
        .card-name-info { font-size: 11px; font-weight: 500; color: #d1d7e3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* ВСПЛЫВАЮЩИЙ БАННЕР РЕЗУЛЬТАТА */
        .status-banner {
            position: absolute; top: -45px; left: 50%; transform: translateX(-50%);
            padding: 8px 20px; border-radius: 6px; font-weight: 700; font-size: 13px;
            opacity: 0; transition: all 0.3s; z-index: 100; text-transform: uppercase; pointer-events: none;
        }
        .status-banner.win { opacity: 1; background: var(--accent-green); color: #000; box-shadow: 0 0 15px rgba(0,255,102,0.4); }
        .status-banner.lose { opacity: 1; background: var(--accent-red); color: #fff; box-shadow: 0 0 15px rgba(255,51,85,0.4); }

        /* НАСТРОЙКИ МОДАЛЬНОГО ОКНА */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 200; display: none; align-items: center; justify-content: center;
        }
        .modal-view {
            background: var(--bg-panel); border: 1px solid var(--border-color); width: 320px;
            border-radius: 16px; padding: 20px; box-sizing: border-box;
        }
        .modal-title { font-size: 14px; font-weight: 700; text-transform: uppercase; margin-bottom: 20px; display: flex; justify-content: space-between; }
        .modal-close { cursor: pointer; color: var(--text-muted); }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 13px; }
        
        /* Переключатель */
        .toggle-switch {
            position: relative; display: inline-block; width: 40px; height: 22px;
        }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .switch-slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #1c2333; transition: .3s; border-radius: 34px; border: 1px solid var(--border-color);
        }
        .switch-slider:before {
            position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px;
            background-color: white; transition: .3s; border-radius: 50%;
        }
        input:checked + .switch-slider { background-color: var(--accent-gold); }
        input:checked + .switch-slider:before { transform: translateX(18px); background-color: #000; }

        .range-slider { width: 100%; margin-top: 5px; -webkit-appearance: none; background: #1c2333; height: 4px; border-radius: 2px; }
        .range-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--accent-gold); cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-bar">
        <div class="logo">EVOLUTION<span>UPGRADE</span></div>
        <div style="font-family: 'Orbitron'; font-weight:700; color:var(--accent-gold)">
            <span id="user-wallet">15 450.00</span> G
        </div>
    </div>

    <div class="upgrade-area">
        <div class="panel">
            <div class="panel-header-title">Предмет для улучшения</div>
            <div id="slot-left" class="slot-content" style="display: none;">
                <img src="" id="slot-left-img" class="skin-icon-large" alt="">
                <div id="slot-left-title" class="skin-title"></div>
                <div id="slot-left-wear" class="skin-wear"></div>
                <div id="slot-left-price" class="skin-value"></div>
            </div>
            <div id="slot-left-empty" class="placeholder-text">Выберите предмет из инвентаря ниже</div>
        </div>

        <div class="panel wheel-panel">
            <div class="status-banner" id="status-banner">Успех!</div>
            <div class="wheel-outer" id="wheel-render">
                <div class="wheel-runner" id="wheel-indicator"></div>
                <div class="wheel-center">
                    <div class="chance-value" id="chance-text">0.00%</div>
                    <div class="chance-label" id="chance-tier">Ожидание</div>
                </div>
            </div>
            <button class="btn-action-upgrade" id="btn-start" disabled onclick="executeUpgrade()">Улучшить</button>
            <div class="settings-trigger" onclick="toggleSettings(true)">⚙️</div>
        </div>

        <div class="panel">
            <div class="panel-header-title">Целевой предмет</div>
            <div id="slot-right" class="slot-content" style="display: none;">
                <img src="" id="slot-right-img" class="skin-icon-large" alt="">
                <div id="slot-right-title" class="skin-title"></div>
                <div id="slot-right-wear" class="skin-wear"></div>
                <div id="slot-right-price" class="skin-value"></div>
            </div>
            <div id="slot-right-empty" class="placeholder-text">Выберите цель из списка доступных</div>
        </div>
    </div>

    <div class="inventory-section">
        <div class="panel" style="align-items: flex-start; justify-content: flex-start;">
            <div class="inv-title-container">
                <div class="inv-title">Мой инвентарь</div>
                <div style="font-size:12px; color:var(--text-muted)" id="count-inv">Слотов: 0</div>
            </div>
            <div class="skins-grid" id="grid-user-inventory"></div>
        </div>

        <div class="panel" style="align-items: flex-start; justify-content: flex-start;">
            <div class="inv-title-container">
                <div class="inv-title">Доступные скины</div>
            </div>
            <div class="skins-grid" id="grid-shop-items"></div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="settings-modal">
    <div class="modal-view">
        <div class="modal-title">
            <span>Быстрый апгрейд</span>
            <span class="modal-close" onclick="toggleSettings(false)">✕</span>
        </div>
        <div class="setting-row">
            <span>Быстрый режим</span>
            <label class="toggle-switch">
                <input type="checkbox" id="cfg-fast">
                <span class="switch-slider"></span>
            </label>
        </div>
        <div class="setting-row">
            <span>Вспышка экрана</span>
            <label class="toggle-switch">
                <input type="checkbox" id="cfg-flash" checked>
                <span class="switch-slider"></span>
            </label>
        </div>
        <div class="setting-row">
            <span>Анимация</span>
            <label class="toggle-switch">
                <input type="checkbox" id="cfg-anim" checked>
                <span class="switch-slider"></span>
            </label>
        </div>
        <div class="setting-row">
            <span>Звуковые эффекты</span>
            <label class="toggle-switch">
                <input type="checkbox" id="cfg-sound" checked>
                <span class="switch-slider"></span>
            </label>
        </div>
        <div style="margin-top:15px;">
            <div class="setting-row" style="margin-bottom:5px;">
                <span>Скорость анимации</span>
                <span id="cfg-speed-lbl">4.2s</span>
            </div>
            <input type="range" min="10" max="60" value="42" class="range-slider" id="cfg-speed" oninput="document.getElementById('cfg-speed-lbl').innerText = (this.value/10).toFixed(1) + 's'">
        </div>
    </div>
</div>

<script>
    // --- ИГРОВОЙ ЗВУКОВОЙ ДВИЖОК (Web Audio API) ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;

    function initAudio() {
        if (!audioCtx) audioCtx = new AudioContext();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function emitSound(type) {
        if (!document.getElementById('cfg-sound').checked || !audioCtx) return;
        const now = audioCtx.currentTime;

        if (type === 'click') {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(450, now); gain.gain.setValueAtTime(0.05, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.04); osc.start(now); osc.stop(now + 0.04);
        } else if (type === 'tick') {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'triangle';
            osc.frequency.setValueAtTime(280, now); gain.gain.setValueAtTime(0.04, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.015); osc.start(now); osc.stop(now + 0.015);
        } else if (type === 'win') {
            [440, 554.37, 659.25, 880].forEach((f, i) => {
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination); o.frequency.setValueAtTime(f, now + i*0.08);
                g.gain.setValueAtTime(0.08, now + i*0.08); g.gain.exponentialRampToValueAtTime(0.001, now + i*0.08 + 0.25);
                o.start(now + i*0.08); o.stop(now + i*0.08 + 0.25);
            });
        } else if (type === 'lose') {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(140, now); osc.frequency.linearRampToValueAtTime(60, now + 0.35);
            gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0.001, now + 0.35);
            osc.start(now); osc.stop(now + 0.35);
        }
    }

    // --- ПОЛНАЯ БАЗА СКИНОВ ИЗ ВИДЕО ---
    const ITEMS_DB = {
        "neon_noir": { name: "M40A1 | Neo-Noir", wear: "Well Worn", price: 415.43, rarity: "var(--rarity-legendary)", img: "https://i.postimg.cc/q7g67V7k/m40.png" },
        "atrack": { name: "MP7 | Atrack", wear: "Minimal Wear", price: 1320.13, rarity: "var(--rarity-rare)", img: "https://i.postimg.cc/d08pXg56/mp7.png" },
        "wasteland": { name: "Fabm | Wasteland Princess", wear: "Factory New", price: 2379.37, rarity: "var(--rarity-epic)", img: "https://i.postimg.cc/T3bS0zS7/fabm.png" },
        "shipwood": { name: "F/S | Shipwood", wear: "Factory New", price: 2830.52, rarity: "var(--rarity-rare)", img: "https://i.postimg.cc/9M4Z2YFv/fs.png" },
        "safari": { name: "M9 | Safari Mesh", wear: "Battle Scarred", price: 5532.32, rarity: "var(--rarity-arcane)", img: "https://i.postimg.cc/Z5f0H1S8/m9.png" },
        "ultraviolet": { name: "M9 | Ultraviolet", wear: "Minimal Wear", price: 5422.31, rarity: "var(--rarity-arcane)", img: "https://i.postimg.cc/fW6N872G/m9uv.png" }
    };

    // Состояние приложения
    let playerGold = 12500.00;
    let inventoryList = ["neon_noir", "atrack", "shipwood"];
    let activeInvIdx = null;
    let activeShopKey = null;
    let currentChance = 0;
    let processRunning = false;

    document.body.addEventListener('click', initAudio, { once: true });

    function init() {
        buildGrids();
        refreshWorkspace();
    }

    function buildGrids() {
        // Рендер инвентаря игрока
        const invGrid = document.getElementById("grid-user-inventory");
        invGrid.innerHTML = "";
        document.getElementById("count-inv").innerText = `Слотов: ${inventoryList.length}`;
        document.getElementById("user-wallet").innerText = playerGold.toFixed(2);

        inventoryList.forEach((key, idx) => {
            const data = ITEMS_DB[key];
            if (!data) return;
            const block = document.createElement("div");
            block.className = `skin-item-card ${activeInvIdx === idx ? 'selected' : ''}`;
            block.onclick = () => { if(!processRunning) { emitSound('click'); selectInventory(idx); } };
            block.innerHTML = `
                <div class="card-price-tag">${data.price.toFixed(2)} G</div>
                <img src="${data.img}" class="skin-img-small" onerror="this.src='https://i.postimg.cc/Y96Xz3g0/fallback.png'">
                <div class="card-name-info">${data.name}</div>
                <div class="card-rarity-badge" style="background: ${data.rarity}"></div>
            `;
            invGrid.appendChild(block);
        });

        // Рендер магазина доступных целей
        const shopGrid = document.getElementById("grid-shop-items");
        shopGrid.innerHTML = "";
        Object.keys(ITEMS_DB).forEach(key => {
            const data = ITEMS_DB[key];
            const block = document.createElement("div");
            block.className = `skin-item-card ${activeShopKey === key ? 'selected' : ''}`;
            block.onclick = () => { if(!processRunning) { emitSound('click'); selectShop(key); } };
            block.innerHTML = `
                <div class="card-price-tag">${data.price.toFixed(2)} G</div>
                <img src="${data.img}" class="skin-img-small" onerror="this.src='https://i.postimg.cc/Y96Xz3g0/fallback.png'">
                <div class="card-name-info">${data.name}</div>
                <div class="card-rarity-badge" style="background: ${data.rarity}"></div>
            `;
            shopGrid.appendChild(block);
        });
    }

    function selectInventory(idx) {
        activeInvIdx = (activeInvIdx === idx) ? null : idx;
        refreshWorkspace();
        buildGrids();
    }

    function selectShop(key) {
        activeShopKey = (activeShopKey === key) ? null : key;
        refreshWorkspace();
        buildGrids();
    }

    function refreshWorkspace() {
        // Левый слот
        if (activeInvIdx !== null) {
            const item = ITEMS_DB[inventoryList[activeInvIdx]];
            document.getElementById("slot-left-empty").style.display = "none";
            document.getElementById("slot-left").style.display = "flex";
            document.getElementById("slot-left-img").src = item.img;
            document.getElementById("slot-left-title").innerText = item.name;
            document.getElementById("slot-left-wear").innerText = item.wear;
            document.getElementById("slot-left-price").innerText = item.price.toFixed(2) + " G";
        } else {
            document.getElementById("slot-left").style.display = "none";
            document.getElementById("slot-left-empty").style.display = "block";
        }

        // Правый слот
        if (activeShopKey !== null) {
            const item = ITEMS_DB[activeShopKey];
            document.getElementById("slot-right-empty").style.display = "none";
            document.getElementById("slot-right").style.display = "flex";
            document.getElementById("slot-right-img").src = item.img;
            document.getElementById("slot-right-title").innerText = item.name;
            document.getElementById("slot-right-wear").innerText = item.wear;
            document.getElementById("slot-right-price").innerText = item.price.toFixed(2) + " G";
        } else {
            document.getElementById("slot-right").style.display = "none";
            document.getElementById("slot-right-empty").style.display = "block";
        }

        // Логика расчета шанса
        const btn = document.getElementById("btn-start");
        if (activeInvIdx !== null && activeShopKey !== null) {
            const valFrom = ITEMS_DB[inventoryList[activeInvIdx]].price;
            const valTo = ITEMS_DB[activeShopKey].price;

            currentChance = Math.min((valFrom / valTo) * 100, 100);
            document.getElementById("chance-text").innerText = currentChance.toFixed(2) + "%";

            if (currentChance >= 75) {
                document.getElementById("chance-tier").innerText = "Высокий шанс";
                document.getElementById("chance-text").style.color = "var(--accent-green)";
            } else if (currentChance >= 35) {
                document.getElementById("chance-tier").innerText = "Средний шанс";
                document.getElementById("chance-text").style.color = "var(--accent-gold)";
            } else {
                document.getElementById("chance-tier").innerText = "Низкий шанс";
                document.getElementById("chance-text").style.color = "var(--accent-red)";
            }

            btn.disabled = false;
            paintWheelArc(currentChance);
        } else {
            currentChance = 0;
            document.getElementById("chance-text").innerText = "0.00%";
            document.getElementById("chance-text").style.color = "var(--accent-gold)";
            document.getElementById("chance-tier").innerText = "Ожидание";
            btn.disabled = true;
            paintWheelArc(0);
        }
    }

    function paintWheelArc(chance) {
        const target = document.getElementById("wheel-render");
        if (chance <= 0) { target.style.background = "#111522"; return; }
        
        // Рисуем дугу победы желтым цветом, начиная от верхней точки (0 градусов)
        target.style.background = `conic-gradient(
            var(--accent-gold) 0deg, 
            var(--accent-gold) ${chance * 3.6}deg, 
            #111522 ${chance * 3.6}deg, 
            #111522 360deg
        )`;
    }

    function executeUpgrade() {
        if (processRunning || activeInvIdx === null || activeShopKey === null) return;
        
        processRunning = true;
        document.getElementById("btn-start").disabled = true;
        document.getElementById("status-banner").className = "status-banner";

        const isWin = (Math.random() * 100) <= currentChance;
        const configFast = document.getElementById("cfg-fast").checked;
        const configAnim = document.getElementById("cfg-anim").checked;
        
        // Определение точки остановки стрелки на основе результата
        let targetDegree = 0;
        if (isWin) {
            targetDegree = Math.random() * (currentChance * 3.6);
        } else {
            targetDegree = (currentChance * 3.6) + Math.random() * ((100 - currentChance) * 3.6);
        }

        if (configFast || !configAnim) {
            // Мгновенный исход
            wrapUpUpgrade(isWin);
            return;
        }

        const duration = (parseInt(document.getElementById("cfg-speed").value) / 10) * 1000;
        const fullRotations = 1440; // 4 полных оборота индикатора для динамики
        const finalDeg = fullRotations + targetDegree;
        
        const runner = document.getElementById("wheel-indicator");
        let startTimestamp = null;
        let prevTickAngle = 0;

        function stepAnimation(timestamp) {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            
            // Плавное кубическое замедление (Cubic Out Ease)
            const ease = 1 - Math.pow(1 - progress, 3);
            const currentAngle = finalDeg * ease;
            
            runner.style.transform = `rotate(${currentAngle}deg)`;

            // Воспроизведение звука прокрутки при преодолении каждых 20 градусов
            if (currentAngle - prevTickAngle > 20) {
                emitSound('tick');
                prevTickAngle = currentAngle;
            }

            if (progress < 1) {
                requestAnimationFrame(stepAnimation);
            } else {
                if (document.getElementById("cfg-flash").checked) {
                    document.body.style.backgroundColor = isWin ? "#0d3618" : "#3b0b14";
                    setTimeout(() => { document.body.style.backgroundColor = var(--bg-main); }, 150);
                }
                wrapUpUpgrade(isWin);
            }
        }
        requestAnimationFrame(stepAnimation);
    }

    function wrapUpUpgrade(isWin) {
        const banner = document.getElementById("status-banner");
        
        // Удаляем сгоревший предмет
        const lostItemKey = inventoryList[activeInvIdx];
        inventoryList.splice(activeInvIdx, 1);

        if (isWin) {
            inventoryList.push(activeShopKey);
            banner.innerText = "Успешный апгрейд!";
            banner.className = "status-banner win";
            emitSound('win');
        } else {
            banner.innerText = "Предмет сгорел";
            banner.className = "status-banner lose";
            emitSound('lose');
        }

        // Очистка рабочего пространства
        activeInvIdx = null;
        activeShopKey = null;
        processRunning = false;
        
        buildGrids();
        refreshWorkspace();

        setTimeout(() => { banner.className = "status-banner"; }, 3500);
    }

    function toggleSettings(show) {
        document.getElementById("settings-modal").style.display = show ? "flex" : "none";
    }

    window.onload = init;
</script>
