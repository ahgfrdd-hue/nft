<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FlashUpgrader | Telegram Gifts</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0e1621;
            --bg-sec: #17212b;
            --bg-card: #242f3d;
            --bg-hover: #2b3847;
            --tg-blue: #2AABEE;
            --tg-blue-hover: #2298d6;
            --text-main: #ffffff;
            --text-muted: #8393a3;
            --border-color: #101921;
            --accent-green: #33c372;
            --accent-red: #e64d44;
            --accent-star: #fac031;
            
            --grad-premium: linear-gradient(135deg, #8E2DE2, #4A00E0);
            --grad-star: linear-gradient(135deg, #F1C40F, #F39C12);
            --grad-ton: linear-gradient(135deg, #00c6ff, #0072ff);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; user-select: none; }
        body { background-color: var(--bg-main); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
        button { cursor: pointer; border: none; outline: none; transition: all 0.2s ease; font-family: inherit; }
        
        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 16px; }

        /* HEADER & LIVE STATS */
        .header { display: flex; justify-content: space-between; align-items: center; height: 70px; border-bottom: 1px solid var(--border-color); background: var(--bg-sec); padding: 0 20px;}
        .logo { font-weight: 900; font-size: 22px; color: #fff; display: flex; align-items: center; gap: 8px; letter-spacing: -0.5px;}
        .logo span { color: var(--tg-blue); font-size: 26px; }
        .live-stats { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: var(--accent-green); background: rgba(51, 195, 114, 0.1); padding: 8px 14px; border-radius: 12px; }
        
        .btn-login { background: var(--tg-blue); color: #fff; font-weight: 600; padding: 10px 20px; border-radius: 10px; display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .btn-login:hover { background: var(--tg-blue-hover); transform: translateY(-1px); }

        .live-drops { display: flex; overflow-x: auto; background: var(--bg-sec); padding: 12px; gap: 12px; border-bottom: 1px solid var(--border-color); scrollbar-width: none; }
        .live-drops::-webkit-scrollbar { display: none; }
        .drop-item { background: var(--bg-card); border-radius: 12px; padding: 8px 14px; display: flex; align-items: center; gap: 12px; min-width: max-content; animation: slideIn 0.5s ease-out; border-left: 3px solid var(--accent-star);}
        .drop-icon { font-size: 24px; width: 32px; text-align: center; }
        .drop-info { display: flex; flex-direction: column; }
        .drop-name { font-size: 12px; font-weight: 600; color: #fff; }
        .drop-user { font-size: 11px; color: var(--tg-blue); font-weight: 500; }

        /* UPGRADER ARENA (CLASSIC DESIGN) */
        .upgrader-arena { display: flex; justify-content: center; align-items: center; gap: 40px; padding: 40px 20px; flex-wrap: wrap; }
        @media (max-width: 768px) { .upgrader-arena { gap: 20px; flex-direction: column; } }

        .upgrade-slot { background: var(--bg-card); border: 2px solid var(--border-color); border-radius: 16px; width: 260px; height: 320px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; transition: all 0.3s; }
        .upgrade-slot.active { border-color: var(--tg-blue); box-shadow: 0 0 25px rgba(42, 171, 238, 0.15); }
        .slot-label { position: absolute; top: 16px; font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
        .slot-price { position: absolute; bottom: 20px; font-size: 18px; font-weight: 800; color: var(--accent-star); display: flex; gap: 6px; align-items: center;}
        .slot-price::before { content: '⭐️'; font-size: 14px; }
        .slot-item-icon { font-size: 80px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5)); margin-bottom: 10px; transition: transform 0.3s; }
        .upgrade-slot:hover .slot-item-icon { transform: scale(1.1); }
        .slot-item-name { font-size: 15px; font-weight: 700; color: #fff; text-align: center; padding: 0 10px; }

        .chance-block { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .chance-circle-container { position: relative; width: 180px; height: 180px; display: flex; justify-content: center; align-items: center; }
        .chance-circle-bg { position: absolute; width: 100%; height: 100%; background: var(--bg-card); border-radius: 50%; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); border: 6px solid var(--bg-sec); }
        .chance-svg { position: absolute; width: 100%; height: 100%; transform: rotate(-90deg); z-index: 2; }
        .chance-track { fill: none; stroke: var(--bg-sec); stroke-width: 10; }
        .chance-progress { fill: none; stroke: var(--tg-blue); stroke-width: 10; stroke-dasharray: 0 100; transition: stroke-dasharray 0.3s ease; }
        
        .chance-info { position: absolute; z-index: 5; text-align: center; }
        .chance-val { font-size: 32px; font-weight: 900; color: #fff; }
        .chance-lbl { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }

        .btn-upgrade-main { background: var(--tg-blue); color: #fff; font-size: 16px; font-weight: 800; text-transform: uppercase; padding: 18px 40px; border-radius: 12px; letter-spacing: 1px; box-shadow: 0 10px 25px rgba(42, 171, 238, 0.3); width: 100%; }
        .btn-upgrade-main:hover { background: var(--tg-blue-hover); transform: translateY(-2px); box-shadow: 0 10px 35px rgba(42, 171, 238, 0.5); }
        .btn-upgrade-main:disabled { background: var(--bg-sec); color: var(--text-muted); box-shadow: none; cursor: not-allowed; transform: none; }

        /* INVENTORIES (SPLIT VIEW) */
        .inventories-wrapper { display: flex; gap: 20px; padding: 0 20px 40px 20px; max-width: 1400px; margin: 0 auto; }
        @media (max-width: 900px) { .inventories-wrapper { flex-direction: column; } }
        
        .inv-pane { flex: 1; background: var(--bg-sec); border-radius: 16px; border: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .inv-header { padding: 16px 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .inv-title { font-size: 15px; font-weight: 800; color: #fff; display: flex; align-items: center; gap: 8px; }
        .inv-total { font-size: 13px; color: var(--accent-star); font-weight: 700; }
        
        .inv-grid { padding: 16px; display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; max-height: 400px; overflow-y: auto; align-content: start; }
        .inv-grid::-webkit-scrollbar { width: 6px; }
        .inv-grid::-webkit-scrollbar-thumb { background: var(--bg-hover); border-radius: 4px; }

        .item-card { background: var(--bg-card); border-radius: 12px; padding: 12px; text-align: center; position: relative; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .item-card:hover { background: var(--bg-hover); transform: translateY(-3px); }
        .item-card.selected { border-color: var(--tg-blue); background: var(--bg-hover); }
        .item-icon { font-size: 36px; margin: 8px 0; display: inline-block; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); }
        .item-name { font-size: 11px; font-weight: 600; color: #fff; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-price { font-size: 13px; font-weight: 800; color: var(--accent-star); }

        .btn-buy { margin-top: 8px; background: var(--bg-sec); color: var(--accent-green); font-size: 11px; font-weight: 700; width: 100%; padding: 6px; border-radius: 6px; border: 1px solid var(--accent-green); transition: 0.2s; }
        .btn-buy:hover { background: var(--accent-green); color: #fff; }

        /* OVERLAYS & MODALS */
        .auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(14, 22, 33, 0.9); backdrop-filter: blur(5px); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; text-align: center; }
        .auth-overlay h2 { font-size: 28px; font-weight: 800; margin-bottom: 10px; }
        .auth-overlay p { font-size: 15px; color: var(--text-muted); margin-bottom: 24px; max-width: 300px; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 100; display: none; justify-content: center; align-items: center; padding: 20px; opacity: 0; transition: opacity 0.3s ease; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-content { background: var(--bg-card); border-radius: 20px; width: 100%; max-width: 400px; overflow: hidden; transform: translateY(20px); transition: transform 0.3s ease; }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        
        .profile-header { padding: 20px; background: var(--bg-sec); display: flex; justify-content: space-between; align-items: center; }
        .btn-close { background: none; color: var(--text-muted); font-size: 24px; }
        .profile-body { padding: 20px; }
        
        .input-group { margin-bottom: 16px; }
        .input-group input { width: 100%; padding: 12px; background: var(--bg-main); border: 1px solid var(--border-color); color: #fff; border-radius: 10px; outline: none; font-weight: 600; }
        .input-group button { margin-top: 8px; width: 100%; padding: 10px; background: var(--tg-blue); color: #fff; border-radius: 10px; font-weight: 700; }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes spinPulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="auth-overlay" id="auth-lock">
        <h2>Доступ закрыт</h2>
        <p>Авторизуйтесь через Telegram, чтобы совершать апгрейды.</p>
        <button class="btn-login" onclick="toggleAuth(true)" style="padding: 14px 28px; font-size: 16px;">Войти через Telegram</button>
    </div>

    <header class="header">
        <div class="logo"><span>⚡️</span> FlashUpgrader</div>
        <div style="display: flex; gap: 12px;">
            <div class="live-stats">
                <span style="font-size: 16px;">🟢</span> Онлайн: <span id="online-count">3 142</span>
            </div>
            <div id="auth-btn-container"></div>
        </div>
    </header>
    
    <div class="live-drops" id="live-drops">
        </div>

    <div class="upgrader-arena">
        
        <div class="upgrade-slot" id="slot-my">
            <div class="slot-label">Мой предмет</div>
            <div class="slot-item-icon" id="my-icon" style="opacity: 0.2;">🎁</div>
            <div class="slot-item-name" id="my-name" style="color: var(--text-muted);">Выберите из инвентаря</div>
            <div class="slot-price" id="my-price">0</div>
        </div>

        <div class="chance-block">
            <div class="chance-circle-container">
                <div class="chance-circle-bg"></div>
                <svg class="chance-svg" viewBox="0 0 100 100">
                    <circle class="chance-track" cx="50" cy="50" r="40" />
                    <circle class="chance-progress" id="chance-arc" cx="50" cy="50" r="40" pathLength="100" stroke-dasharray="0 100" />
                </svg>
                <div class="chance-info">
                    <div class="chance-val" id="chance-display">0%</div>
                    <div class="chance-lbl">Шанс апгрейда</div>
                </div>
            </div>
            <button class="btn-upgrade-main" id="btn-upgrade" onclick="startUpgrade()" disabled>
                ЗАГРУЗКА...
            </button>
        </div>

        <div class="upgrade-slot" id="slot-target">
            <div class="slot-label">Цель</div>
            <div class="slot-item-icon" id="target-icon" style="opacity: 0.2;">🎯</div>
            <div class="slot-item-name" id="target-name" style="color: var(--text-muted);">Выберите в магазине</div>
            <div class="slot-price" id="target-price">0</div>
        </div>

    </div>

    <div class="inventories-wrapper">
        <div class="inv-pane">
            <div class="inv-header">
                <div class="inv-title">📦 Мои предметы</div>
                <div class="inv-total" id="my-inv-total">Сумма: 0 ⭐️</div>
            </div>
            <div class="inv-grid" id="my-inventory-grid">
                </div>
        </div>

        <div class="inv-pane">
            <div class="inv-header">
                <div class="inv-title">🛒 Магазин (Цели)</div>
                <div class="inv-total">Только новые TG Подарки</div>
            </div>
            <div class="inv-grid" id="shop-grid">
                </div>
        </div>
    </div>

    <div class="modal-overlay" id="profile-modal" onclick="closeModal(event, 'profile-modal')">
        <div class="modal-content">
            <div class="profile-header">
                <h3 style="font-weight: 800;">Настройки профиля</h3>
                <button class="btn-close" onclick="document.getElementById('profile-modal').classList.remove('active')">&times;</button>
            </div>
            <div class="profile-body">
                <div style="background: var(--bg-main); padding: 16px; border-radius: 12px; text-align: center; margin-bottom: 20px;">
                    <p style="color: var(--text-muted); font-size: 12px; margin-bottom: 4px;">Баланс</p>
                    <h2 style="color: var(--accent-star); font-size: 28px;" id="modal-balance">0 ⭐️</h2>
                </div>
                
                <div class="input-group">
                    <label style="font-size: 12px; color: var(--text-muted); margin-bottom: 4px; display: block;">Изменить никнейм</label>
                    <input type="text" id="nick-input" placeholder="Введите новый ник">
                    <button onclick="changeNickname()">Сохранить ник</button>
                </div>

                <button style="width: 100%; padding: 12px; background: rgba(230, 77, 68, 0.1); color: var(--accent-red); border-radius: 10px; font-weight: 700; margin-top: 10px;" onclick="toggleAuth(false)">Выйти из аккаунта</button>
            </div>
        </div>
    </div>

    <script>
        // --- ДАННЫЕ ПРОЕКТА ---
        let user = {
            isAuth: false,
            balance: 50000,
            name: 'sn1kersevo'
        };

        // Новые подарки из Телеграма
        const shopItems = [
            { id: 1, name: 'Печальный Пепе', price: 50, icon: '🐸' },
            { id: 2, name: 'Снежный Кот', price: 150, icon: '🐱' },
            { id: 3, name: 'Аниме Тян', price: 500, icon: '👧' },
            { id: 4, name: 'Золотая Звезда', price: 1000, icon: '🌟' },
            { id: 5, name: 'Корона Императора', price: 5000, icon: '👑' },
            { id: 6, name: 'Крутой Дракон', price: 15000, icon: '🐲' },
            { id: 7, name: 'Бриллиант TON', price: 50000, icon: '💎' },
            { id: 8, name: 'Telegram Premium X', price: 100000, icon: '🚀' }
        ];

        let myInventory = [];
        
        let selectedMyItemIndex = null;
        let selectedTargetItem = null;
        let isSpinning = false;

        // --- ИНИЦИАЛИЗАЦИЯ ---
        window.onload = () => {
            renderShop();
            renderMyInventory();
            startLiveOnline();
            startLiveDrops();
        };

        // --- АВТОРИЗАЦИЯ И UI ---
        function toggleAuth(status) {
            user.isAuth = status;
            document.getElementById('auth-lock').style.display = status ? 'none' : 'flex';
            
            const authContainer = document.getElementById('auth-btn-container');
            if (status) {
                renderHeaderProfile();
                document.getElementById('profile-modal').classList.remove('active');
            }
            updateBalanceUI();
        }

        function renderHeaderProfile() {
            const authContainer = document.getElementById('auth-btn-container');
            authContainer.innerHTML = `
                <div style="display: flex; align-items: center; gap: 12px; cursor: pointer; background: var(--bg-card); padding: 6px 12px; border-radius: 12px; border: 1px solid var(--border-color);" onclick="openProfile()">
                    <div style="text-align: right; line-height: 1.2;">
                        <div style="font-size: 13px; font-weight: 700; color: #fff;" id="header-name">${user.name}</div>
                        <div style="font-size: 12px; color: var(--accent-star); font-weight: 800;" id="header-balance">${user.balance} ⭐️</div>
                    </div>
                    <div style="width: 36px; height: 36px; background: var(--tg-blue); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: 800; font-size: 16px; color: #fff;" id="header-avatar">${user.name.charAt(0).toUpperCase()}</div>
                </div>
            `;
        }

        function updateBalanceUI() {
            if(!user.isAuth) return;
            document.getElementById('header-balance').innerText = `${Math.floor(user.balance)} ⭐️`;
            document.getElementById('modal-balance').innerText = `${Math.floor(user.balance)} ⭐️`;
        }

        function openProfile() {
            document.getElementById('nick-input').value = user.name;
            document.getElementById('profile-modal').classList.add('active');
        }

        function closeModal(e, id) {
            if(e.target.id === id) document.getElementById(id).classList.remove('active');
        }

        function changeNickname() {
            const newNick = document.getElementById('nick-input').value.trim();
            if(newNick.length > 2) {
                user.name = newNick;
                renderHeaderProfile();
                alert('Никнейм успешно изменен!');
                document.getElementById('profile-modal').classList.remove('active');
            }
        }

        // --- ЛОГИКА ПОКУПКИ И ИНВЕНТАРЯ ---
        function buyItem(e, id) {
            e.stopPropagation(); // Чтобы не кликалось выделение таргета
            const item = shopItems.find(i => i.id === id);
            if(user.balance >= item.price) {
                user.balance -= item.price;
                // Даем предмету уникальный ID в инвентаре
                myInventory.push({ ...item, invId: Date.now() + Math.random() });
                updateBalanceUI();
                renderMyInventory();
            } else {
                alert('Недостаточно баланса!');
            }
        }

        function renderShop() {
            const grid = document.getElementById('shop-grid');
            grid.innerHTML = shopItems.map(item => `
                <div class="item-card ${selectedTargetItem && selectedTargetItem.id === item.id ? 'selected' : ''}" onclick="selectTarget(${item.id})">
                    <div class="item-icon">${item.icon}</div>
                    <div class="item-name">${item.name}</div>
                    <div class="item-price">${item.price} ⭐️</div>
                    <button class="btn-buy" onclick="buyItem(event, ${item.id})">Купить</button>
                </div>
            `).join('');
        }

        function renderMyInventory() {
            const grid = document.getElementById('my-inventory-grid');
            let sum = 0;
            
            if(myInventory.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); font-size: 13px; padding: 20px;">Инвентарь пуст.<br>Купите подарки в магазине.</div>`;
            } else {
                grid.innerHTML = myInventory.map((item, index) => {
                    sum += item.price;
                    const isSelected = selectedMyItemIndex === index;
                    return `
                    <div class="item-card ${isSelected ? 'selected' : ''}" onclick="selectMyItem(${index})">
                        <div class="item-icon">${item.icon}</div>
                        <div class="item-name">${item.name}</div>
                        <div class="item-price">${item.price} ⭐️</div>
                    </div>
                `}).join('');
            }
            document.getElementById('my-inv-total').innerText = `Сумма: ${sum} ⭐️`;
            
            // Сбрасываем выбранный предмет если его удалили (проиграли)
            if(selectedMyItemIndex !== null && selectedMyItemIndex >= myInventory.length) {
                selectedMyItemIndex = null;
                updateSlotsUI();
            }
        }

        // --- ВЫБОР ПРЕДМЕТОВ ДЛЯ АПГРЕЙДА ---
        function selectMyItem(index) {
            if(isSpinning) return;
            selectedMyItemIndex = index;
            renderMyInventory();
            updateSlotsUI();
        }

        function selectTarget(id) {
            if(isSpinning) return;
            selectedTargetItem = shopItems.find(i => i.id === id);
            renderShop();
            updateSlotsUI();
        }

        function updateSlotsUI() {
            // Мой слот
            if (selectedMyItemIndex !== null) {
                const myItem = myInventory[selectedMyItemIndex];
                document.getElementById('my-icon').innerText = myItem.icon;
                document.getElementById('my-icon').style.opacity = '1';
                document.getElementById('my-name').innerText = myItem.name;
                document.getElementById('my-name').style.color = '#fff';
                document.getElementById('my-price').innerText = myItem.price;
                document.getElementById('slot-my').classList.add('active');
            } else {
                document.getElementById('my-icon').innerText = '🎁';
                document.getElementById('my-icon').style.opacity = '0.2';
                document.getElementById('my-name').innerText = 'Выберите из инвентаря';
                document.getElementById('my-name').style.color = 'var(--text-muted)';
                document.getElementById('my-price').innerText = '0';
                document.getElementById('slot-my').classList.remove('active');
            }

            // Таргет слот
            if (selectedTargetItem) {
                document.getElementById('target-icon').innerText = selectedTargetItem.icon;
                document.getElementById('target-icon').style.opacity = '1';
                document.getElementById('target-name').innerText = selectedTargetItem.name;
                document.getElementById('target-name').style.color = '#fff';
                document.getElementById('target-price').innerText = selectedTargetItem.price;
                document.getElementById('slot-target').classList.add('active');
            } else {
                document.getElementById('target-icon').innerText = '🎯';
                document.getElementById('target-icon').style.opacity = '0.2';
                document.getElementById('target-name').innerText = 'Выберите в магазине';
                document.getElementById('target-name').style.color = 'var(--text-muted)';
                document.getElementById('target-price').innerText = '0';
                document.getElementById('slot-target').classList.remove('active');
            }

            calculateChance();
        }

        function calculateChance() {
            const btn = document.getElementById('btn-upgrade');
            const arc = document.getElementById('chance-arc');
            const text = document.getElementById('chance-display');
            
            if (selectedMyItemIndex === null || !selectedTargetItem) {
                arc.style.strokeDasharray = `0 100`;
                text.innerText = '0%';
                btn.disabled = true;
                btn.innerText = 'ВЫБЕРИТЕ ПРЕДМЕТЫ';
                return 0;
            }

            const myPrice = myInventory[selectedMyItemIndex].price;
            const targetPrice = selectedTargetItem.price;
            
            let chance = (myPrice / targetPrice) * 100;
            if (chance > 100) chance = 100; // Ограничение в 100%
            
            arc.style.strokeDasharray = `${chance} 100`;
            text.innerText = `${chance.toFixed(2)}%`;
            
            if (chance >= 100) {
                btn.disabled = true;
                btn.innerText = 'ШАНС 100%';
            } else {
                btn.disabled = false;
                btn.innerText = 'АПГРЕЙДНУТЬ';
            }
            
            return chance;
        }

        // --- АНИМАЦИЯ И РЕЗУЛЬТАТ ---
        function startUpgrade() {
            const chance = calculateChance();
            if(isSpinning || chance <= 0 || chance >= 100) return;

            isSpinning = true;
            const btn = document.getElementById('btn-upgrade');
            btn.disabled = true;
            btn.innerText = 'КРУТИМ...';
            
            // Анимация пульсации круга
            document.querySelector('.chance-circle-container').style.animation = 'spinPulse 0.5s infinite';

            setTimeout(() => {
                const randomVal = Math.random() * 100;
                const isWin = randomVal <= chance;
                
                document.querySelector('.chance-circle-container').style.animation = 'none';
                
                if(isWin) {
                    // Выигрыш: забираем мой предмет, выдаем цель в инвентарь
                    myInventory.splice(selectedMyItemIndex, 1);
                    myInventory.push({ ...selectedTargetItem, invId: Date.now() });
                    btn.innerText = 'УСПЕШНО!';
                    btn.style.background = 'var(--accent-green)';
                } else {
                    // Проигрыш: просто сжигаем мой предмет
                    myInventory.splice(selectedMyItemIndex, 1);
                    btn.innerText = 'КРАШ!';
                    btn.style.background = 'var(--accent-red)';
                }
                
                selectedMyItemIndex = null; // Сбрасываем выбор своего предмета
                renderMyInventory();
                updateSlotsUI();
                
                setTimeout(() => {
                    isSpinning = false;
                    btn.style.background = 'var(--tg-blue)';
                    calculateChance();
                }, 1500);

            }, 2000); // 2 секунды фейк-кручения
        }

        // --- ЖИВОЙ ОНЛАЙН И ДРОПЫ (ФЕЙК) ---
        function startLiveOnline() {
            setInterval(() => {
                const el = document.getElementById('online-count');
                let current = parseInt(el.innerText.replace(/\s/g, ''));
                let delta = Math.floor(Math.random() * 7) - 3; // -3 до +3
                current += delta;
                if(current < 1000) current = 1000;
                el.innerText = current.toLocaleString('ru-RU');
            }, 4000);
        }

        function startLiveDrops() {
            const container = document.getElementById('live-drops');
            const randomNames = ['Dmitry', 'Alex_TG', 'TopG', 'Ivan_99', 'CryptoLord', 'AnimeFan', 'Durov'];
            
            // Изначальное заполнение
            for(let i=0; i<8; i++) addDrop(false);

            // Интервал добавления
            setInterval(() => addDrop(true), 3500);

            function addDrop(animate) {
                const item = shopItems[Math.floor(Math.random() * shopItems.length)];
                const uname = randomNames[Math.floor(Math.random() * randomNames.length)];
                
                const dropHTML = `
                    <div class="drop-item">
                        <div class="drop-icon">${item.icon}</div>
                        <div class="drop-info">
                            <span class="drop-name">${item.name}</span>
                            <span class="drop-user">${uname}</span>
                        </div>
                    </div>
                `;
                
                container.insertAdjacentHTML('afterbegin', dropHTML);
                if(container.children.length > 15) {
                    container.lastElementChild.remove();
                }
            }
        }
    </script>
</body>
</html>
