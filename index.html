<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashUpgrader - Premium</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&family=JetBrains+Mono:wght@700&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; user-select: none; }
        
        body { 
            background-color: #08090d; 
            background-image: radial-gradient(circle at 50% 0%, #161923 0%, #08090d 70%);
            color: #eceff4; 
            display: flex; 
            min-height: 100vh; 
            overflow-x: hidden; 
        }

        /* --- ЛАЙВ ЛЕНТА СЛЕВА --- */
        .live-feed { width: 80px; height: 100vh; background: rgba(15, 17, 24, 0.95); border-right: 1px solid #1a1c26; position: fixed; left: 0; top: 0; display: flex; flex-direction: column; align-items: center; padding-top: 15px; z-index: 100; overflow: hidden; backdrop-filter: blur(10px); }
        .live-item { width: 56px; height: 56px; background: #12141d; border: 1px solid #232736; margin-bottom: 10px; display: flex; justify-content: center; align-items: center; animation: slideDown 0.6s cubic-bezier(0.1, 0.9, 0.2, 1); border-radius: 8px; }
        .live-item img { width: 36px; height: 36px; object-fit: contain; }
        @keyframes slideDown { from { transform: translateY(-80px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* --- ОСНОВНАЯ ЗОНА --- */
        .main-wrapper { margin-left: 80px; width: calc(100% - 80px); display: flex; flex-direction: column; align-items: center; padding-bottom: 60px; }

        header { width: 100%; padding: 20px 50px; background: rgba(15, 17, 24, 0.8); border-bottom: 1px solid #1a1c26; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(20px); z-index: 50; }
        .logo { color: #00ff88; font-size: 22px; font-weight: 900; letter-spacing: 4px; text-transform: uppercase; text-shadow: 0 0 20px rgba(0,255,136,0.3); }
        .btn-profile { background: #12141d; border: 1px solid #232736; color: #eceff4; padding: 12px 28px; border-radius: 6px; font-weight: 700; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; font-size: 12px; }
        .btn-profile:hover { background: #00ff88; color: #08090d; border-color: #00ff88; box-shadow: 0 0 15px rgba(0,255,136,0.4); }

        /* --- ЗОНА АПГРЕЙДА --- */
        .upgrade-section { display: flex; justify-content: center; align-items: center; gap: 70px; margin-top: 80px; width: 100%; max-width: 1100px; }

        .item-box { width: 240px; height: 320px; background: #0f1118; border: 1px dashed #232736; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; transition: 0.4s cubic-bezier(0.1, 0.9, 0.2, 1); }
        .item-box.active { border: 1px solid #32384c; background: #12151e; box-shadow: 0 15px 40px rgba(0,0,0,0.5); }
        .box-title { position: absolute; top: 20px; font-size: 10px; color: #6a718c; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }
        .item-img { width: 100px; height: 100px; object-fit: contain; margin: 30px 0 15px 0; filter: drop-shadow(0 15px 20px rgba(0,0,0,0.6)); transition: 0.3s; }
        .item-box.active:hover .item-img { transform: translateY(-5px) scale(1.05); }
        .item-price { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 700; color: #00ff88; }
        .item-name { color: #8a92b6; font-size: 12px; margin-top: 10px; text-align: center; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; padding: 0 15px; }

        /* --- РУЛЕТКА SVG --- */
        .center-module { display: flex; flex-direction: column; align-items: center; width: 320px; position: relative; }
        
        .roulette-circle { width: 280px; height: 280px; border-radius: 50%; background: #08090d; border: 6px solid #12141d; position: relative; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 50px rgba(0,0,0,0.8), inset 0 0 30px rgba(0,0,0,0.8); }
        
        /* СВГ прогресс бар (Зеленая жижа) */
        .svg-progress { position: absolute; top: -6px; left: -6px; width: 280px; height: 280px; transform: rotate(90deg); pointer-events: none; }
        .svg-track { fill: none; stroke: transparent; stroke-width: 14; }
        .svg-fill { fill: none; stroke: #00ff88; stroke-width: 14; stroke-linecap: round; stroke-dasharray: 842; /* 2 * PI * 134 */ stroke-dashoffset: 842; transition: stroke-dashoffset 0.6s cubic-bezier(0.1, 0.9, 0.2, 1); filter: drop-shadow(0 0 8px rgba(0,255,136,0.6)); }

        .inner-hole { position: absolute; width: 210px; height: 210px; background: #0b0d12; border-radius: 50%; z-index: 2; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 2px solid #1a1c26; box-shadow: inset 0 10px 30px rgba(0,0,0,0.9); }
        
        .arrow-spinner { position: absolute; width: 100%; height: 100%; z-index: 3; transition: transform 8s cubic-bezier(0.05, 0.95, 0.1, 1); }
        .arrow-indicator { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-bottom: 25px solid #fff; filter: drop-shadow(0 0 15px rgba(255,255,255,0.8)); }

        .chance-text { font-family: 'JetBrains Mono', monospace; font-size: 42px; font-weight: 700; z-index: 4; color: #eceff4; text-shadow: 0 0 20px rgba(236,239,244,0.2); }
        .chance-sub { font-size: 10px; color: #6a718c; z-index: 4; text-transform: uppercase; font-weight: 700; letter-spacing: 4px; margin-top: 5px; }

        .btn-play { background: #00ff88; color: #08090d; border: none; padding: 22px 0; width: 100%; border-radius: 8px; font-size: 16px; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 40px; transition: 0.3s; letter-spacing: 3px; position: relative; overflow: hidden; }
        .btn-play::after { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent); transform: skewX(-20deg); transition: 0.5s; }
        .btn-play:hover:not(:disabled)::after { left: 150%; }
        .btn-play:hover:not(:disabled) { background: #00e67a; box-shadow: 0 0 30px rgba(0, 255, 136, 0.4); transform: translateY(-2px); }
        .btn-play:disabled { background: #12141d; color: #32384c; cursor: not-allowed; box-shadow: none; }

        .multiplier-bar { display: flex; justify-content: center; gap: 8px; margin-top: 20px; width: 100%; }
        .mult-btn { background: #0b0d12; border: 1px solid #1a1c26; color: #6a718c; padding: 12px 20px; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; font-family: 'JetBrains Mono', monospace; }
        .mult-btn:hover { background: #161923; border-color: #00ff88; color: #00ff88; }

        /* --- ВКЛАДКИ И ИНВЕНТАРЬ --- */
        .tabs-section { margin-top: 100px; width: 100%; max-width: 1100px; }
        .tabs-header { display: flex; gap: 10px; border-bottom: 2px solid #12141d; padding-bottom: 20px; margin-bottom: 40px; }
        .tab-btn { background: transparent; border: none; color: #6a718c; font-size: 13px; font-weight: 700; cursor: pointer; padding: 12px 28px; transition: 0.3s; border-radius: 6px; text-transform: uppercase; letter-spacing: 1.5px; }
        .tab-btn:hover { color: #eceff4; background: #12141d; }
        .tab-btn.active { color: #00ff88; background: #12141d; box-shadow: inset 0 -2px 0 #00ff88; }
        
        .tab-balance { margin-left: auto; display: flex; align-items: center; color: #00ff88; font-weight: 700; font-size: 18px; font-family: 'JetBrains Mono', monospace; background: #0b0d12; padding: 0 25px; border-radius: 6px; border: 1px solid #1a1c26; }

        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .grid-card { background: #0f1118; border: 1px solid #1a1c26; border-radius: 8px; padding: 30px 20px; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; }
        
        /* РЕДКОСТИ (Rarities) */
        .grid-card.r-common { border-bottom: 3px solid #6a718c; }
        .grid-card.r-rare { border-bottom: 3px solid #0088ff; }
        .grid-card.r-epic { border-bottom: 3px solid #b000ff; }
        .grid-card.r-legendary { border-bottom: 3px solid #ffaa00; }

        .grid-card:hover { transform: translateY(-5px); background: #161923; }
        .grid-card.selected { border-color: #00ff88; background: #12151e; box-shadow: 0 0 20px rgba(0,255,136,0.1); }
        .grid-card.selected::before { content: '✓'; position: absolute; top: 10px; right: 10px; color: #00ff88; font-weight: 900; }
        
        .card-img { width: 65px; height: 65px; object-fit: contain; margin-bottom: 20px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.4)); transition: 0.3s; }
        .grid-card:hover .card-img { transform: scale(1.1); }
        .card-price { font-weight: 700; font-family: 'JetBrains Mono', monospace; color: #eceff4; font-size: 15px; }
        .card-name { font-size: 11px; color: #8a92b6; margin-top: 10px; text-align: center; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }
        .buy-action { margin-top: 20px; width: 100%; background: #12141d; color: #eceff4; border: 1px solid #232736; padding: 12px; border-radius: 4px; font-size: 11px; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .grid-card:hover .buy-action { background: #00ff88; color: #08090d; border-color: #00ff88; }

        /* --- АНИМАЦИЯ ОТКРЫТИЯ КЕЙСА --- */
        .case-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(8, 9, 13, 0.95); backdrop-filter: blur(15px); display: none; justify-content: center; align-items: center; flex-direction: column; z-index: 300; }
        .case-title { color: #fff; font-size: 28px; font-weight: 900; text-transform: uppercase; letter-spacing: 5px; margin-bottom: 40px; text-shadow: 0 0 30px rgba(255,255,255,0.3); opacity: 0; transition: 0.5s; }
        
        /* Сцена с коробкой */
        .case-scene { display: flex; justify-content: center; align-items: center; width: 100%; height: 300px; position: absolute; z-index: 301; transition: opacity 0.5s; }
        .box-3d { width: 150px; height: 150px; position: relative; transition: 0.5s; }
        .box-3d img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 20px 30px #00ff88); transition: transform 1s cubic-bezier(0.1, 0.9, 0.2, 1), opacity 1s; }
        .box-3d.opening img { transform: scale(1.5) translateY(-20px); opacity: 0; filter: drop-shadow(0 0 100px #00ff88) brightness(2); }

        /* Окно рулетки */
        .case-window { width: 900px; height: 180px; background: #0f1118; border: 2px solid #232736; position: relative; overflow: hidden; display: flex; align-items: center; box-shadow: 0 30px 60px rgba(0,0,0,0.9); border-radius: 8px; opacity: 0; transform: scale(0.9); transition: 0.5s; }
        .case-window.visible { opacity: 1; transform: scale(1); }
        .case-center-line { position: absolute; left: 50%; transform: translateX(-50%); width: 3px; height: 100%; background: #00ff88; z-index: 10; box-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88; }
        .case-track { display: flex; gap: 15px; padding: 0 15px; transition: transform 5s cubic-bezier(0.1, 0.9, 0.2, 1); will-change: transform; }
        .case-item { width: 140px; height: 140px; flex-shrink: 0; background: #12141d; border: 1px solid #232736; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 6px; }
        .case-item img { width: 60px; height: 60px; object-fit: contain; margin-bottom: 15px; }
        .case-item-name { font-size: 10px; color: #8a92b6; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; text-align: center; }

        /* --- СТРОГИЙ ПРОФИЛЬ --- */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(8, 9, 13, 0.9); display: none; justify-content: center; align-items: center; z-index: 200; backdrop-filter: blur(5px); }
        .modal-content { background: #0f1118; border: 1px solid #232736; border-radius: 12px; width: 450px; padding: 40px; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .close-btn { position: absolute; top: 20px; right: 25px; background: none; border: none; color: #6a718c; font-size: 28px; cursor: pointer; transition: 0.3s; }
        .close-btn:hover { color: #fff; transform: rotate(90deg); }
        .profile-header { display: flex; align-items: center; gap: 20px; margin-bottom: 35px; border-bottom: 1px solid #1a1c26; padding-bottom: 25px; }
        .avatar-stub { width: 60px; height: 60px; background: linear-gradient(135deg, #00ff88, #0088ff); border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 24px; font-weight: 900; color: #08090d; }
        .profile-title { font-size: 22px; font-weight: 900; color: #fff; text-transform: uppercase; letter-spacing: 2px; }
        .profile-role { font-size: 11px; color: #00ff88; text-transform: uppercase; letter-spacing: 3px; font-weight: 700; margin-top: 5px; }
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .stat-box { background: #12141d; border: 1px solid #1a1c26; padding: 20px; border-radius: 8px; text-align: center; }
        .stat-box .lbl { color: #6a718c; font-size: 10px; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; margin-bottom: 10px; }
        .stat-box .val { font-family: 'JetBrains Mono', monospace; font-size: 20px; color: #eceff4; font-weight: 700; }
        .stat-box .val.green { color: #00ff88; }

        .deposit-zone { padding: 25px; background: #08090d; border: 1px dashed #232736; border-radius: 8px; text-align: center; }
        .btn-tg { background: #fff; color: #08090d; text-decoration: none; padding: 14px 0; width: 100%; border-radius: 6px; font-weight: 900; display: inline-block; margin-top: 15px; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .btn-tg:hover { background: #00ff88; box-shadow: 0 0 20px rgba(0,255,136,0.3); }
    </style>
</head>
<body>

    <div class="live-feed" id="live-feed"></div>

    <div class="main-wrapper">
        <header>
            <div class="logo">FLASH<span style="color:#fff;">UPGRADER</span></div>
            <button class="btn-profile" onclick="document.getElementById('profileModal').style.display='flex'">Личный Кабинет</button>
        </header>

        <div class="upgrade-section">
            <div class="item-box" id="box-src">
                <div class="box-title">Ваш предмет</div>
                <img src="https://img.icons8.com/color/100/000000/box-important--v1.png" class="item-img" id="src-img" style="opacity: 0.2; filter: grayscale(1);">
                <div class="item-price" id="src-price">-</div>
                <div class="item-name" id="src-name">Выберите инвентарь</div>
            </div>

            <div class="center-module">
                <div class="roulette-circle">
                    <svg class="svg-progress">
                        <circle class="svg-track" cx="140" cy="140" r="134"></circle>
                        <circle class="svg-fill" id="chance-svg-fill" cx="140" cy="140" r="134"></circle>
                    </svg>

                    <div class="inner-hole">
                        <div class="chance-text" id="chance-val">0%</div>
                        <div class="chance-sub">Шанс успеха</div>
                    </div>
                    <div class="arrow-spinner" id="arrow">
                        <div class="arrow-indicator"></div>
                    </div>
                </div>
                
                <button class="btn-play" id="btn-play" onclick="startPlay()" disabled>Запустить</button>
                
                <div class="multiplier-bar">
                    <button class="mult-btn" onclick="calcTarget(1.5)">1.5X</button>
                    <button class="mult-btn" onclick="calcTarget(2)">2X</button>
                    <button class="mult-btn" onclick="calcTarget(5)">5X</button>
                    <button class="mult-btn" onclick="calcTarget(10)">10X</button>
                </div>
            </div>

            <div class="item-box" id="box-tgt">
                <div class="box-title">Цель апгрейда</div>
                <img src="https://img.icons8.com/color/100/000000/box-important--v1.png" class="item-img" id="tgt-img" style="opacity: 0.2; filter: grayscale(1);">
                <div class="item-price" id="tgt-price">-</div>
                <div class="item-name" id="tgt-name">Выберите в магазине</div>
            </div>
        </div>

        <div class="tabs-section">
            <div class="tabs-header">
                <button class="tab-btn active" id="tab1" onclick="switchTab('inv')">Инвентарь</button>
                <button class="tab-btn" id="tab2" onclick="switchTab('shop')">Магазин</button>
                <button class="tab-btn" id="tab3" onclick="switchTab('targets')">Все предметы</button>
                <div class="tab-balance" id="ui-balance">0 ⭐️</div>
            </div>
            <div class="items-grid" id="grid-content"></div>
        </div>
    </div>

    <div class="modal" id="profileModal">
        <div class="modal-content">
            <button class="close-btn" onclick="document.getElementById('profileModal').style.display='none'">×</button>
            
            <div class="profile-header">
                <div class="avatar-stub" id="p-avatar">И</div>
                <div>
                    <div class="profile-title" id="p-name">Игрок</div>
                    <div class="profile-role">Flashgram Member</div>
                </div>
            </div>

            <div class="stat-grid">
                <div class="stat-box">
                    <div class="lbl">Всего игр</div>
                    <div class="val" id="p-games">0</div>
                </div>
                <div class="stat-box">
                    <div class="lbl">Успешных</div>
                    <div class="val green" id="p-wins">0</div>
                </div>
            </div>
            
            <div class="deposit-zone">
                <div style="font-size: 12px; color: #8a92b6; line-height: 1.6; text-transform: uppercase; font-weight: 700; letter-spacing: 1px;">
                    Пополнение через Flashgram
                </div>
                <div style="font-size: 10px; color: #4a506b; margin-top: 5px;">От 5.000 звезд. Для зачисления пишите менеджеру.</div>
                <a href="https://t.me/om1a2" target="_blank" class="btn-tg">Связаться с поддержкой</a>
            </div>
        </div>
    </div>

    <div class="case-overlay" id="loserCaseModal">
        <div class="case-title" id="caseTitleText">Утешительный дроп</div>
        
        <div class="case-scene" id="caseScene">
            <div class="box-3d" id="caseBox">
                <img src="https://img.icons8.com/3d-fluency/200/gift.png" alt="Case">
            </div>
        </div>

        <div class="case-window" id="caseWindow">
            <div class="case-center-line"></div>
            <div class="case-track" id="caseTrack"></div>
        </div>
    </div>

    <script>
        // ВАЖНО: ЗАМЕНИ ССЫЛКИ НА КАРТИНКИ (img) НА СВОИ ИЗ ТЕЛЕГРАМА!
        
        const CHEAP_ITEMS = [
            { name: "Coal NFT", price: 5, img: "https://img.icons8.com/3d-fluency/100/coal.png", rarity: "common" },
            { name: "Cookie NFT", price: 10, img: "https://img.icons8.com/3d-fluency/100/cookie.png", rarity: "common" },
            { name: "Coin NFT", price: 25, img: "https://img.icons8.com/3d-fluency/100/stack-of-coins.png", rarity: "common" },
            { name: "Scroll NFT", price: 50, img: "https://img.icons8.com/3d-fluency/100/scroll.png", rarity: "rare" }
        ];

        const DB = [
            { id: 1, name: "Telegram Star", price: 100, img: "https://img.icons8.com/3d-fluency/100/star.png", rarity: "common" },
            { id: 2, name: "Candy Box", price: 250, img: "https://img.icons8.com/3d-fluency/100/candy.png", rarity: "common" },
            { id: 3, name: "Golden Heart", price: 500, img: "https://img.icons8.com/3d-fluency/100/heart-suit.png", rarity: "rare" },
            { id: 4, name: "Magic Potion", price: 1000, img: "https://img.icons8.com/3d-fluency/100/potion.png", rarity: "rare" },
            { id: 5, name: "Crypto Key", price: 2500, img: "https://img.icons8.com/3d-fluency/100/key.png", rarity: "epic" },
            { id: 6, name: "Cyber Frog", price: 5000, img: "https://img.icons8.com/3d-fluency/100/frog.png", rarity: "epic" },
            { id: 7, name: "Plasma Crystal", price: 10000, img: "https://img.icons8.com/3d-fluency/100/crystal.png", rarity: "epic" },
            { id: 8, name: "King Crown", price: 25000, img: "https://img.icons8.com/3d-fluency/100/crown.png", rarity: "legendary" },
            { id: 9, name: "Diamond NFT", price: 50000, img: "https://img.icons8.com/3d-fluency/100/diamond.png", rarity: "legendary" },
            { id: 10, name: "Space Rocket", price: 100000, img: "https://img.icons8.com/3d-fluency/100/rocket.png", rarity: "legendary" }
        ];

        let user = { name: "Игрок", balance: 0, inv: [], games: 0, wins: 0 };
        let activeTab = 'inv';
        let srcItem = null;
        let tgtItem = null;
        let spinning = false;
        let currentDeg = 0;
        const SVG_CIRCUMFERENCE = 841.9; // 2 * PI * r (134)

        window.onload = () => {
            let s = localStorage.getItem('upgPremium');
            if(s) {
                user = JSON.parse(s);
            } else {
                user.name = prompt("Введите ваш никнейм:") || "Игрок";
                user.balance = 25000;
                save();
            }
            document.getElementById('p-avatar').innerText = user.name.charAt(0).toUpperCase();
            updateView();
            switchTab('inv');
        };

        function save() { localStorage.setItem('upgPremium', JSON.stringify(user)); }

        function updateView() {
            document.getElementById('ui-balance').innerText = user.balance.toLocaleString() + " ⭐️";
            document.getElementById('p-name').innerText = user.name;
            document.getElementById('p-games').innerText = user.games;
            document.getElementById('p-wins').innerText = user.wins;

            // Сорс
            const sImg = document.getElementById('src-img');
            if(srcItem) {
                sImg.src = srcItem.img; sImg.style.opacity = 1; sImg.style.filter = "drop-shadow(0 15px 20px rgba(0,0,0,0.6))";
                document.getElementById('src-price').innerText = srcItem.price.toLocaleString() + " ⭐️";
                document.getElementById('src-name').innerText = srcItem.name;
                document.getElementById('box-src').classList.add('active');
            } else {
                sImg.src = "https://img.icons8.com/color/100/000000/box-important--v1.png"; sImg.style.opacity = 0.2; sImg.style.filter = "grayscale(1)";
                document.getElementById('src-price').innerText = "-";
                document.getElementById('src-name').innerText = "Выберите инвентарь";
                document.getElementById('box-src').classList.remove('active');
            }

            // Таргет
            const tImg = document.getElementById('tgt-img');
            if(tgtItem) {
                tImg.src = tgtItem.img; tImg.style.opacity = 1; tImg.style.filter = "drop-shadow(0 15px 20px rgba(0,0,0,0.6))";
                document.getElementById('tgt-price').innerText = tgtItem.price.toLocaleString() + " ⭐️";
                document.getElementById('tgt-name').innerText = tgtItem.name;
                document.getElementById('box-tgt').classList.add('active');
            } else {
                tImg.src = "https://img.icons8.com/color/100/000000/box-important--v1.png"; tImg.style.opacity = 0.2; tImg.style.filter = "grayscale(1)";
                document.getElementById('tgt-price').innerText = "-";
                document.getElementById('tgt-name').innerText = "Выберите цель";
                document.getElementById('box-tgt').classList.remove('active');
            }

            // Рулетка SVG Логика
            const btn = document.getElementById('btn-play');
            const svgFill = document.getElementById('chance-svg-fill');
            
            if(srcItem && tgtItem) {
                let chance = (srcItem.price / tgtItem.price) * 100;
                if(chance > 100) chance = 100;
                document.getElementById('chance-val').innerText = chance.toFixed(2) + "%";
                
                // Вычисляем длину заполнения (SVG stroke-dashoffset)
                let offset = SVG_CIRCUMFERENCE - (chance / 100) * SVG_CIRCUMFERENCE;
                svgFill.style.strokeDashoffset = offset;
                
                btn.disabled = srcItem.price >= tgtItem.price;
            } else {
                document.getElementById('chance-val').innerText = "0%";
                svgFill.style.strokeDashoffset = SVG_CIRCUMFERENCE;
                btn.disabled = true;
            }
        }

        function switchTab(tab) {
            if(spinning) return;
            activeTab = tab;
            document.getElementById('tab1').className = `tab-btn ${tab==='inv'?'active':''}`;
            document.getElementById('tab2').className = `tab-btn ${tab==='shop'?'active':''}`;
            document.getElementById('tab3').className = `tab-btn ${tab==='targets'?'active':''}`;
            
            const grid = document.getElementById('grid-content');
            grid.innerHTML = '';

            if(tab === 'inv') {
                if(user.inv.length === 0) grid.innerHTML = '<div style="color:#4a506b; grid-column:1/-1; font-weight: 700; text-transform: uppercase; font-size: 12px; letter-spacing: 1px;">Инвентарь пуст</div>';
                user.inv.forEach(i => {
                    const d = document.createElement('div');
                    d.className = `grid-card r-${i.rarity} ${srcItem && srcItem.uid === i.uid ? 'selected' : ''}`;
                    d.innerHTML = `<img src="${i.img}" class="card-img"><div class="card-price">${i.price.toLocaleString()} ⭐️</div><div class="card-name">${i.name}</div>`;
                    d.onclick = () => { srcItem = i; updateView(); switchTab('inv'); };
                    grid.appendChild(d);
                });
            } else if (tab === 'shop') {
                DB.forEach(i => {
                    const d = document.createElement('div');
                    d.className = `grid-card r-${i.rarity}`;
                    d.innerHTML = `<img src="${i.img}" class="card-img"><div class="card-price">${i.price.toLocaleString()} ⭐️</div><div class="card-name">${i.name}</div><button class="buy-action" onclick="buy(${i.id}, event)">Купить</button>`;
                    grid.appendChild(d);
                });
            } else if (tab === 'targets') {
                DB.forEach(i => {
                    const d = document.createElement('div');
                    d.className = `grid-card r-${i.rarity} ${tgtItem && tgtItem.id === i.id ? 'selected' : ''}`;
                    d.innerHTML = `<img src="${i.img}" class="card-img"><div class="card-price">${i.price.toLocaleString()} ⭐️</div><div class="card-name">${i.name}</div>`;
                    d.onclick = () => { tgtItem = i; updateView(); switchTab('targets'); };
                    grid.appendChild(d);
                });
            }
        }

        function buy(id, e) {
            e.stopPropagation();
            const item = DB.find(x => x.id === id);
            if(user.balance >= item.price) {
                user.balance -= item.price;
                user.inv.push({...item, uid: Date.now() + Math.random()});
                save(); updateView();
            } else {
                alert("Недостаточно звезд!");
            }
        }

        function calcTarget(mult) {
            if(!srcItem) return alert("Выберите свой предмет в Инвентаре!");
            const target = srcItem.price * mult;
            tgtItem = DB.reduce((prev, curr) => Math.abs(curr.price - target) < Math.abs(prev.price - target) ? curr : prev);
            updateView();
            switchTab('targets');
        }

        function startPlay() {
            if(spinning || !srcItem || !tgtItem) return;
            spinning = true;
            document.getElementById('btn-play').disabled = true;

            let chanceVis = (srcItem.price / tgtItem.price) * 100;
            if(chanceVis > 100) chanceVis = 100;
            
            let chanceReal = chanceVis * 0.7; 
            let isWin = (Math.random() * 100) <= chanceReal;

            const arrow = document.getElementById('arrow');
            const winSector = (chanceVis / 100) * 360;
            const stopDeg = isWin ? (Math.random() * winSector) : (winSector + Math.random() * (360 - winSector));
            
            currentDeg += (360 * 6) + stopDeg; 
            arrow.style.transform = `rotate(${currentDeg}deg)`;

            user.games++;

            setTimeout(() => {
                if(isWin) {
                    user.wins++;
                    user.inv.push({...tgtItem, uid: Date.now()});
                    user.inv = user.inv.filter(x => x.uid !== srcItem.uid);
                    srcItem = null;
                    spinning = false;
                    save(); updateView(); switchTab(activeTab);
                } else {
                    user.inv = user.inv.filter(x => x.uid !== srcItem.uid);
                    srcItem = null;
                    save(); updateView();
                    startEpicLoserCase();
                }
            }, 8000);
        }

        // НОВАЯ МЕХАНИКА ОТКРЫТИЯ КЕЙСА
        function startEpicLoserCase() {
            const modal = document.getElementById('loserCaseModal');
            const scene = document.getElementById('caseScene');
            const box = document.getElementById('caseBox');
            const windowObj = document.getElementById('caseWindow');
            const title = document.getElementById('caseTitleText');
            const track = document.getElementById('caseTrack');
            
            // Сброс стилей
            modal.style.display = 'flex';
            box.classList.remove('opening');
            windowObj.classList.remove('visible');
            scene.style.display = 'flex';
            windowObj.style.display = 'none';
            title.style.opacity = '1';

            // Генерация предметов рулетки
            track.style.transition = 'none';
            track.style.transform = 'translateX(0)';
            let itemsHTML = '';
            let winnerItem = null;

            for(let i=0; i<60; i++) {
                let drop = CHEAP_ITEMS[Math.floor(Math.random() * CHEAP_ITEMS.length)];
                if(i === 45) winnerItem = drop;
                itemsHTML += `<div class="case-item"><img src="${drop.img}"><div class="case-item-name">${drop.name}</div></div>`;
            }
            track.innerHTML = itemsHTML;

            // ФАЗА 1: Анимация открытия кейса (спустя 0.5с)
            setTimeout(() => {
                box.classList.add('opening');
                
                // ФАЗА 2: Скрытие кейса и показ рулетки
                setTimeout(() => {
                    scene.style.display = 'none';
                    windowObj.style.display = 'flex';
                    
                    // Небольшая задержка перед scale эффектом
                    setTimeout(() => {
                        windowObj.classList.add('visible');
                        
                        // Запуск прокрутки
                        setTimeout(() => {
                            track.style.transition = 'transform 6s cubic-bezier(0.1, 0.9, 0.15, 1)';
                            const offset = (45 * 155) - 450 + 77 + (Math.random() * 100 - 50);
                            track.style.transform = `translateX(-${offset}px)`;
                            
                            // Завершение и выдача
                            setTimeout(() => {
                                user.inv.push({...winnerItem, uid: Date.now()});
                                save(); updateView(); switchTab(activeTab);
                                
                                setTimeout(() => {
                                    modal.style.display = 'none';
                                    spinning = false;
                                }, 2000);
                            }, 6500);

                        }, 300);
                    }, 50);

                }, 800); 
            }, 800);
        }

        // Рандомная лайв-лента
        setInterval(() => {
            const feed = document.getElementById('live-feed');
            const d = document.createElement('div');
            d.className = 'live-item';
            const rndItem = DB[Math.floor(Math.random() * DB.length)];
            d.innerHTML = `<img src="${rndItem.img}" alt="drop">`;
            feed.prepend(d);
            if(feed.children.length > 12) feed.lastChild.remove();
        }, 1500);
    </script>
</body>
