<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <title>FlashUpgrader — Premium Site</title>
    <style>
        :root {
            --bg-main: #060608;
            --bg-panel: #0b0b0d;
            --bg-card: #111114;
            --bg-card-hover: #16161a;
            --accent-gold: #ffcc00;
            --accent-gold-glow: rgba(255, 204, 0, 0.3);
            --text-main: #ffffff;
            --text-muted: #6c6c75;
            --border-color: #1c1c22;
            
            --rarity-epic: #9b59b6;
            --rarity-legendary: #e67e22;
            --rarity-mythic: #e74c3c;
            --rarity-immortal: #ff007f;
            
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 10px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at 50% 0%, #121217 0%, var(--bg-main) 70%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex; flex-direction: column; overflow-x: hidden;
        }

        /* === ХЕДЕР === */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 24px; background: rgba(6, 6, 8, 0.8); backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100;
        }

        .logo-area { display: flex; flex-direction: column; }
        .logo { font-size: 22px; font-weight: 900; color: var(--accent-gold); letter-spacing: 0.5px; text-shadow: 0 0 12px var(--accent-gold-glow); }
        .logo span { color: var(--text-main); text-shadow: none; }
        .online-count { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
        .online-count span { color: #2ecc71; font-weight: bold; }

        .user-area { display: flex; align-items: center; gap: 16px; }
        .balance-block { display: flex; flex-direction: column; align-items: flex-end; }
        .balance-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; }
        .balance { font-size: 16px; font-weight: 800; color: var(--accent-gold); }
        
        .btn-deposit {
            background: linear-gradient(135deg, #ffcc00, #ffaa00); color: #000;
            padding: 8px 16px; border: none; border-radius: var(--radius-sm);
            font-size: 13px; font-weight: 800; cursor: pointer; transition: var(--transition);
        }
        .profile-avatar {
            width: 38px; height: 38px; background: var(--bg-card); border: 2px solid var(--border-color);
            border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 16px; transition: var(--transition);
        }

        /* === ОСНОВНОЙ КОНТЕНТ === */
        main { flex: 1; display: flex; flex-direction: column; padding: 24px 16px; gap: 24px; max-width: 650px; width: 100%; margin: 0 auto; }

        .live-ticker {
            background: rgba(11, 11, 13, 0.5); border: 1px solid var(--border-color);
            border-radius: var(--radius-md); padding: 12px; display: flex; gap: 12px;
            overflow-x: auto; white-space: nowrap; scrollbar-width: none; min-height: 56px;
        }
        .live-ticker::-webkit-scrollbar { display: none; }
        
        .ticker-item {
            display: inline-flex; align-items: center; gap: 8px; background: var(--bg-card);
            padding: 8px 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; border-bottom: 2px solid var(--accent-gold);
        }
        .ticker-item.fail { border-bottom-color: #e74c3c; opacity: 0.6; }
        .ticker-img { width: 20px; height: 20px; object-fit: contain; }

        /* === АРЕНА АПГРЕЙДА === */
        .upgrade-arena {
            background: linear-gradient(180deg, var(--bg-panel) 0%, #070709 100%);
            border: 1px solid var(--border-color); border-radius: var(--radius-lg);
            padding: 32px 24px; display: flex; flex-direction: column; align-items: center; gap: 28px;
            box-shadow: 0 16px 40px rgba(0,0,0,0.5); position: relative; transition: background 0.4s ease, box-shadow 0.4s ease; overflow: hidden;
        }
        .upgrade-arena.win-state { background: linear-gradient(180deg, #1b5e20 0%, #0c290e 100%) !important; box-shadow: 0 0 40px rgba(46, 204, 113, 0.4); }
        .upgrade-arena.fail-state { background: linear-gradient(180deg, #b71c1c 0%, #4a0707 100%) !important; box-shadow: 0 0 40px rgba(231, 76, 60, 0.4); }

        /* Дизайн слотов выбора как на фото */
        .slots-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; z-index: 2; }
        
        .item-slot {
            background: #0d0d11; border: 1px solid #1a1a24; border-radius: var(--radius-md);
            height: 140px; display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 16px; text-align: center; transition: var(--transition); cursor: pointer; position: relative;
        }
        .item-slot:hover { border-color: #2a2a3a; background: #111116; }
        .item-slot.active { border: 1px solid rgba(255, 204, 0, 0.25); background: rgba(255, 204, 0, 0.01); }
        
        /* Стилизация пустого состояния */
        .slot-empty-icon {
            width: 36px; height: 36px; background: #161620; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: #555565; margin-bottom: 12px; font-weight: bold;
            border: 1px dashed #2c2c3d;
        }
        .slot-hint { font-size: 11px; color: var(--text-muted); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }

        /* === КРУГ АПГРЕЙДА === */
        .wheel-container {
            position: relative; width: 260px; height: 260px; margin: 10px 0;
            display: flex; align-items: center; justify-content: center; z-index: 2;
        }
        
        .wheel-box { width: 100%; height: 100%; position: relative; }
        /* Поворот -90 градусов ставит начало заполнения шкалы ровно на 12 часов (вверх) */
        .wheel-svg { transform: rotate(-90deg); width: 100%; height: 100%; } 
        
        .wheel-progress {
            stroke-dasharray: 534; stroke-dashoffset: 534; stroke-linecap: butt;
            transition: stroke-dashoffset 0.4s ease;
        }
        
        /* Вращающаяся стрелка управляется JS */
        .arrow-spinner-wrapper {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 15;
        }
        
        /* Стрелка изначально указывает строго вверх (на 12 часов) */
        .wheel-arrow {
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            width: 22px; height: 36px; filter: drop-shadow(0 0 8px rgba(255, 204, 0, 0.6));
        }

        .wheel-center-content {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; height: 100%; z-index: 5; text-align: center; pointer-events: none;
        }

        #chanceDisplay h1 { font-size: 34px; font-weight: 900; color: #ffffff; letter-spacing: -1px; }
        #chanceDisplay p { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; }

        /* Кнопка */
        .action-block { width: 100%; display: flex; flex-direction: column; gap: 12px; z-index: 2; }
        .btn-upgrade {
            background: linear-gradient(135deg, var(--accent-gold), #e6b800);
            color: #000; border: none; padding: 18px; font-size: 15px; font-weight: 800;
            border-radius: var(--radius-md); cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 8px 28px rgba(255, 204, 0, 0.25); transition: var(--transition);
        }
        .btn-upgrade:disabled { background: #1c1c22; color: #4c4c54; cursor: not-allowed; box-shadow: none; }

        /* === ИНВЕНТАРЬ И ТАБЫ === */
        .inventory-section { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: var(--radius-lg); display: flex; flex-direction: column; overflow: hidden; }
        .tabs-header { display: flex; background: #0e0e11; border-bottom: 1px solid var(--border-color); padding: 6px; gap: 6px; }
        .tab-btn { flex: 1; padding: 14px; background: transparent; border: none; color: var(--text-muted); font-size: 13px; font-weight: 700; border-radius: var(--radius-sm); cursor: pointer; transition: var(--transition); text-transform: uppercase; }
        .tab-btn.active { color: #fff; background: var(--bg-card); }
        .items-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 16px; max-height: 420px; overflow-y: auto; }
        .item-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 12px; display: flex; flex-direction: column; align-items: center; position: relative; cursor: pointer; transition: var(--transition); }
        .item-card:hover { background: var(--bg-card-hover); transform: translateY(-4px); }
        .item-price { font-size: 11px; font-weight: 800; color: var(--accent-gold); align-self: flex-end; background: rgba(0,0,0,0.4); padding: 4px 8px; border-radius: 6px; }
        .item-img-container { width: 100%; height: 85px; display: flex; align-items: center; justify-content: center; margin: 6px 0; }
        .item-img-container img { max-width: 90%; max-height: 90%; object-fit: contain; }
        .item-info { text-align: center; width: 100%; }
        .item-title { font-size: 10px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; }
        .item-sub { font-size: 12px; font-weight: 700; margin-top: 1px; color: #eee; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }

        .rarity-epic { border-bottom: 3px solid var(--rarity-epic); }
        .rarity-legendary { border-bottom: 3px solid var(--rarity-legendary); }
        .rarity-mythic { border-bottom: 3px solid var(--rarity-mythic); }
        .rarity-immortal { border-bottom: 3px solid var(--rarity-immortal); }

        /* === МОДАЛКИ === */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 200; display: none; align-items: center; justify-content: center; padding: 16px; }
        .modal-card { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: var(--radius-lg); width: 100%; max-width: 460px; padding: 24px; position: relative; max-height: 90vh; overflow-y: auto; }
        .modal-close { position: absolute; top: 16px; right: 16px; background: transparent; border: none; color: var(--text-muted); font-size: 22px; cursor: pointer; }
        .modal-title { font-size: 20px; font-weight: 800; margin-bottom: 16px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
        .modal-input { width: 100%; background: var(--bg-card); border: 1px solid var(--border-color); padding: 14px; border-radius: var(--radius-sm); color: #fff; font-size: 16px; margin-bottom: 16px; outline: none; }
        .modal-btn { width: 100%; background: linear-gradient(135deg, #2ecc71, #27ae60); color: #fff; border: none; padding: 14px; border-radius: var(--radius-sm); font-size: 15px; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        
        .profile-tabs { display: flex; gap: 8px; margin-bottom: 16px; background: #0e0e11; padding: 4px; border-radius: var(--radius-sm); }
        .p-tab-btn { flex: 1; padding: 10px; border: none; background: transparent; color: var(--text-muted); font-size: 11px; font-weight: 700; text-transform: uppercase; cursor: pointer; border-radius: 6px; }
        .p-tab-btn.active { background: var(--bg-card); color: #fff; }
        .profile-list-item { display: flex; justify-content: space-between; align-items: center; background: var(--bg-card); padding: 10px 14px; border-radius: var(--radius-sm); margin-bottom: 8px; border-left: 3px solid transparent; }
        .p-item-info { display: flex; flex-direction: column; }
        .p-item-name { font-size: 13px; font-weight: 700; }
        .p-item-price { font-size: 11px; color: var(--accent-gold); font-weight: bold; }
        .btn-profile-action { padding: 6px 12px; border: none; border-radius: 4px; font-size: 11px; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .btn-sell { background: rgba(231, 76, 60, 0.15); color: #e74c3c; border: 1px solid rgba(231, 76, 60, 0.3); }
        .btn-sell:hover { background: #e74c3c; color: #fff; }
        .btn-buy { background: rgba(46, 204, 113, 0.15); color: #2ecc71; border: 1px solid rgba(46, 204, 113, 0.3); }
        .btn-buy:hover { background: #2ecc71; color: #fff; }
        .stat-line { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border-color); font-size: 14px; }
        .stat-line span:last-child { font-weight: bold; color: var(--accent-gold); }

        /* === ТЕХНОЛОГИЧНЫЙ ФУТЕР (КАК НА ПОСЛЕДНЕМ ФОТО) === */
        footer {
            margin-top: auto; background: #09090c; border-top: 1px solid var(--border-color);
            padding: 24px 16px; display: flex; flex-direction: column; align-items: center; gap: 16px;
        }
        .footer-top {
            display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 650px;
        }
        .footer-copyright { font-size: 12px; color: var(--text-muted); font-weight: 500; }
        
        /* Кнопка Телеграма */
        .tg-link-btn {
            display: inline-flex; align-items: center; gap: 8px; background: #1a1a24;
            border: 1px solid var(--border-color); padding: 8px 16px; border-radius: var(--radius-sm);
            color: #fff; font-size: 12px; font-weight: 700; text-decoration: none; transition: var(--transition);
        }
        .tg-link-btn:hover { background: #242433; border-color: #ffcc00; }
        .tg-icon { width: 16px; height: 16px; fill: #0088cc; }

        /* Переключатель языка */
        .lang-switcher {
            display: flex; background: #111116; border: 1px solid var(--border-color);
            padding: 2px; border-radius: 6px; gap: 2px;
        }
        .lang-btn {
            background: transparent; border: none; color: var(--text-muted);
            font-size: 11px; font-weight: 800; padding: 6px 12px; border-radius: 4px;
            cursor: pointer; transition: var(--transition);
        }
        .lang-btn.active { background: #1c1c27; color: #fff; }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <div class="logo">FLASH<span>UPGRADER</span></div>
            <div class="online-count"><span id="lblOnline">Онлайн</span>: <span id="onlineCount">1 742</span></div>
        </div>
        <div class="user-area">
            <div class="balance-block">
                <span class="balance-label" id="lblBalance">Баланс</span>
                <div class="balance" id="userBalance">10 000.00 ₽</div>
            </div>
            <button class="btn-deposit" id="btnDepositTop" onclick="openModal('depositModal')">Пополнить</button>
            <div class="profile-avatar" onclick="openModal('profileModal')">👤</div>
        </div>
    </header>

    <main>
        <div class="live-ticker" id="liveTicker"></div>

        <section class="upgrade-arena" id="arenaBox">
            <div class="slots-container">
                <div class="item-slot" id="slotLeft" onclick="switchTab('my')">
                    <div class="slot-empty-icon">+</div>
                    <span class="slot-hint" id="hintLeft">Выберите предмет</span>
                </div>
                <div class="item-slot" id="slotRight" onclick="switchTab('shop')">
                    <div class="slot-empty-icon">+</div>
                    <span class="slot-hint" id="hintRight">Выберите цель</span>
                </div>
            </div>

            <div class="wheel-container">
                <div class="arrow-spinner-wrapper" id="arrowSpinner">
                    <svg class="wheel-arrow" viewBox="0 0 24 40" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" stop-color="#ffea00" />
                                <stop offset="100%" stop-color="#d4af37" />
                            </linearGradient>
                        </defs>
                        <path d="M12 0 L24 24 L16 20 L16 40 L8 40 L8 20 L0 24 Z" fill="url(#arrowGrad)"/>
                    </svg>
                </div>
                
                <div class="wheel-box">
                    <svg class="wheel-svg" viewBox="0 0 260 260">
                        <defs>
                            <linearGradient id="progressGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#ffcc00" />
                                <stop offset="100%" stop-color="#ff5722" />
                            </linearGradient>
                        </defs>
                        <circle cx="130" cy="130" r="120" fill="none" stroke="#2a2a32" stroke-width="6" stroke-dasharray="2 18" />
                        <circle cx="130" cy="130" r="100" fill="#151518" />
                        <circle cx="130" cy="130" r="85" fill="none" stroke="#222228" stroke-width="24" />
                        <circle class="wheel-progress" id="wheelCircle" cx="130" cy="130" r="85" fill="none" stroke="url(#progressGrad)" stroke-width="24" />
                    </svg>

                    <div class="wheel-center-content">
                        <svg id="centerChevrons" width="60" height="60" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="display: block;">
                            <polygon points="15,70 50,40 85,70 85,85 50,55 15,85" fill="#8b7310"/>
                            <polygon points="15,40 50,10 85,40 85,55 50,25 15,55" fill="#ffea00"/>
                        </svg>

                        <div class="chance-display" id="chanceDisplay" style="display: none;">
                            <h1 id="chanceText">0.00%</h1>
                            <p id="lblChanceText">шанс</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="action-block">
                <button class="btn-upgrade" id="btnUpgrade" onclick="executeUpgrade()" disabled>Выберите подарки</button>
            </div>
        </section>

        <section class="inventory-section">
            <div class="tabs-header">
                <button class="tab-btn active" id="tabMy" onclick="switchTab('my')">Мой инвентарь</button>
                <button class="tab-btn" id="tabShop" onclick="switchTab('shop')">Желаемый подарок</button>
            </div>
            <div class="items-grid" id="gridContent"></div>
        </section>
    </main>

    <footer>
        <div class="footer-top">
            <div class="footer-copyright">© 2026 FLASHUPGRADER. All rights reserved.</div>
            
            <a href="https://t.me/om1a2" target="_blank" class="tg-link-btn">
                <svg class="tg-icon" viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69a.2.2 0 0 0-.05-.18c-.06-.05-.14-.03-.21-.02-.09.02-1.49.95-4.22 2.79-.4.27-.76.41-1.08.4-.36-.01-1.04-.2-1.55-.37-.63-.2-1.12-.31-1.08-.66.02-.18.27-.36.74-.55 2.92-1.27 4.86-2.11 5.83-2.51 2.78-1.16 3.35-1.36 3.73-1.36.08 0 .27.02.39.12.1.08.13.19.14.27-.01.06.01.24 0 .38z"/>
                </svg>
                <span>Telegram Support</span>
            </a>

            <div class="lang-switcher">
                <button class="lang-btn active" id="btnLangRU" onclick="changeLanguage('ru')">RU</button>
                <button class="lang-btn" id="btnLangEN" onclick="changeLanguage('en')">EN</button>
            </div>
        </div>
    </footer>

    <div class="modal-overlay" id="depositModal">
        <div class="modal-card">
            <button class="modal-close" onclick="closeModal('depositModal')">×</button>
            <div class="modal-title" id="lblModalDepTitle">Пополнение баланса</div>
            <input type="number" class="modal-input" id="depositAmount" placeholder="Сумма (₽)" min="10">
            <button class="modal-btn" id="btnModalDepSubmit" onclick="processDeposit()">Пополнить</button>
        </div>
    </div>

    <div class="modal-overlay" id="profileModal">
        <div class="modal-card">
            <button class="modal-close" onclick="closeModal('profileModal')">×</button>
            <div class="profile-tabs">
                <button class="p-tab-btn active" id="pTabStats" onclick="switchProfileTab('stats')">Статистика</button>
                <button class="p-tab-btn" id="pTabSell" onclick="switchProfileTab('sell')">Продать</button>
                <button class="p-tab-btn" id="pTabBuy" onclick="switchProfileTab('buy')">Купить</button>
                <button class="p-tab-btn" id="pTabPayout" onclick="switchProfileTab('payout')">Вывод</button>
            </div>
            <div id="pContentStats">
                <div class="modal-title" id="lblStatsTitle" style="font-size:16px;">Твои достижения</div>
                <div class="stat-line"><span id="lblStatTotal">Всего апгрейдов:</span><span id="statTotal">0</span></div>
                <div class="stat-line"><span id="lblStatWins">Успешных:</span><span id="statWins" style="color:#2ecc71;">0</span></div>
                <div class="stat-line"><span id="lblStatLosses">Сгорело:</span><span id="statLosses" style="color:#e74c3c;">0</span></div>
            </div>
            <div id="pContentSell" style="display:none;">
                <div class="modal-title" id="lblSellTitle" style="font-size:16px;">Инвентарь (Продажа 50%)</div>
                <div id="profileSellList" style="max-height: 250px; overflow-y:auto;"></div>
            </div>
            <div id="pContentBuy" style="display:none;">
                <div class="modal-title" id="lblBuyTitle" style="font-size:16px;">Магазин предметов</div>
                <div id="profileBuyList" style="max-height: 250px; overflow-y:auto;"></div>
            </div>
            <div id="pContentPayout" style="display:none;">
                <div class="modal-title" id="lblPayoutTitle" style="font-size:16px;">Вывод средств</div>
                <input type="text" class="modal-input" id="withdrawDetails" placeholder="Номер карты/кошелька" style="margin-bottom:10px;">
                <input type="number" class="modal-input" id="withdrawAmount" placeholder="Сумма (₽)">
                <button class="modal-btn" id="btnPayoutSubmit" style="background:linear-gradient(135deg, #3498db, #2980b9);" onclick="processWithdraw()">Создать заявку</button>
            </div>
        </div>
    </div>

    <audio id="soundSpin" src="spin.mp3" preload="auto" loop></audio>
    <audio id="soundWin" src="win.mp3" preload="auto"></audio>
    <audio id="soundFail" src="lose.mp3" preload="auto"></audio>
    <audio id="soundClick" src="click.mp3" preload="auto"></audio>

    <script>
        // Словарь для переключения языков
        const translations = {
            ru: {
                online: "Онлайн", balance: "Баланс", deposit: "Пополнить",
                selectItem: "Выберите предмет", selectTarget: "Выберите цель",
                chanceText: "шанс", btnChoose: "Выберите подарки", btnUpgrade: "Прокачать подарок",
                tabMy: "Мой инвентарь", tabShop: "Желаемый подарок",
                stats: "Статистика", sell: "Продать", buy: "Купить", payout: "Вывод",
                achievements: "Твои достижения", totalUpgrades: "Всего апгрейдов:",
                successful: "Успешных:", burned: "Сгорело:", shopTitle: "Магазин предметов",
                sellTitle: "Инвентарь (Продажа 50%)", payoutTitle: "Вывод средств",
                btnPayout: "Создать заявку", emptyInv: "Инвентарь пуст. Зайдите в Профиль, чтобы купить предметы.",
                successDep: "Успешно зачислено", minDep: "Минимальная сумма — 10 ₽",
                noFunds: "Недостаточно средств на балансе!", fillFields: "Пожалуйста, заполните все поля!"
            },
            en: {
                online: "Online", balance: "Balance", deposit: "Deposit",
                selectItem: "Select Item", selectTarget: "Select Target",
                chanceText: "chance", btnChoose: "Choose gifts", btnUpgrade: "Upgrade Gift",
                tabMy: "My Inventory", tabShop: "Desired Gift",
                stats: "Stats", sell: "Sell", buy: "Shop", payout: "Withdraw",
                achievements: "Your Achievements", totalUpgrades: "Total Upgrades:",
                successful: "Successful:", burned: "Burned:", shopTitle: "Item Shop",
                sellTitle: "Inventory (50% Sell Value)", payoutTitle: "Withdraw Funds",
                btnPayout: "Submit Request", emptyInv: "Inventory empty. Open profile to buy items.",
                successDep: "Successfully deposited", minDep: "Minimum amount is 10 ₽",
                noFunds: "Insufficient funds!", fillFields: "Please fill in all fields!"
            }
        };

        let currentLang = 'ru';

        // База подарков включая обновленные имена файлов картинок из вложений
        const giftPool = [
            { id: 'frog_purple', title: 'Epic', sub: 'Аметистовый Харт', price: '4500.00', rarity: 'rarity-epic', img: '16246.png' },
            { id: 'frog_aqua', title: 'Legendary', sub: 'Бирюзовый Лав', price: '8900.00', rarity: 'rarity-legendary', img: '16245.png' },
            { id: 'frog_love', title: 'Mythic', sub: 'Влюбленный Пепе', price: '12500.00', rarity: 'rarity-mythic', img: '16248.png' },
            { id: 'frog_glitter', title: 'Immortal', sub: 'Звездный Блеск', price: '24000.00', rarity: 'rarity-immortal', img: '16247.png' }
        ];

        let balance = parseFloat(localStorage.getItem('ub_balance')) || 199143.51;
        let myInventoryData = JSON.parse(localStorage.getItem('ub_inv')) || [giftPool[0], giftPool[2]];
        let stats = JSON.parse(localStorage.getItem('ub_stats')) || { total: 0, wins: 0, losses: 0 };
        
        let currentTab = 'my';
        let selectedLeft = null;
        let selectedRight = null;
        let isProcessing = false;
        let arrowRotation = 0; 
        const circleCircumference = 534; 

        const soundSpin = document.getElementById('soundSpin');
        const soundWin = document.getElementById('soundWin');
        const soundFail = document.getElementById('soundFail');
        const soundClick = document.getElementById('soundClick');

        // Web Audio API структуры
        let audioContext, analyserNode, sourceNode, dataArray, isAudioSetup = false;

        function saveData() {
            localStorage.setItem('ub_balance', balance);
            localStorage.setItem('ub_inv', JSON.stringify(myInventoryData));
            localStorage.setItem('ub_stats', JSON.stringify(stats));
        }

        function playSound(audio) { audio.currentTime = 0; audio.play().catch(() => {}); }
        function updateBalanceUI() { document.getElementById('userBalance').innerText = balance.toFixed(2).replace(/\d(?=(\d{3})+\.)/g, '$& ') + ' ₽'; }

        function changeLanguage(lang) {
            currentLang = lang;
            document.getElementById('btnLangRU').classList.toggle('active', lang === 'ru');
            document.getElementById('btnLangEN').classList.toggle('active', lang === 'en');
            
            const trans = translations[lang];
            document.getElementById('lblOnline').innerText = trans.online;
            document.getElementById('lblBalance').innerText = trans.balance;
            document.getElementById('btnDepositTop').innerText = trans.deposit;
            document.getElementById('tabMy').innerText = trans.tabMy;
            document.getElementById('tabShop').innerText = trans.tabShop;
            document.getElementById('lblChanceText').innerText = trans.chanceText;
            
            document.getElementById('pTabStats').innerText = trans.stats;
            document.getElementById('pTabSell').innerText = trans.sell;
            document.getElementById('pTabBuy').innerText = trans.buy;
            document.getElementById('pTabPayout').innerText = trans.payout;
            
            document.getElementById('lblStatsTitle').innerText = trans.achievements;
            document.getElementById('lblStatTotal').innerText = trans.totalUpgrades;
            document.getElementById('lblStatWins').innerText = trans.successful;
            document.getElementById('lblStatLosses').innerText = trans.burned;
            
            document.getElementById('lblSellTitle').innerText = trans.sellTitle;
            document.getElementById('lblBuyTitle').innerText = trans.shopTitle;
            document.getElementById('lblPayoutTitle').innerText = trans.payoutTitle;
            document.getElementById('btnPayoutSubmit').innerText = trans.btnPayout;
            document.getElementById('btnModalDepSubmit').innerText = trans.deposit;
            document.getElementById('lblModalDepTitle').innerText = trans.deposit;

            if(!selectedLeft && !selectedRight) {
                document.getElementById('btnUpgrade').innerText = trans.btnChoose;
            } else if (selectedLeft && selectedRight && !isProcessing) {
                document.getElementById('btnUpgrade').innerText = trans.btnUpgrade;
            }

            if (!selectedLeft) resetSlotUI('slotLeft', 'hintLeft', trans.selectItem);
            if (!selectedRight) resetSlotUI('slotRight', 'hintRight', trans.selectTarget);

            renderGrid();
        }

        function resetSlotUI(slotId, hintId, text) {
            document.getElementById(slotId).innerHTML = `<div class="slot-empty-icon">+</div><span class="slot-hint" id="${hintId}">${text}</span>`;
        }

        function renderGrid() {
            const grid = document.getElementById('gridContent');
            grid.innerHTML = '';
            const activeData = currentTab === 'my' ? myInventoryData : giftPool;

            if(activeData.length === 0) {
                grid.innerHTML = `<div style="grid-column:span 3;text-align:center;padding:30px;color:var(--text-muted); font-size: 13px;">${translations[currentLang].emptyInv}</div>`;
                return;
            }

            activeData.forEach((item, idx) => {
                grid.innerHTML += `
                    <div class="item-card ${item.rarity}" onclick="selectItem(${idx})">
                        <div class="item-price">${Math.round(item.price)} ₽</div>
                        <div class="item-img-container"><img src="${item.img}"></div>
                        <div class="item-info">
                            <div class="item-title">${item.title}</div>
                            <div class="item-sub">${item.sub}</div>
                        </div>
                    </div>
                `;
            });
        }

        function switchTab(tab) {
            playSound(soundClick);
            currentTab = tab;
            document.getElementById('tabMy').classList.toggle('active', tab === 'my');
            document.getElementById('tabShop').classList.toggle('active', tab === 'shop');
            renderGrid();
        }

        function selectItem(index) {
            if (isProcessing) return;
            playSound(soundClick);
            const item = currentTab === 'my' ? myInventoryData[index] : giftPool[index];
            if (currentTab === 'my') { selectedLeft = item; renderSlot('slotLeft', item); } 
            else { selectedRight = item; renderSlot('slotRight', item); }
            updateChance();
        }

        function renderSlot(slotId, item) {
            const slot = document.getElementById(slotId);
            slot.classList.add('active');
            slot.innerHTML = `
                <div style="font-size:13px; font-weight:800; color:var(--accent-gold); position:absolute; top:12px;">${Math.round(item.price)} ₽</div>
                <div style="margin-top:14px; height:75px; display:flex; align-items:center;"><img src="${item.img}" style="max-height:70px;"></div>
                <div style="font-size:12px; font-weight:700; color:#fff; text-overflow:ellipsis; overflow:hidden; width:100%; white-space:nowrap; margin-top:4px;">${item.sub}</div>
            `;
        }

        function updateChance() {
            const btn = document.getElementById('btnUpgrade');
            const chevrons = document.getElementById('centerChevrons');
            const chanceDisplay = document.getElementById('chanceDisplay');

            if (!selectedLeft || !selectedRight) {
                btn.disabled = true;
                btn.innerText = translations[currentLang].btnChoose;
                chevrons.style.display = 'block';
                chanceDisplay.style.display = 'none';
                document.getElementById('wheelCircle').style.strokeDashoffset = circleCircumference;
                return;
            }
            
            btn.disabled = false;
            btn.innerText = translations[currentLang].btnUpgrade;
            chevrons.style.display = 'none';
            chanceDisplay.style.display = 'block';

            let chance = (parseFloat(selectedLeft.price) / parseFloat(selectedRight.price)) * 100;
            if (chance > 95) chance = 95;
            if (chance < 1) chance = 1;

            document.getElementById('chanceText').innerText = chance.toFixed(2) + '%';
            document.getElementById('wheelCircle').style.strokeDashoffset = circleCircumference - (circleCircumference * (chance / 100));
        }

        function setupAudioAnalysis() {
            if (isAudioSetup) return;
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyserNode = audioContext.createAnalyser();
                sourceNode = audioContext.createMediaElementSource(soundSpin);
                sourceNode.connect(analyserNode);
                analyserNode.connect(audioContext.destination);
                analyserNode.fftSize = 256;
                dataArray = new Uint8Array(analyserNode.frequencyBinCount);
                isAudioSetup = true;
            } catch (e) { console.error(e); }
        }

        function getAverageVolume() {
            if (!isAudioSetup) return 0;
            analyserNode.getByteTimeDomainData(dataArray);
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
                let amplitude = (dataArray[i] - 128) / 128;
                sum += amplitude * amplitude;
            }
            return Math.sqrt(sum / dataArray.length);
        }

        // === ИСПРАВЛЕННАЯ СИНХРОНИЗАЦИЯ ПО ОРАНЖЕВОМУ СЕКТОРУ И АУДИО ===
        function executeUpgrade() {
            if (isProcessing || !selectedLeft || !selectedRight) return;
            setupAudioAnalysis();

            isProcessing = true;
            const btn = document.getElementById('btnUpgrade');
            const arena = document.getElementById('arenaBox');
            const arrowSpinner = document.getElementById('arrowSpinner');
            
            btn.innerText = currentLang === 'ru' ? 'Улучшение...' : 'Upgrading...';
            soundSpin.play().catch(() => {});

            let chance = (parseFloat(selectedLeft.price) / parseFloat(selectedRight.price)) * 100;
            if (chance > 95) chance = 95;
            if (chance < 1) chance = 1;
            
            let roll = Math.random() * 100;
            let isWin = roll <= chance;

            // Расчет секторов (Так как шкала начинается на 12 часах и идет по часовой стрелке)
            let orangeArcDeg = chance * 3.6; 
            let targetSectorDeg;
            
            if (isWin) {
                // Выигрыш — стрелка указывает строго внутрь заполненного оранжевого сектора
                targetSectorDeg = Math.random() * orangeArcDeg; 
            } else {
                // Поражение — стрелка указывает на пустую серую область
                targetSectorDeg = orangeArcDeg + Math.random() * (360 - orangeArcDeg); 
            }
            
            // Накапливаем градусы, добавляя обороты
            let targetRotation = arrowRotation + (360 * 7) + targetSectorDeg;
            let startRotation = arrowRotation; 
            stats.total++;

            // ФИКС: Удаляем строго одно вхождение выбранной карточки
            const indexToRemove = myInventoryData.indexOf(selectedLeft);
            if (indexToRemove !== -1) {
                myInventoryData.splice(indexToRemove, 1);
            }

            let animationDuration = 3800; 
            let animationStartTime = performance.now();

            function animateRotation(timestamp) {
                let elapsed = timestamp - animationStartTime;
                
                if (elapsed > animationDuration) {
                    arrowSpinner.style.transform = `rotate(${targetRotation}deg)`;
                    arrowRotation = targetRotation % 360; 
                    soundSpin.pause();
                    soundSpin.currentTime = 0;
                    afterSpin(isWin);
                    return;
                }

                let progress = elapsed / animationDuration;
                let t = 1 - progress;
                let currentBaseRotation = startRotation + (targetRotation - startRotation) * (1 - t * t * t);

                // Синхронизация "тряски" стрелоки с аудиоволной
                let vol = getAverageVolume();
                let jitter = vol * 2.5 * (Math.random() > 0.5 ? 1 : -1); 

                arrowSpinner.style.transform = `rotate(${currentBaseRotation + jitter}deg)`;
                requestAnimationFrame(animateRotation);
            }

            requestAnimationFrame(animateRotation);
        }

        function afterSpin(isWin) {
            const btn = document.getElementById('btnUpgrade');
            const arena = document.getElementById('arenaBox');
            
            btn.innerText = isWin ? (currentLang === 'ru' ? 'ВЫИГРЫШ!' : 'WIN!') : (currentLang === 'ru' ? 'СГОРЕЛО!' : 'LOSE!');

            if (isWin) {
                stats.wins++;
                btn.style.background = '#2ecc71';
                arena.classList.add('win-state');
                playSound(soundWin);
                
                confetti({ particleCount: 140, spread: 80, origin: { y: 0.6 }, colors: ['#ffcc00', '#2ecc71', '#ffffff'] });
                myInventoryData.push(selectedRight);
            } else {
                stats.losses++;
                btn.style.background = '#e74c3c';
                arena.classList.add('fail-state');
                playSound(soundFail);
                
                document.getElementById('chanceText').innerText = '0.00%';
                document.getElementById('wheelCircle').style.strokeDashoffset = 534;
            }

            saveData();
            updateBalanceUI();

            setTimeout(() => {
                btn.style.background = '';
                arena.className = 'upgrade-arena';
                selectedLeft = null; selectedRight = null;
                
                resetSlotUI('slotLeft', 'hintLeft', translations[currentLang].selectItem);
                resetSlotUI('slotRight', 'hintRight', translations[currentLang].selectTarget);
                document.getElementById('slotLeft').classList.remove('active');
                document.getElementById('slotRight').classList.remove('active');
                
                updateChance();
                renderGrid();
                isProcessing = false;
            }, 2000);
        }

        /* === МОДАЛКИ И СЕРВИСНЫЕ МЕТОДЫ === */
        function openModal(id) {
            setupAudioAnalysis();
            playSound(soundClick);
            document.getElementById(id).style.display = 'flex';
            if(id === 'profileModal') switchProfileTab('stats');
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function switchProfileTab(pTab) {
            playSound(soundClick);
            const tabs = ['stats', 'sell', 'buy', 'payout'];
            tabs.forEach(t => {
                document.getElementById(`pTab${t.charAt(0).toUpperCase() + t.slice(1)}`).classList.toggle('active', t === pTab);
                document.getElementById(`pContent${t.charAt(0).toUpperCase() + t.slice(1)}`).style.display = t === pTab ? 'block' : 'none';
            });

            if(pTab === 'stats') {
                document.getElementById('statTotal').innerText = stats.total;
                document.getElementById('statWins').innerText = stats.wins;
                document.getElementById('statLosses').innerText = stats.losses;
            } else if(pTab === 'sell') { renderProfileSellList(); }
              else if(pTab === 'buy') { renderProfileBuyList(); }
        }

        function renderProfileSellList() {
            const container = document.getElementById('profileSellList');
            container.innerHTML = '';
            if(myInventoryData.length === 0) {
                container.innerHTML = `<div style="color:var(--text-muted);text-align:center;padding:15px; font-size:12px;">Empty</div>`;
                return;
            }
            myInventoryData.forEach((item, idx) => {
                let sellPrice = Math.round(item.price * 0.5);
                container.innerHTML += `
                    <div class="profile-list-item" style="border-left-color: var(--accent-gold);">
                        <div class="p-item-info">
                            <span class="p-item-name">${item.sub}</span>
                            <span class="p-item-price">${sellPrice} ₽ (50%)</span>
                        </div>
                        <button class="btn-profile-action btn-sell" onclick="sellFromProfile(${idx})">${translations[currentLang].sell}</button>
                    </div>
                `;
            });
        }

        function sellFromProfile(idx) {
            playSound(soundClick);
            let item = myInventoryData[idx];
            balance += item.price * 0.5;
            myInventoryData.splice(idx, 1);
            saveData();
            updateBalanceUI();
            renderProfileSellList();
            renderGrid();
        }

        function renderProfileBuyList() {
            const container = document.getElementById('profileBuyList');
            container.innerHTML = '';
            giftPool.forEach((item) => {
                container.innerHTML += `
                    <div class="profile-list-item" style="border-left-color: #2ecc71;">
                        <div class="p-item-info">
                            <span class="p-item-name">${item.sub}</span>
                            <span class="p-item-price">${Math.round(item.price)} ₽</span>
                        </div>
                        <button class="btn-profile-action btn-buy" onclick="buyFromProfile('${item.id}')">${translations[currentLang].buy}</button>
                    </div>
                `;
            });
        }

        function buyFromProfile(itemId) {
            playSound(soundClick);
            const targetItem = giftPool.find(p => p.id === itemId);
            let cost = parseFloat(targetItem.price);
            
            if(balance < cost) {
                alert(translations[currentLang].noFunds);
                return;
            }

            balance -= cost;
            myInventoryData.push(targetItem);
            saveData();
            updateBalanceUI();
            renderProfileBuyList();
            renderGrid();
        }

        function processDeposit() {
            const amount = parseFloat(
