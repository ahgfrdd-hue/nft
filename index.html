<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Stars Upgrader Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

        :root {
            --bg-main: #060913;
            --bg-panel: #0b1120;
            --bg-card: #111a30;
            --bg-input: #0e1526;
            --text-main: #ffffff;
            --text-muted: #64748b;
            --accent-blue: #0088cc;
            --accent-yellow: #00f0ff; /* Обновленный кибер-неон для точности */
            --accent-gold: #ffca00;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --border-color: #1e293b;
            --border-hover: #334155;

            /* Редкости предметов с неоновым свечением */
            --tier-common: linear-gradient(135deg, #1e40af, #1e3a8a);
            --tier-rare: linear-gradient(135deg, #6d28d9, #4c1d95);
            --tier-epic: linear-gradient(135deg, #be185d, #701a75);
            --tier-legendary: linear-gradient(135deg, #b91c1c, #7f1d1d);
            --tier-immortal: linear-gradient(135deg, #b45309, #78350f);
        }

        body {
            margin: 0; padding: 20px;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            box-sizing: border-box; user-select: none;
            display: flex; flex-direction: column; align-items: center;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .app-container {
            width: 100%; max-width: 1340px;
            display: flex; flex-direction: column; gap: 24px;
        }

        /* ХЕДЕР ПЛАТФОРМЫ */
        .app-header {
            display: flex; justify-content: space-between; align-items: center;
            background-color: var(--bg-panel); padding: 16px 24px;
            border-radius: 16px; border: 1px solid var(--border-color);
        }
        .brand { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
        .brand span { color: var(--accent-blue); }
        .header-controls { display: flex; align-items: center; gap: 16px; }
        
        .btn-audio {
            background: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-muted);
            padding: 10px; border-radius: 10px; cursor: pointer; transition: all 0.2s;
        }
        .btn-audio.active { color: var(--accent-gold); border-color: rgba(255,202,0,0.3); }

        /* ВЕРХНЯЯ ЗОНА (РАБОЧЕЕ ПРОСТРАНСТВО) */
        .top-section {
            display: grid; grid-template-columns: 1fr 1.2fr 1fr; gap: 24px; min-height: 420px;
        }

        .panel {
            background-color: var(--bg-panel); border-radius: 20px;
            position: relative; display: flex; flex-direction: column;
            border: 1px solid var(--border-color);
            padding: 24px; box-sizing: border-box; transition: border-color 0.3s;
        }

        .panel-title {
            font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase;
            letter-spacing: 1.5px; margin-bottom: 20px; text-align: center;
        }

        .item-preview {
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center;
        }
        
        .gift-img-large {
            width: 160px; height: 160px; object-fit: contain; margin-bottom: 15px;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.7));
            animation: float 5s ease-in-out infinite;
        }
        
        .item-name { color: #fff; font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
        .item-price { font-size: 18px; font-weight: 700; color: var(--accent-gold); margin-top: 8px; background: rgba(255,202,0,0.06); padding: 4px 12px; border-radius: 20px; border: 1px solid rgba(255,202,0,0.15); }
        
        .empty-state { color: var(--text-muted); font-size: 13px; font-weight: 600; text-align: center; margin: auto; line-height: 1.6; max-width: 200px; }
        .empty-state span { display: block; margin-top: 8px; font-size: 11px; color: #475569; }

        /* Кастомизация слайдера баланса */
        .balance-slider-container {
            margin-top: auto; display: flex; flex-direction: column; gap: 10px;
            background: var(--bg-input); padding: 16px; border-radius: 14px; border: 1px solid var(--border-color);
        }
        .slider-header { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-muted); font-weight: 600; }
        .slider-header span b { color: var(--accent-gold); }
        
        .custom-slider {
            width: 100%; -webkit-appearance: none; background: var(--border-color); height: 6px; border-radius: 10px; outline: none;
        }
        .custom-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--accent-gold); cursor: pointer; box-shadow: 0 0 10px rgba(255,202,0,0.5); transition: transform 0.1s;
        }
        .custom-slider::-webkit-slider-thumb:hover { transform: scale(1.15); }

        /* ЦЕНТРАЛЬНЫЙ ТРЭКЕР */
        .center-panel { align-items: center; justify-content: center; background: transparent; border: none; padding: 0; gap: 20px;}
        
        .circle-container { position: relative; width: 280px; height: 280px; }
        
        .upgrader-wheel {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%; background: #0f1524;
            display: flex; align-items: center; justify-content: center;
            z-index: 1; transition: background 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 4px solid var(--border-color); box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
        }

        .wheel-inner {
            width: 230px; height: 230px;
            background: var(--bg-panel); border-radius: 50%;
            z-index: 3; display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 2px solid var(--border-color); box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .wheel-percent { font-size: 46px; font-weight: 800; color: var(--accent-gold); letter-spacing: -1px; }
        .wheel-text { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; font-weight: 700; margin-top: 4px; }

        .wheel-ticker {
            position: absolute; bottom: 0; left: 50%; width: 4px; height: 100%;
            transform-origin: center center; transform: translateX(-50%) rotate(0deg);
            z-index: 4; pointer-events: none;
        }
        .ticker-arrow {
            position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 12px solid transparent; border-right: 12px solid transparent;
            border-bottom: 20px solid var(--accent-gold);
            filter: drop-shadow(0 0 12px var(--accent-gold));
        }

        .btn-upgrade {
            width: 100%; background: linear-gradient(135deg, #ffca00, #e6b600); color: #000; border: none;
            padding: 20px; font-size: 16px; font-weight: 800; border-radius: 14px; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1.5px; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px rgba(255,202,0,0.15);
        }
        .btn-upgrade:hover:not(:disabled) { background: linear-gradient(135deg, #ffe100, #ffca00); transform: translateY(-2px); box-shadow: 0 6px 24px rgba(255,202,0,0.3); }
        .btn-upgrade:disabled { background: #151c2e; color: #3b455e; cursor: not-allowed; box-shadow: none; border: 1px solid var(--border-color); }

        /* СЕТКА УМНОЖИТЕЛЕЙ */
        .multiplier-container {
            margin-top: auto; display: flex; flex-direction: column; gap: 8px; width: 100%;
        }
        .multiplier-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
        .btn-mult {
            background: var(--bg-input); border: 1px solid var(--border-color); color: #94a3b8;
            padding: 10px 0; font-size: 11px; font-weight: 700; border-radius: 8px; cursor: pointer;
            transition: all 0.15s; text-align: center;
        }
        .btn-mult:hover:not(:disabled) { background: #1e293b; color: #fff; border-color: var(--border-hover); }
        .btn-mult.active { background: rgba(0, 240, 255, 0.08); border-color: var(--accent-yellow); color: var(--accent-yellow); box-shadow: 0 0 10px rgba(0,240,255,0.15); }
        .btn-mult:disabled { opacity: 0.3; cursor: not-allowed; }

        /* ИНВЕНТАРНАЯ ЗОНА */
        .bottom-section { display: grid; grid-template-columns: 1fr 1.2fr; gap: 24px; min-height: 520px; }

        .inventory-header {
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 16px; border-bottom: 1px solid var(--border-color); margin-bottom: 20px; gap: 12px;
        }
        .inventory-title { font-weight: 800; font-size: 15px; text-transform: uppercase; letter-spacing: 1px; color: #fff; display: flex; align-items: center; gap: 8px;}
        .inventory-title span { color: var(--text-muted); font-weight: 600; font-size: 13px; }
        
        .balance-badge {
            background: rgba(255,202,0,0.08); border: 1px solid rgba(255,202,0,0.2);
            padding: 8px 16px; border-radius: 10px; font-size: 15px; font-weight: 700; color: var(--accent-gold);
            display: flex; align-items: center; gap: 6px;
        }

        /* Поиск и фильтры магазина */
        .shop-filter-bar {
            display: flex; gap: 10px; width: 100%; max-width: 320px;
        }
        .search-input {
            width: 100%; background: var(--bg-input); border: 1px solid var(--border-color);
            border-radius: 10px; padding: 8px 14px; color: #fff; font-family: inherit; font-size: 13px; outline: none;
            transition: border-color 0.2s;
        }
        .search-input:focus { border-color: var(--border-hover); }
        
        .select-sort {
            background: var(--bg-input); border: 1px solid var(--border-color);
            border-radius: 10px; padding: 0 10px; color: var(--text-muted); font-family: inherit; font-size: 12px; cursor: pointer; outline: none;
        }

        .grid-container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(125px, 1fr));
            gap: 12px; overflow-y: auto; height: 420px; align-content: start; padding-right: 4px;
        }
        .grid-container::-webkit-scrollbar { width: 6px; }
        .grid-container::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

        /* Премиальные карточки предметов */
        .skin-card {
            background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 14px;
            padding: 14px; position: relative; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            height: 155px; box-sizing: border-box; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .skin-card:hover { background: #16223d; border-color: #334155; transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
        .skin-card.selected { border-color: var(--accent-gold); background: #1a2642; box-shadow: 0 0 20px rgba(255, 202, 0, 0.15); }
        
        .rarity-line { position: absolute; top: 0; left: 0; width: 100%; height: 4px; border-radius: 14px 14px 0 0; }
        .card-price { width: 100%; text-align: right; font-size: 12px; font-weight: 700; color: var(--accent-gold); }
        
        .gift-img-small { width: 68px; height: 68px; object-fit: contain; filter: drop-shadow(0 8px 12px rgba(0,0,0,0.4)); transition: transform 0.25s; margin: 4px 0;}
        .skin-card:hover .gift-img-small { transform: scale(1.1); }

        .skin-card .name { font-size: 12px; color: #f1f5f9; font-weight: 600; text-align: center; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .empty-slot { background: rgba(17, 26, 48, 0.2); border: 2px dashed rgba(255,255,255,0.03); border-radius: 14px; height: 155px; }

        /* Баннер исхода апгрейда */
        .result-banner {
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%) scale(0.9);
            padding: 12px 32px; border-radius: 10px; font-weight: 800; font-size: 14px;
            opacity: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 20; text-transform: uppercase; letter-spacing: 1.5px; pointer-events: none;
        }
        .result-banner.win { opacity: 1; transform: translateX(-50%) scale(1); background: var(--accent-green); color: #000; box-shadow: 0 0 30px rgba(16, 185, 129, 0.5); }
        .result-banner.lose { opacity: 1; transform: translateX(-50%) scale(1); background: var(--accent-red); color: #fff; box-shadow: 0 0 30px rgba(239, 68, 68, 0.5); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="app-header">
        <div class="brand">🚀 UPGRADER<span>.TG</span></div>
        <div class="header-controls">
            <button class="btn-audio active" id="audio-toggle" onclick="toggleAudio()" title="Вкл/Выкл звук">
                🔊 Звук
            </button>
        </div>
    </div>

    <div class="top-section">
        <div class="panel" id="panel-input">
            <div class="panel-title">Ваш Предмет</div>
            <div id="preview-left-content" class="item-preview" style="display: none;">
                <img src="" class="gift-img-large" id="input-img" alt="">
                <div class="item-name" id="input-title">Название</div>
                <div class="item-price" id="input-price">0 ⭐️</div>
            </div>
            <div id="preview-left-empty" class="empty-state">
                ВЫБЕРИТЕ ПРЕДМЕТ
                <span>из инвентаря снизу для начала</span>
            </div>
            
            <div class="balance-slider-container">
                <div class="slider-header">
                    <span>Добавить баланс:</span>
                    <span><span id="slider-val">0</span> ⭐️</span>
                </div>
                <input type="range" min="0" max="0" value="0" class="custom-slider" id="balance-slider" oninput="updateSliderAmount()">
            </div>
        </div>

        <div class="panel center-panel">
            <div class="result-banner" id="res-banner">УСПЕХ!</div>
            <div class="circle-container">
                <div class="upgrader-wheel" id="wheel-canvas">
                    <div class="wheel-ticker" id="wheel-ticker">
                        <div class="ticker-arrow"></div>
                    </div>
                    <div class="wheel-inner">
                        <div class="wheel-percent" id="chance-display">0.00%</div>
                        <div class="wheel-text" id="chance-status">выберите цели</div>
                    </div>
                </div>
            </div>
            <button class="btn-upgrade" id="btn-upgrade-main" disabled onclick="startUpgrade()">Попытаться улучшить</button>
        </div>

        <div class="panel" id="panel-target">
            <div class="panel-title">Целевой Предмет</div>
            <div id="preview-right-content" class="item-preview" style="display: none;">
                <img src="" class="gift-img-large" id="target-img" alt="">
                <div class="item-name" id="target-title">Название</div>
                <div class="item-price" id="target-price">0 ⭐️</div>
            </div>
            <div id="preview-right-empty" class="empty-state">
                ВЫБЕРИТЕ ЦЕЛЬ
                <span>из витрины наград справа</span>
            </div>

            <div class="multiplier-container">
                <div class="multiplier-grid">
                    <button class="btn-mult" id="m-x2" onclick="applyQuickMultiplier(2, false)">x2</button>
                    <button class="btn-mult" id="m-x5" onclick="applyQuickMultiplier(5, false)">x5</button>
                    <button class="btn-mult" id="m-x10" onclick="applyQuickMultiplier(10, false)">x10</button>
                    <button class="btn-mult" id="m-25" onclick="applyQuickMultiplier(25, true)">25%</button>
                    <button class="btn-mult" id="m-50" onclick="applyQuickMultiplier(50, true)">50%</button>
                    <button class="btn-mult" id="m-75" onclick="applyQuickMultiplier(75, true)">75%</button>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-section">
        <div class="panel">
            <div class="inventory-header">
                <div class="inventory-title">🗃 Мой инвентарь <span id="inv-count">(0)</span></div>
                <div class="balance-badge"><span id="balance-amount">5000</span> ⭐️</div>
            </div>
            <div class="grid-container" id="my-inventory-grid"></div>
        </div>

        <div class="panel">
            <div class="inventory-header">
                <div class="inventory-title">🛍 Магазин Наград</div>
                <div class="shop-filter-bar">
                    <input type="text" class="search-input" id="shop-search" placeholder="Поиск наград..." oninput="renderShop()">
                    <select class="select-sort" id="shop-sort" onchange="renderShop()">
                        <option value="asc">Сначала дешевые</option>
                        <option value="desc">Сначала дорогие</option>
                    </select>
                </div>
            </div>
            <div class="grid-container" id="shop-grid"></div>
        </div>
    </div>
</div>

<script>
    // --- АУДИОСИСТЕМА ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    let isSoundEnabled = true;

    function initAudio() {
        if (!audioCtx) audioCtx = new AudioContext();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function toggleAudio() {
        isSoundEnabled = !isSoundEnabled;
        const btn = document.getElementById("audio-toggle");
        if(isSoundEnabled) {
            btn.classList.add("active");
            btn.innerText = "🔊 Звук";
            initAudio();
        } else {
            btn.classList.remove("active");
            btn.innerText = "🔇 Мут";
        }
    }

    function playSound(type) {
        if (!audioCtx || !isSoundEnabled) return;
        const now = audioCtx.currentTime;
        
        if (type === 'click') {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(450, now);
            gain.gain.setValueAtTime(0.08, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
            osc.start(now); osc.stop(now + 0.06);
        } else if (type === 'tick') {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'triangle'; osc.frequency.setValueAtTime(280, now);
            gain.gain.setValueAtTime(0.05, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.03);
            osc.start(now); osc.stop(now + 0.03);
        } else if (type === 'win') {
            [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.frequency.setValueAtTime(freq, now + i*0.07);
                g.gain.setValueAtTime(0.1, now + i*0.07); g.gain.exponentialRampToValueAtTime(0.001, now + i*0.07 + 0.25);
                o.connect(g); g.connect(audioCtx.destination); o.start(now + i*0.07); o.stop(now + i*0.07 + 0.25);
            });
        } else if (type === 'lose') {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(110, now); osc.frequency.linearRampToValueAtTime(40, now + 0.45);
            gain.gain.setValueAtTime(0.12, now); gain.gain.linearRampToValueAtTime(0.001, now + 0.45);
            osc.start(now); osc.stop(now + 0.45);
        }
    }

    // --- БАЗА ДАННЫХ ПРЕДМЕТОВ TELEGRAM ---
    const NFT_DATABASE = {
        "lollipop": { name: "Lollipop", img: "https://i.postimg.cc/k47vYg7k/lollipop.png", price: 50, rarity: "var(--tier-common)" },
        "pigeon": { name: "Letter Pigeon", img: "https://i.postimg.cc/g0gDcgL4/pigeon.png", price: 150, rarity: "var(--tier-common)" },
        "cake": { name: "Birthday Cake", img: "https://i.postimg.cc/0jXm8Yf1/cake.png", price: 400, rarity: "var(--tier-common)" },
        "duck": { name: "Rubber Duck", img: "https://i.postimg.cc/N0fL8vWh/duck.png", price: 1200, rarity: "var(--tier-rare)" },
        "star_bottle": { name: "Star Bottle", img: "https://i.postimg.cc/85zXbXfG/star.png", price: 3000, rarity: "var(--tier-rare)" },
        "plush_pepe": { name: "Plush Pepe", img: "https://i.postimg.cc/HkWZzX9S/hotdog.png", price: 7500, rarity: "var(--tier-epic)" },
        "ton_coin": { name: "Crypto TON Coin", img: "https://i.postimg.cc/PqMvMDp6/heart.png", price: 18000, rarity: "var(--tier-epic)" },
        "pavel_durov": { name: "Pavel Durov", img: "https://i.postimg.cc/hGvXbXbY/cap.png", price: 45000, rarity: "var(--tier-epic)" },
        "magic_crystal": { name: "Magic Crystal", img: "https://i.postimg.cc/fyXbXbF3/crystal.png", price: 120000, rarity: "var(--tier-legendary)" },
        "telegram_bear": { name: "Golden Crown Bear", img: "https://i.postimg.cc/9QvXbXb8/crown.png", price: 300000, rarity: "var(--tier-immortal)" }
    };

    // Стейт
    let freebetBalance = 25000;
    let userInventory = ["lollipop", "pigeon", "cake", "duck", "star_bottle"]; 
    let selectedInvIdx = null;
    let selectedShopKey = null;
    let addedBalance = 0;
    let calculatedChance = 0;
    let isUpgrading = false;

    document.body.addEventListener('click', initAudio, { once: true });

    function init() { 
        renderInventory(); 
        renderShop(); 
        updateWorkspace(); 
    }

    function renderInventory() {
        const grid = document.getElementById("my-inventory-grid");
        grid.innerHTML = "";
        document.getElementById("inv-count").innerText = `(${userInventory.length})`;
        document.getElementById("balance-amount").innerText = freebetBalance.toLocaleString();

        userInventory.forEach((key, idx) => {
            const item = NFT_DATABASE[key];
            if(!item) return;
            const card = document.createElement("div");
            card.className = `skin-card ${selectedInvIdx === idx ? 'selected' : ''}`;
            card.onclick = () => { if(!isUpgrading) { playSound('click'); selectInventoryItem(idx); } };
            card.innerHTML = `
                <div class="rarity-line" style="background: ${item.rarity}"></div>
                <div class="card-price">${item.price.toLocaleString()} ⭐️</div>
                <img src="${item.img}" class="gift-img-small" alt="">
                <div class="name">${item.name}</div>
            `;
            grid.appendChild(card);
        });

        for(let i = 0; i < Math.max(0, 8 - userInventory.length); i++) {
            const slot = document.createElement("div"); slot.className = "empty-slot"; grid.appendChild(slot);
        }
    }

    function renderShop() {
        const grid = document.getElementById("shop-grid");
        const searchQuery = document.getElementById("shop-search").value.toLowerCase();
        const sortOrder = document.getElementById("shop-sort").value;
        
        grid.innerHTML = "";
        
        let keys = Object.keys(NFT_DATABASE);
        
        // Фильтрация поиска
        keys = keys.filter(k => NFT_DATABASE[k].name.toLowerCase().includes(searchQuery));
        
        // Сортировка
        keys.sort((a, b) => {
            return sortOrder === 'asc' ? NFT_DATABASE[a].price - NFT_DATABASE[b].price : NFT_DATABASE[b].price - NFT_DATABASE[a].price;
        });

        keys.forEach(key => {
            const item = NFT_DATABASE[key];
            const card = document.createElement("div");
            card.className = `skin-card ${selectedShopKey === key ? 'selected' : ''}`;
            card.onclick = () => { if(!isUpgrading) { playSound('click'); selectShopItem(key); } };
            card.innerHTML = `
                <div class="rarity-line" style="background: ${item.rarity}"></div>
                <div class="card-price">${item.price.toLocaleString()} ⭐️</div>
                <img src="${item.img}" class="gift-img-small" alt="">
                <div class="name">${item.name}</div>
            `;
            grid.appendChild(card);
        });
    }

    function selectInventoryItem(idx) { 
        selectedInvIdx = (selectedInvIdx === idx) ? null : idx;
        addedBalance = 0;
        resetMultipliers();
        updateWorkspace(); 
        renderInventory();
    }

    function selectShopItem(key) { 
        selectedShopKey = (selectedShopKey === key) ? null : key;
        resetMultipliers();
        updateWorkspace(); 
        renderShop();
    }

    function resetMultipliers() {
        document.querySelectorAll('.btn-mult').forEach(b => b.classList.remove('active'));
    }

    function updateSliderAmount() {
        const slider = document.getElementById("balance-slider");
        addedBalance = parseInt(slider.value);
        document.getElementById("slider-val").innerText = addedBalance.toLocaleString();
        updateWorkspace(false);
    }

    // --- УМНАЯ ЛОГИКА МНОЖИТЕЛЕЙ (МЕХАНИКА ИЗ UPGRADER.PRO) ---
    function applyQuickMultiplier(value, isPercentage = false) {
        if (selectedInvIdx === null || isUpgrading) return;
        playSound('click');
        
        const inputItem = NFT_DATABASE[userInventory[selectedInvIdx]];
        const currentTotalInput = inputItem.price + addedBalance;
        let targetTargetPrice = 0;

        if (!isPercentage) {
            // Режим множителя цены (x2, x5, x10)
            targetTargetPrice = currentTotalInput * value;
        } else {
            // Режим фиксированного процента риска (25%, 50%, 75%)
            targetTargetPrice = currentTotalInput / (value / 100);
        }

        // Ищем в базе предмет, наиболее близкий по цене к расчетному значению
        let bestKey = null;
        let minDiff = Infinity;

        Object.keys(NFT_DATABASE).forEach(key => {
            const item = NFT_DATABASE[key];
            // Цель должна быть строго дороже базового предмета инвентаря
            if (item.price > inputItem.price) {
                const diff = Math.abs(item.price - targetTargetPrice);
                if (diff < minDiff) {
                    minDiff = diff;
                    bestKey = key;
                }
            }
        });

        if (bestKey) {
            selectedShopKey = bestKey;
            renderShop();
            updateWorkspace(false);
            
            resetMultipliers();
            const btnId = isPercentage ? `m-${value}` : `m-x${value}`;
            const activeBtn = document.getElementById(btnId);
            if (activeBtn) activeBtn.classList.add('active');
        }
    }

    // Расчет шансов
    function updateWorkspace(resetSlider = true) {
        const pLeftContent = document.getElementById("preview-left-content");
        const pLeftEmpty = document.getElementById("preview-left-empty");
        const slider = document.getElementById("balance-slider");
        const panelInput = document.getElementById("panel-input");
        const panelTarget = document.getElementById("panel-target");

        if (selectedInvIdx !== null) {
            const item = NFT_DATABASE[userInventory[selectedInvIdx]];
            pLeftEmpty.style.display = "none"; pLeftContent.style.display = "flex";
            document.getElementById("input-img").src = item.img;
            document.getElementById("input-title").innerText = item.name;
            document.getElementById("input-price").innerText = item.price.toLocaleString() + " ⭐️";
            panelInput.style.borderColor = "rgba(255,255,255,0.1)";
            
            slider.max = freebetBalance;
            if (resetSlider) {
                slider.value = addedBalance;
                document.getElementById("slider-val").innerText = addedBalance.toLocaleString();
            }
        } else { 
            pLeftContent.style.display = "none"; pLeftEmpty.style.display = "block"; 
            slider.max = 0; slider.value = 0;
            document.getElementById("slider-val").innerText = 0;
            panelInput.style.borderColor = "var(--border-color)";
        }

        const pRightContent = document.getElementById("preview-right-content");
        const pRightEmpty = document.getElementById("preview-right-empty");
        
        if (selectedShopKey !== null) {
            const item = NFT_DATABASE[selectedShopKey];
            pRightEmpty.style.display = "none"; pRightContent.style.display = "flex";
            document.getElementById("target-img").src = item.img;
            document.getElementById("target-title").innerText = item.name;
            document.getElementById("target-price").innerText = item.price.toLocaleString() + " ⭐️";
            panelTarget.style.borderColor = "rgba(255,255,255,0.1)";
        } else { 
            pRightContent.style.display = "none"; pRightEmpty.style.display = "block"; 
            panelTarget.style.borderColor = "var(--border-color)";
        }

        const btnUpgrade = document.getElementById("btn-upgrade-main");
        
        if (selectedInvIdx !== null && selectedShopKey !== null) {
            const costFrom = NFT_DATABASE[userInventory[selectedInvIdx]].price + addedBalance;
            const costTo = NFT_DATABASE[selectedShopKey].price;
            
            calculatedChance = Math.min((costFrom / costTo) * 100, 100);
            
            const displayChance = document.getElementById("chance-display");
            displayChance.innerText = calculatedChance.toFixed(2) + "%";
            
            if (calculatedChance >= 65) {
                document.getElementById("chance-status").innerText = "высокий шанс";
                displayChance.style.color = "var(--accent-green)";
            } else if (calculatedChance >= 30) {
                document.getElementById("chance-status").innerText = "средний шанс";
                displayChance.style.color = "var(--accent-gold)";
            } else {
                document.getElementById("chance-status").innerText = "низкий шанс";
                displayChance.style.color = "var(--accent-red)";
            }
            
            if (costTo <= NFT_DATABASE[userInventory[selectedInvIdx]].price) {
                displayChance.innerText = "0.00%";
                document.getElementById("chance-status").innerText = "цель должна быть дороже";
                btnUpgrade.disabled = true;
                drawWheelSector(0);
            } else {
                btnUpgrade.disabled = false;
                drawWheelSector(calculatedChance);
            }
        } else {
            calculatedChance = 0;
            document.getElementById("chance-display").innerText = "0.00%";
            document.getElementById("chance-display").style.color = "var(--text-muted)";
            document.getElementById("chance-status").innerText = "выберите цели";
            btnUpgrade.disabled = true;
            drawWheelSector(0);
        }
    }

    function drawWheelSector(chance) {
        const wheel = document.getElementById("wheel-canvas");
        if (chance <= 0) { wheel.style.background = `#0f1524`; return; }
        
        const arcDegrees = (chance / 100) * 360;
        const startDeg = 180 - (arcDegrees / 2);
        const endDeg = 180 + (arcDegrees / 2);
        
        wheel.style.background = `conic-gradient(from 0deg, 
            #0f1524 0deg, #0f1524 ${startDeg}deg, 
            var(--accent-gold) ${startDeg}deg, var(--accent-gold) ${endDeg}deg, 
            #0f1524 ${endDeg}deg, #0f1524 360deg
        )`;
    }

    // --- КРУТИЛКА И ТИКЕР КИНЕМАТИКИ ---
    function startUpgrade() {
        if (isUpgrading || selectedInvIdx === null || selectedShopKey === null) return;
        
        isUpgrading = true;
        playSound('click');
        document.getElementById("btn-upgrade-main").disabled = true;
        document.querySelectorAll('.btn-mult').forEach(b => b.disabled = true);
        document.getElementById("balance-slider").disabled = true;
        document.getElementById("shop-sort").disabled = true;
        document.getElementById("shop-search").disabled = true;

        const isWin = (Math.random() * 100) <= calculatedChance;
        const arcDegrees = (calculatedChance / 100) * 360;
        
        let targetAngle = 0;
        if (isWin) {
            const half = arcDegrees / 2; 
            targetAngle = 180 + (Math.random() * (half * 0.85) * (Math.random() > 0.5 ? 1 : -1));
        } else {
            const half = arcDegrees / 2;
            if (Math.random() > 0.5) { 
                targetAngle = Math.random() * (180 - half - 15); 
            } else { 
                targetAngle = (180 + half + 15) + (Math.random() * (180 - half - 15)); 
            }
        }

        const totalSpins = 2880; // Повышено количество оборотов для лучшей плавности замедления
        const finalRotation = totalSpins + targetAngle;
        
        const ticker = document.getElementById("wheel-ticker");
        document.getElementById("res-banner").className = "result-banner";

        let startTimestamp = null;
        const duration = 4500; 
        let lastTickAngle = 0;

        function animate(timestamp) {
            if (!startTimestamp) startTimestamp = timestamp;
            const elapsed = timestamp - startTimestamp;
            const progress = Math.min(elapsed / duration, 1);
            
            // Плавное физическое торможение стрелки
            const easeOut = 1 - Math.pow(1 - progress, 4);
            const currentAngle = finalRotation * easeOut;

            ticker.style.transform = `translateX(-50%) rotate(${currentAngle}deg)`;

            if (currentAngle - lastTickAngle > 18) {
                playSound('tick');
                lastTickAngle = currentAngle;
            }

            if (progress < 1) {
                requestAnimationFrame(animate);
            } else {
                finishUpgrade(isWin);
            }
        }
        requestAnimationFrame(animate);
    }

    function finishUpgrade(isWin) {
        const banner = document.getElementById("res-banner");
        
        freebetBalance -= addedBalance;
        const rawKey = userInventory[selectedInvIdx];
        userInventory.splice(selectedInvIdx, 1);

        if (isWin) {
            userInventory.push(selectedShopKey);
            banner.innerText = "🎉 Успешный Апгрейд!";
            banner.className = "result-banner win";
            playSound('win');
        } else {
            banner.innerText = "💥 Подарок Сгорел";
            banner.className = "result-banner lose";
            playSound('lose');
        }

        selectedInvIdx = null;
        selectedShopKey = null;
        addedBalance = 0;
        isUpgrading = false;
        
        document.querySelectorAll('.btn-mult').forEach(b => b.disabled = false);
        document.getElementById("balance-slider").disabled = false;
        document.getElementById("shop-sort").disabled = false;
        document.getElementById("shop-search").disabled = false;
        
        resetMultipliers();
        renderInventory(); 
        renderShop();
        updateWorkspace();

        setTimeout(() => { banner.className = "result-banner"; }, 4000);
    }

    window.onload = init;
</script>
