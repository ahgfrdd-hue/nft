<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Gift Upgrader</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: #0f111a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 20px;
            background-color: #1a1d2d;
            text-align: center;
            border-bottom: 2px solid #2a2e45;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        h1 {
            color: #0088cc;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .upgrade-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin-top: 60px;
            width: 90%;
            max-width: 1000px;
        }

        .item-box {
            width: 250px;
            height: 350px;
            background-color: #1a1d2d;
            border-radius: 15px;
            border: 2px solid #2a2e45;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
            transition: all 0.3s;
        }

        .item-box.active {
            border-color: #0088cc;
            box-shadow: 0 0 20px rgba(0, 136, 204, 0.4);
        }

        .item-image {
            width: 150px;
            height: 150px;
            object-fit: contain;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
        }

        .item-price {
            font-size: 24px;
            font-weight: 700;
            color: #ffd700;
        }

        .item-name {
            color: #a0a5c0;
            margin-top: 5px;
            font-size: 14px;
            text-align: center;
            padding: 0 10px;
        }

        .central-block {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .chance-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 8px solid #2a2e45;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
            position: relative;
        }

        .chance-value {
            font-size: 32px;
            font-weight: 900;
        }

        .chance-label {
            font-size: 12px;
            color: #a0a5c0;
            text-transform: uppercase;
        }

        .btn-upgrade {
            background: linear-gradient(90deg, #0088cc, #005580);
            border: none;
            padding: 15px 40px;
            color: white;
            font-size: 18px;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(0, 136, 204, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-upgrade:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 25px rgba(0, 136, 204, 0.6);
        }

        .btn-upgrade:disabled {
            background: #2a2e45;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
            color: #666;
        }

        .inventory-section {
            margin-top: 80px;
            width: 90%;
            max-width: 1000px;
        }

        .inventory-title {
            margin-bottom: 20px;
            font-size: 20px;
            border-bottom: 1px solid #2a2e45;
            padding-bottom: 10px;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .grid-item {
            background-color: #1a1d2d;
            border: 1px solid #2a2e45;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .grid-item:hover {
            border-color: #0088cc;
        }

        .grid-item img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .result-message {
            position: absolute;
            top: -50px;
            font-size: 24px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .win { color: #00ff00; }
        .lose { color: #ff3333; }
    </style>
</head>
<body>

    <header>
        <h1>TG Gift Upgrader</h1>
    </header>

    <div class="upgrade-container">
        <div class="item-box" id="source-box">
            <span style="color: #a0a5c0; margin-bottom: 20px;">Ваш предмет</span>
            <img src="https://em-content.zobj.net/source/telegram/386/star_2b50.webp" class="item-image" id="source-img" alt="Source">
            <div class="item-price" id="source-price">100 ⭐️</div>
            <div class="item-name" id="source-name">Обычная Звезда</div>
        </div>

        <div class="central-block">
            <div class="result-message" id="result-msg">УСПЕХ!</div>
            <div class="chance-circle" id="chance-circle">
                <div class="chance-value" id="chance-display">50%</div>
                <div class="chance-label">Шанс</div>
            </div>
            <button class="btn-upgrade" id="btn-upgrade" onclick="startUpgrade()">UPGRADE</button>
        </div>

        <div class="item-box active" id="target-box">
            <span style="color: #a0a5c0; margin-bottom: 20px;">Желаемый предмет</span>
            <img src="16148.jpg" class="item-image" id="target-img" alt="Target" onerror="this.src='https://em-content.zobj.net/source/telegram/386/frog_1f438.webp'">
            <div class="item-price" id="target-price">500 ⭐️</div>
            <div class="item-name" id="target-name">Блестящая Желейная Лягушка</div>
        </div>
    </div>

    <div class="inventory-section">
        <h2 class="inventory-title">Доступные подарки (Выберите желаемый)</h2>
        <div class="items-grid" id="inventory-grid">
            </div>
    </div>

    <script>
        // База данных подарков
        const items = [
            { id: 1, name: "Обычная Звезда", price: 100, img: "https://em-content.zobj.net/source/telegram/386/star_2b50.webp" },
            { id: 2, name: "Новогодняя Елка", price: 250, img: "https://em-content.zobj.net/source/telegram/386/christmas-tree_1f384.webp" },
            { id: 3, name: "Золотое Сердце", price: 1000, img: "https://em-content.zobj.net/source/telegram/386/yellow-heart_1f49b.webp" },
            { id: 4, name: "Премиум Корона", price: 5000, img: "https://em-content.zobj.net/source/telegram/386/crown_1f451.webp" },
            // Твой эксклюзивный предмет (картинка должна быть в той же папке)
            { id: 5, name: "Блестящая Желейная Лягушка", price: 15000, img: "16148.jpg" } 
        ];

        let currentSource = items[0];
        let currentTarget = items[4];
        let isUpgrading = false;

        // Инициализация магазина/инвентаря
        function renderInventory() {
            const grid = document.getElementById('inventory-grid');
            grid.innerHTML = '';
            
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'grid-item';
                div.innerHTML = `
                    <img src="${item.img}" onerror="this.src='https://em-content.zobj.net/source/telegram/386/question-mark_2753.webp'">
                    <div style="color: #ffd700; font-weight: bold; margin-bottom: 5px;">${item.price} ⭐️</div>
                    <div style="font-size: 12px; color: #a0a5c0; text-align: center;">${item.name}</div>
                `;
                div.onclick = () => selectTarget(item);
                grid.appendChild(div);
            });
        }

        function selectTarget(item) {
            if(isUpgrading) return;
            currentTarget = item;
            updateUI();
        }

        function updateUI() {
            // Обновляем левый блок
            document.getElementById('source-img').src = currentSource.img;
            document.getElementById('source-price').innerText = currentSource.price + " ⭐️";
            document.getElementById('source-name').innerText = currentSource.name;

            // Обновляем правый блок
            document.getElementById('target-img').src = currentTarget.img;
            document.getElementById('target-price').innerText = currentTarget.price + " ⭐️";
            document.getElementById('target-name').innerText = currentTarget.name;

            // Рассчитываем шанс
            let chance = (currentSource.price / currentTarget.price) * 100;
            if (chance > 100) chance = 100;
            
            // Защита от математических ошибок если цены нет
            if(isNaN(chance)) chance = 0;

            const chanceCircle = document.getElementById('chance-circle');
            const btn = document.getElementById('btn-upgrade');

            document.getElementById('chance-display').innerText = chance.toFixed(2) + "%";

            // Меняем цвет круга в зависимости от шанса
            if(chance < 10) chanceCircle.style.borderColor = '#ff3333';
            else if(chance < 50) chanceCircle.style.borderColor = '#ff9900';
            else chanceCircle.style.borderColor = '#00ff00';

            // Блокируем кнопку, если даунгрейд
            if (currentSource.price >= currentTarget.price) {
                btn.disabled = true;
                btn.innerText = "НЕДОСТУПНО";
                document.getElementById('chance-display').innerText = "MAX";
            } else {
                btn.disabled = false;
                btn.innerText = "UPGRADE";
            }
        }

        function startUpgrade() {
            if(isUpgrading) return;
            isUpgrading = true;
            
            const btn = document.getElementById('btn-upgrade');
            const chanceDisplay = document.getElementById('chance-display');
            const resultMsg = document.getElementById('result-msg');
            
            btn.disabled = true;
            resultMsg.style.opacity = 0;
            
            let chance = (currentSource.price / currentTarget.price) * 100;
            
            // Имитация "прокрутки" шанса
            let ticks = 0;
            let interval = setInterval(() => {
                chanceDisplay.innerText = (Math.random() * 100).toFixed(2) + "%";
                ticks++;
                
                if (ticks > 20) {
                    clearInterval(interval);
                    finishUpgrade(chance);
                }
            }, 50);
        }

        function finishUpgrade(realChance) {
            const chanceDisplay = document.getElementById('chance-display');
            const resultMsg = document.getElementById('result-msg');
            const roll = Math.random() * 100;
            
            chanceDisplay.innerText = roll.toFixed(2) + "%";
            
            if (roll <= realChance) {
                // Победа
                resultMsg.innerText = "УСПЕШНЫЙ АПГРЕЙД!";
                resultMsg.className = "result-message win";
                currentSource = currentTarget; // Предмет становится твоим
            } else {
                // Поражение
                resultMsg.innerText = "КРАШ!";
                resultMsg.className = "result-message lose";
                currentSource = items[0]; // Сбрасываем до дешманского предмета
            }
            
            resultMsg.style.opacity = 1;
            isUpgrading = false;
            
            setTimeout(() => {
                updateUI();
                resultMsg.style.opacity = 0;
            }, 2000);
        }

        // Запуск при загрузке
        renderInventory();
        updateUI();
    </script>
</body>
</html>
