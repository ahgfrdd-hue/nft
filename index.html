<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Upgrader Mobile Remastered</title>
    <style>
        /* === ПЕРЕМЕННЫЕ И БАЗОВЫЕ НАСТРОЙКИ === */
        :root {
            --bg-main: #0c0c0e;
            --bg-panel: #141416;
            --bg-card: #1a1a1e;
            --accent-gold: #f4c21a;
            --accent-gold-glow: rgba(244, 194, 26, 0.35);
            --text-main: #ffffff;
            --text-muted: #7d7d85;
            --border-color: #222226;
            
            /* Цвета редкостей для новых предметов */
            --rarity-epic: #9b59b6;
            --rarity-legendary: #e67e22;
            --rarity-mythic: #e74c3c;
            --rarity-immortal: #ff007f;
            
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 6px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* === ХЕДЕР (Компактный для мобилок) === */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-area {
            display: flex;
            flex-direction: column;
        }
        .logo {
            font-size: 18px;
            font-weight: 900;
            color: var(--accent-gold);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .logo span { color: var(--text-main); }
        .online-count {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 1px;
        }
        .online-count span { color: #2ecc71; font-weight: bold; }

        .user-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .balance {
            font-size: 14px;
            font-weight: 700;
            color: var(--accent-gold);
        }
        .btn-deposit {
            background: var(--accent-gold);
            color: #000;
            padding: 8px 14px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 800;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-deposit:hover { transform: scale(1.03); }

        /* === ОСНОВНОЙ КОНТЕНТ (Одноколоночный для мобильных) === */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px;
            gap: 20px;
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
        }

        /* === ЛЕНТА LIVE (Мини-формат сверху) === */
        .live-ticker {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 8px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            white-space: nowrap;
        }
        .ticker-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--bg-main);
            padding: 4px 8px;
            border-radius: var(--radius-sm);
            font-size: 11px;
            border-left: 2px solid var(--accent-gold);
        }
        .ticker-item.fail { border-left-color: #e74c3c; }

        /* === БЛОК С КЕЙСОМ === */
        .case-banner {
            background: linear-gradient(135deg, #1e1e24 0%, #111115 100%);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        .case-text h2 { font-size: 15px; color: var(--accent-gold); margin-bottom: 2px; }
        .case-text p { font-size: 11px; color: var(--text-muted); }
        .btn-case {
            background: transparent;
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-case:hover { background: var(--accent-gold); color: #000; }

        /* === АРЕНА АПГРЕЙДА === */
        .upgrade-arena {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* Слоты для выбранных предметов (Строка над кругом) */
        .slots-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
        }
        .item-slot {
            background: var(--bg-main);
            border: 1px dashed #333;
            border-radius: var(--radius-md);
            height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 8px;
            text-align: center;
            position: relative;
            transition: var(--transition);
        }
        .item-slot.active {
            border: 1px solid var(--accent-gold);
            background: rgba(244, 194, 26, 0.02);
        }
        .slot-hint { font-size: 10px; color: var(--text-muted); }

        /* Круг апгрейда */
        .wheel-box {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 10px 0;
        }
        .wheel-svg {
            transform: rotate(-90deg); /* Поворачиваем, чтобы заполнение шло СНИЗУ вверх по бокам */
            width: 100%;
            height: 100%;
        }
        .wheel-track {
            fill: none;
            stroke: var(--bg-main);
            stroke-width: 12;
        }
        .wheel-progress {
            fill: none;
            stroke: var(--accent-gold);
            stroke-width: 12;
            stroke-dasharray: 502; /* Окружность 2 * PI * 80 */
            stroke-dashoffset: 251; /* 50% по умолчанию */
            stroke-linecap: round;
            transition: stroke-dashoffset 0.5s ease;
        }
        .wheel-center-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 5;
        }
        .wheel-center-text h1 {
            font-size: 26px;
            font-weight: 900;
            color: var(--accent-gold);
            text-shadow: 0 0 15px var(--accent-gold-glow);
        }
        .wheel-center-text p {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Кнопка Прокачать */
        .action-block {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn-upgrade {
            background: var(--accent-gold);
            color: #000;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 900;
            border-radius: var(--radius-md);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 20px rgba(244, 194, 26, 0.25);
            transition: var(--transition);
        }
        .btn-upgrade:active { transform: scale(0.98); }

        /* Множители под кнопкой */
        .multipliers {
            display: flex;
            justify-content: center;
            gap: 8px;
        }
        .mult-btn {
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 6px 12px;
            font-size: 11px;
            font-weight: 600;
            border-radius: var(--radius-sm);
            cursor: pointer;
        }

        /* === ИНВЕНТАРИ (Вкладки вместо двух огромных колонок) === */
        .inventory-section {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .tabs-header {
            display: flex;
            background: rgba(0,0,0,0.2);
            border-bottom: 1px solid var(--border-color);
        }
        .tab-btn {
            flex: 1;
            padding: 14px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
        }
        .tab-btn.active {
            color: var(--accent-gold);
            border-bottom: 2px solid var(--accent-gold);
            background: rgba(244, 194, 26, 0.02);
        }

        .search-box {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border-color);
        }
        .search-box input {
            width: 100%;
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            outline: none;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 12px;
            max-height: 340px;
            overflow-y: auto;
        }

        /* КАРТОЧКА ПРЕДМЕТА */
        .item-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            cursor: pointer;
            transition: var(--transition);
        }
        .item-card:active { transform: scale(0.95); }
        .item-price {
            font-size: 10px;
            font-weight: 700;
            color: var(--accent-gold);
            align-self: flex-end;
            background: rgba(0,0,0,0.3);
            padding: 2px 4px;
            border-radius: 4px;
        }
        
        /* Стилизация картинок-лягушек */
        .item-img-container {
            width: 100%;
            height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 6px 0;
            position: relative;
        }
        .item-img-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.6));
        }

        .item-info {
            text-align: center;
            width: 100%;
        }
        .item-title {
            font-size: 9px;
            color: var(--text-muted);
            text-overflow: ellipsis;
            overflow: hidden;
            white-space: nowrap;
        }
        .item-sub {
            font-size: 11px;
            font-weight: 700;
            text-overflow: ellipsis;
            overflow: hidden;
            white-space: nowrap;
        }

        /* Эффекты свечения для кастомных редкостей */
        .rarity-epic { border-color: var(--rarity-epic); }
        .rarity-epic .item-img-container::after { content:''; position: absolute; width: 40px; height: 40px; background: var(--rarity-epic); filter: blur(20px); opacity: 0.4; }
        
        .rarity-legendary { border-color: var(--rarity-legendary); }
        .rarity-legendary .item-img-container::after { content:''; position: absolute; width: 40px; height: 40px; background: var(--rarity-legendary); filter: blur(20px); opacity: 0.4; }

        .rarity-mythic { border-color: var(--rarity-mythic); }
        .rarity-mythic .item-img-container::after { content:''; position: absolute; width: 40px; height: 40px; background: var(--rarity-mythic); filter: blur(20px); opacity: 0.4; }

        .rarity-immortal { border-color: var(--rarity-immortal); animation: immortalGlow 2s infinite alternate; }
        .rarity-immortal .item-img-container::after { content:''; position: absolute; width: 45px; height: 45px; background: var(--rarity-immortal); filter: blur(25px); opacity: 0.5; }

        /* === АНИМАЦИИ === */
        @keyframes immortalGlow {
            0% { box-shadow: 0 0 5px rgba(255, 0, 127, 0.2); }
            100% { box-shadow: 0 0 15px rgba(255, 0, 127, 0.6); border-color: #ff3399; }
        }
        @keyframes spinWheel {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(1080deg); }
        }
        .spinning .wheel-progress {
            animation: pulseGlow 0.4s infinite alternate;
        }
        @keyframes pulseGlow {
            0% { opacity: 0.6; stroke: #fff; }
            100% { opacity: 1; stroke: var(--accent-gold); }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <div class="logo">UP<span>GRADER</span></div>
            <div class="online-count">Онлайн: <span>1 878</span></div>
        </div>
        <div class="user-area">
            <div class="balance" id="userBalance">23 543.51 ₽</div>
            <button class="btn-deposit">Пополнить</button>
        </div>
    </header>

    <main>
        
        <div class="live-ticker" id="liveTicker"></div>

        <section class="case-banner">
            <div class="case-text">
                <h2>Специальный Майский Кейс</h2>
                <p>Получи бонус к шансу апгрейда!</p>
            </div>
            <button class="btn-case">Открыть</button>
        </section>

        <section class="upgrade-arena" id="arenaBox">
            
            <div class="slots-container">
                <div class="item-slot" id="slotLeft">
                    <span class="slot-hint">Твой скин</span>
                </div>
                <div class="item-slot" id="slotRight">
                    <span class="slot-hint">Желаемый скин</span>
                </div>
            </div>

            <div class="wheel-box">
                <svg class="wheel-svg">
                    <circle class="wheel-track" cx="90" cy="90" r="80"></circle>
                    <circle class="wheel-progress" id="wheelCircle" cx="90" cy="90" r="80"></circle>
                </svg>
                <div class="wheel-center-text">
                    <h1 id="chanceText">0.00%</h1>
                    <p>шанс</p>
                </div>
            </div>

            <div class="action-block">
                <button class="btn-upgrade" id="btnUpgrade" onclick="executeUpgrade()">Прокачать</button>
                <div class="multipliers">
                    <button class="mult-btn">1.5x</button>
                    <button class="mult-btn">2x</button>
                    <button class="mult-btn">5x</button>
                </div>
            </div>

        </section>

        <section class="inventory-section">
            <div class="tabs-header">
                <button class="tab-btn active" id="tabMy" onclick="switchTab('my')">Мои скины</button>
                <button class="tab-btn" id="tabShop" onclick="switchTab('shop')">Магазин</button>
            </div>
            <div class="search-box">
                <input type="text" placeholder="Поиск предметов...">
            </div>
            
            <div class="items-grid" id="gridContent"></div>
        </section>

    </main>

    <script>
        // БАЗА ДАННЫХ ИЗ ТВОИХ ФОТОК (Лягушки-подарки)
        const customItems = [
            { id: 'frog_love', title: 'Подарок', sub: 'Влюбленный Пепе', price: '12500.00', rarity: 'rarity-mythic', img: '16203.png' },
            { id: 'frog_purple', title: 'Подарок', sub: 'Аметистовый Харт', price: '8900.00', rarity: 'rarity-epic', img: '16201.png' },
            { id: 'frog_glitter', title: 'Подарок', sub: 'Звездный Блеск', price: '24000.00', rarity: 'rarity-immortal', img: '16154.jpg' },
            { id: 'frog_aqua', title: 'Подарок', sub: 'Бирюзовый Лав', price: '4500.00', rarity: 'rarity-legendary', img: '16202.png' }
        ];

        // Дефолтные скины для массы
        const defaultWeapons = [
            { title: 'AK-47', sub: 'Asiimov', price: '3400.00', rarity: 'rarity-legendary', img: '' },
            { title: 'AWP', sub: 'Redline', price: '6200.00', rarity: 'rarity-epic', img: '' },
            { title: 'M4A4', sub: 'Howl', price: '48000.00', rarity: 'rarity-immortal', img: '' },
            { title: 'Glock-18', sub: 'Fade', price: '11000.00', rarity: 'rarity-mythic', img: '' }
        ];

        let currentTab = 'my';
        let selectedLeft = null;
        let selectedRight = null;
        let isProcessing = false;

        // Генерация инвентарей
        let myInventoryData = [customItems[1], customItems[3], defaultWeapons[0], defaultWeapons[1]];
        let shopInventoryData = [customItems[0], customItems[2], defaultWeapons[2], defaultWeapons[3], ...customItems];

        function renderGrid() {
            const grid = document.getElementById('gridContent');
            grid.innerHTML = '';
            const data = currentTab === 'my' ? myInventoryData : shopInventoryData;

            data.forEach((item, index) => {
                const imgTag = item.img ? `<img src="${item.img}" alt="img">` : `<div style="width:40px;height:12px;background:#444;transform:rotate(-15deg);border-radius:2px;"></div>`;
                grid.innerHTML += `
                    <div class="item-card ${item.rarity}" onclick="selectItem(${index})">
                        <div class="item-price">${Math.round(item.price)} ₽</div>
                        <div class="item-img-container">${imgTag}</div>
                        <div class="item-info">
                            <div class="item-title">${item.title}</div>
                            <div class="item-sub">${item.sub}</div>
                        </div>
                    </div>
                `;
            });
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tabMy').classList.toggle('active', tab === 'my');
            document.getElementById('tabShop').classList.toggle('active', tab === 'shop');
            renderGrid();
        }

        function selectItem(index) {
            if (isProcessing) return;
            const item = currentTab === 'my' ? myInventoryData[index] : shopInventoryData[index];
            
            if (currentTab === 'my') {
                selectedLeft = item;
                renderSlot('slotLeft', item, 'Твой скин');
            } else {
                selectedRight = item;
                renderSlot('slotRight', item, 'Желаемый скин');
            }
            updateChance();
        }

        function renderSlot(slotId, item, fallbackText) {
            const slot = document.getElementById(slotId);
            slot.classList.add('active');
            const imgTag = item.img ? `<img src="${item.img}" style="max-height:50px; object-fit:contain;">` : `<div style="width:30px;height:10px;background:#555;"></div>`;
            slot.innerHTML = `
                <div style="font-size:11px;font-weight:700;color:var(--accent-gold);">${Math.round(item.price)} ₽</div>
                <div style="margin:4px 0;">${imgTag}</div>
                <div style="font-size:10px;font-weight:600;text-overflow:ellipsis;overflow:hidden;width:100%;white-space:nowrap;">${item.sub}</div>
            `;
        }

        // КОРРЕКТНЫЙ РАСЧЕТ ШАНСА И СИНХРОНИЗАЦИЯ КРУГА СНИЗУ ВВЕРХ
        function updateChance() {
            if (!selectedLeft || !selectedRight) return;
            
            let chance = (parseFloat(selectedLeft.price) / parseFloat(selectedRight.price)) * 100;
            if (chance > 95) chance = 95;
            if (chance < 1) chance = 1;

            document.getElementById('chanceText').innerText = chance.toFixed(2) + '%';
            
            // Расчет сдвига stroke-dashoffset для круга (полный круг = 502)
            const circle = document.getElementById('wheelCircle');
            const maxOffset = 502;
            const offset = maxOffset - (maxOffset * (chance / 100));
            circle.style.strokeDashoffset = offset;
        }

        // Функция прокачки (Анимация + Исход)
        function executeUpgrade() {
            if (isProcessing || !selectedLeft || !selectedRight) return;
            isProcessing = true;

            const btn = document.getElementById('btnUpgrade');
            const arena = document.getElementById('arenaBox');
            btn.innerText = 'Прокачка...';
            arena.classList.add('spinning');

            let chance = (parseFloat(selectedLeft.price) / parseFloat(selectedRight.price)) * 100;
            let roll = Math.random() * 100;
            let isWin = roll <= chance;

            setTimeout(() => {
                arena.classList.remove('spinning');
                if (isWin) {
                    btn.style.background = '#2ecc71';
                    btn.innerText = 'УСПЕШНО!';
                    // Добавляем выигранный скин себе, удаляем старый
                    myInventoryData.push(selectedRight);
                    myInventoryData = myInventoryData.filter(i => i !== selectedLeft);
                } else {
                    btn.style.background = '#e74c3c';
                    btn.innerText = 'ОШИБКА!';
                    // Сгорает твой скин
                    myInventoryData = myInventoryData.filter(i => i !== selectedLeft);
                }

                // Сброс интерфейса
                setTimeout(() => {
                    btn.style.background = 'var(--accent-gold)';
                    btn.innerText = 'Прокачать';
                    selectedLeft = null;
                    selectedRight = null;
                    document.getElementById('slotLeft').innerHTML = '<span class="slot-hint">Твой скин</span>';
                    document.getElementById('slotLeft').classList.remove('active');
                    document.getElementById('slotRight').innerHTML = '<span class="slot-hint">Желаемый скин</span>';
                    document.getElementById('slotRight').classList.remove('active');
                    document.getElementById('chanceText').innerText = '0.00%';
                    document.getElementById('wheelCircle').style.strokeDashoffset = 502;
                    renderGrid();
                    isProcessing = false;
                }, 1500);

            }, 2500);
        }

        // Лента живой активности
        function updateTicker() {
            const ticker = document.getElementById('liveTicker');
            const randItem = shopInventoryData[Math.floor(Math.random() * shopInventoryData.length)];
            const isWin = Math.random() > 0.4;
            
            const html = `<div class="ticker-item ${isWin ? '' : 'fail'}">${randItem.sub} -> ${isWin ? '🔥' : '❌'}</div>`;
            ticker.insertAdjacentHTML('afterbegin', html);
            if (ticker.children.length > 5) ticker.removeChild(ticker.lastChild);
        }

        // Инициализация
        setInterval(updateTicker, 3000);
        renderGrid();
    </script>
</body>
</html>
