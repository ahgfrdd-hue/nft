<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <title>FlashUpgrader — Premium Edition</title>
    <style>
        /* === НОВЫЙ ДИЗАЙН (Стиль референса 2) === */
        :root {
            --bg-main: #0a0a0f;
            --bg-panel: #13131c;
            --bg-card: #1a1a24;
            --bg-card-hover: #22222e;
            --accent-main: #8a2be2; /* Глубокий неоновый фиолетовый/синий */
            --accent-glow: rgba(138, 43, 226, 0.4);
            --accent-secondary: #00e5ff;
            --text-main: #ffffff;
            --text-muted: #8b8b9e;
            --border-color: #272736;
            
            --rarity-epic: #a55eea;
            --rarity-legendary: #fd9644;
            --rarity-mythic: #fc5c65;
            --rarity-immortal: #2bcbba;
            
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 8px;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-main);
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, var(--bg-main) 70%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex; flex-direction: column; overflow-x: hidden;
        }

        /* === ХЕДЕР === */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 24px; background: rgba(10, 10, 15, 0.85); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100;
        }

        .logo-area { display: flex; flex-direction: column; }
        .logo { font-size: 22px; font-weight: 900; color: var(--accent-main); letter-spacing: 0.5px; text-shadow: 0 0 15px var(--accent-glow); }
        .logo span { color: var(--text-main); text-shadow: none; }
        .online-count { font-size: 12px; color: var(--text-muted); margin-top: 3px; font-weight: 500; }
        .online-count span { color: var(--accent-secondary); font-weight: bold; }

        .user-area { display: flex; align-items: center; gap: 14px; }
        
        /* ПЕРЕКЛЮЧАТЕЛЬ ЯЗЫКА (стили) */
        .lang-switch {
            display: flex; align-items: center; gap: 6px; background: var(--bg-card);
            border: 1px solid var(--border-color); padding: 6px 10px; border-radius: var(--radius-sm);
            font-size: 12px; font-weight: 700; color: var(--text-muted); cursor: pointer; transition: var(--transition);
        }
        .lang-switch:hover { border-color: var(--accent-main); }
        .lang-switch span.active { color: var(--text-main); }
        .lang-switch .divider { color: #333; font-weight: 400; }

        .balance-block { display: flex; flex-direction: column; align-items: flex-end; }
        .balance-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .balance { font-size: 16px; font-weight: 800; color: var(--text-main); }
        
        .btn-deposit {
            background: linear-gradient(135deg, var(--accent-main), #b838ff); color: #fff;
            padding: 8px 16px; border: none; border-radius: var(--radius-sm);
            font-size: 13px; font-weight: 700; cursor: pointer; transition: var(--transition);
            box-shadow: 0 4px 15px var(--accent-glow);
        }
        .btn-deposit:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--accent-glow); }
        
        .profile-avatar {
            width: 38px; height: 38px; background: var(--bg-card); border: 2px solid var(--border-color);
            border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 16px; transition: var(--transition);
        }
        .profile-avatar:hover { border-color: var(--accent-main); background: var(--bg-card-hover); }

        /* === ОСНОВНОЙ КОНТЕНТ === */
        main { flex: 1; display: flex; flex-direction: column; padding: 24px 16px; gap: 24px; max-width: 650px; width: 100%; margin: 0 auto; }

        .live-ticker {
            background: var(--bg-panel); border: 1px solid var(--border-color);
            border-radius: var(--radius-md); padding: 10px; display: flex; gap: 10px;
            overflow-x: auto; white-space: nowrap; scrollbar-width: none; min-height: 56px;
        }
        .live-ticker::-webkit-scrollbar { display: none; }
        
        .ticker-item {
            display: inline-flex; align-items: center; gap: 8px; background: var(--bg-card);
            padding: 6px 12px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; border-bottom: 2px solid var(--accent-secondary);
        }
        .ticker-item.fail { border-bottom-color: var(--rarity-mythic); opacity: 0.5; }
        .ticker-img { width: 22px; height: 22px; object-fit: contain; }

        /* === АРЕНА АПГРЕЙДА С НОВЫМИ АНИМАЦИЯМИ === */
        .upgrade-arena {
            background: linear-gradient(180deg, var(--bg-panel) 0%, #0d0d14 100%);
            border: 1px solid var(--border-color); border-radius: var(--radius-lg);
            padding: 32px 24px; display: flex; flex-direction: column; align-items: center; gap: 28px;
            position: relative; transition: all 0.4s ease; overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
        }
        
        .upgrade-arena.win-state { 
            background: linear-gradient(180deg, rgba(0, 229, 255, 0.15) 0%, #081a20 100%) !important; 
            box-shadow: 0 0 50px rgba(0, 229, 255, 0.3); 
            border-color: var(--accent-secondary); 
            animation: winPulse 1.2s ease-out;
        }
        
        .upgrade-arena.fail-state { 
            background: linear-gradient(180deg, rgba(252, 92, 101, 0.15) 0%, #1a080a 100%) !important; 
            box-shadow: 0 0 40px rgba(252, 92, 101, 0.2); 
            border-color: var(--rarity-mythic); 
            animation: lossShake 0.5s ease-in-out;
        }

        @keyframes winPulse {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(0, 229, 255, 0.1); }
            50% { transform: scale(1.03); box-shadow: 0 0 60px rgba(0, 229, 255, 0.6); }
            100% { transform: scale(1); box-shadow: 0 0 50px rgba(0, 229, 255, 0.3); }
        }

        @keyframes lossShake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        .slots-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; z-index: 2; }
        .item-slot {
            background: var(--bg-card); border: 1px dashed #3a3a4d; border-radius: var(--radius-md);
            height: 140px; display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 16px; text-align: center; transition: var(--transition); cursor: pointer;
            position: relative; overflow: hidden;
        }
        .item-slot:hover { border-color: var(--text-muted); background: var(--bg-card-hover); }
        .item-slot.active { border: 1px solid var(--accent-main); background: rgba(138, 43, 226, 0.05); box-shadow: 0 0 15px rgba(138,43,226,0.1) inset; }
        
        .slot-bg-pepe {
            position: absolute; width: 75%; height: 75%; object-fit: contain;
            filter: brightness(0); opacity: 0.15; z-index: 1; pointer-events: none;
        }
        
        .slot-chevron-container { position: relative; z-index: 2; margin-bottom: 8px; }
        .slot-hint { font-size: 12px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; position: relative; z-index: 2; }

        /* === КОЛЕСО И СТРЕЛКА (ИСправлено позиционирование SVG) === */
        .wheel-container {
            position: relative; width: 280px; height: 280px; margin: 10px 0;
            display: flex; align-items: center; justify-content: center; z-index: 2;
        }
        
        .wheel-box { width: 100%; height: 100%; position: relative; }
        
        /* Убрали rotate(90deg) из CSS, чтобы не конфликтовало с браузерами */
        .wheel-svg { width: 100%; height: 100%; filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); }
        
        .wheel-progress {
            stroke-dasharray: 534; stroke-dashoffset: 534; stroke-linecap: round;
            transition: stroke-dashoffset 0.4s ease;
        }
        
        .arrow-spinner-wrapper {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 15;
        }
        
        .wheel-arrow {
            position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
            width: 24px; height: 38px; filter: drop-shadow(0 0 8px var(--accent-glow));
        }

        .wheel-center-content {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; height: 100%; z-index: 5; text-align: center; pointer-events: none;
        }

        #chanceDisplay h1 { font-size: 38px; font-weight: 900; color: #ffffff; letter-spacing: -1px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        #chanceDisplay p { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; font-weight: 700; margin-top: -4px;}

        .action-block { width: 100%; display: flex; flex-direction: column; gap: 12px; z-index: 2; }
        .btn-upgrade {
            background: linear-gradient(135deg, var(--accent-main), #6b1cb0);
            color: #fff; border: none; padding: 20px; font-size: 16px; font-weight: 800;
            border-radius: var(--radius-md); cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 8px 25px var(--accent-glow); transition: var(--transition);
        }
        .btn-upgrade:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 12px 30px var(--accent-glow); }
        .btn-upgrade:disabled { background: var(--bg-card); color: #555566; cursor: not-allowed; box-shadow: none; border: 1px solid var(--border-color); }

        /* === ТАБЫ И ИНВЕНТАРЬ === */
        .inventory-section { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: var(--radius-lg); display: flex; flex-direction: column; overflow: hidden; }
        .tabs-header { display: flex; background: #0c0c12; border-bottom: 1px solid var(--border-color); padding: 8px; gap: 8px; }
        .tab-btn { flex: 1; padding: 14px; background: transparent; border: none; color: var(--text-muted); font-size: 13px; font-weight: 700; border-radius: var(--radius-sm); cursor: pointer; transition: var(--transition); text-transform: uppercase; letter-spacing: 0.5px;}
        .tab-btn:hover { color: #fff; }
        .tab-btn.active { color: #fff; background: var(--bg-card); border: 1px solid var(--border-color); }
        
        .items-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; padding: 20px; max-height: 420px; overflow-y: auto; }
        .items-grid::-webkit-scrollbar { width: 6px; }
        .items-grid::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
        
        .item-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 12px; display: flex; flex-direction: column; align-items: center; position: relative; cursor: pointer; transition: var(--transition); }
        .item-card:hover { background: var(--bg-card-hover); transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.4); border-color: #3a3a4d; }
        .item-price { font-size: 11px; font-weight: 800; color: #fff; align-self: flex-end; background: rgba(0,0,0,0.5); padding: 4px 8px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); }
        .item-img-container { width: 100%; height: 85px; display: flex; align-items: center; justify-content: center; margin: 8px 0; }
        .item-img-container img { max-width: 90%; max-height: 90%; object-fit: contain; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); }
        .item-info { text-align: center; width: 100%; }
        .item-title { font-size: 10px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; }
        .item-sub { font-size: 12px; font-weight: 700; margin-top: 3px; color: #eee; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }

        .rarity-epic { border-bottom: 3px solid var(--rarity-epic); }
        .rarity-legendary { border-bottom: 3px solid var(--rarity-legendary); }
        .rarity-mythic { border-bottom: 3px solid var(--rarity-mythic); }
        .rarity-immortal { border-bottom: 3px solid var(--rarity-immortal); }

        /* === ФУТЕР === */
        footer { margin-top: auto; padding: 24px 16px; background: var(--bg-panel); border-top: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .footer-contacts { display: flex; align-items: center; gap: 10px; background: var(--bg-card); border: 1px solid var(--border-color); padding: 10px 20px; border-radius: var(--radius-lg); color: var(--text-main); font-size: 14px; font-weight: 700; text-decoration: none; transition: var(--transition); }
        .footer-contacts:hover { border-color: #2AABEE; background: var(--bg-card-hover); transform: translateY(-2px); box-shadow: 0 4px 15px rgba(42, 171, 238, 0.15); }
        .tg-icon { width: 22px; height: 22px; fill: #2AABEE; }

        /* === МОДАЛКИ === */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 200; display: none; align-items: center; justify-content: center; padding: 16px; }
        .modal-card { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: var(--radius-lg); width: 100%; max-width: 460px; padding: 28px; position: relative; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .modal-close { position: absolute; top: 20px; right: 20px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 50%; width: 32px; height: 32px; display:flex; align-items:center; justify-content:center; color: var(--text-muted); font-size: 18px; cursor: pointer; transition: var(--transition); }
        .modal-close:hover { background: var(--rarity-mythic); color: #fff; border-color: var(--rarity-mythic); }
        .modal-title { font-size: 20px; font-weight: 800; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; color: #fff; }
        .modal-input { width: 100%; background: var(--bg-card); border: 1px solid var(--border-color); padding: 16px; border-radius: var(--radius-sm); color: #fff; font-size: 16px; margin-bottom: 16px; outline: none; transition: var(--transition); }
        .modal-input:focus { border-color: var(--accent-main); }
        .modal-btn { width: 100%; background: linear-gradient(135deg, var(--accent-main), #b838ff); color: #fff; border: none; padding: 16px; border-radius: var(--radius-sm); font-size: 15px; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: var(--transition); }
        .modal-btn:hover { box-shadow: 0 6px 20px var(--accent-glow); }
        
        .profile-tabs { display: flex; gap: 8px; margin-bottom: 20px; background: #0a0a0f; padding: 6px; border-radius: var(--radius-sm); border: 1px solid var(--border-color); }
        .p-tab-btn { flex: 1; padding: 10px; border: none; background: transparent; color: var(--text-muted); font-size: 11px; font-weight: 700; text-transform: uppercase; cursor: pointer; border-radius: 6px; transition: var(--transition); }
        .p-tab-btn.active { background: var(--bg-card); color: #fff; border: 1px solid #333344; }
        .profile-list-item { display: flex; justify-content: space-between; align-items: center; background: var(--bg-card); padding: 12px 16px; border-radius: var(--radius-sm); margin-bottom: 10px; border: 1px solid transparent; border-left: 4px solid transparent; transition: var(--transition); }
        .profile-list-item:hover { border-color: var(--border-color); background: var(--bg-card-hover); }
        .p-item-info { display: flex; flex-direction: column; }
        .p-item-name { font-size: 13px; font-weight: 700; color: #fff; }
        .p-item-price { font-size: 11px; color: var(--text-muted); font-weight: bold; margin-top: 2px;}
        .btn-profile-action { padding: 8px 14px; border: none; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: var(--transition); }
        .btn-sell { background: rgba(252, 92, 101, 0.1); color: var(--rarity-mythic); border: 1px solid rgba(252, 92, 101, 0.2); }
        .btn-sell:hover { background: var(--rarity-mythic); color: #fff; }
        .btn-buy { background: rgba(43, 203, 186, 0.1); color: var(--rarity-immortal); border: 1px solid rgba(43, 203, 186, 0.2); }
        .btn-buy:hover { background: var(--rarity-immortal); color: #fff; }
        .stat-line { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px dashed var(--border-color); font-size: 14px; color: var(--text-muted); }
        .stat-line span:last-child { font-weight: bold; color: #fff; font-size: 16px; }
        
        /* ПЕРЕКРАСКА ЖЕЛТЫХ СТРЕЛОЧЕК */
        .slot-chevron-container svg path { fill: var(--accent-main) !important; }
        .slot-chevron-container svg { filter: drop-shadow(0 0 8px var(--accent-glow)) !important; }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <div class="logo">FLASH<span>UPGRADER</span></div>
            <div class="online-count">Онлайн: <span id="onlineCount">1 742</span></div>
        </div>
        <div class="user-area">
            <div class="balance-block">
                <span class="balance-label">Баланс</span>
                <div class="balance" id="userBalance">10 000.00 ₽</div>
            </div>
            <button class="btn-deposit" onclick="openModal('depositModal')">Пополнить</button>
            <div class="profile-avatar" onclick="openModal('profileModal')">👤</div>
        </div>
    </header>

    <main>
        <div class="live-ticker" id="liveTicker"></div>

        <section class="upgrade-arena" id="arenaBox">
            <div class="slots-container">
                <div class="item-slot" id="slotLeft" onclick="switchTab('my')">
                    <img src="16201.png" class="slot-bg-pepe">
                    <div class="slot-chevron-container">
                        <svg class="chevron-down" viewBox="0 0 50 75" width="45" height="65">
                            <path fill="#FFCC00" d="M5 10 L25 25 L45 10 L45 20 L25 35 L5 20 Z" />
                            <path fill="#FFCC00" d="M5 30 L25 45 L45 30 L45 40 L25 55 L5 40 Z" />
                            <path fill="#FFCC00" d="M5 50 L25 65 L45 50 L45 60 L25 75 L5 60 Z" />
                        </svg>
                    </div>
                    <span class="slot-hint">Выбери свой подарок</span>
                </div>
                <div class="item-slot" id="slotRight" onclick="switchTab('shop')">
                    <img src="16201.png" class="slot-bg-pepe">
                    <div class="slot-chevron-container">
                        <svg class="chevron-up" viewBox="0 0 50 75" width="45" height="65">
                            <path fill="#FFCC00" d="M5 25 L25 10 L45 25 L45 15 L25 0 L5 15 Z" />
                            <path fill="#FFCC00" d="M5 45 L25 30 L45 45 L45 35 L25 20 L5 35 Z" />
                            <path fill="#FFCC00" d="M5 65 L25 50 L45 65 L45 55 L25 40 L5 55 Z" />
                        </svg>
                    </div>
                    <span class="slot-hint">Выбери цель</span>
                </div>
            </div>

            <div class="wheel-container">
                <div class="arrow-spinner-wrapper" id="arrowSpinner">
                    <svg class="wheel-arrow" viewBox="0 0 24 40" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" stop-color="#a55eea" />
                                <stop offset="100%" stop-color="#4a00e0" />
                            </linearGradient>
                        </defs>
                        <path d="M12 0 L24 24 L16 20 L16 40 L8 40 L8 20 L0 24 Z" fill="url(#arrowGrad)"/>
                    </svg>
                </div>
                
                <div class="wheel-box">
                    <svg class="wheel-svg" viewBox="0 0 260 260">
                        <defs>
                            <linearGradient id="progressGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#8a2be2" />
                                <stop offset="100%" stop-color="#00e5ff" />
                            </linearGradient>
                        </defs>
                        <!-- Исправление бага: добавлен жесткий SVG transform="rotate(90 130 130)", чтобы заливка строго стартовала снизу -->
                        <circle cx="130" cy="130" r="120" fill="none" stroke="#272736" stroke-width="4" stroke-dasharray="2 12" />
                        <circle cx="130" cy="130" r="100" fill="#13131c" />
                        <circle cx="130" cy="130" r="85" fill="none" stroke="#1a1a24" stroke-width="26" />
                        <circle class="wheel-progress" id="wheelCircle" cx="130" cy="130" r="85" fill="none" stroke="url(#progressGrad)" stroke-width="26" transform="rotate(90 130 130)" />
                    </svg>

                    <div class="wheel-center-content">
                        <svg id="centerChevrons" width="60" height="60" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="display: block;">
                            <polygon points="15,70 50,40 85,70 85,85 50,55 15,85" fill="#3a1c61"/>
                            <polygon points="15,40 50,10 85,40 85,55 50,25 15,55" fill="#8a2be2"/>
                        </svg>

                        <div id="chanceDisplay" style="display: none;">
                            <h1 id="chanceText">0.00%</h1>
                            <p>шанс</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="action-block">
                <button class="btn-upgrade" id="btnUpgrade" onclick="executeUpgrade()" disabled>Выберите подарки</button>
            </div>
        </section>

        <section class="inventory-section">
            <div class="tabs-header">
                <button class="tab-btn active" id="tabMy" onclick="switchTab('my')">Мой инвентарь</button>
                <button class="tab-btn" id="tabShop" onclick="switchTab('shop')">Желаемый подарок</button>
            </div>
            <div class="items-grid" id="gridContent"></div>
        </section>
    </main>

    <footer>
        <div class="lang-switch">
            <span class="active">RU</span>
            <span class="divider">/</span>
            <span>EN</span>
        </div>
        
        <a href="https://t.me/om1a2" target="_blank" class="footer-contacts">
            <svg class="tg-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

            @om1a2

    </footer>

    <div class="modal-overlay" id="depositModal">
        <div class="modal-card">
            <button class="modal-close" onclick="closeModal('depositModal')">×</button>
            <div class="modal-title">Пополнение баланса</div>
            <input type="number" class="modal-input" id="depositAmount" placeholder="Сумма (₽)" min="10">
            <button class="modal-btn" onclick="processDeposit()">Пополнить</button>
        </div>
    </div>

    <div class="modal-overlay" id="profileModal">
        <div class="modal-card">
            <button class="modal-close" onclick="closeModal('profileModal')">×</button>
            <div class="profile-tabs">
                <button class="p-tab-btn active" id="pTabStats" onclick="switchProfileTab('stats')">Статистика</button>
                <button class="p-tab-btn" id="pTabSell" onclick="switchProfileTab('sell')">Продать</button>
                <button class="p-tab-btn" id="pTabBuy" onclick="switchProfileTab('buy')">Купить</button>
                <button class="p-tab-btn" id="pTabPayout" onclick="switchProfileTab('payout')">Вывод</button>
            </div>
            <div id="pContentStats">
                <div class="modal-title" style="font-size:16px;">Твои достижения</div>
                <div class="stat-line"><span>Всего апгрейдов:</span><span id="statTotal">0</span></div>
                <div class="stat-line"><span>Успешных:</span><span id="statWins" style="color:var(--accent-secondary);">0</span></div>
                <div class="stat-line"><span>Сгорело:</span><span id="statLosses" style="color:var(--rarity-mythic);">0</span></div>
            </div>
            <div id="pContentSell" style="display:none;">
                <div class="modal-title" style="font-size:16px;">Инвентарь (Продажа 50%)</div>
                <div id="profileSellList" style="max-height: 250px; overflow-y:auto; padding-right: 5px;"></div>
            </div>
            <div id="pContentBuy" style="display:none;">
                <div class="modal-title" style="font-size:16px;">Магазин предметов</div>
                <div id="profileBuyList" style="max-height: 250px; overflow-y:auto; padding-right: 5px;"></div>
            </div>
            <div id="pContentPayout" style="display:none;">
                <div class="modal-title" style="font-size:16px;">Вывод средств</div>
                <input type="text" class="modal-input" id="withdrawDetails" placeholder="Номер карты/кошелька" style="margin-bottom:10px;">
                <input type="number" class="modal-input" id="withdrawAmount" placeholder="Сумма (₽)">
                <button class="modal-btn" style="background:linear-gradient(135deg, #0984e3, #74b9ff);" onclick="processWithdraw()">Создать заявку</button>
            </div>
        </div>
    </div>

    <audio id="soundSpin" src="user_spin.mp3" preload="auto" loop></audio>
    <audio id="soundWin" src="win.mp3" preload="auto"></audio>
    <audio id="soundFail" src="lose.mp3" preload="auto"></audio>
    <audio id="soundClick" src="click.mp3" preload="auto"></audio>

    <script>
        const giftPool = [
            { id: 'frog_purple', title: 'Премиум Подарок', sub: 'Аметистовый Харт', price: '4500.00', rarity: 'rarity-epic', img: '16201.png' },
            { id: 'frog_aqua', title: 'Премиум Подарок', sub: 'Бирюзовый Лав', price: '8900.00', rarity: 'rarity-legendary', img: '16202.png' },
            { id: 'frog_love', title: 'Премиум Подарок', sub: 'Влюбленный Пепе', price: '12500.00', rarity: 'rarity-mythic', img: '16203.png' },
            { id: 'frog_glitter', title: 'Премиум Подарок', sub: 'Звездный Блеск', price: '24000.00', rarity: 'rarity-immortal', img: '16154.jpg' },
            { id: 'frog_glow', title: 'Мифический', sub: 'Король Пепе', price: '15000.00', rarity: 'rarity-mythic', img: 'frog_glow.png' },
            { id: 'frog_blue', title: 'Легендарный', sub: 'Пепе Блу Кнопки', price: '9500.00', rarity: 'rarity-legendary', img: 'frog_blue_buttons.png' },
            { id: 'frog_gold', title: 'Бессмертный', sub: 'Золотой Император', price: '25000.00', rarity: 'rarity-immortal', img: 'frog_gold_buttons.png' },
            { id: 'frog_ninja', title: 'Бессмертный', sub: 'Пепе-Ниндзя', price: '19000.00', rarity: 'rarity-immortal', img: 'frog_ninja.png' },
            { id: 'frog_secret', title: 'Эксклюзив', sub: 'Тайный Пепе', price: '28000.00', rarity: 'rarity-immortal', img: '16289.jpg' },
            { id: 'frog_cosmic', title: 'Эксклюзив', sub: 'Космический Пепе', price: '35000.00', rarity: 'rarity-immortal', img: '16290.jpg' }
        ];

        let balance = parseFloat(localStorage.getItem('ub_balance')) || 10143.51;
        let myInventoryData = JSON.parse(localStorage.getItem('ub_inv')) || [giftPool[0], giftPool[1], giftPool[4], giftPool[8]];
        let stats = JSON.parse(localStorage.getItem('ub_stats')) || { total: 0, wins: 0, losses: 0 };
        
        let currentTab = 'my';
        let selectedLeft = null;
        let selectedRight = null;
        let isProcessing = false;
        let arrowRotation = 0; 
        const circleCircumference = 534; 

        const soundSpin = document.getElementById('soundSpin');
        const soundWin = document.getElementById('soundWin');
        const soundFail = document.getElementById('soundFail');
        const soundClick = document.getElementById('soundClick');

        function saveData() {
            localStorage.setItem('ub_balance', balance);
            localStorage.setItem('ub_inv', JSON.stringify(myInventoryData));
            localStorage.setItem('ub_stats', JSON.stringify(stats));
        }

        function playSound(audio) { audio.currentTime = 0; audio.play().catch(() => {}); }
        function updateBalanceUI() { document.getElementById('userBalance').innerText = balance.toFixed(2).replace(/\d(?=(\d{3})+\.)/g, '$& ') + ' ₽'; }

        function renderGrid() {
            const grid = document.getElementById('gridContent');
            grid.innerHTML = '';
            const activeData = currentTab === 'my' ? myInventoryData : giftPool;

            if(activeData.length === 0) {
                grid.innerHTML = `<div style="grid-column:span 3;text-align:center;padding:30px;color:var(--text-muted);">Инвентарь пуст. Зайдите в Профиль, чтобы купить предметы.</div>`;
                return;
            }

            activeData.forEach((item, idx) => {
                grid.innerHTML += `
                    <div class="item-card ${item.rarity}" onclick="selectItem(${idx})">
                        <div class="item-price">${Math.round(item.price)} ₽</div>
                        <div class="item-img-container"><img src="${item.img}" onerror="this.src='16201.png'"></div>
                        <div class="item-info">
                            <div class="item-title">${item.title}</div>
                            <div class="item-sub">${item.sub}</div>
                        </div>
                    </div>
                `;
            });
        }

        function switchTab(tab) {
            playSound(soundClick);
            currentTab = tab;
            document.getElementById('tabMy').classList.toggle('active', tab === 'my');
            document.getElementById('tabShop').classList.toggle('active', tab === 'shop');
            renderGrid();
        }

        function selectItem(index) {
            if (isProcessing) return;
            playSound(soundClick);
            const item = currentTab === 'my' ? myInventoryData[index] : giftPool[index];
            if (currentTab === 'my') { selectedLeft = item; renderSlot('slotLeft', item); } 
            else { selectedRight = item; renderSlot('slotRight', item); }
            updateChance();
        }

        function renderSlot(slotId, item) {
            const slot = document.getElementById(slotId);
            slot.classList.add('active');
            slot.innerHTML = `
                <div style="font-size:14px; font-weight:800; color:#fff; position: relative; z-index: 2;">${Math.round(item.price)} ₽</div>
                <div style="margin:6px 0; height:60px; display:flex; align-items:center; position: relative; z-index: 2;"><img src="${item.img}" style="max-height:55px;"></div>
                <div style="font-size:12px; font-weight:700; color:var(--text-muted); text-overflow:ellipsis; overflow:hidden; width:100%; white-space:nowrap; position: relative; z-index: 2;">${item.sub}</div>
            `;
        }

        function updateChance() {
            const btn = document.getElementById('btnUpgrade');
            const chevrons = document.getElementById('centerChevrons');
            const chanceDisplay = document.getElementById('chanceDisplay');

            if (!selectedLeft || !selectedRight) {
                btn.disabled = true;
                btn.innerText = 'Выберите подарки';
                chevrons.style.display = 'block';
                chanceDisplay.style.display = 'none';
                document.getElementById('wheelCircle').style.strokeDashoffset = circleCircumference;
                return;
            }
            
            btn.disabled = false;
            btn.innerText = 'Прокачать подарок';
            chevrons.style.display = 'none';
            chanceDisplay.style.display = 'block';

            let chance = (parseFloat(selectedLeft.price) / parseFloat(selectedRight.price)) * 100;
            if (chance > 95) chance = 95;
            if (chance < 1) chance = 1;

            document.getElementById('chanceText').innerText = chance.toFixed(2) + '%';
            document.getElementById('wheelCircle').style.strokeDashoffset = circleCircumference - (circleCircumference * (chance / 100));

            if (chance >= 80) {
                btn.disabled = true;
                btn.innerText = 'ШАНС СЛИШКОМ ВЫСОКИЙ';
                btn.style.background = 'var(--bg-card)';
            } else {
                btn.style.background = '';
            }
        }

        let startRotation = 0;
        let targetRotation = 0;
        let volumeFactor = 1.2; 
        let rotationAnimationRequest; 

        let audioContext;
        let analyserNode;
        let sourceNode;
        let dataArray;
        let isAudioSetup = false;

        function setupAudioAnalysis() {
            if (isAudioSetup) return;
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyserNode = audioContext.createAnalyser();
                sourceNode = audioContext.createMediaElementSource(soundSpin);
                sourceNode.connect(analyserNode);
                analyserNode.connect(audioContext.destination);
                analyserNode.fftSize = 256;
                let bufferLength = analyserNode.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
                isAudioSetup = true;
            } catch (error) {
                console.error("Audio API error:", error);
            }
        }

        function getAverageVolume() {
            if (!isAudioSetup) return 0;
            analyserNode.getByteTimeDomainData(dataArray);
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
                let amplitude = (dataArray[i] - 128) / 128;
                sum += amplitude * amplitude;
            }
            return Math.sqrt(sum / dataArray.length);
        }

        function executeUpgrade() {
            if (isProcessing || !selectedLeft || !selectedRight) return;
            setupAudioAnalysis(); 

            isProcessing = true;

            const btn = document.getElementById('btnUpgrade');
            const arrowSpinner = document.getElementById('arrowSpinner');
            
            let chance = (parseFloat(selectedLeft.price) / parseFloat(selectedRight.price)) * 100;
            
            if (chance >= 80) {
                alert('Максимальный шанс для апгрейда составляет 79.99%!');
                isProcessing = false;
                btn.innerText = 'ШАНС СЛИШКОМ ВЫСОКИЙ';
                btn.style.background = 'var(--bg-card)';
                return;
            }

            btn.innerText = 'Улучшение...';
            soundSpin.play().catch(() => {});

            if (chance > 95) chance = 95;
            if (chance < 1) chance = 1;
            
            let roll = Math.random() * 100;
            let isWin = roll <= chance;

            let fullRotationDeg = chance * 3.6; 
            
            let targetSectorDeg;
            if (isWin) {
                targetSectorDeg = Math.random() * fullRotationDeg; 
            } else {
                targetSectorDeg = fullRotationDeg + Math.random() * (360 - fullRotationDeg); 
            }
            
            targetRotation = arrowRotation + (360 * (Math.floor(Math.random() * 5) + 6)) + targetSectorDeg;
            startRotation = arrowRotation; 
            stats.total++;

            const indexToRemove = myInventoryData.indexOf(selectedLeft);
            if (indexToRemove !== -1) {
                myInventoryData.splice(indexToRemove, 1);
            }

            let animationDuration = 3500; 
            let animationStartTime = performance.now();

            function animateRotation(timestamp) {
                let elapsed = timestamp - animationStartTime;
                
                if (elapsed > animationDuration) {
                    arrowSpinner.style.transform = `rotate(${targetRotation}deg)`;
                    arrowRotation = targetRotation; 
                    soundSpin.pause();
                    soundSpin.currentTime = 0;
                    afterSpin(isWin); 
                    return;
                }

                let progress = elapsed / animationDuration;
                let totalDiff = targetRotation - startRotation;
                let t = 1 - progress;
                let currentBaseRotation = startRotation + totalDiff * (1 - t * t * t);

                let averageVolume = getAverageVolume();
                let soundVisualOffset = averageVolume * volumeFactor * -2.0; 
                
                let currentVisualRotation = currentBaseRotation + soundVisualOffset;
                arrowSpinner.style.transform = `rotate(${currentVisualRotation}deg)`;
                
                rotationAnimationRequest = requestAnimationFrame(animateRotation);
            }

            requestAnimationFrame(animateRotation); 
        }

        function afterSpin(isWin) {
            const btn = document.getElementById('btnUpgrade');
            const arena = document.getElementById('arenaBox');
            
            btn.innerText = isWin ? 'ВЫИГРЫШ!' : 'СГОРЕЛО!';

            if (isWin) {
                stats.wins++;
                btn.style.background = 'var(--accent-secondary)'; /* Неоновый голубой */
                arena.classList.add('win-state'); 
                playSound(soundWin);
                
                /* Обновленные цвета конфетти для премиум дизайна */
                confetti({ particleCount: 140, spread: 80, origin: { y: 0.6 }, colors: ['#00e5ff', '#8a2be2', '#ffffff'] });
                myInventoryData.push(selectedRight);
            } else {
                stats.losses++;
                btn.style.background = 'var(--rarity-mythic)'; /* Свежий багровый */
                arena.classList.add('fail-state'); 
                playSound(soundFail);
                
                document.getElementById('chanceText').innerText = '0.00%';
                document.getElementById('wheelCircle').style.strokeDashoffset = 534;
            }

            saveData();
            updateBalanceUI();

            setTimeout(() => {
                btn.style.background = '';
                btn.innerText = 'Выберите подарки';
                btn.disabled = true;
                arena.className = 'upgrade-arena'; 
                
                selectedLeft = null; selectedRight = null;
                
                document.getElementById('slotLeft').innerHTML = `
                    <img src="16201.png" class="slot-bg-pepe">
                    <div class="slot-chevron-container">
                        <svg class="chevron-down" viewBox="0 0 50 75" width="45" height="65">
                            <path fill="#FFCC00" d="M5 10 L25 25 L45 10 L45 20 L25 35 L5 20 Z" />
                            <path fill="#FFCC00" d="M5 30 L25 45 L45 30 L45 40 L25 55 L5 40 Z" />
                            <path fill="#FFCC00" d="M5 50 L25 65 L45 50 L45 60 L25 75 L5 60 Z" />
                        </svg>
                    </div>
                    <span class="slot-hint">Выбери свой подарок</span>
                `;
                document.getElementById('slotLeft').classList.remove('active');
                
                document.getElementById('slotRight').innerHTML = `
                    <img src="16201.png" class="slot-bg-pepe">
                    <div class="slot-chevron-container">
                        <svg class="chevron-up" viewBox="0 0 50 75" width="45" height="65">
                            <path fill="#FFCC00" d="M5 25 L25 10 L45 25 L45 15 L25 0 L5 15 Z" />
                            <path fill="#FFCC00" d="M5 45 L25 30 L45 45 L45 35 L25 20 L5 35 Z" />
                            <path fill="#FFCC00" d="M5 65 L25 50 L45 65 L45 55 L25 40 L5 55 Z" />
                        </svg>
                    </div>
                    <span class="slot-hint">Выбери цель</span>
                `;
                document.getElementById('slotRight').classList.remove('active');
                
                updateChance(); 
                renderGrid();
                isProcessing = false;
            }, 2000);
        }

        function openModal(id) {
            setupAudioAnalysis(); 
            playSound(soundClick);
            document.getElementById(id).style.display = 'flex';
            if(id === 'profileModal') switchProfileTab('stats');
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function switchProfileTab(pTab) {
            playSound(soundClick);
            const tabs = ['stats', 'sell', 'buy', 'payout'];
            tabs.forEach(t => {
                document.getElementById(`pTab${t.charAt(0).toUpperCase() + t.slice(1)}`).classList.toggle('active', t === pTab);
                document.getElementById(`pContent${t.charAt(0).toUpperCase() + t.slice(1)}`).style.display = t === pTab ? 'block' : 'none';
            });

            if(pTab === 'stats') {
                document.getElementById('statTotal').innerText = stats.total;
                document.getElementById('statWins').innerText = stats.wins;
                document.getElementById('statLosses').innerText = stats.losses;
            } else if(pTab === 'sell') {
                renderProfileSellList();
            } else if(pTab === 'buy') {
                renderProfileBuyList();
            }
        }

        function renderProfileSellList() {
            const container = document.getElementById('profileSellList');
            container.innerHTML = '';
            if(myInventoryData.length === 0) {
                container.innerHTML = '<div style="color:var(--text-muted);text-align:center;padding:15px;">У вас нет предметов для продажи</div>';
                return;
            }
            myInventoryData.forEach((item, idx) => {
                let sellPrice = Math.round(item.price * 0.5);
                container.innerHTML += `
                    <div class="profile-list-item" style="border-left-color: var(--accent-main);">
                        <div class="p-item-info">
                            <span class="p-item-name">${item.sub}</span>
                            <span class="p-item-price">Цена: ${sellPrice} ₽ (50%)</span>
                        </div>
                        <button class="btn-profile-action btn-sell" onclick="sellFromProfile(${idx})">Продать</button>
                    </div>
                `;
            });
        }

        function sellFromProfile(idx) {
            playSound(soundClick);
            let item = myInventoryData[idx];
            balance += item.price * 0.5;
            myInventoryData.splice(idx, 1);
            saveData();
            updateBalanceUI();
            renderProfileSellList();
            renderGrid();
        }

        function renderProfileBuyList() {
            const container = document.getElementById('profileBuyList');
            container.innerHTML = '';
            giftPool.forEach((item) => {
                container.innerHTML += `
                    <div class="profile-list-item" style="border-left-color: var(--rarity-immortal);">
                        <div class="p-item-info">
                            <span class="p-item-name">${item.sub}</span>
                            <span class="p-item-price">Стоимость: ${Math.round(item.price)} ₽</span>
                        </div>
                        <button class="btn-profile-action btn-buy" onclick="buyFromProfile('${item.id}')">Купить</button>
                    </div>
                `;
            });
        }

        function buyFromProfile(itemId) {
            playSound(soundClick);
            const targetItem = giftPool.find(p => p.id === itemId);
            let cost = parseFloat(targetItem.price);
            
            if(balance < cost) {
                alert('Недостаточно средств на балансе для покупки!');
                return;
            }

            balance -= cost;
            myInventoryData.push(targetItem);
            saveData();
            updateBalanceUI();
            renderProfileBuyList();
            renderGrid();
            alert(`Вы успешно приобрели ${targetItem.sub}! Он добавлен в инвентарь.`);
        }

        function processDeposit() {
            const amount = parseFloat(document.getElementById('depositAmount').value);
            if (!amount || amount < 10) { alert('Минимальная сумма — 10 ₽'); return; }
            balance += amount;
            saveData();
            updateBalanceUI();
            closeModal('depositModal');
            alert(`Успешно зачислено ${amount} ₽`);
        }

        function processWithdraw() {
            const amount = parseFloat(document.getElementById('withdrawAmount').value);
            const details = document.getElementById('withdrawDetails').value.trim();
            if(!details || !amount) { alert('Пожалуйста, заполните все поля!'); return; }
            if(amount > balance) { alert('На балансе недостаточно средств!'); return; }
            
            balance -= amount;
            saveData();
            updateBalanceUI();
            closeModal('profileModal');
            alert(`Заявка на вывод ${amount} ₽ на реквизиты [${details}] успешно принята!`);
        }

        function updateOnline() {
            const countNode = document.getElementById('onlineCount');
            let current = parseInt(countNode.innerText.replace(/\s/g, ''));
            current += Math.random() > 0.5 ? Math.floor(Math.random() * 5) : -Math.floor(Math.random() * 5);
            if(current < 1300) current = 1600;
            if(current > 2300) current = 1750;
            countNode.innerText = current.toLocaleString('ru-RU');
        }

        function updateTicker() {
            const ticker = document.getElementById('liveTicker');
            const item = giftPool[Math.floor(Math.random() * giftPool.length)];
            const isWin = Math.random() > 0.45;
            const html = `<div class="ticker-item ${isWin ? '' : 'fail'}"><img class="ticker-img" src="${item.img}" onerror="this.src='16201.png'"><span>${item.sub}</span><span>${isWin ? '🔥' : '❌'}</span></div>`;
            ticker.insertAdjacentHTML('afterbegin', html);
            if (ticker.children.length > 6) ticker.removeChild(ticker.lastChild);
        }

        setInterval(updateOnline, 3000);
        setInterval(updateTicker, 2200);
        
        updateBalanceUI();
        renderGrid();
    </script>
</body>
