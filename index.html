<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Upgrader Mobile Remastered</title>
    <!-- Библиотека для салюта при победе -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* === ПЕРЕМЕННЫЕ И БАЗОВЫЕ НАСТРОЙКИ === */
        :root {
            --bg-main: #0a0a0c;
            --bg-panel: #141416;
            --bg-card: #1c1c20;
            --accent-gold: #f4c21a;
            --accent-gold-glow: rgba(244, 194, 26, 0.4);
            --text-main: #ffffff;
            --text-muted: #8b8b93;
            --border-color: #26262b;
            
            --rarity-epic: #9b59b6;
            --rarity-legendary: #e67e22;
            --rarity-mythic: #e74c3c;
            --rarity-immortal: #ff007f;
            
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 8px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at 50% 0%, #1a1a20 0%, var(--bg-main) 60%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* === ХЕДЕР === */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 20px;
            background: rgba(20, 20, 22, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            position: sticky; top: 0; z-index: 100;
        }

        .logo-area { display: flex; flex-direction: column; }
        .logo { font-size: 20px; font-weight: 900; color: var(--accent-gold); text-shadow: 0 0 10px var(--accent-gold-glow); }
        .logo span { color: var(--text-main); text-shadow: none; }
        .online-count { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
        .online-count span { color: #2ecc71; font-weight: bold; }

        .user-area { display: flex; align-items: center; gap: 14px; }
        .balance { font-size: 15px; font-weight: 800; color: var(--accent-gold); }
        .btn-deposit {
            background: linear-gradient(135deg, #f4c21a, #f1a900);
            color: #000; padding: 8px 16px; border: none; border-radius: var(--radius-sm);
            font-size: 13px; font-weight: 800; cursor: pointer; transition: var(--transition);
            box-shadow: 0 4px 15px rgba(244, 194, 26, 0.2);
        }
        .btn-deposit:active { transform: scale(0.95); }

        /* === ОСНОВНОЙ КОНТЕНТ === */
        main {
            flex: 1; display: flex; flex-direction: column;
            padding: 20px; gap: 24px; max-width: 600px; width: 100%; margin: 0 auto;
        }

        /* === ЛЕНТА LIVE === */
        .live-ticker {
            background: rgba(20, 20, 22, 0.6); border: 1px solid var(--border-color);
            border-radius: var(--radius-md); padding: 10px; display: flex; gap: 10px;
            overflow-x: auto; white-space: nowrap; box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);
        }
        .ticker-item {
            display: inline-flex; align-items: center; gap: 6px;
            background: var(--bg-card); padding: 6px 10px; border-radius: var(--radius-sm);
            font-size: 12px; font-weight: 600; border-left: 3px solid var(--accent-gold);
        }
        .ticker-item.fail { border-left-color: #e74c3c; opacity: 0.7; }

        /* === АРЕНА АПГРЕЙДА === */
        .upgrade-arena {
            background: linear-gradient(180deg, var(--bg-panel) 0%, #0d0d0f 100%);
            border: 1px solid var(--border-color); border-radius: var(--radius-lg);
            padding: 24px 20px; display: flex; flex-direction: column; align-items: center; gap: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .slots-container { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; width: 100%; }
        .item-slot {
            background: var(--bg-card); border: 1px dashed #444; border-radius: var(--radius-md);
            height: 110px; display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 10px; text-align: center; transition: var(--transition);
        }
        .item-slot.active { border: 1px solid var(--accent-gold); background: rgba(244, 194, 26, 0.05); box-shadow: 0 0 15px rgba(244, 194, 26, 0.1); }
        .slot-hint { font-size: 12px; color: var(--text-muted); font-weight: 600; }

        /* Круг апгрейда и стрелка */
        .wheel-box { position: relative; width: 200px; height: 200px; margin: 10px 0; }
        .wheel-svg { transform: rotate(-90deg); width: 100%; height: 100%; }
        .wheel-track { fill: none; stroke: var(--bg-card); stroke-width: 14; }
        .wheel-progress {
            fill: none; stroke: var(--accent-gold); stroke-width: 14;
            stroke-dasharray: 565; stroke-dashoffset: 282.5; stroke-linecap: round;
            transition: stroke-dashoffset 0.5s ease;
            filter: drop-shadow(0 0 8px var(--accent-gold-glow));
        }
        
        /* СТРЕЛОЧКА */
        .wheel-arrow {
            position: absolute;
            top: 6px;
            left: 50%;
            margin-left: -12px; /* Половина ширины */
            width: 0; 
            height: 0; 
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 18px solid var(--text-main);
            transform-origin: 12px 94px; /* Центр вращения */
            z-index: 10;
            transition: transform 3s cubic-bezier(0.25, 0.1, 0.2, 1); /* Плавное замедление */
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        .wheel-center-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 5;
        }
        .wheel-center-text h1 { font-size: 28px; font-weight: 900; color: var(--accent-gold); text-shadow: 0 0 15px var(--accent-gold-glow); }
        .wheel-center-text p { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }

        /* Кнопка Прокачать */
        .action-block { width: 100%; display: flex; flex-direction: column; gap: 14px; }
        .btn-upgrade {
            background: linear-gradient(135deg, var(--accent-gold), #e0ad0b);
            color: #000; border: none; padding: 16px; font-size: 18px; font-weight: 900;
            border-radius: var(--radius-md); cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 6px 25px rgba(244, 194, 26, 0.3); transition: var(--transition);
        }
        .btn-upgrade:active { transform: scale(0.96); box-shadow: 0 2px 10px rgba(244, 194, 26, 0.3); }

        /* === ИНВЕНТАРИ === */
        .inventory-section {
            background: var(--bg-panel); border: 1px solid var(--border-color);
            border-radius: var(--radius-lg); display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .tabs-header { display: flex; background: var(--bg-card); border-bottom: 1px solid var(--border-color); }
        .tab-btn {
            flex: 1; padding: 16px; background: transparent; border: none; color: var(--text-muted);
            font-size: 14px; font-weight: 800; cursor: pointer; transition: var(--transition); text-transform: uppercase;
        }
        .tab-btn.active { color: var(--accent-gold); border-bottom: 3px solid var(--accent-gold); background: rgba(244, 194, 26, 0.05); }

        .items-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 16px;
            max-height: 400px; overflow-y: auto;
        }

        .item-card {
            background: var(--bg-main); border: 1px solid var(--border-color); border-radius: var(--radius-md);
            padding: 10px; display: flex; flex-direction: column; align-items: center; position: relative;
            cursor: pointer; transition: var(--transition); box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .item-card:hover { transform: translateY(-3px); border-color: #444; }
        .item-card:active { transform: scale(0.95); }
        
        .item-price {
            font-size: 11px; font-weight: 800; color: var(--accent-gold); align-self: flex-end;
            background: rgba(0,0,0,0.5); padding: 3px 6px; border-radius: 6px;
        }
        
        .item-img-container { width: 100%; height: 75px; display: flex; align-items: center; justify-content: center; margin: 8px 0; position: relative; }
        .item-img-container img { max-width: 100%; max-height: 100%; object-fit: contain; filter: drop-shadow(0 6px 8px rgba(0,0,0,0.5)); transition: var(--transition); }
        .item-card:hover .item-img-container img { transform: scale(1.1); }

        .item-info { text-align: center; width: 100%; }
        .item-title { font-size: 10px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; }
        .item-sub { font-size: 12px; font-weight: 800; margin-top: 2px; }

        /* Редкости */
        .rarity-epic { border-bottom: 3px solid var(--rarity-epic); }
        .rarity-legendary { border-bottom: 3px solid var(--rarity-legendary); }
        .rarity-mythic { border-bottom: 3px solid var(--rarity-mythic); }
        .rarity-immortal { border-bottom: 3px solid var(--rarity-immortal); animation: immortalGlow 2s infinite alternate; }

        @keyframes immortalGlow {
            0% { box-shadow: 0 5px 15px rgba(255, 0, 127, 0.1); }
            100% { box-shadow: 0 5px 20px rgba(255, 0, 127, 0.4); }
        }
        .spinning .wheel-progress { animation: pulseGlow 0.4s infinite alternate; }
        @keyframes pulseGlow { 0% { opacity: 0.6; stroke: #fff; } 100% { opacity: 1; stroke: var(--accent-gold); } }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <div class="logo">UP<span>GRADER</span></div>
            <div class="online-count">Онлайн: <span>1 878</span></div>
        </div>
        <div class="user-area">
            <div class="balance" id="userBalance">23 543.51 ₽</div>
            <button class="btn-deposit">Пополнить</button>
        </div>
    </header>

    <main>
        <div class="live-ticker" id="liveTicker"></div>

        <section class="upgrade-arena" id="arenaBox">
            <div class="slots-container">
                <div class="item-slot" id="slotLeft"><span class="slot-hint">Твой подарок</span></div>
                <div class="item-slot" id="slotRight"><span class="slot-hint">Желаемый подарок</span></div>
            </div>

            <div class="wheel-box">
                <svg class="wheel-svg">
                    <circle class="wheel-track" cx="100" cy="100" r="90"></circle>
                    <circle class="wheel-progress" id="wheelCircle" cx="100" cy="100" r="90"></circle>
                </svg>
                <!-- Добавленная стрелочка -->
                <div class="wheel-arrow" id="wheelArrow"></div>
                
                <div class="wheel-center-text">
                    <h1 id="chanceText">0.00%</h1>
                    <p>шанс</p>
                </div>
            </div>

            <div class="action-block">
                <button class="btn-upgrade" id="btnUpgrade" onclick="executeUpgrade()">Прокачать</button>
            </div>
        </section>

        <section class="inventory-section">
            <div class="tabs-header">
                <button class="tab-btn active" id="tabMy" onclick="switchTab('my')">Мои подарки</button>
                <button class="tab-btn" id="tabShop" onclick="switchTab('shop')">Магазин</button>
            </div>
            <div class="items-grid" id="gridContent"></div>
        </section>
    </main>

    <script>
        // Только твои фотки лягушек Пепе!
        const customItems = [
            { id: 'frog_love', title: 'Подарок', sub: 'Влюбленный Пепе', price: '12500.00', rarity: 'rarity-mythic', img: '16203.png' },
            { id: 'frog_purple', title: 'Подарок', sub: 'Аметистовый Харт', price: '8900.00', rarity: 'rarity-epic', img: '16201.png' },
            { id: 'frog_glitter', title: 'Подарок', sub: 'Звездный Блеск', price: '24000.00', rarity: 'rarity-immortal', img: '16154.jpg' },
            { id: 'frog_aqua', title: 'Подарок', sub: 'Бирюзовый Лав', price: '4500.00', rarity: 'rarity-legendary', img: '16202.png' }
        ];

        let currentTab = 'my';
        let selectedLeft = null;
        let selectedRight = null;
        let isProcessing = false;
        let currentRotation = 0; // Для бесконечной крутилки стрелки

        // Инвентари (без скинов из КС, только лягушки)
        let myInventoryData = [customItems[1], customItems[3]];
        let shopInventoryData = [customItems[0], customItems[2], customItems[1], customItems[3]];

        function renderGrid() {
            const grid = document.getElementById('gridContent');
            grid.innerHTML = '';
            const data = currentTab === 'my' ? myInventoryData : shopInventoryData;

            data.forEach((item, index) => {
                const imgTag = item.img ? `<img src="${item.img}" alt="img">` : `<div style="width:40px;height:12px;background:#444;transform:rotate(-15deg);border-radius:2px;"></div>`;
                grid.innerHTML += `
                    <div class="item-card ${item.rarity}" onclick="selectItem(${index})">
                        <div class="item-price">${Math.round(item.price)} ₽</div>
                        <div class="item-img-container">${imgTag}</div>
                        <div class="item-info">
                            <div class="item-title">${item.title}</div>
                            <div class="item-sub">${item.sub}</div>
                        </div>
                    </div>
                `;
            });
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tabMy').classList.toggle('active', tab === 'my');
            document.getElementById('tabShop').classList.toggle('active', tab === 'shop');
            renderGrid();
        }

        function selectItem(index) {
            if (isProcessing) return;
            const item = currentTab === 'my' ? myInventoryData[index] : shopInventoryData[index];
            
            if (currentTab === 'my') {
                selectedLeft = item;
                renderSlot('slotLeft', item);
            } else {
                selectedRight = item;
                renderSlot('slotRight', item);
            }
            updateChance();
        }

        function renderSlot(slotId, item) {
            const slot = document.getElementById(slotId);
            slot.classList.add('active');
            const imgTag = item.img ? `<img src="${item.img}" style="max-height:60px; object-fit:contain; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));">` : ``;
            slot.innerHTML = `
                <div style="font-size:13px;font-weight:800;color:var(--accent-gold);">${Math.round(item.price)} ₽</div>
                <div style="margin:8px 0;">${imgTag}</div>
                <div style="font-size:11px;font-weight:700;text-overflow:ellipsis;overflow:hidden;width:100%;white-space:nowrap;">${item.sub}</div>
            `;
        }

        function updateChance() {
            if (!selectedLeft || !selectedRight) return;
            let chance = (parseFloat(selectedLeft.price) / parseFloat(selectedRight.price)) * 100;
            if (chance > 95) chance = 95;
            if (chance < 1) chance = 1;

            document.getElementById('chanceText').innerText = chance.toFixed(2) + '%';
            
            // Круг 565 длины для радиуса 90
            const maxOffset = 565; 
            document.getElementById('wheelCircle').style.strokeDasharray = maxOffset;
            document.getElementById('wheelCircle').style.strokeDashoffset = maxOffset - (maxOffset * (chance / 100));
        }

        function executeUpgrade() {
            if (isProcessing || !selectedLeft || !selectedRight) return;
            isProcessing = true;

            const btn = document.getElementById('btnUpgrade');
            const arena = document.getElementById('arenaBox');
            const arrow = document.getElementById('wheelArrow');
            
            btn.innerText = 'Крутим...';
            arena.classList.add('spinning');

            // Крутим стрелку (от 5 до 10 полных оборотов + рандомный градус)
            const spins = Math.floor(Math.random() * 5) + 5; 
            const randomDegree = Math.floor(Math.random() * 360);
            currentRotation += (spins * 360) + randomDegree;
            arrow.style.transform = `rotate(${currentRotation}deg)`;

            let chance = (parseFloat(selectedLeft.price) / parseFloat(selectedRight.price)) * 100;
            let roll = Math.random() * 100;
            let isWin = roll <= chance;

            setTimeout(() => {
                arena.classList.remove('spinning');
                if (isWin) {
                    btn.style.background = 'linear-gradient(135deg, #2ecc71, #27ae60)';
                    btn.innerText = 'УСПЕШНО!';
                    
                    // --- САЛЮТ ПРИ ПОБЕДЕ ---
                    confetti({
                        particleCount: 150,
                        spread: 80,
                        origin: { y: 0.6 },
                        colors: ['#f4c21a', '#2ecc71', '#ffffff']
                    });

                    myInventoryData.push(selectedRight);
                    myInventoryData = myInventoryData.filter(i => i !== selectedLeft);
                } else {
                    btn.style.background = 'linear-gradient(135deg, #e74c3c, #c0392b)';
                    btn.innerText = 'СГОРЕЛО!';
                    myInventoryData = myInventoryData.filter(i => i !== selectedLeft);
                }

                setTimeout(() => {
                    btn.style.background = '';
                    btn.innerText = 'Прокачать';
                    selectedLeft = null; selectedRight = null;
                    document.getElementById('slotLeft').innerHTML = '<span class="slot-hint">Твой подарок</span>';
                    document.getElementById('slotLeft').classList.remove('active');
                    document.getElementById('slotRight').innerHTML = '<span class="slot-hint">Желаемый подарок</span>';
                    document.getElementById('slotRight').classList.remove('active');
                    document.getElementById('chanceText').innerText = '0.00%';
                    document.getElementById('wheelCircle').style.strokeDashoffset = 565;
                    renderGrid();
                    isProcessing = false;
                }, 2000);

            }, 3000); // 3 секунды крутится стрелка
        }

        function updateTicker() {
            const ticker = document.getElementById('liveTicker');
            const randItem = customItems[Math.floor(Math.random() * customItems.length)];
            const isWin = Math.random() > 0.4;
            const html = `<div class="ticker-item ${isWin ? '' : 'fail'}">${randItem.sub} -> ${isWin ? '🔥' : '❌'}</div>`;
            ticker.insertAdjacentHTML('afterbegin', html);
            if (ticker.children.length > 5) ticker.removeChild(ticker.lastChild);
        }

        setInterval(updateTicker, 3000);
        renderGrid();
    </script>
</body>
</html>
