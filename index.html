<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <title>FLASHUPGRADER — Premium Edition</title>
    <style>
        /* === НОВЫЙ ДИЗАЙН (Светлее, меньше черного, меньше глоу) === */
        :root {
            --bg-main: #1a1a24; /* Сделано светлее */
            --bg-panel: #22222f; /* Панели светлее */
            --bg-card: #2a2a38;
            --bg-card-hover: #323245;
            --accent-main: #8a2be2; 
            --accent-glow: rgba(138, 43, 226, 0.15); /* Глоу значительно уменьшен */
            --accent-secondary: #00e5ff;
            --text-main: #ffffff;
            --text-muted: #9ba1b0;
            --border-color: #38384d;
            
            --rarity-epic: #a55eea;
            --rarity-legendary: #fd9644;
            --rarity-mythic: #fc5c65;
            --rarity-immortal: #2bcbba;
            
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --transition: all 0.3s cubic-bezier(0.25, 1, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0; box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
            min-width: 0;
        }

        button:active, .item-slot:active, .item-card:active, .profile-avatar:active, .modal-close:active, .payment-method:active {
            transform: scale(0.95) !important;
            transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }

        .item-sub, .item-title, .p-item-name, .bd-name, #profileEmailDisplay, .ticker-item span {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 100%;
        }
        .p-item-info, .item-info {
            min-width: 0;
            width: 100%; display: flex; flex-direction: column; align-items: center;
        }

        body {
            background: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* === ХЕДЕР === */
        header {
            display: flex;
            justify-content: space-between; align-items: center;
            padding: 16px 20px; background: rgba(34, 34, 47, 0.95); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color); position: sticky;
            top: 0; z-index: 100;
        }

        .logo-area { display: flex; flex-direction: column; }
        .logo { font-size: 20px; font-weight: 900; color: var(--accent-main); letter-spacing: 0.5px; transition: var(--transition); text-shadow: 0 0 2px var(--accent-glow); }
        .logo span { color: var(--text-main); text-shadow: none; }
        .online-count { font-size: 11px; color: var(--text-muted); margin-top: 2px; font-weight: 600; }

        .user-area { display: flex; align-items: center; gap: 12px; min-height: 38px;}
        .balance-block { display: flex; flex-direction: column; align-items: flex-end; justify-content: center; }
        .balance-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; }
        .balance { font-size: 15px; font-weight: 800; color: var(--text-main); }
        
        .btn-deposit {
            background: linear-gradient(135deg, #8a2be2, #6a1b9a);
            color: #fff;
            padding: 8px 14px; border: none; border-radius: var(--radius-sm);
            font-size: 13px; font-weight: 800; cursor: pointer; transition: var(--transition);
            text-transform: uppercase;
        }
        .btn-deposit:hover { filter: brightness(1.1); transform: translateY(-2px); }
        
        .profile-avatar {
            width: 36px;
            height: 36px; background: var(--bg-card); border: 2px solid var(--border-color);
            border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: var(--transition);
            overflow: hidden; flex-shrink: 0;
        }
        .profile-avatar:hover { border-color: var(--accent-main); transform: scale(1.05); }

        /* === ОСНОВНОЙ КОНТЕНТ === */
        main { 
            flex: 1;
            display: flex; flex-direction: column; padding: 20px 14px; gap: 20px; 
            max-width: 1300px; width: 100%; margin: 0 auto;
        }
        
        .main-content { display: flex; flex-direction: column; gap: 24px; flex: 1; max-width: 1000px; margin: 0 auto; width: 100%; }

        .live-ticker {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md); padding: 8px; display: flex; align-items: center; gap: 8px;
            overflow-x: auto; white-space: nowrap; scrollbar-width: none;
            min-height: 56px;
            scroll-behavior: smooth; position: relative;
        }
        .live-ticker::-webkit-scrollbar { display: none; }
        
        .ticker-item {
            display: inline-flex;
            align-items: center; gap: 8px; background: var(--bg-card);
            padding: 6px 10px; border-radius: var(--radius-sm); font-size: 11px; font-weight: 600; 
            min-width: 150px; max-width: 200px;
            border-left: 3px solid transparent; transition: var(--transition);
            animation: slideInTicker 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; opacity: 0; transform: translateX(-20px);
            height: 38px;
        }
        @keyframes slideInTicker { to { opacity: 1; transform: translateX(0); } }
        
        .ticker-img { width: 20px; height: 20px; object-fit: contain; flex-shrink: 0; }
        .ticker-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .ticker-chance { margin-left: auto; font-weight: 800; font-size: 10px; padding: 2px 5px; border-radius: 4px; flex-shrink: 0; }
        .ticker-user { font-size: 10px; color: var(--text-muted); opacity: 0.8; margin-right: 4px; flex-shrink: 0; }

        @media (min-width: 900px) {
            main { flex-direction: row; align-items: flex-start; justify-content: center; }
            .live-ticker { 
                flex-direction: column;
                align-items: stretch; width: 220px; height: auto; max-height: 80vh; 
                overflow-y: auto; overflow-x: hidden; white-space: normal; padding: 10px;
                margin-top: 0; /* Идеальное выравнивание с основным контентом */
            }
            .ticker-item { width: 100%; justify-content: flex-start; max-width: 100%; }
            .main-content { margin: 0; }
        }

        /* === АРЕНА АПГРЕЙДА === */
        .upgrade-arena {
            background: var(--bg-panel);
            border: 1px solid var(--border-color); border-radius: var(--radius-lg);
            padding: 40px 20px 30px; display: flex; flex-direction: column; align-items: center; gap: 24px;
            position: relative;
            transition: var(--transition); overflow: visible; 
        }
        
        /* Молния отодвинута от карточки */
        .top-left-controls { 
            position: absolute;
            top: -45px; left: 0px; z-index: 10; display: flex; gap: 8px; align-items: center;
        }
        .fast-upgrade-label { cursor: pointer; display: flex; align-items: center; background: var(--bg-panel);
            padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border-color); box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: var(--transition);
            gap: 6px;}
        .fast-upgrade-label:hover { border-color: var(--accent-main); transform: translateY(-2px); }
        .fast-upgrade-label span { font-size: 11px; font-weight: bold; color: var(--text-muted); text-transform: uppercase; }
        .fast-upgrade-label input { display: none; }
        .lightning-icon { width: 16px; height: 16px; fill: var(--text-muted); transition: var(--transition); }
        .fast-upgrade-label input:checked + .lightning-icon { fill: #ffcc00; filter: drop-shadow(0 0 5px rgba(255, 204, 0, 0.5)); }
        .fast-upgrade-label input:checked ~ span { color: #ffcc00; }

        .arena-row { 
            display: flex;
            align-items: stretch; justify-content: center; 
            width: 100%; z-index: 2; margin-top: 10px; gap: 30px; flex-wrap: nowrap;
        }

        /* ОДИНАКОВЫЕ РАЗМЕРЫ БЛОКОВ И СИММЕТРИЯ */
        .left-slot-wrapper, .right-slot-wrapper {
            display: flex;
            flex-direction: column; flex: 1; max-width: 280px; width: 100%; min-width: 150px; gap: 16px; justify-content: space-between;
        }

        .item-slot {
            background: var(--bg-card);
            border: 2px dashed var(--border-color); border-radius: var(--radius-md);
            height: 250px; width: 100%; /* Фиксированная одинаковая высота и ширина */
            display: flex;
            flex-direction: column; justify-content: space-between; align-items: center;
            padding: 16px; text-align: center; cursor: pointer; position: relative; overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .item-slot:hover { border-color: var(--accent-main); background: var(--bg-card-hover); transform: translateY(-4px); }
        
        .item-slot.active { border-style: solid; border-width: 2px; }
        .item-slot.active.rarity-epic { border-color: var(--rarity-epic); background: rgba(165, 94, 234, 0.05); }
        .item-slot.active.rarity-legendary { border-color: var(--rarity-legendary); background: rgba(253, 150, 68, 0.05); }
        .item-slot.active.rarity-mythic { border-color: var(--rarity-mythic); background: rgba(252, 92, 101, 0.05); }
        .item-slot.active.rarity-immortal { border-color: var(--rarity-immortal); background: rgba(43, 203, 186, 0.05); }

        /* Пепе в слотах сделаны светлее и заметнее */
        .slot-bg-pepe { position: absolute;
            width: 85%; height: 85%; object-fit: contain; filter: brightness(1.3) opacity(0.6); z-index: 1; pointer-events: none; animation: floatEffect 6s ease-in-out infinite;
        }
        
        .slot-chevron-container { position: relative; z-index: 2; margin: auto 0; display: flex; align-items: center; justify-content: center; height: 60px; }
        .slot-hint { font-size: 12px; color: var(--text-muted); font-weight: 800; text-transform: uppercase; position: relative; z-index: 2; margin-top: auto; letter-spacing: 0.5px;}

        /* === БУСТ ШАНСА И МНОЖИТЕЛИ (СТРОГО ОДИНАКОВЫЕ РАЗМЕРЫ) === */
        .balance-boost-container, .multiplier-bar-custom {
            background: var(--bg-card);
            border-radius: var(--radius-sm); padding: 10px 16px; 
            width: 100%; border: 1px solid var(--border-color);
            height: 80px; /* ОДИНАКОВАЯ ВЫСОТА И СИММЕТРИЯ */
            display: flex; flex-direction: column; justify-content: center; gap: 8px;
        }

        .multiplier-bar-custom {
            flex-direction: row; gap: 10px; align-items: center; justify-content: space-between;
        }

        .boost-header-custom { display: flex; justify-content: space-between; align-items: center; }
        .boost-title-custom { color: var(--text-muted); font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .boost-val-custom { font-size: 13px; font-weight: 900; color: #ffcc00; display: flex; align-items: center; gap: 4px; }
        .boost-max-custom { color: var(--text-muted); font-size: 10px; font-weight: 600; margin-left: 4px; }
        
        /* Ползунок буста цвета сайта */
        .boost-slider-custom {
            -webkit-appearance: none;
            width: 100%; height: 6px; border-radius: 3px; 
            background: var(--border-color); outline: none; transition: 0.1s; border: none;
        }
        .boost-slider-custom::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none; width: 20px; height: 20px; border-radius: 50%; 
            background: var(--accent-main); cursor: pointer; 
            border: 2px solid #fff; transition: transform 0.2s ease;
        }
        .boost-slider-custom::-webkit-slider-thumb:hover { transform: scale(1.15); box-shadow: 0 0 8px var(--accent-glow); }

        /* Иксы и проценты: ровные, одинаковые, широкие, без кривизны */
        .mult-btn {
            flex: 1; height: 100%; background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: var(--radius-sm); 
            color: var(--text-main); font-size: 14px; font-weight: bold; cursor: pointer;
            transition: all 0.2s ease; display: flex; align-items: center; justify-content: center;
        }
        .mult-btn:hover { background: var(--bg-card-hover); color: #fff; border-color: var(--accent-main); transform: translateY(-2px); }
        
        /* === КОЛЕСО И СТРЕЛКА === */
        .wheel-container { position: relative;
            width: 240px; height: 240px; margin: 0; display: flex; align-items: center; justify-content: center; z-index: 2; flex-shrink: 0;
        }
        .wheel-box { width: 100%; height: 100%; position: relative; }
        .wheel-svg { width: 100%; height: 100%; }
        .wheel-progress { stroke-dasharray: 408.4; stroke-dashoffset: 408.4;
            transition: stroke-dashoffset 1s cubic-bezier(0.34, 1.56, 0.64, 1); filter: drop-shadow(0 0 8px var(--accent-glow));
        }

        .wheel-marker { position: absolute; font-size: 10px; font-weight: bold; color: var(--text-muted); z-index: 10; pointer-events: none; opacity: 0.8; }
        .marker-top { top: 35px; left: 50%; transform: translateX(-50%); }
        .marker-bottom { bottom: 35px; left: 50%; transform: translateX(-50%); }
        .marker-left { top: 50%; left: 35px; transform: translateY(-50%); }
        .marker-right { top: 50%; right: 35px; transform: translateY(-50%); }
        
        .arrow-spinner-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 15; will-change: transform; }
        
        .wheel-arrow { 
            position: absolute;
            top: 18px; left: 50%; transform: translateX(-50%) rotate(180deg);
            width: 18px; height: 26px; fill: var(--accent-main);
        }

        .wheel-center-content { 
            position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            width: 85%; height: 85%; z-index: 5; text-align: center; pointer-events: none; 
            background: var(--bg-panel); border-radius: 50%; border: 1px solid var(--border-color);
        }

        #chanceDisplay { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
        #chanceDisplay h1 { font-size: 28px; font-weight: 900; color: #ffffff; line-height: 1; margin: 0; white-space: nowrap; }
        #chanceDisplay p { font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: bold; margin-top: 6px; }

        .action-block { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 10px; z-index: 2; margin-top: 20px; }

        .btn-upgrade { background: var(--accent-main); color: #fff; border: none; padding: 18px; font-size: 16px;
            font-weight: 900; border-radius: var(--radius-md); cursor: pointer; text-transform: uppercase; transition: all 0.4s ease; letter-spacing: 1px;
        }
        .btn-upgrade:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-3px); }
        .btn-upgrade:disabled { background: var(--bg-card); color: var(--text-muted); cursor: not-allowed; border: 1px solid var(--border-color); }

        @keyframes floatEffect { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-6px) rotate(2deg); } }

        /* === ИНВЕНТАРЬ И МАГАЗИН === */
        .inventory-section { background: var(--bg-panel);
            border: 1px solid var(--border-color); border-radius: var(--radius-lg); display: flex; flex-direction: column; overflow: hidden; padding: 24px;
        }
        .inventory-split { display: flex; gap: 30px; align-items: flex-start; }
        .inv-col { flex: 1; min-width: 0; display: flex; flex-direction: column; }
        
        @media (max-width: 768px) { 
            .inventory-split { flex-direction: column; } 
            .arena-row { flex-direction: column; align-items: center; }
            .left-slot-wrapper, .right-slot-wrapper { max-width: 100%; width: 100%; }
            .wheel-container { order: -1; }
        }

        .inv-header-title { font-size: 18px; font-weight: 900; color: #fff; margin: 0 0 20px; text-transform: uppercase; border-left: 4px solid var(--accent-main); padding-left: 12px; }
        
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 16px; align-items: stretch; max-height: 600px; overflow-y: auto; padding-right: 8px; padding-bottom: 12px; }
        
        .item-card { 
            background: var(--bg-card);
            border: 1px solid var(--border-color); border-radius: var(--radius-md); 
            padding: 14px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; 
            cursor: pointer; transition: all 0.2s ease; height: 180px; position: relative; overflow: hidden; width: 100%;
        }
        .item-card:hover:not(.empty-slot) { background: var(--bg-card-hover); transform: translateY(-4px); border-color: var(--accent-main); }
        .item-price { font-size: 12px; font-weight: 900; color: #fff; align-self: flex-end; background: rgba(0,0,0,0.4); padding: 4px 10px; border-radius: 6px; }
        
        /* Затемняем картинки инвентаря для приятного визуала */
        .item-img-container { width: 100%; height: 70px; display: flex; align-items: center; justify-content: center; margin: auto 0; position: relative;}
        .item-img-container img { max-width: 85%; max-height: 100%; object-fit: contain; transition: var(--transition); filter: brightness(0.5); /* Сильнее затемнил */ }
        .item-card:hover:not(.empty-slot) .item-img-container img { transform: scale(1.1); filter: brightness(1) drop-shadow(0 0 5px var(--accent-glow)); }
        
        .item-rarity-text { font-size: 10px; text-transform: uppercase; font-weight: bold; margin-bottom: 6px; padding: 4px 10px; border-radius: 6px; display: inline-block; letter-spacing: 0.5px; }
        .rarity-epic .item-rarity-text { color: var(--rarity-epic); background: rgba(165, 94, 234, 0.1); }
        .rarity-legendary .item-rarity-text { color: var(--rarity-legendary); background: rgba(253, 150, 68, 0.1); }
        .rarity-mythic .item-rarity-text { color: var(--rarity-mythic); background: rgba(252, 92, 101, 0.1); }
        .rarity-immortal .item-rarity-text { color: var(--rarity-immortal); background: rgba(43, 203, 186, 0.1); }
        .item-title { font-size: 13px; color: #fff; font-weight: bold; }

        .rarity-epic { border-bottom: 3px solid var(--rarity-epic); }
        .rarity-legendary { border-bottom: 3px solid var(--rarity-legendary); }
        .rarity-mythic { border-bottom: 3px solid var(--rarity-mythic); }
        .rarity-immortal { border-bottom: 3px solid var(--rarity-immortal); }

        /* Вспомогательные классы */
        .hidden { display: none !important; }
        .text-red { color: #fc5c65 !important; }
        .text-green { color: #2bcbba !important; }
        
        /* Скроллбары */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 6px; }
        
        /* === ПРОФИЛЬ (Симметрия) === */
        .profile-page-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg-main); z-index: 300; display: none; flex-direction: column; opacity: 0; transform: translateX(100%); transition: all 0.4s ease; }
        .profile-page-overlay.active { display: flex; opacity: 1; transform: translateX(0); }
        .profile-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; background: var(--bg-panel); border-bottom: 1px solid var(--border-color); }
        .profile-back { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 10px; cursor: pointer; padding: 8px; display: flex; align-items: center; justify-content: center; transition: var(--transition); }
        .profile-back:hover { border-color: var(--accent-main); }
        .profile-title-text { font-size: 20px; font-weight: 900; color: #fff; text-transform: uppercase; }
        .profile-body { flex: 1; overflow-y: auto; padding: 24px; width: 100%; max-width: 1200px; margin: 0 auto; display: flex; gap: 24px; }
        .profile-left-panel, .profile-right-panel { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        
        .stat-card { background: var(--bg-panel); padding: 20px; border-radius: var(--radius-md); border: 1px solid var(--border-color); }
        .profile-tabs { display: flex; gap: 10px; background: var(--bg-card); padding: 8px; border-radius: var(--radius-md); border: 1px solid var(--border-color); }
        .p-tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: var(--text-muted); font-size: 13px; font-weight: bold; text-transform: uppercase; cursor: pointer; border-radius: 8px; transition: var(--transition); }
        .p-tab-btn.active { background: var(--bg-panel); color: #fff; border: 1px solid var(--border-color); }
        
        .profile-list-item { display: flex; justify-content: space-between; align-items: center; background: var(--bg-card); padding: 16px; border-radius: var(--radius-sm); margin-bottom: 12px; border: 1px solid var(--border-color); }
        .btn-action { padding: 10px 16px; border: none; border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: var(--transition); }
        .btn-sell-item { background: rgba(252, 92, 101, 0.1); color: var(--rarity-mythic); border: 1px solid rgba(252, 92, 101, 0.3); }
        .btn-sell-item:hover { background: var(--rarity-mythic); color: #fff; }

        /* Модальные окна */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(26, 26, 36, 0.9); backdrop-filter: blur(5px); z-index: 200; display: none; align-items: center; justify-content: center; padding: 16px; opacity: 0; transition: opacity 0.3s ease; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-card { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: var(--radius-lg); width: 100%; max-width: 440px; padding: 30px; position: relative; }
        .modal-close { position: absolute; top: 20px; right: 20px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 10px; width: 34px; height: 34px; display:flex; align-items:center; justify-content:center; color: var(--text-muted); font-size: 20px; font-weight: bold; cursor: pointer; transition: var(--transition); }
        .modal-close:hover { background: var(--border-color); color: #fff; }
    </style>
</head>
<body>

    <audio id="sfx-click" src="click.mp3" preload="auto"></audio>
    <audio id="sfx-spin" src="spin.mp3" preload="auto"></audio>
    <audio id="sfx-win" src="win.mp3" preload="auto"></audio>
    <audio id="sfx-lose" src="lose.mp3" preload="auto"></audio>

    <header>
        <div class="logo-area">
            <div class="logo">FLASH<span>UPGRADER</span></div>
            <div class="online-count">Онлайн: <span id="onlineCount">482</span></div>
        </div>
        <div class="user-area">
            <div id="headerUserArea" style="display: flex; align-items: center; gap: 14px;">
                <div class="balance-block">
                    <span class="balance-label">Баланс</span>
                    <div class="balance" id="userBalance">1 000 000 ⭐</div>
                </div>
                <button class="btn-deposit" onclick="openModal('depositModal')">Пополнить</button>
                <div class="profile-avatar" id="headerAvatar" onclick="openProfile()"><img src="frog_ninja.png" onerror="this.src='16201.png'" style="width:100%; height:100%; border-radius:50%; object-fit:cover;"></div>
            </div>
        </div>
    </header>

    <main>
        <div class="live-ticker" id="liveTicker"></div>

        <div class="main-content">
            <section class="upgrade-arena" id="arenaBox">
                <div class="top-left-controls">
                    <label class="fast-upgrade-label" title="Быстрый апгрейд">
                        <input type="checkbox" id="fastUpgradeCheck">
                        <svg class="lightning-icon" viewBox="0 0 24 24">
                            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                        </svg>
                        <span>Fast Mode</span>
                    </label>
                </div>

                <div class="arena-row">
                    <div class="left-slot-wrapper">
                        <div class="item-slot" id="slotLeft" onclick="document.getElementById('gridMyContent').scrollIntoView({behavior: 'smooth'})">
                            <canvas class="slot-confetti"></canvas>
                            <img src="16201.png" class="slot-bg-pepe" onerror="this.src=''">
                            <div class="slot-chevron-container"></div>
                            <span class="slot-hint">Ваш предмет</span>
                        </div>

                        <div class="balance-boost-container" id="boostContainer">
                            <div class="boost-header-custom">
                                <span class="boost-title-custom">Сумма баланса:</span>
                                <span class="boost-val-custom">
                                    <span id="boostValDisplay">0</span> ⭐ 
                                    <span class="boost-max-custom">(max <span id="boostMaxDisplay">0</span>)</span>
                                </span>
                            </div>
                            <input type="range" id="balanceBoostSlider" min="0" max="0" value="0" step="1" class="boost-slider-custom">
                        </div>
                    </div>
                    
                    <div class="wheel-container">
                        <div class="wheel-marker marker-top">100%</div>
                        <div class="wheel-marker marker-bottom">0%</div>
                        <div class="wheel-marker marker-left">50%</div>
                        <div class="wheel-marker marker-right">50%</div>

                        <div class="arrow-spinner-wrapper" id="arrowSpinner">
                            <svg class="wheel-arrow" viewBox="0 0 24 50" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 0 L24 20 L16 18 L16 50 L8 50 L8 18 L0 20 Z" />
                            </svg>
                        </div>
                        
                        <div class="wheel-box">
                            <svg class="wheel-svg" viewBox="0 0 200 200">
                                <circle cx="100" cy="100" r="90" fill="none" stroke="var(--border-color)" stroke-width="3" stroke-dasharray="2 8" />
                                <circle cx="100" cy="100" r="75" fill="var(--bg-panel)" />
                                <circle cx="100" cy="100" r="65" fill="none" stroke="var(--bg-card)" stroke-width="20" />
                                <circle class="wheel-progress" id="wheelCircle" cx="100" cy="100" r="65" fill="none" stroke="var(--accent-main)" stroke-width="20" transform="rotate(-90 100 100)" />
                            </svg>

                            <div class="wheel-center-content">
                                <div id="chanceDisplay" style="display: none;">
                                    <h1 id="chanceText">0.00%</h1>
                                    <p id="chanceLabel">шанс</p>
                                </div>
                                <div id="centerBars" style="color: var(--text-muted); font-size: 24px;">?</div>
                            </div>
                        </div>
                    </div>

                    <div class="right-slot-wrapper">
                        <div class="item-slot" id="slotRight" onclick="document.getElementById('gridShopContent').scrollIntoView({behavior: 'smooth'})">
                            <canvas class="slot-confetti"></canvas>
                            <img src="16201.png" class="slot-bg-pepe" onerror="this.src=''">
                            <div class="slot-chevron-container"></div>
                            <span class="slot-hint">Желаемый предмет</span>
                        </div>
                        
                        <div class="multiplier-bar-custom">
                            <button class="mult-btn" onclick="selectByMultiplier(2)">x2</button>
                            <button class="mult-btn" onclick="selectByMultiplier(4)">x4</button>
                            <button class="mult-btn" onclick="selectByMultiplier(8)">x8</button>
                            <button class="mult-btn" onclick="selectByChance(35)">35%</button>
                            <button class="mult-btn" onclick="selectByChance(75)">75%</button>
                        </div>
                    </div>
                </div>

                <div class="action-block">
                    <button class="btn-upgrade" id="btnUpgrade" onclick="executeUpgrade()" disabled>ВЫБЕРИТЕ ПРЕДМЕТЫ</button>
                </div>
            </section>

            <section class="inventory-section" id="inventorySection">
                <div class="inventory-split">
                    <div class="inv-col" id="myInvWrapper">
                        <div class="inv-header-title">Мой инвентарь</div>
                        <div class="items-grid" id="gridMyContent"></div>
                    </div>
                    
                    <div class="inv-col">
                        <div class="inv-header-title">Магазин предметов</div>
                        <div class="items-grid" id="gridShopContent"></div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <div class="modal-overlay" id="depositModal">
        <div class="modal-card">
            <button class="modal-close" onclick="closeModal('depositModal')">×</button>
            <h3 style="color: #fff; margin-bottom: 20px;">Пополнение (Тест)</h3>
            <button class="btn-upgrade" onclick="balance += 100000; updateBalanceUI(); closeModal('depositModal');" style="width: 100%;">+ 100,000 ⭐</button>
        </div>
    </div>

    <div class="profile-page-overlay" id="profileModal">
        <div class="profile-header">
            <button class="profile-back" onclick="closeProfile()">Назад</button>
            <div class="profile-title-text">ПРОФИЛЬ ИГРОКА</div>
            <div style="width: 60px;"></div>
        </div>
        <div class="profile-body">
            <div class="profile-left-panel">
                <div class="stat-card" style="text-align: center;">
                    <h2 style="color: #fff; margin-bottom: 10px;" id="profileBalanceVal">0 ⭐</h2>
                    <p style="color: var(--text-muted); font-size: 12px; text-transform: uppercase;">Текущий баланс</p>
                </div>
            </div>
            <div class="profile-right-panel">
                <div class="profile-tabs">
                    <button class="p-tab-btn active" onclick="renderProfileInventory()">Мои предметы (Продажа)</button>
                </div>
                <div class="stat-card" id="profileSellList" style="max-height: 400px; overflow-y: auto;">
                    </div>
            </div>
        </div>
    </div>

    <script>
        const giftPool = [
            { id: 'new_drop_blue', title: 'Обычный', sub: 'Bear', price: '15', rarity: 'rarity-epic', img: '1779384748829.png' },
            { id: 'new_gem_red', title: 'Обычный', sub: 'Rose', price: '25', rarity: 'rarity-epic', img: '1779384763664.png' },
            { id: 'new_sphere_green', title: 'Обычный', sub: 'Cake', price: '50', rarity: 'rarity-epic', img: '1779384784150.png' },
            { id: 'new_crystal_blue', title: 'Обычный', sub: 'Cup', price: '100', rarity: 'rarity-epic', img: '1779384804515.png' },
            { id: 'new_star_purple', title: 'Редкий', sub: 'SurfBoard', price: '2500', rarity: 'rarity-legendary', img: '1779384818636.png' },
            { id: 'new_shield_gold', title: 'Эпический', sub: 'Durovs Boots', price: '10000', rarity: 'rarity-legendary', img: '1779384968361.png' },
            { id: 'new_flame_orange', title: 'Эпический', sub: 'Durovs Sunglasses', price: '30000', rarity: 'rarity-legendary', img: '1779384992327.png' },
            { id: 'frog_secret', title: 'Эксклюзив', sub: 'Тайный Пепе', price: '280000', rarity: 'rarity-immortal', img: '16289.jpg' },
            { id: 'frog_purple', title: 'Мифический', sub: 'Yellow Purp', price: '877198', rarity: 'rarity-legendary', img: '16201.png' },
            { id: 'frog_aqua', title: 'Мифический', sub: 'Pepe Mint', price: '1039583', rarity: 'rarity-mythic', img: '16202.png' },
            { id: 'frog_blue', title: 'Мифический', sub: 'Cold Heart', price: '1576013', rarity: 'rarity-mythic', img: 'frog_blue_buttons.png' },
            { id: 'frog_ninja', title: 'Бессмертный', sub: 'Leonardo', price: '1675430', rarity: 'rarity-immortal', img: 'frog_ninja.png' },
            { id: 'frog_gold', title: 'Бессмертный', sub: 'Gucci Leap', price: '4582012', rarity: 'rarity-immortal', img: 'frog_gold_buttons.png' }
        ];
        giftPool.sort((a, b) => parseInt(a.price) - parseInt(b.price));

        let balance = 1000000;
        let myInventoryData = [ giftPool[5], giftPool[6], giftPool[8] ];
        let selectedLeft = null;
        let selectedRight = null;
        let isProcessing = false;
        let arrowRotation = 0; 
        const circleCircumference = 408.4;

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function openProfile() { 
            document.getElementById('profileModal').classList.add('active');
            renderProfileInventory();
            updateBalanceUI();
        }
        function closeProfile() { document.getElementById('profileModal').classList.remove('active'); }

        function updateBalanceUI() { 
            let formatted = Math.floor(balance).toLocaleString('ru-RU');
            document.getElementById('userBalance').innerText = formatted + ' ⭐'; 
            document.getElementById('profileBalanceVal').innerText = formatted + ' ⭐';
        }

        // Обновление ползунка и цвета
        const balanceBoostSlider = document.getElementById('balanceBoostSlider');
        balanceBoostSlider.addEventListener('input', function() {
            const valPercent = ((this.value - this.min) / (this.max - this.min)) * 100 || 0;
            this.style.background = `linear-gradient(to right, var(--accent-main) ${valPercent}%, var(--border-color) ${valPercent}%)`;
            updateChance();
        });

        // Рабочие множители
        function selectByMultiplier(multiplier) {
            if (!selectedLeft) { alert("Сначала выберите свой предмет!"); return; }
            let targetPrice = parseFloat(selectedLeft.price) * multiplier;
            findClosestAndSelect(targetPrice);
        }

        function selectByChance(targetChancePercent) {
            if (!selectedLeft) { alert("Сначала выберите свой предмет!"); return; }
            let targetPrice = (parseFloat(selectedLeft.price) / targetChancePercent) * 100;
            findClosestAndSelect(targetPrice);
        }

        function findClosestAndSelect(targetPrice) {
            let closestItem = giftPool.reduce((prev, curr) => {
                return (Math.abs(parseFloat(curr.price) - targetPrice) < Math.abs(parseFloat(prev.price) - targetPrice) ? curr : prev);
            });
            selectedRight = closestItem;
            renderSlot('slotRight', closestItem);
            updateChance();
        }

        function renderGrid() {
            const gridMy = document.getElementById('gridMyContent');
            const gridShop = document.getElementById('gridShopContent');
            
            gridMy.innerHTML = '';
            myInventoryData.forEach((item, idx) => {
                gridMy.innerHTML += `
                    <div class="item-card ${item.rarity}" onclick="selectItem(${idx}, 'my')">
                        <div class="item-price">${Math.round(item.price)} ⭐</div>
                        <div class="item-img-container"><img src="${item.img}" onerror="this.src='16201.png'"></div>
                        <div class="item-info">
                            <div class="item-rarity-text">${item.title}</div>
                            <div class="item-title">${item.sub}</div>
                        </div>
                    </div>
                `;
            });

            // Заполнение пустыми слотами для симметрии
            const minCells = 8;
            if (myInventoryData.length < minCells) {
                const emptyCount = minCells - myInventoryData.length;
                for(let i=0; i<emptyCount; i++) {
                    gridMy.innerHTML += `
                        <div class="item-card empty-slot" style="opacity: 0.3; pointer-events: none; background: transparent; border: 1px dashed var(--border-color);">
                            <div class="item-img-container"></div>
                        </div>
                    `;
                }
            }

            gridShop.innerHTML = '';
            giftPool.forEach((item, idx) => {
                // ЛОГИКА UPGRADER: Прячем предметы, на которые шанс > 79% (слишком дешевые предметы для вашего)
                if (selectedLeft) {
                    let maxChanceCheck = (parseFloat(selectedLeft.price) / parseFloat(item.price)) * 100;
                    if (maxChanceCheck > 79) return; // ПРОПУСКАЕМ
                }

                gridShop.innerHTML += `
                    <div class="item-card ${item.rarity}" onclick="selectItem(${idx}, 'shop')">
                        <div class="item-price">${Math.round(item.price)} ⭐</div>
                        <div class="item-img-container"><img src="${item.img}" onerror="this.src='16201.png'"></div>
                        <div class="item-info">
                            <div class="item-rarity-text">${item.title}</div>
                            <div class="item-title">${item.sub}</div>
                        </div>
                    </div>
                `;
            });
        }

        function selectItem(index, type) {
            if (isProcessing) return;
            if (type === 'my') { 
                const item = myInventoryData[index];
                selectedLeft = item; 
                renderSlot('slotLeft', item); 
                // Обновляем магазин, чтобы скрыть дешевые предметы
                renderGrid();
            } else { 
                const shopItems = [];
                // Воссоздаем логику фильтрации, чтобы индекс совпадал
                giftPool.forEach(item => {
                    if (selectedLeft) {
                        let maxChanceCheck = (parseFloat(selectedLeft.price) / parseFloat(item.price)) * 100;
                        if (maxChanceCheck > 79) return;
                    }
                    shopItems.push(item);
                });
                const item = shopItems[index];
                selectedRight = item; 
                renderSlot('slotRight', item); 
            }
            updateChance();
        }

        function renderSlot(slotId, item) {
            const slot = document.getElementById(slotId);
            slot.classList.remove('rarity-epic', 'rarity-legendary', 'rarity-mythic', 'rarity-immortal');
            slot.classList.add('active', item.rarity);
            
            slot.innerHTML = `
                <img src="${item.img}" class="slot-bg-pepe" onerror="this.src=''">
                <div style="font-size:12px; font-weight:900; color:#fff; position: relative; z-index: 2; text-transform: uppercase;">${item.sub}</div>
                <div style="margin: 8px 0; flex: 1; display:flex; align-items:center; justify-content:center; position: relative; z-index: 2;">
                    <img src="${item.img}" style="max-height:100px; max-width:90%; object-fit:contain; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.4));" onerror="this.src='16201.png'">
                </div>
                <div style="font-size:13px; font-weight:900; color:#fff; background: rgba(0,0,0,0.6); padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border-color); position: relative; z-index: 2;">${Math.round(item.price)} ⭐</div>
            `;
        }

        function updateChance() {
            const btn = document.getElementById('btnUpgrade');
            const chanceDisplay = document.getElementById('chanceDisplay');
            const centerBars = document.getElementById('centerBars');
            const chanceText = document.getElementById('chanceText');
            
            const boostSlider = document.getElementById('balanceBoostSlider');
            const boostValDisplay = document.getElementById('boostValDisplay');
            const boostMaxDisplay = document.getElementById('boostMaxDisplay');

            if (!selectedLeft || !selectedRight) {
                btn.disabled = true;
                btn.innerText = 'ВЫБЕРИТЕ ПРЕДМЕТЫ';
                chanceDisplay.style.display = 'none';
                centerBars.style.display = 'block';
                document.getElementById('wheelCircle').style.strokeDashoffset = circleCircumference;
                boostSlider.disabled = true;
                return;
            }
            
            boostSlider.disabled = false;
            let maxBoostPossible = balance; 
            let neededFor80 = (parseFloat(selectedRight.price) * 0.8) - parseFloat(selectedLeft.price);
            if (neededFor80 < 0) neededFor80 = 0;
            let maxAllowed = Math.min(maxBoostPossible, neededFor80);
            boostSlider.max = Math.floor(maxAllowed);
            
            let currentBoost = parseFloat(boostSlider.value) || 0;
            boostValDisplay.innerText = Math.floor(currentBoost);
            boostMaxDisplay.innerText = Math.floor(maxAllowed);
            
            // Визуальное обновление ползунка
            const valPercent = ((currentBoost - boostSlider.min) / (boostSlider.max - boostSlider.min)) * 100 || 0;
            boostSlider.style.background = `linear-gradient(to right, var(--accent-main) ${valPercent}%, var(--border-color) ${valPercent}%)`;

            btn.disabled = false;
            btn.innerText = 'АПГРЕЙД';
            btn.style.background = 'var(--accent-main)';
            chanceDisplay.style.display = 'block';
            centerBars.style.display = 'none';

            let chance = ((parseFloat(selectedLeft.price) + currentBoost) / parseFloat(selectedRight.price)) * 100;
            if (chance > 80) chance = 80;
            if (chance < 1) chance = 1;

            chanceText.innerText = chance.toFixed(2) + '%';
            document.getElementById('wheelCircle').style.strokeDashoffset = circleCircumference - (circleCircumference * (chance / 100));
        }

        function executeUpgrade() {
            if (isProcessing || !selectedLeft || !selectedRight) return;
            let currentBoost = parseFloat(document.getElementById('balanceBoostSlider').value) || 0;
            if (currentBoost > balance) { alert('Недостаточно баланса для буста!'); return; }

            let chance = ((parseFloat(selectedLeft.price) + currentBoost) / parseFloat(selectedRight.price)) * 100;
            if (chance > 80) { alert('Максимальный шанс для апгрейда составляет 80%!'); return; }
            
            balance -= currentBoost;
            isProcessing = true;

            const btn = document.getElementById('btnUpgrade');
            const arrowSpinner = document.getElementById('arrowSpinner');
            const isFastUpgrade = document.getElementById('fastUpgradeCheck').checked;
            
            btn.innerText = 'Улучшение...';
            document.getElementById('balanceBoostSlider').disabled = true;
            
            let animationDuration = isFastUpgrade ? 1000 : 4500;
            
            let roll = Math.random() * 100;
            let isWin = roll <= chance;

            let fullRotationDeg = chance * 3.6; 
            let targetSectorDeg = isWin ? (Math.random() * fullRotationDeg) : (fullRotationDeg + Math.random() * (360 - fullRotationDeg));
            let extraSpins = 360 * (Math.floor(Math.random() * 3) + 5); 
            let currentMod = arrowRotation % 360;
            let distance = targetSectorDeg - currentMod;
            if (distance < 0) distance += 360;
            let targetRotation = arrowRotation + extraSpins + distance;

            // Удаляем левый предмет из инвентаря на время крутки
            const indexToRemove = myInventoryData.indexOf(selectedLeft);
            if (indexToRemove !== -1) myInventoryData.splice(indexToRemove, 1);
            
            updateBalanceUI();

            let startTime = performance.now();
            function animate(time) {
                let elapsed = time - startTime;
                if (elapsed > animationDuration) {
                    arrowSpinner.style.transform = `rotate(${targetRotation}deg)`;
                    arrowRotation = targetRotation; 
                    afterSpin(isWin, chance); 
                    return;
                }
                // Cubic bezier ease-out для реалистичности
                let t = elapsed / animationDuration;
                let easeOut = 1 - Math.pow(1 - t, 3);
                let currentRot = arrowRotation + (targetRotation - arrowRotation) * easeOut;
                arrowSpinner.style.transform = `rotate(${currentRot}deg)`;
                requestAnimationFrame(animate);
            }
            requestAnimationFrame(animate);
        }

        // Завершение спина, логика кнопок
        function afterSpin(isWin, chance) {
            isProcessing = false;
            const btn = document.getElementById('btnUpgrade');
            
            if (isWin) {
                btn.style.background = 'var(--rarity-immortal)';
                btn.innerText = 'УСПЕШНО!';
                myInventoryData.push(selectedRight);
            } else {
                btn.style.background = 'var(--rarity-mythic)'; /* Кнопка становится красной */
                btn.innerText = 'СГОРЕЛО';
            }
            
            updateBalanceUI();
            
            setTimeout(() => {
                // Сброс всего в исходное положение (Возвращаем оригинальный цвет)
                btn.style.background = 'var(--accent-main)';
                btn.innerText = 'ВЫБЕРИТЕ ПРЕДМЕТЫ';
                
                selectedLeft = null;
                selectedRight = null;
                
                document.getElementById('slotLeft').innerHTML = `<div class="slot-hint">Ваш предмет</div>`;
                document.getElementById('slotLeft').className = 'item-slot';
                document.getElementById('slotRight').innerHTML = `<div class="slot-hint">Желаемый предмет</div>`;
                document.getElementById('slotRight').className = 'item-slot';
                
                document.getElementById('balanceBoostSlider').value = 0;
                
                updateChance();
                renderGrid();
            }, 2000);
        }

        // Исправленная логика продажи (Комиссия 5%, сумма точная)
        function sellItem(index) {
            let item = myInventoryData[index];
            if (!item) return;
            
            // Комиссия 5%, то есть пользователь получает 95% от заявленной стоимости
            let sellPrice = Math.floor(parseFloat(item.price) * 0.95);
            balance += sellPrice;
            myInventoryData.splice(index, 1);
            
            updateBalanceUI();
            renderProfileInventory();
            renderGrid();
        }

        function renderProfileInventory() {
            const list = document.getElementById('profileSellList');
            list.innerHTML = '';
            
            if (myInventoryData.length === 0) {
                list.innerHTML = `<div style="text-align:center; padding: 20px; color: var(--text-muted);">Инвентарь пуст</div>`;
                return;
            }

            myInventoryData.forEach((item, idx) => {
                let sellPrice = Math.floor(parseFloat(item.price) * 0.95);
                list.innerHTML += `
                    <div class="profile-list-item">
                        <div style="display:flex; align-items:center; gap: 12px;">
                            <img src="${item.img}" style="width: 40px; height: 40px; object-fit: contain;" onerror="this.src='16201.png'">
                            <div>
                                <div class="p-item-name" style="color: #fff; font-weight: bold; font-size: 14px;">${item.sub}</div>
                                <div style="color: var(--text-muted); font-size: 11px;">Цена: ${item.price} ⭐</div>
                            </div>
                        </div>
                        <button class="btn-action btn-sell-item" onclick="sellItem(${idx})">Продать за ${sellPrice} ⭐</button>
                    </div>
                `;
            });
        }

        // Инициализация при старте
        window.onload = () => {
            updateBalanceUI();
            renderGrid();
        };

    </script>
</body>
</html>
