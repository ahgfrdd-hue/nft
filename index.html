<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <title>FlashUpgrader — Premium Site</title>
    <style>
        :root {
            --bg-main: #060608;
            --bg-panel: #0b0b0d;
            --bg-card: #111114;
            --bg-card-hover: #16161a;
            --accent-gold: #cfa830; /* Более строгий золотой цвет как на фото */
            --accent-gold-glow: rgba(207, 168, 48, 0.3);
            --text-main: #ffffff;
            --text-muted: #6c6c75;
            --border-color: #1c1c22;
            
            --rarity-epic: #9b59b6;
            --rarity-legendary: #e67e22;
            --rarity-mythic: #e74c3c;
            --rarity-immortal: #ff007f;
            
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }

        body { background: #0a0a0c; color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }

        /* === ХЕДЕР === */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 24px; background: rgba(10, 10, 12, 0.95); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100;
        }

        .logo-area { display: flex; flex-direction: column; }
        .logo { font-size: 20px; font-weight: 900; color: var(--accent-gold); letter-spacing: 0.5px; }
        .logo span { color: var(--text-main); }
        .online-count { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
        .online-count span { color: #2ecc71; font-weight: bold; }

        .user-area { display: flex; align-items: center; gap: 16px; }
        .balance-block { display: flex; flex-direction: column; align-items: flex-end; }
        .balance-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; }
        .balance { font-size: 15px; font-weight: 800; color: var(--accent-gold); }
        
        .btn-deposit {
            background: var(--accent-gold); color: #000;
            padding: 8px 16px; border: none; border-radius: var(--radius-sm);
            font-size: 12px; font-weight: 800; cursor: pointer; transition: var(--transition);
        }
        .profile-avatar {
            width: 36px; height: 36px; background: #1c1c24; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px;
        }

        /* === ОСНОВНОЙ КОНТЕНТ === */
        main { flex: 1; display: flex; flex-direction: column; padding: 20px 16px; gap: 24px; max-width: 650px; width: 100%; margin: 0 auto; }

        /* === АРЕНА АПГРЕЙДА === */
        .upgrade-arena {
            background: #0f0f13; border: 1px solid #1a1a22; border-radius: var(--radius-lg);
            padding: 24px 20px; display: flex; flex-direction: column; align-items: center; gap: 24px;
            position: relative; transition: background 0.4s ease;
        }
        .upgrade-arena.win-state { background: #112918 !important; border-color: #2ecc71; }
        .upgrade-arena.fail-state { background: #2b1111 !important; border-color: #e74c3c; }

        /* ДИЗАЙН СЛОТОВ ТОЧЬ-В-ТОЧЬ КАК НА ВТОРОМ ФОТО */
        .slots-container { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; width: 100%; z-index: 2; }
        
        .item-slot {
            background: #141419; border: 1px solid #202028; border-radius: var(--radius-md);
            height: 160px; display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 16px 12px; text-align: center; transition: var(--transition); cursor: pointer;
            position: relative; overflow: hidden;
        }
        .item-slot:hover { background: #18181f; border-color: #2c2c36; }
        .item-slot.active { border: 1px solid rgba(207, 168, 48, 0.4); background: #18181f; }
        
        .slot-bg-weapon {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 120%; height: 120%; z-index: 0; opacity: 0.03; pointer-events: none;
            /* Силуэт автомата */
            background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 40" xmlns="http://www.w3.org/2000/svg"><path d="M10,25 h40 l5,-5 h25 v4 h-10 v4 h-25 v4 h-35 z" fill="%23ffffff"/></svg>');
            background-size: contain; background-repeat: no-repeat; background-position: center;
        }

        .slot-content-wrapper { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; width: 100%; height: 100%; }
        .slot-title { font-size: 13px; font-weight: 700; color: #fff; line-height: 1.2; margin-top: 4px; }
        .slot-subtext { font-size: 11px; color: #6c6c75; margin-top: 4px; font-weight: 500; }
        .slot-icon-container { flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
        
        /* Стили стрелок в слотах */
        .chevron-icon { width: 44px; height: 50px; }
        .ch-light { fill: #f3c942; }
        .ch-mid { fill: #c09d30; }
        .ch-dark { fill: #8a7122; }

        /* Стили заполненного слота */
        .slot-filled-price { font-size: 12px; font-weight: 800; color: var(--accent-gold); position: absolute; top: 12px; }
        .slot-filled-img { margin-top: 16px; height: 75px; display: flex; align-items: center; }
        .slot-filled-img img { max-height: 70px; }
        .slot-filled-name { font-size: 12px; font-weight: 700; color: #fff; margin-top: 8px; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* === КРУГ АПГРЕЙДА === */
        .wheel-container { position: relative; width: 240px; height: 240px; margin: 10px 0; display: flex; align-items: center; justify-content: center; z-index: 2; }
        .wheel-box { width: 100%; height: 100%; position: relative; }
        .wheel-svg { transform: rotate(-90deg); width: 100%; height: 100%; } 
        
        .wheel-progress { stroke-dasharray: 534; stroke-dashoffset: 534; stroke-linecap: butt; transition: stroke-dashoffset 0.4s ease; }
        .arrow-spinner-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 15; }
        .wheel-arrow { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 20px; height: 32px; filter: drop-shadow(0 0 6px rgba(207, 168, 48, 0.5)); }

        .wheel-center-content {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; height: 100%; z-index: 5; text-align: center; pointer-events: none;
        }

        #chanceDisplay h1 { font-size: 32px; font-weight: 900; color: #ffffff; }
        #chanceDisplay p { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }

        /* Кнопка как на фото */
        .action-block { width: 100%; display: flex; flex-direction: column; gap: 12px; z-index: 2; }
        .btn-upgrade {
            background: #9b8a34; /* Горчичный цвет как на 2-м фото */
            color: #111; border: none; padding: 16px; font-size: 16px; font-weight: 800;
            border-radius: var(--radius-sm); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: var(--transition); text-transform: none;
        }
        .btn-upgrade:hover:not(:disabled) { background: #b09e3e; }
        .btn-upgrade:disabled { background: #1c1c22; color: #4c4c54; cursor: not-allowed; }
        .btn-icon-up { width: 18px; height: 18px; fill: currentColor; }

        /* === ИНВЕНТАРЬ И ТАБЫ === */
        .inventory-section { background: #0f0f13; border: 1px solid #1a1a22; border-radius: var(--radius-lg); display: flex; flex-direction: column; overflow: hidden; }
        .tabs-header { display: flex; background: #0a0a0c; border-bottom: 1px solid #1a1a22; padding: 6px; gap: 6px; }
        .tab-btn { flex: 1; padding: 12px; background: transparent; border: none; color: var(--text-muted); font-size: 12px; font-weight: 700; border-radius: var(--radius-sm); cursor: pointer; transition: var(--transition); text-transform: uppercase; }
        .tab-btn.active { color: #fff; background: #141419; }
        .items-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 16px; max-height: 400px; overflow-y: auto; }
        .item-card { background: #141419; border: 1px solid #202028; border-radius: var(--radius-md); padding: 10px; display: flex; flex-direction: column; align-items: center; position: relative; cursor: pointer; transition: var(--transition); }
        .item-card:hover { background: #1a1a22; transform: translateY(-3px); }
        .item-price { font-size: 10px; font-weight: 800; color: var(--accent-gold); align-self: flex-end; background: rgba(0,0,0,0.5); padding: 4px 6px; border-radius: 4px; }
        .item-img-container { width: 100%; height: 75px; display: flex; align-items: center; justify-content: center; margin: 4px 0; }
        .item-img-container img { max-width: 90%; max-height: 90%; object-fit: contain; }
        .item-info { text-align: center; width: 100%; }
        .item-title { font-size: 9px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; }
        .item-sub { font-size: 11px; font-weight: 700; color: #fff; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; margin-top: 2px; }

        .rarity-epic { border-bottom: 3px solid var(--rarity-epic); }
        .rarity-legendary { border-bottom: 3px solid var(--rarity-legendary); }
        .rarity-mythic { border-bottom: 3px solid var(--rarity-mythic); }
        .rarity-immortal { border-bottom: 3px solid var(--rarity-immortal); }

        /* === ТЕХНОЛОГИЧНЫЙ ФУТЕР === */
        footer {
            margin-top: auto; background: #070709; border-top: 1px solid var(--border-color);
            padding: 20px 16px; display: flex; flex-direction: column; align-items: center; gap: 16px;
        }
        .footer-top { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 650px; }
        .tg-link-btn {
            display: inline-flex; align-items: center; gap: 8px; background: #14141a;
            border: 1px solid #23232b; padding: 8px 14px; border-radius: var(--radius-sm);
            color: #fff; font-size: 12px; font-weight: 700; text-decoration: none; transition: var(--transition);
        }
        .tg-link-btn:hover { background: #1a1a24; border-color: var(--accent-gold); }
        .tg-icon { width: 16px; height: 16px; fill: #0088cc; }
        .lang-switcher { display: flex; background: #0d0d11; border: 1px solid #1a1a22; padding: 2px; border-radius: 6px; gap: 2px; }
        .lang-btn { background: transparent; border: none; color: var(--text-muted); font-size: 11px; font-weight: 800; padding: 6px 10px; border-radius: 4px; cursor: pointer; }
        .lang-btn.active { background: #1a1a22; color: #fff; }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <div class="logo">FLASH<span>UPGRADER</span></div>
            <div class="online-count"><span id="lblOnline">Онлайн</span>: <span id="onlineCount">1 742</span></div>
        </div>
        <div class="user-area">
            <div class="balance-block">
                <span class="balance-label" id="lblBalance">Баланс</span>
                <div class="balance" id="userBalance">0.00 ₽</div>
            </div>
            <button class="btn-deposit" id="btnDepositTop">Пополнить</button>
            <div class="profile-avatar">👤</div>
        </div>
    </header>

    <main>
        <section class="upgrade-arena" id="arenaBox">
            <div class="slots-container">
                <div class="item-slot" id="slotLeft" onclick="switchTab('my')"></div>
                <div class="item-slot" id="slotRight" onclick="switchTab('shop')"></div>
            </div>

            <div class="wheel-container">
                <div class="arrow-spinner-wrapper" id="arrowSpinner">
                    <svg class="wheel-arrow" viewBox="0 0 24 40" xmlns="http://www.w3.org/2000/svg">
                        <defs><linearGradient id="arrowGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#ffea00" /><stop offset="100%" stop-color="#d4af37" /></linearGradient></defs>
                        <path d="M12 0 L24 24 L16 20 L16 40 L8 40 L8 20 L0 24 Z" fill="url(#arrowGrad)"/>
                    </svg>
                </div>
                <div class="wheel-box">
                    <svg class="wheel-svg" viewBox="0 0 260 260">
                        <defs><linearGradient id="progressGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#cfa830" /><stop offset="100%" stop-color="#d35400" /></linearGradient></defs>
                        <circle cx="130" cy="130" r="120" fill="none" stroke="#1c1c22" stroke-width="4" stroke-dasharray="2 18" />
                        <circle cx="130" cy="130" r="100" fill="#0d0d11" />
                        <circle cx="130" cy="130" r="85" fill="none" stroke="#16161a" stroke-width="24" />
                        <circle class="wheel-progress" id="wheelCircle" cx="130" cy="130" r="85" fill="none" stroke="url(#progressGrad)" stroke-width="24" />
                    </svg>
                    <div class="wheel-center-content">
                        <svg id="centerChevrons" width="40" height="40" viewBox="0 0 40 40" style="display: block;">
                            <path d="M4 26 L20 10 L36 26" stroke="#8a7122" stroke-width="5" stroke-linecap="square" fill="none"/>
                            <path d="M4 36 L20 20 L36 36" stroke="#f3c942" stroke-width="5" stroke-linecap="square" fill="none"/>
                        </svg>
                        <div class="chance-display" id="chanceDisplay" style="display: none;">
                            <h1 id="chanceText">0.00%</h1>
                            <p id="lblChanceText">шанс</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="action-block">
                <button class="btn-upgrade" id="btnUpgrade" onclick="executeUpgrade()" disabled>
                    <svg class="btn-icon-up" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 4l-8 8h16z"/><path d="M12 12l-8 8h16z"/>
                    </svg>
                    <span id="btnUpgradeText">Выберите подарки</span>
                </button>
            </div>
        </section>

        <section class="inventory-section">
            <div class="tabs-header">
                <button class="tab-btn active" id="tabMy" onclick="switchTab('my')">МОЙ ИНВЕНТАРЬ</button>
                <button class="tab-btn" id="tabShop" onclick="switchTab('shop')">МАГАЗИН ПОДАРКОВ</button>
            </div>
            <div class="items-grid" id="gridContent"></div>
        </section>
    </main>

    <footer>
        <div class="footer-top">
            <div style="font-size: 11px; color: var(--text-muted);">© 2026 FLASHUPGRADER</div>
            <a href="https://t.me/om1a2" target="_blank" class="tg-link-btn">
                <svg class="tg-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69a.2.2 0 0 0-.05-.18c-.06-.05-.14-.03-.21-.02-.09.02-1.49.95-4.22 2.79-.4.27-.76.41-1.08.4-.36-.01-1.04-.2-1.55-.37-.63-.2-1.12-.31-1.08-.66.02-.18.27-.36.74-.55 2.92-1.27 4.86-2.11 5.83-2.51 2.78-1.16 3.35-1.36 3.73-1.36.08 0 .27.02.39.12.1.08.13.19.14.27-.01.06.01.24 0 .38z"/></svg>
                <span>Telegram Support</span>
            </a>
            <div class="lang-switcher">
                <button class="lang-btn active" id="btnLangRU" onclick="changeLanguage('ru')">RU</button>
                <button class="lang-btn" id="btnLangEN" onclick="changeLanguage('en')">EN</button>
            </div>
        </div>
    </footer>

    <audio id="soundSpin" src="spin.mp3" preload="auto" loop></audio>

    <script>
        // === НАДЁЖНАЯ ЗАГРУЗКА (ЧТОБЫ НИЧЕГО НЕ ЛОМАЛОСЬ) ===
        document.addEventListener('DOMContentLoaded', () => {
            try {
                initApp();
            } catch (error) {
                console.error("Критическая ошибка при загрузке:", error);
                alert("Произошла ошибка при загрузке данных. Мы сбросили настройки инвентаря для восстановления работы.");
                localStorage.removeItem('ub_inv');
                localStorage.removeItem('ub_balance');
                location.reload();
            }
        });

        // База подарков
        const giftPool = [
            { id: 'frog_purple', title: 'ПРЕМИУМ ПОДАРОК', sub: 'Аметистовый Харт', price: '4500.00', rarity: 'rarity-epic', img: '16246.png' },
            { id: 'frog_aqua', title: 'ПРЕМИУМ ПОДАРОК', sub: 'Бирюзовый Лав', price: '8900.00', rarity: 'rarity-legendary', img: '16245.png' },
            { id: 'frog_love', title: 'ПРЕМИУМ ПОДАРОК', sub: 'Влюбленный Пепе', price: '12500.00', rarity: 'rarity-mythic', img: '16248.png' },
            { id: 'frog_glitter', title: 'ПРЕМИУМ ПОДАРОК', sub: 'Звездный Блеск', price: '24000.00', rarity: 'rarity-immortal', img: '16247.png' }
        ];

        const translations = {
            ru: {
                online: "Онлайн", balance: "Баланс", 
                leftTitle: "ВЫБЕРИ СВОЙ ПОДАРОК", leftSub: "Можно выбрать несколько",
                rightTitle: "ВЫБЕРИТЕ ЦЕЛЬ", rightSub: "",
                chanceText: "шанс", btnChoose: "ВЫБЕРИТЕ ПОДАРКИ", btnUpgrade: "Upgrade",
                tabMy: "МОЙ ИНВЕНТАРЬ", tabShop: "МАГАЗИН ПОДАРКОВ", emptyInv: "Инвентарь пуст."
            },
            en: {
                online: "Online", balance: "Balance", 
                leftTitle: "SELECT ITEMS TO USE", leftSub: "You can select multiple items",
                rightTitle: "SELECT ITEM FOR UPGRADE", rightSub: "",
                chanceText: "chance", btnChoose: "CHOOSE GIFTS", btnUpgrade: "Upgrade",
                tabMy: "MY INVENTORY", tabShop: "GIFT SHOP", emptyInv: "Inventory is empty."
            }
        };

        let currentLang = 'ru';
        let balance = 0;
        let myInventoryData = [];
        let currentTab = 'my';
        let selectedLeft = null;
        let selectedRight = null;
        let isProcessing = false;
        let arrowRotation = 0; 
        const circleCircumference = 534; 
        let audioContext, analyserNode, sourceNode, dataArray, isAudioSetup = false;

        function initApp() {
            // Безопасное чтение данных
            balance = parseFloat(localStorage.getItem('ub_balance')) || 5643.51;
            try {
                let savedInv = localStorage.getItem('ub_inv');
                myInventoryData = savedInv ? JSON.parse(savedInv) : [giftPool[0], giftPool[1], giftPool[2]];
            } catch (e) {
                myInventoryData = [giftPool[0], giftPool[1], giftPool[2]];
            }

            updateBalanceUI();
            changeLanguage('ru');
            switchTab('my');
        }

        function saveData() {
            localStorage.setItem('ub_balance', balance);
            localStorage.setItem('ub_inv', JSON.stringify(myInventoryData));
        }

        function updateBalanceUI() { 
            document.getElementById('userBalance').innerText = balance.toFixed(2).replace(/\d(?=(\d{3})+\.)/g, '$& ') + ' ₽'; 
        }

        function changeLanguage(lang) {
            currentLang = lang;
            document.getElementById('btnLangRU').classList.toggle('active', lang === 'ru');
            document.getElementById('btnLangEN').classList.toggle('active', lang === 'en');
            
            const t = translations[lang];
            document.getElementById('lblOnline').innerText = t.online;
            document.getElementById('lblBalance').innerText = t.balance;
            document.getElementById('tabMy').innerText = t.tabMy;
            document.getElementById('tabShop').innerText = t.tabShop;
            document.getElementById('lblChanceText').innerText = t.chanceText;

            // Перерисовка пустых слотов с правильным языком
            if (!selectedLeft) resetSlotUI('slotLeft', t.leftTitle, t.leftSub, 'left');
            if (!selectedRight) resetSlotUI('slotRight', t.rightTitle, t.rightSub, 'right');

            updateChance(); // Обновит текст кнопки
            renderGrid();
        }

        // === ИДЕАЛЬНАЯ ОТРИСОВКА ПУСТЫХ СЛОТОВ ===
        function resetSlotUI(slotId, title, subtext, type) {
            const slot = document.getElementById(slotId);
            slot.classList.remove('active');
            
            // Тройные шевроны: Вниз для левого, Вверх для правого
            const chevronsSVG = type === 'left' ? `
                <svg class="chevron-icon" viewBox="0 0 24 30" xmlns="http://www.w3.org/2000/svg">
                    <path class="ch-light" d="M2 6l10 8 10-8-2-2-8 6-8-6z"/>
                    <path class="ch-mid" d="M2 14l10 8 10-8-2-2-8 6-8-6z"/>
                    <path class="ch-dark" d="M2 22l10 8 10-8-2-2-8 6-8-6z"/>
                </svg>
            ` : `
                <svg class="chevron-icon" viewBox="0 0 24 30" xmlns="http://www.w3.org/2000/svg">
                    <path class="ch-dark" d="M12 2L2 10l2 2 8-6 8 6 2-2z"/>
                    <path class="ch-mid" d="M12 10L2 18l2 2 8-6 8 6 2-2z"/>
                    <path class="ch-light" d="M12 18L2 26l2 2 8-6 8 6 2-2z"/>
                </svg>
            `;

            slot.innerHTML = `
                <div class="slot-bg-weapon"></div>
                <div class="slot-content-wrapper">
                    <div class="slot-title">${title}</div>
                    ${subtext ? `<div class="slot-subtext">${subtext}</div>` : ''}
                    <div class="slot-icon-container">${chevronsSVG}</div>
                </div>
            `;
        }

        function renderGrid() {
            const grid = document.getElementById('gridContent');
            grid.innerHTML = '';
            const activeData = currentTab === 'my' ? myInventoryData : giftPool;

            if(activeData.length === 0) {
                grid.innerHTML = `<div style="grid-column:span 3;text-align:center;padding:30px;color:var(--text-muted); font-size: 12px;">${translations[currentLang].emptyInv}</div>`;
                return;
            }

            activeData.forEach((item, idx) => {
                grid.innerHTML += `
                    <div class="item-card ${item.rarity}" onclick="selectItem(${idx})">
                        <div class="item-price">${Math.round(item.price)} ₽</div>
                        <div class="item-img-container"><img src="${item.img}"></div>
                        <div class="item-info">
                            <div class="item-title">${item.title}</div>
                            <div class="item-sub">${item.sub}</div>
                        </div>
                    </div>
                `;
            });
        }

        window.switchTab = function(tab) {
            currentTab = tab;
            document.getElementById('tabMy').classList.toggle('active', tab === 'my');
            document.getElementById('tabShop').classList.toggle('active', tab === 'shop');
            renderGrid();
        }

        window.selectItem = function(index) {
            if (isProcessing) return;
            const item = currentTab === 'my' ? myInventoryData[index] : giftPool[index];
            if (currentTab === 'my') { 
                selectedLeft = item; renderFilledSlot('slotLeft', item); 
            } else { 
                selectedRight = item; renderFilledSlot('slotRight', item); 
            }
            updateChance();
        }

        function renderFilledSlot(slotId, item) {
            const slot = document.getElementById(slotId);
            slot.classList.add('active');
            slot.innerHTML = `
                <div class="slot-filled-price">${Math.round(item.price)} ₽</div>
                <div class="slot-filled-img"><img src="${item.img}"></div>
                <div class="slot-filled-name">${item.sub}</div>
            `;
        }

        function updateChance() {
            const btn = document.getElementById('btnUpgrade');
            const btnText = document.getElementById('btnUpgradeText');
            const chevrons = document.getElementById('centerChevrons');
            const chanceDisplay = document.getElementById('chanceDisplay');
            const t = translations[currentLang];

            if (!selectedLeft || !selectedRight) {
                btn.disabled = true;
                btnText.innerText = t.btnChoose;
                chevrons.style.display = 'block';
                chanceDisplay.style.display = 'none';
                document.getElementById('wheelCircle').style.strokeDashoffset = circleCircumference;
                return;
            }
            
            btn.disabled = false;
            btnText.innerText = t.btnUpgrade;
            chevrons.style.display = 'none';
            chanceDisplay.style.display = 'block';

            let chance = (parseFloat(selectedLeft.price) / parseFloat(selectedRight.price)) * 100;
            if (chance > 95) chance = 95;
            if (chance < 1) chance = 1;

            document.getElementById('chanceText').innerText = chance.toFixed(2) + '%';
            document.getElementById('wheelCircle').style.strokeDashoffset = circleCircumference - (circleCircumference * (chance / 100));
        }

        // Audio setup and spin logic ...
        function setupAudioAnalysis() {
            if (isAudioSetup) return;
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyserNode = audioContext.createAnalyser();
                const soundSpin = document.getElementById('soundSpin');
                sourceNode = audioContext.createMediaElementSource(soundSpin);
                sourceNode.connect(analyserNode);
                analyserNode.connect(audioContext.destination);
                analyserNode.fftSize = 256;
                dataArray = new Uint8Array(analyserNode.frequencyBinCount);
                isAudioSetup = true;
            } catch (e) { console.warn("Аудио недоступно: ", e); }
        }

        window.executeUpgrade = function() {
            if (isProcessing || !selectedLeft || !selectedRight) return;
            setupAudioAnalysis();

            isProcessing = true;
            const btnText = document.getElementById('btnUpgradeText');
            const arrowSpinner = document.getElementById('arrowSpinner');
            const soundSpin = document.getElementById('soundSpin');
            
            btnText.innerText = 'Upgrading...';
            soundSpin.play().catch(() => {});

            let chance = (parseFloat(selectedLeft.price) / parseFloat(selectedRight.price)) * 100;
            if (chance > 95) chance = 95;
            if (chance < 1) chance = 1;
            
            let isWin = Math.random() * 100 <= chance;
            let orangeArcDeg = chance * 3.6; 
            let targetSectorDeg = isWin ? (Math.random() * orangeArcDeg) : (orangeArcDeg + Math.random() * (360 - orangeArcDeg)); 
            
            let targetRotation = arrowRotation + (360 * 6) + targetSectorDeg;
            let startRotation = arrowRotation; 

            // Удаляем предмет
            const indexToRemove = myInventoryData.indexOf(selectedLeft);
            if (indexToRemove !== -1) myInventoryData.splice(indexToRemove, 1);

            let animationDuration = 3500; 
            let animationStartTime = performance.now();

            function animateRotation(timestamp) {
                let elapsed = timestamp - animationStartTime;
                
                if (elapsed > animationDuration) {
                    arrowSpinner.style.transform = `rotate(${targetRotation}deg)`;
                    arrowRotation = targetRotation % 360; 
                    soundSpin.pause(); soundSpin.currentTime = 0;
                    afterSpin(isWin);
                    return;
                }

                let t = 1 - (elapsed / animationDuration);
                let currentBaseRotation = startRotation + (targetRotation - startRotation) * (1 - t * t * t);
                
                // Легкая вибрация если аудио работает
                let jitter = 0;
                if(isAudioSetup) {
                    analyserNode.getByteTimeDomainData(dataArray);
                    let vol = dataArray[0] / 128 - 1;
                    jitter = vol * 3;
                }

                arrowSpinner.style.transform = `rotate(${currentBaseRotation + jitter}deg)`;
                requestAnimationFrame(animateRotation);
            }
            requestAnimationFrame(animateRotation);
        }

        function afterSpin(isWin) {
            const btnText = document.getElementById('btnUpgradeText');
            const arena = document.getElementById('arenaBox');
            const t = translations[currentLang];
            
            btnText.innerText = isWin ? 'УСПЕШНО!' : 'СГОРЕЛО!';
            arena.classList.add(isWin ? 'win-state' : 'fail-state');

            if (isWin) {
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                myInventoryData.push(selectedRight);
            } else {
                document.getElementById('chanceText').innerText = '0.00%';
                document.getElementById('wheelCircle').style.strokeDashoffset = 534;
            }

            saveData();
            updateBalanceUI();

            setTimeout(() => {
                arena.className = 'upgrade-arena';
                selectedLeft = null; selectedRight = null;
                
                resetSlotUI('slotLeft', t.leftTitle, t.leftSub, 'left');
                resetSlotUI('slotRight', t.rightTitle, t.rightSub, 'right');
                
                updateChance();
                renderGrid();
                isProcessing = false;
            }, 2000);
        }
    </script>
</body>
</html>
