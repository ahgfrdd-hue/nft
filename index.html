<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashUpgrader</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; user-select: none; }
        
        body { 
            background-color: #080a10; 
            /* Подключаем твою картинку с затемнением для строгости */
            background-image: linear-gradient(rgba(8, 10, 16, 0.85), rgba(8, 10, 16, 0.95)), url('16148.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff; 
            display: flex; 
            min-height: 100vh; 
            overflow-x: hidden; 
        }

        /* Лайв лента слева */
        .live-feed { width: 90px; height: 100vh; background: rgba(14, 16, 24, 0.8); border-right: 1px solid #1f2335; position: fixed; left: 0; top: 0; display: flex; flex-direction: column; align-items: center; padding-top: 15px; z-index: 100; backdrop-filter: blur(10px); overflow: hidden; }
        .live-item { width: 60px; height: 60px; background: #181b28; border: 1px solid #282c40; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: center; align-items: center; animation: slideDown 0.5s ease-out; font-size: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        @keyframes slideDown { from { transform: translateY(-80px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Основной блок */
        .main-wrapper { margin-left: 90px; width: calc(100% - 90px); display: flex; flex-direction: column; align-items: center; padding-bottom: 50px; }

        header { width: 100%; padding: 15px 40px; background: rgba(14, 16, 24, 0.9); border-bottom: 1px solid #1f2335; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(10px); }
        .logo { color: #00ff88; font-size: 22px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }
        .btn-profile { background: #181b28; border: 1px solid #282c40; color: #fff; padding: 10px 20px; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-profile:hover { background: #23273e; border-color: #00ff88; }

        /* Зона Апгрейда */
        .upgrade-section { display: flex; justify-content: center; align-items: center; gap: 40px; margin-top: 60px; width: 100%; max-width: 1000px; }

        .item-box { width: 240px; height: 320px; background: rgba(20, 23, 33, 0.7); border: 1px solid #282c40; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; backdrop-filter: blur(5px); box-shadow: 0 15px 35px rgba(0,0,0,0.4); transition: 0.3s; }
        .item-box.active { border-color: #00ff88; box-shadow: 0 0 25px rgba(0, 255, 136, 0.15); background: rgba(20, 23, 33, 0.9); }
        .box-title { position: absolute; top: 15px; font-size: 11px; color: #7a82a6; text-transform: uppercase; letter-spacing: 1px; font-weight: 800; }
        .item-emoji { font-size: 80px; margin: 30px 0 15px 0; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5)); }
        .item-price { font-size: 22px; font-weight: 800; color: #ffd700; }
        .item-name { color: #8a92b6; font-size: 13px; margin-top: 8px; text-align: center; padding: 0 10px; }

        /* Центральная часть с рулеткой */
        .center-module { display: flex; flex-direction: column; align-items: center; width: 300px; }
        
        .roulette-circle { width: 220px; height: 220px; border-radius: 50%; background: #0f111a; border: 8px solid #1a1d29; position: relative; display: flex; justify-content: center; align-items: center; box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 0 30px rgba(0,0,0,0.5); }
        .chance-fill { position: absolute; width: 100%; height: 100%; border-radius: 50%; z-index: 1; transition: background 0.3s; }
        .inner-hole { position: absolute; width: 170px; height: 170px; background: #0f111a; border-radius: 50%; z-index: 2; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 2px solid #1a1d29; }
        
        .arrow-spinner { position: absolute; width: 100%; height: 100%; z-index: 3; transition: transform 8s cubic-bezier(0.05, 0.9, 0.1, 1); }
        .arrow-indicator { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-bottom: 25px solid #fff; filter: drop-shadow(0 0 8px rgba(255,255,255,0.6)); }

        .chance-text { font-size: 32px; font-weight: 800; z-index: 4; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .chance-sub { font-size: 11px; color: #7a82a6; z-index: 4; text-transform: uppercase; font-weight: 600; letter-spacing: 1px; }

        .btn-play { background: #00ff88; color: #080a10; border: none; padding: 18px 0; width: 100%; border-radius: 8px; font-size: 16px; font-weight: 800; text-transform: uppercase; cursor: pointer; margin-top: 25px; transition: 0.2s; box-shadow: 0 5px 20px rgba(0, 255, 136, 0.2); letter-spacing: 1px; }
        .btn-play:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0, 255, 136, 0.4); background: #00e67a; }
        .btn-play:disabled { background: #1a1d29; color: #4a506b; cursor: not-allowed; box-shadow: none; }

        /* Зеленая штука (Множители) строго внизу */
        .multiplier-bar { display: flex; justify-content: center; gap: 8px; margin-top: 15px; width: 100%; }
        .mult-btn { background: rgba(0, 255, 136, 0.1); border: 1px solid #00ff88; color: #00ff88; padding: 8px 15px; border-radius: 6px; font-size: 12px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .mult-btn:hover { background: #00ff88; color: #080a10; }

        /* Секция с 3 вкладками */
        .tabs-section { margin-top: 60px; width: 100%; max-width: 1000px; }
        .tabs-header { display: flex; gap: 10px; border-bottom: 1px solid #282c40; padding-bottom: 15px; margin-bottom: 25px; }
        .tab-btn { background: none; border: none; color: #7a82a6; font-size: 15px; font-weight: 600; cursor: pointer; padding: 10px 20px; transition: 0.2s; border-radius: 6px; text-transform: uppercase; letter-spacing: 1px; }
        .tab-btn:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .tab-btn.active { color: #080a10; background: #00ff88; font-weight: 800; }
        
        .tab-balance { margin-left: auto; display: flex; align-items: center; color: #ffd700; font-weight: 800; font-size: 16px; background: rgba(255, 215, 0, 0.1); padding: 0 15px; border-radius: 6px; border: 1px solid rgba(255, 215, 0, 0.2); }

        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .grid-card { background: rgba(20, 23, 33, 0.6); border: 1px solid #282c40; border-radius: 10px; padding: 20px 10px; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.2s; position: relative; }
        .grid-card:hover { border-color: #00ff88; background: rgba(20, 23, 33, 0.9); transform: translateY(-3px); }
        .grid-card.selected { border-color: #00ff88; box-shadow: inset 0 0 15px rgba(0,255,136,0.1); }
        .card-emoji { font-size: 45px; margin-bottom: 12px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4)); }
        .card-price { font-weight: 800; color: #ffd700; font-size: 15px; }
        .card-name { font-size: 11px; color: #7a82a6; margin-top: 6px; text-align: center; text-transform: uppercase; }
        .buy-action { margin-top: 12px; width: 100%; background: #282c40; color: #fff; border: none; padding: 6px; border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .grid-card:hover .buy-action { background: #00ff88; color: #080a10; }

        /* Профиль Модалка */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 200; }
        .modal-content { background: #141721; border: 1px solid #282c40; border-radius: 12px; width: 400px; padding: 30px; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .close-btn { position: absolute; top: 15px; right: 15px; background: none; border: none; color: #7a82a6; font-size: 20px; cursor: pointer; }
        
        .stat-line { display: flex; justify-content: space-between; border-bottom: 1px solid #282c40; padding: 10px 0; color: #8a92b6; font-size: 14px; }
        .stat-line b { color: #fff; }

        .deposit-zone { margin-top: 25px; padding: 20px; background: rgba(0, 255, 136, 0.05); border: 1px dashed #00ff88; border-radius: 8px; text-align: center; }
        .btn-tg { background: #2AABEE; color: #fff; text-decoration: none; padding: 10px 20px; border-radius: 6px; font-weight: 600; display: inline-block; margin-top: 15px; font-size: 13px; }
    </style>
</head>
<body>

    <audio id="s-spin" src="spin.mp3"></audio>
    <audio id="s-win" src="win.mp3"></audio>
    <audio id="s-lose" src="lose.mp3"></audio>

    <div class="live-feed" id="live-feed"></div>

    <div class="main-wrapper">
        <header>
            <div class="logo">FLASH<span style="color:#fff;">UPGRADER</span></div>
            <button class="btn-profile" onclick="document.getElementById('profileModal').style.display='flex'">Профиль</button>
        </header>

        <div class="upgrade-section">
            <div class="item-box" id="box-src">
                <div class="box-title">Ваш предмет</div>
                <div class="item-emoji" id="src-img">❓</div>
                <div class="item-price" id="src-price">-</div>
                <div class="item-name" id="src-name">Выберите в инвентаре</div>
            </div>

            <div class="center-module">
                <div class="roulette-circle">
                    <div class="chance-fill" id="chance-bg"></div>
                    <div class="inner-hole">
                        <div class="chance-text" id="chance-val">0%</div>
                        <div class="chance-sub">Шанс</div>
                    </div>
                    <div class="arrow-spinner" id="arrow">
                        <div class="arrow-indicator"></div>
                    </div>
                </div>
                
                <button class="btn-play" id="btn-play" onclick="startPlay()" disabled>Апгрейд</button>
                
                <div class="multiplier-bar">
                    <button class="mult-btn" onclick="calcTarget(1.5)">1.5X</button>
                    <button class="mult-btn" onclick="calcTarget(2)">2X</button>
                    <button class="mult-btn" onclick="calcTarget(5)">5X</button>
                    <button class="mult-btn" onclick="calcTarget(10)">10X</button>
                </div>
            </div>

            <div class="item-box" id="box-tgt">
                <div class="box-title">Цель апгрейда</div>
                <div class="item-emoji" id="tgt-img">❓</div>
                <div class="item-price" id="tgt-price">-</div>
                <div class="item-name" id="tgt-name">Выберите цель</div>
            </div>
        </div>

        <div class="tabs-section">
            <div class="tabs-header">
                <button class="tab-btn active" id="tab1" onclick="switchTab('inv')">Инвентарь</button>
                <button class="tab-btn" id="tab2" onclick="switchTab('shop')">Магазин</button>
                <button class="tab-btn" id="tab3" onclick="switchTab('targets')">Цели (Апгрейд)</button>
                <div class="tab-balance" id="ui-balance">0 ⭐️</div>
            </div>
            <div class="items-grid" id="grid-content"></div>
        </div>
    </div>

    <div class="modal" id="profileModal">
        <div class="modal-content">
            <button class="close-btn" onclick="document.getElementById('profileModal').style.display='none'">✖</button>
            <h2 style="margin-bottom: 20px; font-weight: 800;">Профиль</h2>
            
            <div class="stat-line">Никнейм: <b id="p-name"></b></div>
            <div class="stat-line">Игр сыграно: <b id="p-games"></b></div>
            <div class="stat-line">Успешных: <b id="p-wins" style="color:#00ff88;"></b></div>
            
            <div class="deposit-zone">
                <div style="font-size: 14px; color: #fff; font-weight: 600; margin-bottom: 8px;">ПОПОЛНЕНИЕ БАЛАНСА</div>
                <div style="font-size: 12px; color: #8a92b6; line-height: 1.5;">
                    Киньте подарок в Flashgram от 5.000 звезд. Для зачисления обратитесь в поддержку.
                </div>
                <a href="https://t.me/om1a2" target="_blank" class="btn-tg">Написать @om1a2</a>
            </div>
        </div>
    </div>

    <script>
        // База с добавленным подарком
        const DB = [
            { id: 1, name: "Звезда", price: 100, img: "⭐️" },
            { id: 2, name: "Елка", price: 250, img: "🎄" },
            { id: 3, name: "Сердце", price: 1000, img: "💛" },
            { id: 4, name: "Лягушка", price: 5000, img: "🐸" },
            { id: 5, name: "Корона", price: 15000, img: "👑" },
            { id: 6, name: "Дракон", price: 25000, img: "🐉" },
            { id: 7, name: "Алмаз", price: 50000, img: "💎" },
            { id: 8, name: "Ракета", price: 100000, img: "🚀" },
            { id: 9, name: "Секретный Подарок", price: 250000, img: "🎁" }
        ];

        let user = { name: "Гость", balance: 0, inv: [], games: 0, wins: 0 };
        let activeTab = 'inv';
        let srcItem = null;
        let tgtItem = null;
        let spinning = false;
        let deg = 0;

        window.onload = () => {
            let s = localStorage.getItem('upgStrict');
            if(s) {
                user = JSON.parse(s);
            } else {
                user.name = prompt("Ваш никнейм:") || "Игрок";
                user.balance = 5000;
                alert("Бонус! Фрибет 5000 ⭐️ зачислен.");
                save();
            }
            updateView();
            switchTab('inv');
        };

        function save() { localStorage.setItem('upgStrict', JSON.stringify(user)); }

        function updateView() {
            document.getElementById('ui-balance').innerText = user.balance.toLocaleString() + " ⭐️";
            document.getElementById('p-name').innerText = user.name;
            document.getElementById('p-games').innerText = user.games;
            document.getElementById('p-wins').innerText = user.wins;

            // Левый блок
            if(srcItem) {
                document.getElementById('src-img').innerText = srcItem.img;
                document.getElementById('src-price').innerText = srcItem.price + " ⭐️";
                document.getElementById('src-name').innerText = srcItem.name;
                document.getElementById('box-src').classList.add('active');
            } else {
                document.getElementById('src-img').innerText = "❓";
                document.getElementById('src-price').innerText = "-";
                document.getElementById('src-name').innerText = "Выберите в инвентаре";
                document.getElementById('box-src').classList.remove('active');
            }

            // Правый блок
            if(tgtItem) {
                document.getElementById('tgt-img').innerText = tgtItem.img;
                document.getElementById('tgt-price').innerText = tgtItem.price + " ⭐️";
                document.getElementById('tgt-name').innerText = tgtItem.name;
                document.getElementById('box-tgt').classList.add('active');
            } else {
                document.getElementById('tgt-img').innerText = "❓";
                document.getElementById('tgt-price').innerText = "-";
                document.getElementById('tgt-name').innerText = "Выберите цель";
                document.getElementById('box-tgt').classList.remove('active');
            }

            // Рулетка
            const btn = document.getElementById('btn-play');
            const bg = document.getElementById('chance-bg');
            if(srcItem && tgtItem) {
                let chance = (srcItem.price / tgtItem.price) * 100;
                if(chance > 100) chance = 100;
                document.getElementById('chance-val').innerText = chance.toFixed(2) + "%";
                bg.style.background = `conic-gradient(#00ff88 ${(chance/100)*360}deg, transparent 0deg)`;
                
                btn.disabled = srcItem.price >= tgtItem.price;
            } else {
                document.getElementById('chance-val').innerText = "0%";
                bg.style.background = 'transparent';
                btn.disabled = true;
            }
        }

        function switchTab(tab) {
            if(spinning) return;
            activeTab = tab;
            document.getElementById('tab1').className = `tab-btn ${tab==='inv'?'active':''}`;
            document.getElementById('tab2').className = `tab-btn ${tab==='shop'?'active':''}`;
            document.getElementById('tab3').className = `tab-btn ${tab==='targets'?'active':''}`;
            
            const grid = document.getElementById('grid-content');
            grid.innerHTML = '';

            if(tab === 'inv') {
                if(user.inv.length === 0) grid.innerHTML = '<div style="color:#4a506b; grid-column:1/-1;">Инвентарь пуст. Загляните в магазин.</div>';
                user.inv.forEach(i => {
                    const d = document.createElement('div');
                    d.className = `grid-card ${srcItem && srcItem.uid === i.uid ? 'selected' : ''}`;
                    d.innerHTML = `<div class="card-emoji">${i.img}</div><div class="card-price">${i.price} ⭐️</div><div class="card-name">${i.name}</div>`;
                    d.onclick = () => { srcItem = i; updateView(); switchTab('inv'); };
                    grid.appendChild(d);
                });
            } else if (tab === 'shop') {
                DB.forEach(i => {
                    const d = document.createElement('div');
                    d.className = 'grid-card';
                    d.innerHTML = `<div class="card-emoji">${i.img}</div><div class="card-price">${i.price} ⭐️</div><div class="card-name">${i.name}</div><button class="buy-action" onclick="buy(${i.id}, event)">Купить</button>`;
                    grid.appendChild(d);
                });
            } else if (tab === 'targets') {
                DB.forEach(i => {
                    const d = document.createElement('div');
                    d.className = `grid-card ${tgtItem && tgtItem.id === i.id ? 'selected' : ''}`;
                    d.innerHTML = `<div class="card-emoji">${i.img}</div><div class="card-price">${i.price} ⭐️</div><div class="card-name">${i.name}</div>`;
                    d.onclick = () => { tgtItem = i; updateView(); switchTab('targets'); };
                    grid.appendChild(d);
                });
            }
        }

        function buy(id, e) {
            e.stopPropagation();
            const item = DB.find(x => x.id === id);
            if(user.balance >= item.price) {
                user.balance -= item.price;
                user.inv.push({...item, uid: Date.now() + Math.random()});
                save(); updateView();
            } else {
                alert("Недостаточно средств на балансе!");
            }
        }

        function calcTarget(mult) {
            if(!srcItem) return alert("Сначала выберите свой предмет во вкладке Инвентарь!");
            const target = srcItem.price * mult;
            tgtItem = DB.reduce((prev, curr) => Math.abs(curr.price - target) < Math.abs(prev.price - target) ? curr : prev);
            updateView();
            switchTab('targets');
        }

        function startPlay() {
            if(spinning || !srcItem || !tgtItem) return;
            spinning = true;
            document.getElementById('btn-play').disabled = true;

            try { document.getElementById('s-spin').play(); } catch(e){}

            let chanceVis = (srcItem.price / tgtItem.price) * 100;
            if(chanceVis > 100) chanceVis = 100;
            
            // Баланс системы
            let chanceReal = chanceVis * 0.6; 
            let isWin = (Math.random() * 100) <= chanceReal;

            const arrow = document.getElementById('arrow');
            const winSector = (chanceVis / 100) * 360;
            const stopDeg = isWin ? (Math.random() * winSector) : (winSector + Math.random() * (360 - winSector));
            
            deg += (360 * 5) + stopDeg; // 5 быстрых оборотов + нужный градус
            arrow.style.transform = `rotate(${deg}deg)`;

            user.games++;

            setTimeout(() => {
                if(isWin) {
                    try { document.getElementById('s-win').play(); } catch(e){}
                    user.wins++;
                    user.inv.push({...tgtItem, uid: Date.now()});
                } else {
                    try { document.getElementById('s-lose').play(); } catch(e){}
                }
                
                user.inv = user.inv.filter(x => x.uid !== srcItem.uid);
                srcItem = null;
                spinning = false;
                
                save(); updateView(); switchTab(activeTab);
            }, 8000);
        }

        // Лента
        setInterval(() => {
            const feed = document.getElementById('live-feed');
            const d = document.createElement('div');
            d.className = 'live-item';
            d.innerText = DB[Math.floor(Math.random() * DB.length)].img;
            feed.prepend(d);
            if(feed.children.length > 12) feed.lastChild.remove();
        }, 1500);
    </script>
</body>
</html>
