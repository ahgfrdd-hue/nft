<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <title>FlashUpgrader — Премиум</title>
    <style>
        /* === ПЕРЕМЕННЫЕ И БАЗОВЫЕ НАСТРОЙКИ === */
        :root {
            --bg-main: #060608;
            --bg-panel: #0b0b0d;
            --bg-card: #111114;
            --bg-card-hover: #16161a;
            --accent-gold: #ffcc00;
            --accent-gold-glow: rgba(255, 204, 0, 0.3);
            --text-main: #ffffff;
            --text-muted: #6c6c75;
            --border-color: #1c1c22;
            
            --rarity-epic: #9b59b6;
            --rarity-legendary: #e67e22;
            --rarity-mythic: #e74c3c;
            --rarity-immortal: #ff007f;
            
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 10px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at 50% 0%, #121217 0%, var(--bg-main) 70%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* === ХЕДЕР === */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 24px;
            background: rgba(6, 6, 8, 0.8);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-color);
            position: sticky; top: 0; z-index: 100;
        }

        .logo-area { display: flex; flex-direction: column; }
        .logo { font-size: 22px; font-weight: 900; color: var(--accent-gold); letter-spacing: 0.5px; text-shadow: 0 0 12px var(--accent-gold-glow); }
        .logo span { color: var(--text-main); text-shadow: none; }
        .online-count { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
        .online-count span { color: #2ecc71; font-weight: bold; }

        .user-area { display: flex; align-items: center; gap: 16px; }
        .balance-block { display: flex; flex-direction: column; align-items: flex-end; }
        .balance-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; }
        .balance { font-size: 16px; font-weight: 800; color: var(--accent-gold); }
        
        .btn-deposit {
            background: linear-gradient(135deg, #ffcc00, #ffaa00);
            color: #000; padding: 8px 16px; border: none; border-radius: var(--radius-sm);
            font-size: 13px; font-weight: 800; cursor: pointer; transition: var(--transition);
        }
        .btn-deposit:hover { transform: translateY(-1px); }

        /* Иконка профиля */
        .profile-avatar {
            width: 38px; height: 38px; background: var(--bg-card); border: 2px solid var(--border-color);
            border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 16px; transition: var(--transition);
        }
        .profile-avatar:hover { border-color: var(--accent-gold); transform: scale(1.05); }

        /* === ОСНОВНОЙ КОНТЕНТ === */
        main {
            flex: 1; display: flex; flex-direction: column;
            padding: 24px 16px; gap: 24px; max-width: 650px; width: 100%; margin: 0 auto;
        }

        /* === ЛЕНТА LIVE === */
        .live-ticker {
            background: rgba(11, 11, 13, 0.5); border: 1px solid var(--border-color);
            border-radius: var(--radius-md); padding: 12px; display: flex; gap: 12px;
            overflow-x: auto; white-space: nowrap; scrollbar-width: none; min-height: 56px;
        }
        .live-ticker::-webkit-scrollbar { display: none; }
        
        .ticker-item {
            display: inline-flex; align-items: center; gap: 8px;
            background: var(--bg-card); padding: 8px 14px; border-radius: var(--radius-sm);
            font-size: 13px; font-weight: 600; border-bottom: 2px solid var(--accent-gold);
        }
        .ticker-item.fail { border-bottom-color: #e74c3c; opacity: 0.6; }
        .ticker-img { width: 20px; height: 20px; object-fit: contain; }

        /* === АРЕНА АПГРЕЙДА === */
        .upgrade-arena {
            background: linear-gradient(180deg, var(--bg-panel) 0%, #070709 100%);
            border: 1px solid var(--border-color); border-radius: var(--radius-lg);
            padding: 32px 24px; display: flex; flex-direction: column; align-items: center; gap: 28px;
            box-shadow: 0 16px 40px rgba(0,0,0,0.5); position: relative;
        }

        .slots-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; }
        .item-slot {
            background: var(--bg-card); border: 1px dashed #2c2c35; border-radius: var(--radius-md);
            height: 130px; display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 16px; text-align: center; transition: var(--transition); cursor: pointer;
        }
        .item-slot.active { border: 1px solid rgba(255, 204, 0, 0.3); background: rgba(255, 204, 0, 0.02); }
        .slot-hint { font-size: 12px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }

        /* === КРУГ И АНИМИРОВАННАЯ СТРЕЛКА СЗАДИ БЕЛАЯ === */
        .wheel-container {
            position: relative; width: 220px; height: 220px; margin: 15px 0;
            display: flex; align-items: center; justify-content: center;
        }
        .wheel-box { width: 100%; height: 100%; position: relative; transition: transform 3.5s cubic-bezier(0.1, 0.8, 0.1, 1); }
        .wheel-svg { transform: rotate(-90deg); width: 100%; height: 100%; }
        .wheel-track { fill: none; stroke: #131318; stroke-width: 12; }
        .wheel-progress {
            fill: none; stroke: var(--accent-gold); stroke-width: 12;
            stroke-dasharray: 596; stroke-dashoffset: 596; stroke-linecap: round;
            transition: stroke-dashoffset 0.4s ease;
        }
        
        /* Возвращенная белая стрелочка строго по центру сверху */
        .wheel-arrow {
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 12px solid transparent; border-right: 12px solid transparent;
            border-top: 18px solid #ffffff;
            z-index: 15; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
            pointer-events: none;
        }

        .wheel-center-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 5; }
        .wheel-center-text h1 { font-size: 32px; font-weight: 900; color: #ffffff; }
        .wheel-center-text p { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; }

        /* Кнопка */
        .action-block { width: 100%; display: flex; flex-direction: column; gap: 12px; }
        .btn-upgrade {
            background: linear-gradient(135deg, var(--accent-gold), #e6b800);
            color: #000; border: none; padding: 18px; font-size: 15px; font-weight: 800;
            border-radius: var(--radius-md); cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 8px 28px rgba(255, 204, 0, 0.25); transition: var(--transition);
        }
        .btn-upgrade:disabled { background: #1c1c22; color: #4c4c54; cursor: not-allowed; box-shadow: none; }

        /* === ТАБЫ И СЕТКА === */
        .inventory-section {
            background: var(--bg-panel); border: 1px solid var(--border-color);
            border-radius: var(--radius-lg); display: flex; flex-direction: column; overflow: hidden;
        }
        .tabs-header { display: flex; background: #0e0e11; border-bottom: 1px solid var(--border-color); padding: 6px; gap: 6px; }
        .tab-btn {
            flex: 1; padding: 14px; background: transparent; border: none; color: var(--text-muted);
            font-size: 13px; font-weight: 700; border-radius: var(--radius-sm); cursor: pointer; transition: var(--transition); text-transform: uppercase;
        }
        .tab-btn.active { color: #fff; background: var(--bg-card); }

        .items-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 16px; max-height: 420px; overflow-y: auto; }
        .item-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 12px; display: flex; flex-direction: column; align-items: center; position: relative; cursor: pointer; transition: var(--transition); }
        .item-card:hover { background: var(--bg-card-hover); transform: translateY(-4px); }
        
        .item-price { font-size: 11px; font-weight: 800; color: var(--accent-gold); align-self: flex-end; background: rgba(0,0,0,0.4); padding: 4px 8px; border-radius: 6px; }
        .item-img-container { width: 100%; height: 85px; display: flex; align-items: center; justify-content: center; margin: 6px 0; }
        .item-img-container img { max-width: 90%; max-height: 90%; object-fit: contain; }

        .item-info { text-align: center; width: 100%; }
        .item-title { font-size: 10px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; }
        .item-sub { font-size: 12px; font-weight: 700; margin-top: 1px; color: #eee; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }

        /* Кнопка быстрой продажи внутри инвентаря */
        .btn-sell-fast {
            margin-top: 8px; width: 100%; background: rgba(231, 76, 60, 0.1); border: 1px solid rgba(231, 76, 60, 0.2);
            color: #e74c3c; font-size: 10px; font-weight: 700; padding: 4px; border-radius: 4px; text-transform: uppercase; cursor: pointer; transition: var(--transition);
        }
        .btn-sell-fast:hover { background: #e74c3c; color: #fff; }

        .rarity-epic { border-bottom: 3px solid var(--rarity-epic); }
        .rarity-legendary { border-bottom: 3px solid var(--rarity-legendary); }
        .rarity-mythic { border-bottom: 3px solid var(--rarity-mythic); }
        .rarity-immortal { border-bottom: 3px solid var(--rarity-immortal); }

        /* === МОДАЛКИ === */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px); z-index: 200; display: none; align-items: center; justify-content: center; padding: 16px;
        }
        .modal-card {
            background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: var(--radius-lg);
            width: 100%; max-width: 400px; padding: 24px; position: relative;
        }
        .modal-close { position: absolute; top: 16px; right: 16px; background: transparent; border: none; color: var(--text-muted); font-size: 22px; cursor: pointer; }
        .modal-title { font-size: 20px; font-weight: 800; margin-bottom: 16px; }
        .modal-input { width: 100%; background: var(--bg-card); border: 1px solid var(--border-color); padding: 14px; border-radius: var(--radius-sm); color: #fff; font-size: 16px; margin-bottom: 16px; outline: none; }
        .modal-btn { width: 100%; background: linear-gradient(135deg, #2ecc71, #27ae60); color: #fff; border: none; padding: 14px; border-radius: var(--radius-sm); font-size: 15px; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        
        .stat-line { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border-color); font-size: 14px; }
        .stat-line span:last-child { font-weight: bold; color: var(--accent-gold); }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <div class="logo">FLASH<span>UPGRADER</span></div>
            <div class="online-count">Онлайн: <span id="onlineCount">1645</span></div>
        </div>
        <div class="user-area">
            <div class="balance-block">
                <span class="balance-label">Баланс</span>
                <div class="balance" id="userBalance">10 000.00 ₽</div>
            </div>
            <button class="btn-deposit" onclick="openModal('depositModal')">Пополнить</button>
            <div class="profile-avatar" onclick="openModal('profileModal')">👤</div>
        </div>
    </header>

    <main>
        <div class="live-ticker" id="liveTicker"></div>

        <section class="upgrade-arena" id="arenaBox">
            <div class="slots-container">
                <div class="item-slot" id="slotLeft" onclick="switchTab('my')"><span class="slot-hint">Выбери свой подарок</span></div>
                <div class="item-slot" id="slotRight" onclick="switchTab('shop')"><span class="slot-hint">Выбери цель</span></div>
            </div>

            <div class="wheel-container">
                <div class="wheel-arrow"></div>
                <div class="wheel-box" id="wheelBox">
                    <svg class="wheel-svg">
                        <circle class="wheel-track" cx="110" cy="110" r="95"></circle>
                        <circle class="wheel-progress" id="wheelCircle" cx="110" cy="110" r="95"></circle>
                    </svg>
                    <div class="wheel-center-text">
                        <h1 id="chanceText">0.00%</h1>
                        <p>шанс</p>
                    </div>
                </div>
            </div>

            <div class="action-block">
                <button class="btn-upgrade" id="btnUpgrade" onclick="executeUpgrade()" disabled>Выберите подарки</button>
            </div>
        </section>

        <section class="inventory-section">
            <div class="tabs-header">
                <button class="tab-btn active" id="tabMy" onclick="switchTab('my')">Мой инвентарь</button>
                <button class="tab-btn" id="tabShop" onclick="switchTab('shop')">Желаемый подарок</button>
            </div>
            <div class="items-grid" id="gridContent"></div>
        </section>
    </main>

    <div class="modal-overlay" id="depositModal">
        <div class="modal-card">
            <button class="modal-close" onclick="closeModal('depositModal')">×</button>
            <div class="modal-title">Пополнение баланса</div>
            <input type="number" class="modal-input" id="depositAmount" placeholder="Сумма (₽)" min="10">
            <button class="modal-btn" onclick="processDeposit()">Пополнить</button>
        </div>
    </div>

    <div class="modal-overlay" id="profileModal">
        <div class="modal-card">
            <button class="modal-close" onclick="closeModal('profileModal')">×</button>
            <div class="modal-title">Профиль игрока</div>
            <div class="stat-line"><span>Всего апгрейдов:</span><span id="statTotal">0</span></div>
            <div class="stat-line"><span>Успешных:</span><span id="statWins" style="color:#2ecc71;">0</span></div>
            <div class="stat-line"><span>Сгорело:</span><span id="statLosses" style="color:#e74c3c;">0</span></div>
            <div style="margin-top: 20px;">
                <div class="modal-title" style="font-size:16px;">Вывести выигрыш</div>
                <input type="text" class="modal-input" id="withdrawDetails" placeholder="Номер карты или QIWI/ЮMoney" style="margin-bottom:10px;">
                <input type="number" class="modal-input" id="withdrawAmount" placeholder="Сумма вывода (₽)">
                <button class="modal-btn" style="background:linear-gradient(135deg, #3498db, #2980b9);" onclick="processWithdraw()">Создать заявку</button>
            </div>
        </div>
    </div>

    <audio id="soundSpin" src="https://cdn.pixabay.com/audio/2022/03/15/audio_735c0326db.mp3" preload="auto" loop></audio>
    <audio id="soundWin" src="https://cdn.pixabay.com/audio/2021/08/04/audio_bb630d7a22.mp3" preload="auto"></audio>
    <audio id="soundFail" src="https://cdn.pixabay.com/audio/2022/01/18/audio_d0a13f69d2.mp3" preload="auto"></audio>
    <audio id="soundClick" src="https://cdn.pixabay.com/audio/2022/03/10/audio_c0c8004b20.mp3" preload="auto"></audio>

    <script>
        // Базовый пул предметов (картинка Звездного блеска исправлена на корректную png/jpg)
        const giftPool = [
            { id: 'frog_purple', title: 'Премиум Подарок', sub: 'Аметистовый Харт', price: '4500.00', rarity: 'rarity-epic', img: '16201.png' },
            { id: 'frog_aqua', title: 'Премиум Подарок', sub: 'Бирюзовый Лав', price: '8900.00', rarity: 'rarity-legendary', img: '16202.png' },
            { id: 'frog_love', title: 'Премиум Подарок', sub: 'Влюбленный Пепе', price: '12500.00', rarity: 'rarity-mythic', img: '16203.png' },
            { id: 'frog_glitter', title: 'Премиум Подарок', sub: 'Звездный Блеск', price: '24000.00', rarity: 'rarity-immortal', img: '16154.jpg' }
        ];

        // Инициализация данных С СОХРАНЕНИЕМ (localStorage)
        let balance = parseFloat(localStorage.getItem('ub_balance')) || 10143.51;
        let myInventoryData = JSON.parse(localStorage.getItem('ub_inv')) || [giftPool[0], giftPool[1]];
        let stats = JSON.parse(localStorage.getItem('ub_stats')) || { total: 0, wins: 0, losses: 0 };
        
        let shopInventoryData = [...giftPool];
        let currentTab = 'my';
        let selectedLeft = null;
        let selectedRight = null;
        let isProcessing = false;
        let wheelRotation = 0;

        const soundSpin = document.getElementById('soundSpin');
        const soundWin = document.getElementById('soundWin');
        const soundFail = document.getElementById('soundFail');
        const soundClick = document.getElementById('soundClick');

        function saveData() {
            localStorage.setItem('ub_balance', balance);
            localStorage.setItem('ub_inv', JSON.stringify(myInventoryData));
            localStorage.setItem('ub_stats', JSON.stringify(stats));
        }

        function playSound(audio) { audio.currentTime = 0; audio.play().catch(() => {}); }

        function updateBalanceUI() {
            document.getElementById('userBalance').innerText = balance.toFixed(2).replace(/\d(?=(\d{3})+\.)/g, '$& ') + ' ₽';
        }

        function renderGrid() {
            const grid = document.getElementById('gridContent');
            grid.innerHTML = '';
            const activeData = currentTab === 'my' ? myInventoryData : shopInventoryData;

            if(activeData.length === 0) {
                grid.innerHTML = `<div style="grid-column:span 3;text-align:center;padding:30px;color:var(--text-muted);">Пусто</div>`;
                return;
            }

            activeData.forEach((item, idx) => {
                let sellBtn = currentTab === 'my' ? `<button class="btn-sell-fast" onclick="event.stopPropagation(); sellItem(${idx})">Продать за ${Math.round(item.price * 0.5)} ₽</button>` : '';
                grid.innerHTML += `
                    <div class="item-card ${item.rarity}" onclick="selectItem(${idx})">
                        <div class="item-price">${Math.round(item.price)} ₽</div>
                        <div class="item-img-container"><img src="${item.img}" onerror="this.src='16201.png'"></div>
                        <div class="item-info">
                            <div class="item-title">${item.title}</div>
                            <div class="item-sub">${item.sub}</div>
                        </div>
                        ${sellBtn}
                    </div>
                `;
            });
        }

        function sellItem(idx) {
            playSound(soundClick);
            let item = myInventoryData[idx];
            balance += item.price * 0.5;
            myInventoryData.splice(idx, 1);
            saveData();
            updateBalanceUI();
            renderGrid();
            // Сброс слота, если предмет продан
            if(selectedLeft === item) {
                selectedLeft = null;
                document.getElementById('slotLeft').innerHTML = '<span class="slot-hint">Выбери свой подарок</span>';
                document.getElementById('slotLeft').classList.remove('active');
                updateChance();
            }
        }

        function switchTab(tab) {
            playSound(soundClick);
            currentTab = tab;
            document.getElementById('tabMy').classList.toggle('active', tab === 'my');
            document.getElementById('tabShop').classList.toggle('active', tab === 'shop');
            renderGrid();
        }

        function selectItem(index) {
            if (isProcessing) return;
            playSound(soundClick);
            const item = currentTab === 'my' ? myInventoryData[index] : shopInventoryData[index];
            
            if (currentTab === 'my') {
                selectedLeft = item;
                renderSlot('slotLeft', item);
            } else {
                selectedRight = item;
                renderSlot('slotRight', item);
            }
            updateChance();
        }

        function renderSlot(slotId, item) {
            const slot = document.getElementById(slotId);
            slot.classList.add('active');
            slot.innerHTML = `
                <div style="font-size:14px; font-weight:800; color:var(--accent-gold);">${Math.round(item.price)} ₽</div>
                <div style="margin:6px 0; height:60px; display:flex; align-items:center;"><img src="${item.img}" style="max-height:55px;"></div>
                <div style="font-size:12px; font-weight:700; color:#fff; text-overflow:ellipsis; overflow:hidden; width:100%; white-space:nowrap;">${item.sub}</div>
            `;
        }

        function updateChance() {
            const btn = document.getElementById('btnUpgrade');
            if (!selectedLeft || !selectedRight) {
                btn.disabled = true;
                btn.innerText = 'Выберите подарки';
                return;
            }
            
            btn.disabled = false;
            btn.innerText = 'Прокачать подарок';

            let chance = (parseFloat(selectedLeft.price) / parseFloat(selectedRight.price)) * 100;
            if (chance > 95) chance = 95;
            if (chance < 1) chance = 1;

            document.getElementById('chanceText').innerText = chance.toFixed(2) + '%';
            const circleCircumference = 596; 
            document.getElementById('wheelCircle').style.strokeDasharray = circleCircumference;
            document.getElementById('wheelCircle').style.strokeDashoffset = circleCircumference - (circleCircumference * (chance / 100));
        }

        // РЕАЛЬНАЯ АНИМАЦИЯ ВРАЩЕНИЯ И ОБНОВЛЕННАЯ ЛОГИКА
        function executeUpgrade() {
            if (isProcessing || !selectedLeft || !selectedRight) return;
            isProcessing = true;

            const btn = document.getElementById('btnUpgrade');
            const arena = document.getElementById('arenaBox');
            const wheel = document.getElementById('wheelBox');
            
            btn.innerText = 'Улучшение...';
            arena.classList.add('spinning');
            soundSpin.play().catch(() => {});

            let chance = (parseFloat(selectedLeft.price) / parseFloat(selectedRight.price)) * 100;
            if (chance > 95) chance = 95;
            if (chance < 1) chance = 1;
            
            let roll = Math.random() * 100;
            let isWin = roll <= chance;

            // РЕАЛЬНОЕ ВРАЩЕНИЕ КОЛЕСА (Добавляем от 5 до 10 полных кругов + случайный сектор)
            let extraDegrees = isWin ? (360 * (1 - (chance/100) * Math.random())) : (360 * (chance/100) + Math.random()*180);
            wheelRotation += (360 * (Math.floor(Math.random() * 4) + 5)) + extraDegrees;
            wheel.style.transform = `rotate(${wheelRotation}deg)`;

            // Фиксация статистики
            stats.total++;

            setTimeout(() => {
                arena.classList.remove('spinning');
                soundSpin.pause();
                soundSpin.currentTime = 0;

                if (!isWin) {
                    document.getElementById('chanceText').innerText = '0.00%';
                    document.getElementById('wheelCircle').style.strokeDashoffset = 596;
                }

                if (isWin) {
                    stats.wins++;
                    btn.style.background = 'linear-gradient(135deg, #2ecc71, #27ae60)';
                    btn.innerText = 'УСПЕШНО!';
                    playSound(soundWin);
                    
                    confetti({ particleCount: 140, spread: 70, origin: { y: 0.65 }, colors: ['#ffcc00', '#2ecc71', '#ffffff'] });

                    myInventoryData.push(selectedRight);
                    myInventoryData = myInventoryData.filter(item => item !== selectedLeft);
                } else {
                    stats.losses++;
                    btn.style.background = 'linear-gradient(135deg, #e74c3c, #c0392b)';
                    btn.innerText = 'СГОРЕЛО!';
                    playSound(soundFail);
                    
                    myInventoryData = myInventoryData.filter(item => item !== selectedLeft);
                }

                saveData();
                updateBalanceUI();

                setTimeout(() => {
                    btn.style.background = '';
                    btn.innerText = 'Выберите подарки';
                    btn.disabled = true;
                    selectedLeft = null; selectedRight = null;
                    document.getElementById('slotLeft').innerHTML = '<span class="slot-hint">Выбери свой подарок</span>';
                    document.getElementById('slotLeft').classList.remove('active');
                    document.getElementById('slotRight').innerHTML = '<span class="slot-hint">Выбери цель</span>';
                    document.getElementById('slotRight').classList.remove('active');
                    document.getElementById('chanceText').innerText = '0.00%';
                    document.getElementById('wheelCircle').style.strokeDashoffset = 596;
                    renderGrid();
                    isProcessing = false;
                }, 2000);

            }, 3500); // Время вращения совпадает с CSS transition
        }

        /* === ОКНА ПРОФИЛЯ, ПОПОЛНЕНИЯ И ВЫВОДА === */
        function openModal(id) {
            playSound(soundClick);
            if(id === 'profileModal') {
                document.getElementById('statTotal').innerText = stats.total;
                document.getElementById('statWins').innerText = stats.wins;
                document.getElementById('statLosses').innerText = stats.losses;
            }
            document.getElementById(id).style.display = 'flex';
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function processDeposit() {
            const amount = parseFloat(document.getElementById('depositAmount').value);
            if (!amount || amount < 10) { alert('Минимальная сумма — 10 ₽'); return; }
            balance += amount;
            saveData();
            updateBalanceUI();
            closeModal('depositModal');
            alert(`Успешно зачислено ${amount} ₽ (Демо-режим каркаса)`);
        }

        function processWithdraw() {
            const amount = parseFloat(document.getElementById('withdrawAmount').value);
            const details = document.getElementById('withdrawDetails').value.trim();
            if(!details || !amount) { alert('Заполните все поля!'); return; }
            if(amount > balance) { alert('Недостаточно средств!'); return; }
            
            balance -= amount;
            saveData();
            updateBalanceUI();
            closeModal('profileModal');
            alert(`Заявка на вывод ${amount} ₽ на реквизиты ${details} успешно отправлена!`);
        }

        // Живой контролируемый онлайн (без ухода в минус)
        function updateOnline() {
            const countNode = document.getElementById('onlineCount');
            let current = parseInt(countNode.innerText.replace(/\s/g, ''));
            current += Math.random() > 0.5 ? Math.floor(Math.random() * 4) : -Math.floor(Math.random() * 4);
            if(current < 1200) current = 1500;
            if(current > 2200) current = 1800;
            countNode.innerText = current.toLocaleString('ru-RU');
        }

        function updateTicker() {
            const ticker = document.getElementById('liveTicker');
            const item = giftPool[Math.floor(Math.random() * giftPool.length)];
            const isWin = Math.random() > 0.5;
            const html = `<div class="ticker-item ${isWin ? '' : 'fail'}"><img class="ticker-img" src="${item.img}" onerror="this.src='16201.png'"><span>${item.sub}</span><span>${isWin ? '🔥' : '❌'}</span></div>`;
            ticker.insertAdjacentHTML('afterbegin', html);
            if (ticker.children.length > 6) ticker.removeChild(ticker.lastChild);
        }

        setInterval(updateOnline, 3000);
        setInterval(updateTicker, 2500);
        
        // Первая загрузка
        updateBalanceUI();
        renderGrid();
    </script>
</body>
</html>
