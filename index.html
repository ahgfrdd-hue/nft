<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <title>FLASHUPGRADER — Premium Edition</title>
    <style>
        /* === НОВЫЙ СИММЕТРИЧНЫЙ ДИЗАЙН === */
        :root {
            /* Глубокий темно-серый/угольный фон */
            --bg-main: #111116;
            --bg-panel: #1a1a22;
            --bg-card: #22222d;
            --bg-card-hover: #2a2a36;
            
            --accent-main: #8a2be2; 
            --accent-glow: rgba(138, 43, 226, 0.5);
            --accent-secondary: #ffcc00;
            --text-main: #ffffff;
            --text-muted: #8b8b9e;
            --border-color: #2c2c3a;
            
            --rarity-epic: #a55eea;
            --rarity-legendary: #fd9644;
            --rarity-mythic: #fc5c65;
            --rarity-immortal: #2bcbba;
            
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            /* Плавные микро-анимации */
            --transition: all 0.3s ease;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
            min-width: 0; 
        }

        button:active, .item-slot:active, .item-card:active, .profile-avatar:active, .modal-close:active, .payment-method:active {
            transform: scale(0.95) !important;
            transition: transform 0.15s ease !important;
        }

        .item-sub, .item-title, .p-item-name, .bd-name, #profileEmailDisplay, .ticker-item span {
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%;
        }
        .p-item-info, .item-info {
            min-width: 0; width: 100%; display: flex; flex-direction: column; align-items: center;
        }

        body {
            background: var(--bg-main); color: var(--text-main);
            min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* === ХЕДЕР === */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 20px; background: rgba(26, 26, 34, 0.95); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100;
        }

        .logo-area { display: flex; flex-direction: column; }
        .logo { font-size: 20px; font-weight: 900; color: var(--accent-main); letter-spacing: 0.5px; transition: var(--transition); text-shadow: 0 0 10px var(--accent-glow); animation: neonPulse 3s infinite; }
        .logo span { color: var(--text-main); text-shadow: none; }
        .online-count { font-size: 11px; color: var(--text-muted); margin-top: 2px; font-weight: 600; }
        .online-count span { color: var(--text-muted); font-weight: bold; }

        @keyframes neonPulse {
            0%, 100% { text-shadow: 0 0 10px var(--accent-glow); }
            50% { text-shadow: 0 0 20px var(--accent-main), 0 0 5px var(--accent-glow); }
        }

        .user-area { display: flex; align-items: center; gap: 12px; min-height: 38px;}
        
        .balance-block { display: flex; flex-direction: column; align-items: flex-end; justify-content: center; }
        .balance-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; }
        .balance { font-size: 15px; font-weight: 800; color: var(--text-main); }
        
        .btn-deposit {
            background: var(--accent-main); color: #fff;
            padding: 8px 14px; border: none; border-radius: var(--radius-sm);
            font-size: 13px; font-weight: 700; cursor: pointer; transition: var(--transition);
            box-shadow: 0 0 10px rgba(138, 43, 226, 0.3);
        }
        .btn-deposit:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 0 15px rgba(138, 43, 226, 0.6); }
        
        .profile-avatar {
            width: 36px; height: 36px; background: var(--bg-card); border: 2px solid var(--border-color);
            border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: var(--transition); overflow: hidden; flex-shrink: 0;
        }
        .profile-avatar:hover { border-color: var(--accent-main); box-shadow: 0 0 10px var(--accent-glow); }

        /* === ОСНОВНОЙ КОНТЕНТ === */
        main { 
            flex: 1; display: flex; flex-direction: column; padding: 20px 14px; gap: 20px; 
            max-width: 1400px; width: 100%; margin: 0 auto; 
        }
        .main-content {
            display: flex; flex-direction: column; gap: 24px; flex: 1; max-width: 1000px; margin: 0 auto; width: 100%;
        }

        .live-ticker {
            background: var(--bg-panel); border: 1px solid var(--border-color);
            border-radius: var(--radius-md); padding: 8px; display: flex; align-items: center; gap: 8px;
            overflow-x: auto; white-space: nowrap; scrollbar-width: none; min-height: 52px;
            scroll-behavior: smooth; position: relative;
        }
        .live-ticker::-webkit-scrollbar { display: none; }
        
        .ticker-item {
            display: inline-flex; align-items: center; gap: 8px; background: var(--bg-card);
            padding: 6px 10px; border-radius: var(--radius-sm); font-size: 11px; font-weight: 600; 
            min-width: 150px; max-width: 200px; border-left: 3px solid transparent; transition: var(--transition);
            animation: fadeIn 0.5s ease forwards;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        
        .ticker-img { width: 20px; height: 20px; object-fit: contain; flex-shrink: 0; }
        .ticker-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .ticker-chance { margin-left: auto; font-weight: 800; font-size: 10px; padding: 2px 5px; border-radius: 4px; flex-shrink: 0; }
        .ticker-user { font-size: 10px; color: var(--text-muted); opacity: 0.8; margin-right: 4px; flex-shrink: 0; }

        @media (min-width: 900px) {
            main { flex-direction: row; align-items: flex-start; justify-content: center; }
            .live-ticker { 
                flex-direction: column; align-items: stretch; width: 220px; height: auto; max-height: 80vh; 
                overflow-y: auto; overflow-x: hidden; white-space: normal; padding: 10px; 
            }
            .ticker-item { width: 100%; justify-content: flex-start; max-width: 100%; }
            .main-content { margin: 0; }
        }

        /* === АРЕНА АПГРЕЙДА (ИДЕАЛЬНАЯ СИММЕТРИЯ) === */
        .upgrade-arena {
            background: var(--bg-panel);
            border: 1px solid var(--border-color); border-radius: var(--radius-lg);
            padding: 40px 30px; display: flex; flex-direction: column; align-items: center; gap: 30px;
            position: relative; transition: var(--transition); overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }
        
        .top-left-controls { 
            position: absolute; top: 16px; left: 16px; z-index: 10; 
            display: flex; gap: 8px; align-items: center; 
        }
        .fast-upgrade-label { cursor: pointer; display: flex; align-items: center; background: var(--bg-card); padding: 8px; border-radius: 10px; border: 1px solid var(--border-color); transition: var(--transition); }
        .fast-upgrade-label:hover { border-color: var(--accent-secondary); box-shadow: 0 0 10px rgba(255, 204, 0, 0.2); }
        .fast-upgrade-label input { display: none; }
        
        /* Анимация иконки (шестеренка/молния) */
        .lightning-icon { width: 16px; height: 16px; fill: var(--text-muted); transition: var(--transition); }
        .fast-upgrade-label:hover .lightning-icon { transform: rotate(180deg) scale(1.1); fill: var(--accent-secondary); }
        .fast-upgrade-label input:checked + .lightning-icon { fill: var(--accent-secondary); filter: drop-shadow(0 0 6px rgba(255, 204, 0, 0.6)); }

        /* Строгая трехколоночная сетка */
        .arena-row { 
            display: grid;
            grid-template-columns: 280px 250px 280px;
            gap: 40px;
            align-items: center; justify-content: center; 
            width: 100%; z-index: 2; margin-top: 10px; 
        }

        .left-slot-wrapper, .right-slot-wrapper {
            display: flex; flex-direction: column; width: 100%; gap: 15px; height: 100%; justify-content: space-between;
        }

        .item-slot {
            background: var(--bg-card); border: 2px dashed var(--border-color); border-radius: var(--radius-md);
            height: 240px; display: flex; flex-direction: column; justify-content: space-between; align-items: center;
            padding: 20px; text-align: center; transition: var(--transition); cursor: pointer;
            position: relative; overflow: hidden; width: 100%;
        }
        .slot-confetti { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        .item-slot:hover { border-color: var(--text-muted); background: var(--bg-card-hover); transform: translateY(-4px); box-shadow: 0 6px 20px rgba(0,0,0,0.5); }
        
        .item-slot.active { border-style: solid; border-width: 2px; }
        .item-slot.active.rarity-epic { border-color: var(--rarity-epic); background: rgba(165, 94, 234, 0.05); box-shadow: inset 0 0 20px rgba(165, 94, 234, 0.1), 0 0 15px rgba(165, 94, 234, 0.25); }
        .item-slot.active.rarity-legendary { border-color: var(--rarity-legendary); background: rgba(253, 150, 68, 0.05); box-shadow: inset 0 0 20px rgba(253, 150, 68, 0.1), 0 0 15px rgba(253, 150, 68, 0.25); }
        .item-slot.active.rarity-mythic { border-color: var(--rarity-mythic); background: rgba(252, 92, 101, 0.05); box-shadow: inset 0 0 20px rgba(252, 92, 101, 0.1), 0 0 15px rgba(252, 92, 101, 0.25); }
        .item-slot.active.rarity-immortal { border-color: var(--rarity-immortal); background: rgba(43, 203, 186, 0.05); box-shadow: inset 0 0 20px rgba(43, 203, 186, 0.1), 0 0 15px rgba(43, 203, 186, 0.25); }

        .slot-bg-pepe { position: absolute; width: 65%; height: 65%; object-fit: contain; filter: brightness(0) opacity(0.2); z-index: 1; pointer-events: none; animation: floatEffect 5s ease-in-out infinite; }
        
        .slot-chevron-container { position: relative; z-index: 2; margin: auto 0; display: flex; align-items: center; justify-content: center; height: 50px; }
        .slot-hint { font-size: 12px; color: var(--text-muted); font-weight: 800; text-transform: uppercase; position: relative; z-index: 2; margin-top: auto; letter-spacing: 0.5px;}

        .arrow-1 { animation: arrowPulse 1.5s infinite; animation-delay: 0s; }
        .arrow-2 { animation: arrowPulse 1.5s infinite; animation-delay: 0.2s; }
        .arrow-3 { animation: arrowPulse 1.5s infinite; animation-delay: 0.4s; }
        .chevron-up .arrow-1 { animation-delay: 0.4s; }
        .chevron-up .arrow-2 { animation-delay: 0.2s; }
        .chevron-up .arrow-3 { animation-delay: 0s; }
        
        @keyframes arrowPulse {
            0%, 100% { opacity: 0.2; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(2px); filter: drop-shadow(0 0 5px var(--accent-main)); }
        }

        /* === НЕОНОВЫЕ КНОПКИ МНОЖИТЕЛЕЙ === */
        .multiplier-bar {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
            width: 100%; background: transparent; padding: 0; border: none;
        }
        .multiplier-btn {
            background: var(--bg-card); color: #fff; border: 1px solid transparent;
            padding: 12px 0; font-size: 13px; font-weight: 800; border-radius: var(--radius-sm); 
            cursor: pointer; text-align: center; transition: var(--transition);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        /* Уникальные цвета для каждой кнопки */
        .multiplier-btn:nth-child(1) { border-color: #00e5ff; box-shadow: inset 0 0 8px rgba(0,229,255,0.1), 0 0 5px rgba(0,229,255,0.3); }
        .multiplier-btn:nth-child(1):hover { background: rgba(0,229,255,0.1); box-shadow: inset 0 0 12px rgba(0,229,255,0.4), 0 0 15px rgba(0,229,255,0.6); text-shadow: 0 0 5px #00e5ff; transform: translateY(-2px); }
        
        .multiplier-btn:nth-child(2) { border-color: #ff4757; box-shadow: inset 0 0 8px rgba(255,71,87,0.1), 0 0 5px rgba(255,71,87,0.3); }
        .multiplier-btn:nth-child(2):hover { background: rgba(255,71,87,0.1); box-shadow: inset 0 0 12px rgba(255,71,87,0.4), 0 0 15px rgba(255,71,87,0.6); text-shadow: 0 0 5px #ff4757; transform: translateY(-2px); }
        
        .multiplier-btn:nth-child(3) { border-color: #eccc68; box-shadow: inset 0 0 8px rgba(236,204,104,0.1), 0 0 5px rgba(236,204,104,0.3); }
        .multiplier-btn:nth-child(3):hover { background: rgba(236,204,104,0.1); box-shadow: inset 0 0 12px rgba(236,204,104,0.4), 0 0 15px rgba(236,204,104,0.6); text-shadow: 0 0 5px #eccc68; transform: translateY(-2px); }
        
        .multiplier-btn:nth-child(4) { border-color: #2ed573; box-shadow: inset 0 0 8px rgba(46,213,115,0.1), 0 0 5px rgba(46,213,115,0.3); }
        .multiplier-btn:nth-child(4):hover { background: rgba(46,213,115,0.1); box-shadow: inset 0 0 12px rgba(46,213,115,0.4), 0 0 15px rgba(46,213,115,0.6); text-shadow: 0 0 5px #2ed573; transform: translateY(-2px); }

        /* === СЛАЙДЕРЫ === */
        .balance-boost-container {
            display: flex; flex-direction: column; gap: 12px; background: var(--bg-card); 
            padding: 16px; border-radius: var(--radius-md); border: 1px solid var(--border-color); 
            transition: var(--transition); width: 100%; margin-top: auto;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }
        
        /* Общие стили для Range */
        input[type="range"] {
            -webkit-appearance: none; width: 100%; height: 6px; border-radius: 4px; outline: none; transition: var(--transition);
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none; width: 20px; height: 20px; border-radius: 50%; cursor: pointer; transition: var(--transition);
        }
        
        /* Фиолетовый слайдер буста */
        .boost-slider {
            background: rgba(138, 43, 226, 0.2); border: 1px solid rgba(138, 43, 226, 0.4);
        }
        .boost-slider::-webkit-slider-thumb {
            background: var(--accent-main); border: 3px solid #fff; box-shadow: 0 0 12px var(--accent-glow);
        }
        .boost-slider::-webkit-slider-thumb:hover { transform: scale(1.2); box-shadow: 0 0 18px var(--accent-main); }

        /* === ИДЕАЛЬНЫЙ ЦЕНТРАЛЬНЫЙ КРУГ === */
        .wheel-container { 
            position: relative; width: 250px; height: 250px; margin: 0 auto; 
            display: flex; align-items: center; justify-content: center; z-index: 2; flex-shrink: 0; 
            transition: var(--transition); 
        }
        .wheel-box { width: 100%; height: 100%; position: relative; filter: drop-shadow(0 0 15px rgba(0,0,0,0.6)); }
        .wheel-svg { width: 100%; height: 100%; display: block; overflow: visible; }
        
        /* Исправление границ и наложений */
        .wheel-progress { 
            stroke-dasharray: 408.4; stroke-dashoffset: 408.4; 
            transition: stroke-dashoffset 0.8s ease; 
            filter: drop-shadow(0 0 10px var(--accent-main)); 
            stroke-linecap: round; 
        }

        .wheel-marker { position: absolute; font-size: 10px; font-weight: 800; color: var(--text-muted); z-index: 10; pointer-events: none; opacity: 0.8; letter-spacing: 0.5px; }
        .marker-top { top: 30px; left: 50%; transform: translateX(-50%); }
        .marker-bottom { bottom: 30px; left: 50%; transform: translateX(-50%); }
        .marker-left { top: 50%; left: 30px; transform: translateY(-50%); }
        .marker-right { top: 50%; right: 30px; transform: translateY(-50%); }
        
        .arrow-spinner-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 15; will-change: transform; }
        
        .wheel-arrow { 
            position: absolute; 
            top: 20px; 
            left: 50%; 
            transform: translateX(-50%) rotate(180deg);
            width: 16px; 
            height: 24px; 
            fill: var(--accent-main); 
            filter: drop-shadow(0 0 8px var(--accent-glow));
        }

        /* Центрирование текста внутри круга */
        .wheel-center-content { 
            position: absolute; 
            inset: 0; margin: auto; /* Идеальный центр */
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            width: 80%; height: 80%; z-index: 5; text-align: center; pointer-events: none; 
        }

        @keyframes slowBarsAnim { 0%, 100% { opacity: 1; transform: translateY(0); } 50% { opacity: 0.6; transform: translateY(-2px); } }
        .bars-anim { animation: slowBarsAnim 2s ease-in-out infinite; }

        #chanceDisplay { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        #chanceDisplay h1 { 
            font-size: 28px; font-weight: 900; color: #ffffff; letter-spacing: 0px; 
            transition: var(--transition); line-height: 1; margin: 0; 
            text-shadow: 0 0 15px rgba(255,255,255,0.4); white-space: nowrap;
        }
        #chanceDisplay p { font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 800; margin-top: 6px; transition: var(--transition); letter-spacing: 0.5px; }

        .action-block { width: 100%; display: flex; flex-direction: column; gap: 10px; z-index: 2; margin-top: 15px; }

        .btn-upgrade { background: var(--accent-main); color: #fff; border: none; padding: 18px; font-size: 15px; font-weight: 900; border-radius: var(--radius-md); cursor: pointer; text-transform: uppercase; transition: var(--transition); letter-spacing: 1px; }
        .btn-upgrade:not(:disabled) { box-shadow: 0 0 20px var(--accent-glow); }
        .btn-upgrade:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.15); box-shadow: 0 0 30px rgba(138, 43, 226, 0.7); }
        .btn-upgrade:disabled { background: var(--bg-card); color: var(--text-muted); cursor: not-allowed; border: 1px solid var(--border-color); transform: none; filter: none; box-shadow: none; }

        @keyframes floatEffect { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-4px); } }
        @keyframes winItemPop { 0% { transform: scale(1); filter: drop-shadow(0 0 0 transparent); } 50% { transform: scale(1.15); filter: drop-shadow(0 0 20px var(--accent-main)); } 100% { transform: scale(1); filter: drop-shadow(0 0 15px var(--accent-main)); } }
        .win-item-anim { animation: winItemPop 1.2s ease forwards !important; z-index: 20; }

        @media (max-width: 900px) {
            .arena-row { grid-template-columns: 1fr; gap: 24px; }
            .left-slot-wrapper, .right-slot-wrapper { max-width: 100%; height: auto; }
            .item-slot { height: 180px; padding: 12px; }
        }

        /* === БЛОК ДЛЯ НЕАВТОРИЗОВАННЫХ === */
        #unauthPromoBlock { flex-direction: column; align-items: center; text-align: center; padding: 40px 20px; background: var(--bg-card); border-radius: var(--radius-lg); border: 2px dashed var(--border-color); }
        .unauth-title { font-size: 20px; font-weight: 900; color: #fff; margin-bottom: 8px; text-transform: uppercase; }
        .unauth-subtitle { font-size: 13px; color: var(--text-muted); font-weight: 600; margin-bottom: 24px; }
        
        #promoDisplay { display: flex; align-items: center; justify-content: center; gap: 12px; min-height: 140px; width: 100%; transition: opacity 0.3s ease; }
        .promo-item { display: flex; flex-direction: column; align-items: center; justify-content: center; transition: var(--transition); width: 70px; }
        .promo-item.side.near { filter: brightness(0.2); transform: scale(0.8); opacity: 0.6; }
        .promo-item.side.far { filter: brightness(0.1); transform: scale(0.6); opacity: 0.2; }
        .promo-item.center { transform: scale(1.15); z-index: 5; width: 100px; }
        .promo-item img { max-width: 100%; max-height: 70px; object-fit: contain; }
        .promo-item.center img { animation: floatEffect 4s ease-in-out infinite; max-height: 85px; filter: drop-shadow(0 0 15px rgba(255,255,255,0.2)); }
        .promo-info { text-align: center; margin-top: 10px; }
        .promo-sub { font-size: 10px; color: var(--text-muted); font-weight: 800; white-space: nowrap; text-transform: uppercase; }
        .promo-price-tag { font-size: 11px; font-weight: 900; color: #fff; background: rgba(0,0,0,0.8); padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border-color); margin-bottom: 8px;}

        /* === ИНВЕНТАРЬ И МАГАЗИН === */
        .inventory-section { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: var(--radius-lg); display: flex; flex-direction: column; overflow: hidden; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .inventory-split { display: flex; gap: 30px; align-items: flex-start; }
        .inv-col { flex: 1; min-width: 0; display: flex; flex-direction: column; }
        
        @media (max-width: 768px) { .inventory-split { flex-direction: column; gap: 20px; } }

        .inv-header-title { font-size: 18px; font-weight: 900; color: #fff; margin: 0 0 20px; text-transform: uppercase; border-left: 4px solid var(--accent-main); padding-left: 12px; letter-spacing: 0.5px; }
        .filter-row { display: flex; gap: 8px; margin-bottom: 20px; align-items: center; background: var(--bg-card); padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border-color); }
        .filter-row span { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }
        .filter-input { width: 100%; background: transparent; border: none; color: #fff; outline: none; font-size: 13px; text-align: center; font-weight: 600; }
        .filter-btn-search { background: var(--accent-main); border: none; color: white; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: var(--transition); }
        .filter-btn-search:hover { filter: brightness(1.15); box-shadow: 0 0 10px var(--accent-glow); transform: scale(1.05); }

        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 14px; align-items: stretch; max-height: 600px; overflow-y: auto; padding-right: 8px; padding-bottom: 12px; }
        .items-grid::-webkit-scrollbar { width: 6px; }
        .items-grid::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 6px; }
        
        .item-card {
