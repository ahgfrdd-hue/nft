<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upgrader - Remastered</title>
    <style>
        /* === БАЗОВЫЕ НАСТРОЙКИ И ПЕРЕМЕННЫЕ === */
        :root {
            --bg-main: #121212;
            --bg-panel: #1a1a1a;
            --bg-panel-hover: #232323;
            --accent-gold: #f4c21a;
            --accent-gold-glow: rgba(244, 194, 26, 0.4);
            --text-main: #ffffff;
            --text-muted: #888888;
            --border-color: #2a2a2a;
            --success: #27ae60;
            --danger: #e74c3c;
            --radius-lg: 16px;
            --radius-md: 8px;
            --radius-sm: 4px;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Скрываем скролл, делаем внутренние скроллы */
        }

        /* === СКРОЛЛБАРЫ === */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-gold); }

        /* === ХЕДЕР (Убраны общие апгрейды) === */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(26, 26, 26, 0.95);
            border-bottom: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .logo-area { display: flex; align-items: center; gap: 20px; }
        .logo { font-size: 24px; font-weight: 900; color: var(--accent-gold); letter-spacing: 1px; text-transform: uppercase; }
        .logo span { color: var(--text-main); }
        .stats { display: flex; gap: 20px; font-size: 13px; color: var(--text-muted); }
        .stats div span { color: var(--text-main); font-weight: bold; margin-left: 5px; }

        .user-area { display: flex; align-items: center; gap: 20px; }
        .balance { font-size: 16px; font-weight: bold; color: var(--accent-gold); }
        .btn-deposit { 
            background: var(--accent-gold); color: #000; padding: 10px 20px; 
            border: none; border-radius: var(--radius-sm); font-weight: bold; cursor: pointer;
            transition: var(--transition); box-shadow: 0 0 10px var(--accent-gold-glow);
        }
        .btn-deposit:hover { transform: translateY(-2px); box-shadow: 0 5px 15px var(--accent-gold-glow); }

        /* === ОСНОВНАЯ СЕТКА === */
        .layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            height: calc(100vh - 70px);
        }

        /* === САЙДБАР (Live Feed) === */
        .sidebar {
            background: var(--bg-panel);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }
        .sidebar-header { padding: 15px; border-bottom: 1px solid var(--border-color); font-weight: bold; text-align: center; font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .live-feed { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .feed-item { 
            background: var(--bg-main); padding: 10px; border-radius: var(--radius-md); 
            display: flex; align-items: center; gap: 10px; border-left: 3px solid transparent;
            transition: var(--transition); animation: slideIn 0.3s ease-out;
        }
        .feed-item:hover { transform: translateX(5px); background: #222; }
        .feed-item.win { border-left-color: var(--accent-gold); }
        .feed-item img { width: 50px; height: 35px; object-fit: contain; }
        .feed-item-info { flex: 1; }
        .feed-item-info p { font-size: 11px; margin-bottom: 2px; }
        .feed-item-info strong { font-size: 13px; color: var(--accent-gold); }

        /* === ЦЕНТРАЛЬНАЯ ЧАСТЬ === */
        .main-content {
            display: flex;
            flex-direction: column;
            padding: 30px;
            overflow-y: auto;
            gap: 40px; /* Большое расстояние между блоками */
        }

        /* --- ВЕРНУЛ КЕЙС НАЗАД --- */
        .case-section {
            background: linear-gradient(145deg, var(--bg-panel) 0%, #111 100%);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: fadeInDown 0.6s ease-out;
        }
        .case-info h2 { font-size: 20px; margin-bottom: 5px; color: var(--accent-gold); }
        .case-info p { color: var(--text-muted); font-size: 13px; }
        .case-btn {
            background: transparent; border: 1px solid var(--accent-gold); color: var(--accent-gold);
            padding: 8px 20px; border-radius: var(--radius-md); cursor: pointer; transition: var(--transition);
        }
        .case-btn:hover { background: var(--accent-gold); color: #000; }

        /* --- АРЕНА АПГРЕЙДА (Спущена вниз) --- */
        .upgrade-arena {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 30px;
            align-items: center;
            animation: fadeIn 0.8s ease-out;
        }

        .item-slot {
            background: var(--bg-panel);
            border: 2px dashed var(--border-color);
            border-radius: var(--radius-lg);
            height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }
        .item-slot:hover { border-color: #444; background: var(--bg-panel-hover); }
        .item-slot.active { border-color: var(--accent-gold); border-style: solid; box-shadow: inset 0 0 40px rgba(244, 194, 26, 0.1); }
        .slot-title { position: absolute; top: 15px; font-size: 13px; color: var(--text-muted); }

        /* Крутилка (Центр) */
        .wheel-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .wheel {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: conic-gradient(var(--accent-gold) 50%, var(--bg-panel) 0);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.5), 0 0 15px var(--accent-gold-glow);
            transition: transform 3s cubic-bezier(0.1, 0.8, 0.1, 1); /* Плавная анимация прокрутки */
        }
        .wheel-inner {
            width: 180px;
            height: 180px;
            background: var(--bg-main);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }
        .wheel-inner span { font-size: 32px; font-weight: 900; color: var(--accent-gold); text-shadow: 0 0 10px var(--accent-gold-glow); }
        .wheel-inner p { font-size: 12px; color: var(--text-muted); margin-top: 5px; }
        
        .btn-upgrade {
            background: var(--accent-gold);
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: 900;
            border-radius: var(--radius-md);
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(244, 194, 26, 0.3);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }
        .btn-upgrade:hover { transform: scale(1.05); box-shadow: 0 15px 30px rgba(244, 194, 26, 0.5); }
        .btn-upgrade:active { transform: scale(0.95); }

        /* --- ИНВЕНТАРИ (Ровная сетка внизу) --- */
        .inventory-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            flex: 1;
        }
        .inventory-panel {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .panel-header {
            padding: 15px 20px;
            background: rgba(0,0,0,0.2);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .panel-header h3 { font-size: 14px; display: flex; align-items: center; gap: 10px; }
        .sort-tools { display: flex; gap: 10px; }
        .sort-tools select, .sort-tools input {
            background: var(--bg-main); border: 1px solid var(--border-color);
            color: var(--text-main); padding: 5px 10px; border-radius: var(--radius-sm); outline: none;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px;
            padding: 15px;
            overflow-y: auto;
            max-height: 400px;
        }

        .skin-card {
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
        }
        .skin-card:hover { border-color: var(--accent-gold); transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .skin-price { position: absolute; top: 10px; right: 10px; font-size: 11px; font-weight: bold; color: #f1c40f; }
        .skin-img { width: 100%; height: 70px; object-fit: contain; margin: 10px 0; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5)); transition: var(--transition); }
        .skin-card:hover .skin-img { transform: scale(1.1); }
        .skin-name { font-size: 11px; color: var(--text-muted); margin-bottom: 2px; text-overflow: ellipsis; white-space: nowrap; overflow: hidden; }
        .skin-model { font-size: 12px; font-weight: bold; }

        /* Цвета редкости (рамки) */
        .rarity-covert { border-bottom: 3px solid #eb4b4b; }
        .rarity-classified { border-bottom: 3px solid #d32ce6; }
        .rarity-restricted { border-bottom: 3px solid #8847ff; }

        /* === АНИМАЦИИ === */
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes pulseGlow { 0% { box-shadow: 0 0 10px var(--accent-gold-glow); } 50% { box-shadow: 0 0 30px rgba(244, 194, 26, 0.8); } 100% { box-shadow: 0 0 10px var(--accent-gold-glow); } }

        .upgrading .wheel { animation: pulseGlow 0.5s infinite; }
        
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <div class="logo">UP<span>GRADER</span></div>
            <div class="stats">
                <div>Онлайн: <span>1 878</span></div>
                </div>
        </div>
        <div class="user-area">
            <div class="balance">23 543.51 ₽</div>
            <button class="btn-deposit">Пополнить</button>
            <div style="width: 40px; height: 40px; background: #333; border-radius: 50%; cursor: pointer;"></div>
        </div>
    </header>

    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-header">Live лента</div>
            <div class="live-feed" id="liveFeed">
                </div>
        </aside>

        <main class="main-content">
            
            <section class="case-section">
                <div class="case-info">
                    <h2>Специальный Майский Кейс</h2>
                    <p>Открой сейчас и получи бонус к шансу апгрейда!</p>
                </div>
                <button class="case-btn">Открыть кейс</button>
            </section>

            <section class="upgrade-arena">
                
                <div class="item-slot" id="leftSlot">
                    <div class="slot-title">Выберите скины для использования</div>
                    </div>

                <div class="wheel-container">
                    <div class="wheel" id="mainWheel">
                        <div class="wheel-inner">
                            <span id="chanceDisplay">50.00%</span>
                            <p>средний шанс</p>
                        </div>
                    </div>
                    <button class="btn-upgrade" id="btnUpgrade" onclick="startUpgrade()">Прокачать</button>
                    
                    <div class="sort-tools" style="margin-top: 10px;">
                        <button class="case-btn" style="padding: 5px 10px; font-size: 12px;">1.5x</button>
                        <button class="case-btn" style="padding: 5px 10px; font-size: 12px;">2x</button>
                        <button class="case-btn" style="padding: 5px 10px; font-size: 12px;">5x</button>
                    </div>
                </div>

                <div class="item-slot" id="rightSlot">
                    <div class="slot-title">Выберите скин для апгрейда</div>
                    </div>
            </section>

            <section class="inventory-wrapper">
                
                <div class="inventory-panel">
                    <div class="panel-header">
                        <h3>Мои скины</h3>
                        <div class="sort-tools">
                            <input type="text" placeholder="Поиск..." style="width: 100px;">
                        </div>
                    </div>
                    <div class="items-grid" id="mySkins">
                        </div>
                </div>

                <div class="inventory-panel">
                    <div class="panel-header">
                        <h3>Выберите скин</h3>
                        <div class="sort-tools">
                            <select><option>Цена: По убыванию</option><option>Цена: По возрастанию</option></select>
                        </div>
                    </div>
                    <div class="items-grid" id="shopSkins">
                        </div>
                </div>

            </section>
        </main>
    </div>

    <script>
        // База мок-данных для скинов
        const weapons = ['AK-47', 'M4A4', 'AWP', 'Glock-18', 'USP-S', 'Desert Eagle', 'Butterfly Knife', 'Karambit'];
        const skins = ['Asiimov', 'Redline', 'Dragon Lore', 'Neo-Noir', 'Hyper Beast', 'Vulcan', 'Doppler', 'Fade'];
        const rarities = ['rarity-restricted', 'rarity-classified', 'rarity-covert'];

        // Функция генерации случайного скина
        function generateSkin() {
            return {
                weapon: weapons[Math.floor(Math.random() * weapons.length)],
                name: skins[Math.floor(Math.random() * skins.length)],
                price: (Math.random() * 50000 + 500).toFixed(2),
                rarity: rarities[Math.floor(Math.random() * rarities.length)]
            };
        }

        // Отрисовка скина в сетке
        function createSkinCard(skin, side) {
            return `
                <div class="skin-card ${skin.rarity}" onclick="selectSkin(this, '${side}', '${skin.price}', '${skin.weapon} | ${skin.name}')">
                    <div class="skin-price">${skin.price} ₽</div>
                    <div style="height: 70px; display: flex; align-items: center; justify-content: center; margin: 10px 0;">
                        <div style="width: 80%; height: 20px; background: #444; border-radius: 4px; transform: rotate(-15deg);"></div>
                    </div>
                    <div class="skin-name">${skin.weapon}</div>
                    <div class="skin-model">${skin.name}</div>
                </div>
            `;
        }

        // Заполнение инвентарей
        const mySkinsDiv = document.getElementById('mySkins');
        const shopSkinsDiv = document.getElementById('shopSkins');
        
        for(let i=0; i<20; i++) mySkinsDiv.innerHTML += createSkinCard(generateSkin(), 'left');
        for(let i=0; i<30; i++) shopSkinsDiv.innerHTML += createSkinCard(generateSkin(), 'right');

        // Логика выбора скина
        let leftPrice = 0;
        let rightPrice = 0;

        function selectSkin(element, side, price, fullName) {
            const slot = side === 'left' ? document.getElementById('leftSlot') : document.getElementById('rightSlot');
            
            // Визуальное оформление слота
            slot.classList.add('active');
            slot.innerHTML = `
                <div class="slot-title" style="top: 10px; color: var(--accent-gold);">Выбрано</div>
                <div style="font-size: 24px; font-weight: bold; margin-bottom: 10px;">${price} ₽</div>
                <div style="width: 150px; height: 50px; background: #444; border-radius: 4px; transform: rotate(-10deg); margin: 20px 0; box-shadow: 0 10px 20px rgba(0,0,0,0.5);"></div>
                <div style="font-size: 14px; text-align: center;">${fullName}</div>
            `;

            if (side === 'left') leftPrice = parseFloat(price);
            else rightPrice = parseFloat(price);

            calculateChance();
        }

        // Расчет шанса
        function calculateChance() {
            if (leftPrice > 0 && rightPrice > 0) {
                let chance = (leftPrice / rightPrice) * 100;
                if (chance > 95) chance = 95; // Максимальный шанс
                
                const chanceDisplay = document.getElementById('chanceDisplay');
                const wheel = document.getElementById('mainWheel');
                
                chanceDisplay.innerText = chance.toFixed(2) + '%';
                // Обновляем заливку круга
                wheel.style.background = \`conic-gradient(var(--accent-gold) \${chance}%, var(--bg-panel) 0)\`;
            }
        }

        // Имитация апгрейда
        let isUpgrading = false;
        function startUpgrade() {
            if (isUpgrading || leftPrice === 0 || rightPrice === 0) return;
            isUpgrading = true;

            const btn = document.getElementById('btnUpgrade');
            const wheelContainer = document.querySelector('.wheel-container');
            const wheel = document.getElementById('mainWheel');
            
            btn.innerText = 'ПРОКАЧКА...';
            wheelContainer.classList.add('upgrading');
            
            // Имитация вращения колеса (визуально крутим фон)
            let rotation = 0;
            const spinInterval = setInterval(() => {
                rotation += 45;
                wheel.style.transform = \`rotate(\${rotation}deg)\`;
            }, 50);

            // Исход через 3 секунды
            setTimeout(() => {
                clearInterval(spinInterval);
                wheelContainer.classList.remove('upgrading');
                wheel.style.transform = 'rotate(0deg)';
                
                const chance = (leftPrice / rightPrice) * 100;
                const roll = Math.random() * 100;
                const isWin = roll <= chance;

                if (isWin) {
                    btn.style.background = 'var(--success)';
                    btn.innerText = 'УСПЕШНО!';
                    wheel.style.background = 'var(--success)';
                    document.getElementById('chanceDisplay').style.color = 'var(--success)';
                    addFeedItem(true);
                } else {
                    btn.style.background = 'var(--danger)';
                    btn.innerText = 'ПРОВАЛ';
                    wheel.style.background = 'var(--danger)';
                    document.getElementById('chanceDisplay').style.color = 'var(--danger)';
                    addFeedItem(false);
                }

                // Сброс через 2 секунды
                setTimeout(() => {
                    btn.style.background = 'var(--accent-gold)';
                    btn.innerText = 'Прокачать';
                    document.getElementById('chanceDisplay').style.color = 'var(--accent-gold)';
                    calculateChance();
                    isUpgrading = false;
                }, 2000);

            }, 3000);
        }

        // Заполнение Live Feed
        const feedDiv = document.getElementById('liveFeed');
        function addFeedItem(isWinMock = null) {
            const isWin = isWinMock !== null ? isWinMock : Math.random() > 0.5;
            const skin = generateSkin();
            const el = document.createElement('div');
            el.className = \`feed-item \${isWin ? 'win' : ''}\`;
            el.innerHTML = \`
                <div style="width: 40px; height: 20px; background: #444; border-radius: 2px;"></div>
                <div class="feed-item-info">
                    <p>\${skin.weapon}</p>
                    <strong>\${skin.price} ₽</strong>
                </div>
            \`;
            feedDiv.prepend(el);
            if (feedDiv.children.length > 20) feedDiv.removeChild(feedDiv.lastChild);
        }

        // Инициализация фида
        setInterval(() => addFeedItem(), 3500);
        for(let i=0; i<10; i++) addFeedItem();

    </script>
</body>
</html>
