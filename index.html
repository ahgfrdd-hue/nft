<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>FlashUpgrader</title>
    <style>
        :root { 
            --accent: #00ff88; 
            --accent-hover: #00cc6a;
            --bg: #0a0c14; 
            --panel: #151824; 
            --danger: #ff3366;
        }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; margin: 0; min-height: 100vh; }
        
        /* Sidebar */
        #live-feed { width: 120px; height: 100vh; background: #111420; border-right: 1px solid #222; overflow: hidden; padding: 10px; box-sizing: border-box; }
        .live-item { width: 100%; height: 90px; background: #1a1e30; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; font-size: 32px; animation: drop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        @keyframes drop { from { opacity: 0; transform: translateY(-30px) scale(0.8); } to { opacity: 1; transform: translateY(0) scale(1); } }

        /* Main */
        .content { flex: 1; padding: 40px; display: flex; flex-direction: column; align-items: center; overflow-y: auto; }
        h1 { color: var(--accent); margin-bottom: 30px; letter-spacing: 3px; font-size: 36px; text-shadow: 0 0 20px rgba(0, 255, 136, 0.3); }
        
        .upgrade-zone { display: flex; gap: 50px; align-items: center; margin-bottom: 40px; }
        .item-card { width: 220px; height: 300px; background: var(--panel); border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px solid #222; transition: all 0.3s ease; position: relative; overflow: hidden; }
        .item-card:hover { transform: translateY(-5px); border-color: #333; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .item-card.active { border-color: var(--accent); box-shadow: 0 0 20px rgba(0, 255, 136, 0.2); }
        .item-card .icon { font-size: 80px; margin-bottom: 20px; transition: transform 0.3s; }
        .item-card:hover .icon { transform: scale(1.1); }
        .item-card .name { font-size: 20px; font-weight: bold; }
        .item-card .price { color: #888; margin-top: 10px; }
        
        /* Рулетка */
        .roulette { width: 200px; height: 200px; border-radius: 50%; border: 8px solid #1a1e30; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 32px; position: relative; transition: all 0.5s ease; background: #0f121d; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
        .roulette::before { content: ''; position: absolute; top: -8px; left: -8px; right: -8px; bottom: -8px; border-radius: 50%; border: 8px solid transparent; border-top-color: var(--accent); opacity: 0; transition: 0.3s; }
        .roulette.spinning::before { opacity: 1; animation: spin 1s linear infinite; }
        .roulette.success { border-color: var(--accent); color: var(--accent); text-shadow: 0 0 15px var(--accent); }
        .roulette.fail { border-color: var(--danger); color: var(--danger); text-shadow: 0 0 15px var(--danger); }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        /* Зеленая штука (Контролы перенесены вниз) */
        .controls-wrapper { display: flex; flex-direction: column; align-items: center; gap: 20px; background: #111420; padding: 30px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #222; width: 100%; max-width: 600px; }
        .multiplier-bar { display: flex; gap: 15px; }
        .mult-btn { background: #1a1e30; color: #fff; border: 2px solid #333; padding: 12px 30px; border-radius: 12px; cursor: pointer; font-size: 18px; font-weight: bold; transition: all 0.2s ease; }
        .mult-btn:hover { border-color: var(--accent); color: var(--accent); }
        .mult-btn.active { background: var(--accent); color: #000; border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 255, 136, 0.4); }
        
        #upg-btn { padding: 18px 80px; background: var(--accent); color: #000; font-weight: 900; font-size: 24px; border-radius: 40px; border: none; cursor: pointer; transition: all 0.2s ease; text-transform: uppercase; letter-spacing: 1px; }
        #upg-btn:hover { background: var(--accent-hover); transform: scale(1.05); box-shadow: 0 0 25px rgba(0, 255, 136, 0.5); }
        #upg-btn:active { transform: scale(0.95); }
        #upg-btn:disabled { background: #333; color: #666; cursor: not-allowed; box-shadow: none; transform: none; }
        
        /* Инвентарь */
        .section { width: 100%; max-width: 900px; margin-top: 50px; }
        .section h3 { margin-bottom: 20px; font-size: 24px; border-bottom: 2px solid #222; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; }
        .shop-card { background: var(--panel); padding: 20px 15px; border-radius: 16px; text-align: center; border: 1px solid #222; transition: all 0.2s ease; cursor: pointer; }
        .shop-card:hover { transform: translateY(-5px); border-color: #555; background: #1a1e30; }
        .shop-card .icon { font-size: 40px; margin-bottom: 10px; }
        .shop-card .name { font-weight: bold; margin-bottom: 5px; }
        .shop-card .price { color: #888; font-size: 14px; }
    </style>
</head>
<body>

<div id="live-feed"></div>

<div class="content">
    <h1>FLASHUPGRADER</h1>

    <!-- Зона апгрейда -->
    <div class="upgrade-zone">
        <div class="item-card" id="source-card">
            <div class="icon">❓</div>
            <div class="name">Выберите предмет</div>
            <div class="price">из инвентаря</div>
        </div>
        
        <div class="roulette" id="roulette-display">50%</div>
        
        <div class="item-card" id="target-card">
            <div class="icon">🎯</div>
            <div class="name">Цель</div>
            <div class="price">--</div>
        </div>
    </div>

    <!-- Зеленая штука (контролы) теперь внизу и красиво оформлена -->
    <div class="controls-wrapper">
        <div class="multiplier-bar">
            <button class="mult-btn active" onclick="setMult(1.5, this)">1.5X</button>
            <button class="mult-btn" onclick="setMult(2, this)">2X</button>
            <button class="mult-btn" onclick="setMult(5, this)">5X</button>
            <button class="mult-btn" onclick="setMult(10, this)">10X</button>
        </div>
        <button id="upg-btn" onclick="startUpgrade()">UPGRADE</button>
    </div>

    <!-- Инвентарь -->
    <div class="section">
        <h3>Мой Инвентарь (Баланс: <span id="balance-display">50000</span> ⭐️)</h3>
        <div class="grid" id="inventory-grid"></div>
    </div>
</div>

<script>
    // Звуки (нужно добавить файлы в папку)
    const sfx = {
        click: new Audio('click.mp3'),
        spin: new Audio('spin.mp3'),
        win: new Audio('success.mp3'),
        fail: new Audio('fail.mp3')
    };

    function playSound(name) {
        if(sfx[name]) {
            sfx[name].currentTime = 0;
            sfx[name].play().catch(e => console.log("Добавь mp3 файлы для звука!"));
        }
    }

    // Расширенный список подарков (предметов)
    const items = [
        { id: 1, name: "Звезда", price: 100, img: "⭐️" },
        { id: 2, name: "Елка", price: 500, img: "🎄" },
        { id: 3, name: "Сердце", price: 1000, img: "💛" },
        { id: 4, name: "Огонь", price: 2500, img: "🔥" },
        { id: 5, name: "Корона", price: 5000, img: "👑" },
        { id: 6, name: "Ракета", price: 10000, img: "🚀" },
        { id: 7, name: "Лягушка", price: 15000, img: "🐸" },
        { id: 8, name: "Пришелец", price: 25000, img: "👽" },
        { id: 9, name: "Магия", price: 50000, img: "🔮" },
        { id: 10, name: "Бриллиант", price: 100000, img: "💎" }
    ];

    // Состояние игрока
    let player = {
        balance: 50000,
        inventory: [1, 2, 3, 5, 7] // Стартовые ID предметов у игрока
    };

    let currentMult = 1.5;
    let selectedSourceId = null;
    let isUpgrading = false;

    // Плавная лента (Live Feed)
    function addLive() {
        const f = document.getElementById('live-feed');
        const d = document.createElement('div');
        d.className = 'live-item';
        d.innerText = items[Math.floor(Math.random()*items.length)].img;
        f.prepend(d);
        if(f.children.length > 7) f.lastChild.remove();
    }
    setInterval(addLive, 1500);

    // Отрисовка инвентаря
    function renderInventory() {
        document.getElementById('balance-display').innerText = player.balance;
        const grid = document.getElementById('inventory-grid');
        grid.innerHTML = '';
        
        player.inventory.forEach((itemId, index) => {
            const item = items.find(i => i.id === itemId);
            if(!item) return;

            const div = document.createElement('div');
            div.className = 'shop-card';
            div.innerHTML = `
                <div class="icon">${item.img}</div>
                <div class="name">${item.name}</div>
                <div class="price">${item.price} ⭐️</div>
            `;
            div.onclick = () => selectSource(item, index);
            grid.appendChild(div);
        });
    }

    // Выбор предмета для апгрейда
    function selectSource(item, inventoryIndex) {
        if(isUpgrading) return;
        playSound('click');
        selectedSourceId = inventoryIndex; // Запоминаем индекс в инвентаре
        
        document.getElementById('source-card').innerHTML = `
            <div class="icon">${item.img}</div>
            <div class="name">${item.name}</div>
            <div class="price">${item.price} ⭐️</div>
        `;
        document.getElementById('source-card').classList.add('active');
        
        updateTarget(item.price);
    }

    // Установка множителя
    function setMult(val, btnElement) {
        if(isUpgrading) return;
        playSound('click');
        currentMult = val;
        
        // Убираем активный класс у всех кнопок
        document.querySelectorAll('.mult-btn').forEach(b => b.classList.remove('active'));
        btnElement.classList.add('active');

        // Если предмет уже выбран, обновляем цель
        if(selectedSourceId !== null) {
            const sourceItem = items.find(i => i.id === player.inventory[selectedSourceId]);
            updateTarget(sourceItem.price);
        }
    }

    // Расчет цели (шанса и иконки)
    function updateTarget(sourcePrice) {
        const targetPrice = sourcePrice * currentMult;
        // Находим подходящий предмет или создаем заглушку, если такого дорогого нет
        let targetItem = items.slice().reverse().find(i => i.price <= targetPrice) || items[items.length-1];
        
        // Расчет шанса (чуть меньше 100/mult для маржи казино)
        let chance = (100 / currentMult) * 0.9; 
        if(chance > 90) chance = 90;
        
        document.getElementById('target-card').innerHTML = `
            <div class="icon">${targetItem.img}</div>
            <div class="name">Цель (x${currentMult})</div>
            <div class="price">~${Math.floor(targetPrice)} ⭐️</div>
        `;
        
        document.getElementById('roulette-display').innerText = chance.toFixed(1) + '%';
        document.getElementById('roulette-display').className = 'roulette'; // Сброс классов
    }

    // Сам апгрейд (красивая и плавная логика)
    function startUpgrade() {
        if(selectedSourceId === null) {
            alert("Сначала выберите предмет из инвентаря!");
            return;
        }
        if(isUpgrading) return;

        isUpgrading = true;
        document.getElementById('upg-btn').disabled = true;
        playSound('spin');

        const sourceItem = items.find(i => i.id === player.inventory[selectedSourceId]);
        let chance = (100 / currentMult) * 0.9;
        const win = Math.random() * 100 <= chance;

        const roulette = document.getElementById('roulette-display');
        roulette.classList.add('spinning');
        roulette.innerText = '...';

        // Имитация кручения
        setTimeout(() => {
            roulette.classList.remove('spinning');
            
            // Удаляем исходный предмет в любом случае
            player.inventory.splice(selectedSourceId, 1);
            selectedSourceId = null;
            document.getElementById('source-card').classList.remove('active');
            document.getElementById('source-card').innerHTML = '<div class="icon">❓</div><div class="name">Выберите предмет</div><div class="price">из инвентаря</div>';

            if(win) {
                playSound('win');
                roulette.classList.add('success');
                roulette.innerText = 'WIN!';
                
                // Выдаем предмет-цель или деньги
                const targetPrice = sourceItem.price * currentMult;
                let targetItem = items.slice().reverse().find(i => i.price <= targetPrice);
                if(targetItem) {
                    player.inventory.push(targetItem.id);
                } else {
                    player.balance += targetPrice; // Если предмета нет, даем балансом
                }
            } else {
                playSound('fail');
                roulette.classList.add('fail');
                roulette.innerText = 'CRASH';
            }

            renderInventory();
            isUpgrading = false;
            document.getElementById('upg-btn').disabled = false;
            
            setTimeout(() => {
                if(!isUpgrading) {
                    roulette.className = 'roulette';
                    roulette.innerText = chance.toFixed(1) + '%';
                }
            }, 2000);

        }, 1500); // Время анимации рулетки
    }

    // Запуск
    renderInventory();
</script>
</body>
</html>
