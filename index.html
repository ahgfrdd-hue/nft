<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Stars Premium Upgrader</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap');

        :root {
            --bg-main: #060913;
            --bg-panel: #0b1120;
            --bg-card: #111a30;
            --bg-input: #0e1526;
            --text-main: #ffffff;
            --text-muted: #64748b;
            --accent-blue: #0088cc;
            --accent-yellow: #00f0ff; 
            --accent-gold: #ffca00;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --border-color: #1e293b;
            --border-hover: #334155;

            /* Редкости предметов */
            --tier-common: linear-gradient(135deg, #1e40af, #1e3a8a);
            --tier-rare: linear-gradient(135deg, #6d28d9, #4c1d95);
            --tier-epic: linear-gradient(135deg, #be185d, #701a75);
            --tier-legendary: linear-gradient(135deg, #b91c1c, #7f1d1d);
            --tier-immortal: linear-gradient(135deg, #b45309, #78350f);
            
            --shadow-win: 0 0 20px rgba(16, 185, 129, 0.4);
            --shadow-lose: 0 0 20px rgba(239, 68, 68, 0.4);
        }

        body {
            margin: 0; padding: 20px;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            box-sizing: border-box; user-select: none;
            display: flex; flex-direction: column; align-items: center;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-6px) rotate(1deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .app-container {
            width: 100%; max-width: 1340px;
            display: flex; flex-direction: column; gap: 20px;
        }

        /* ХЕДЕР ПЛАТФОРМЫ */
        .app-header {
            display: flex; justify-content: space-between; align-items: center;
            background-color: var(--bg-panel); padding: 14px 24px;
            border-radius: 16px; border: 1px solid var(--border-color);
        }
        .brand { font-size: 20px; font-weight: 900; display: flex; align-items: center; gap: 8px; }
        .brand span { color: var(--accent-blue); text-shadow: 0 0 10px rgba(0, 136, 204, 0.4); }
        .header-controls { display: flex; align-items: center; gap: 12px; }
        
        .btn-audio {
            background: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-muted);
            padding: 10px 18px; border-radius: 10px; cursor: pointer; transition: all 0.2s; font-weight: 700;
        }
        .btn-audio.active { color: var(--accent-gold); border-color: rgba(255,202,0,0.3); box-shadow: 0 0 10px rgba(255,202,0,0.15); }

        /* ИСТОРИЯ ВЫБИТЫХ ПОДАРКОВ (ЖИВАЯ ЛЕНТА) */
        .live-history-ribbon {
            display: flex; gap: 10px; background: var(--bg-panel); border: 1px solid var(--border-color);
            padding: 12px; border-radius: 16px; overflow-x: auto; min-height: 70px; align-items: center;
        }
        .live-history-ribbon::-webkit-scrollbar { height: 4px; }
        .live-history-ribbon::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        
        .ribbon-item {
            display: flex; align-items: center; gap: 10px; background: var(--bg-card);
            border-radius: 10px; padding: 6px 14px; min-width: 160px; flex-shrink: 0;
            border: 1px solid var(--border-color); box-sizing: border-box;
            animation: slideIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        .ribbon-item.win { border-color: var(--accent-green); box-shadow: inset 0 0 10px rgba(16,185,129,0.1); }
        .ribbon-item.lose { border-color: var(--accent-red); box-shadow: inset 0 0 10px rgba(239,68,68,0.1); }
        
        .ribbon-img { width: 34px; height: 34px; object-fit: contain; }
        .ribbon-info { display: flex; flex-direction: column; gap: 2px; }
        .ribbon-name { font-size: 11px; font-weight: 700; color: #fff; max-width: 100px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ribbon-status { font-size: 9px; font-weight: 800; text-transform: uppercase; }
        .ribbon-status.win { color: var(--accent-green); }
        .ribbon-status.lose { color: var(--accent-red); }

        /* РАБОЧЕЕ ПРОСТРАНСТВО */
        .top-section {
            display: grid; grid-template-columns: 1fr 1.2fr 1fr; gap: 20px; min-height: 420px;
        }

        .panel {
            background-color: var(--bg-panel); border-radius: 20px;
            position: relative; display: flex; flex-direction: column;
            border: 1px solid var(--border-color); padding: 24px; box-sizing: border-box;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .panel-title {
            font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase;
            letter-spacing: 1.5px; margin-bottom: 20px; text-align: center;
        }

        .item-preview { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; }
        .gift-img-large { width: 130px; height: 130px; object-fit: contain; margin-bottom: 12px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)); animation: float 4s ease-in-out infinite; }
        .item-name { color: #fff; font-size: 19px; font-weight: 800; letter-spacing: -0.5px; }
        .item-price { font-size: 15px; font-weight: 700; color: var(--accent-gold); margin-top: 6px; background: rgba(255,202,0,0.05); padding: 4px 12px; border-radius: 20px; border: 1px solid rgba(255,202,0,0.15); }
        .empty-state { color: var(--text-muted); font-size: 13px; font-weight: 600; text-align: center; margin: auto; line-height: 1.6; }
        .empty-state span { display: block; margin-top: 6px; font-size: 11px; color: #475569; }

        .balance-slider-container {
            margin-top: auto; display: flex; flex-direction: column; gap: 10px;
            background: var(--bg-input); padding: 14px; border-radius: 14px; border: 1px solid var(--border-color);
        }
        .slider-header { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-muted); font-weight: 600; }
        .custom-slider { width: 100%; -webkit-appearance: none; background: var(--border-color); height: 6px; border-radius: 10px; outline: none; }
        .custom-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--accent-gold); cursor: pointer; box-shadow: 0 0 10px rgba(255,202,0,0.5);
        }

        /* ЦЕНТРАЛЬНОЕ КОЛЕСО */
        .center-panel { align-items: center; justify-content: center; background: transparent; border: none; padding: 0; gap: 20px;}
        .circle-container { position: relative; width: 280px; height: 280px; }
        
        /* Статичная основа колеса */
        .upgrader-wheel {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%; background: #0f1524;
            display: flex; align-items: center; justify-content: center;
            z-index: 1; border: 4px solid var(--border-color); box-shadow: inset 0 0 25px rgba(0,0,0,0.7);
        }

        .wheel-inner {
            width: 205px; height: 205px; background: var(--bg-panel); border-radius: 50%;
            z-index: 5; display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 2px solid var(--border-color); box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .wheel-percent { font-size: 44px; font-weight: 900; color: var(--accent-gold); letter-spacing: -1px; text-shadow: 0 0 15px rgba(255, 202, 0, 0.2); }
        .wheel-text { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; font-weight: 700; margin-top: 4px; }

        /* ПОДВИЖНАЯ СТРЕЛКА НА ОРБИТЕ */
        .wheel-ticker-orbit {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none; transform: rotate(0deg);
        }
        .ticker-arrow-element {
            position: absolute; bottom: -10px; left: calc(50% - 14px);
            width: 0; height: 0;
            border-left: 14px solid transparent; border-right: 14px solid transparent;
            border-bottom: 24px solid #ffffff;
            filter: drop-shadow(0 0 12px #ffffff);
        }

        .btn-upgrade {
            width: 100%; background: linear-gradient(135deg, #ffca00, #e6b600); color: #000; border: none;
            padding: 18px; font-size: 15px; font-weight: 800; border-radius: 14px; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1.5px; transition: all 0.2s;
        }
        .btn-upgrade:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 0 25px rgba(255,202,0,0.35); }
        .btn-upgrade:disabled { background: #151c2e; color: #3b455e; cursor: not-allowed; box-shadow: none; border: 1px solid var(--border-color); }

        .multiplier-container { margin-top: auto; display: flex; flex-direction: column; gap: 8px; width: 100%; }
        .multiplier-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
        .btn-mult {
            background: var(--bg-input); border: 1px solid var(--border-color); color: #94a3b8;
            padding: 10px 0; font-size: 11px; font-weight: 700; border-radius: 8px; cursor: pointer; text-align: center;
        }
        .btn-mult.active { background: rgba(0, 240, 255, 0.08); border-color: var(--accent-yellow); color: var(--accent-yellow); }

        /* ИНВЕНТАРЬ И МАГАЗИН */
        .bottom-section { display: grid; grid-template-columns: 1fr 1.2fr; gap: 24px; min-height: 480px; }
        .inventory-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 16px; border-bottom: 1px solid var(--border-color); margin-bottom: 16px; }
        .inventory-title { font-weight: 800; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: #fff; }
        .balance-badge { background: rgba(255,202,0,0.08); border: 1px solid rgba(255,202,0,0.2); padding: 8px 14px; border-radius: 10px; font-size: 14px; font-weight: 700; color: var(--accent-gold); }

        .shop-filter-bar { display: flex; gap: 8px; align-items: center; }
        .search-input { background: var(--bg-input); border: 1px solid var(--border-color); border-radius: 10px; padding: 8px 12px; color: #fff; font-size: 12px; outline: none; }
        
        .grid-container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px; overflow-y: auto; height: 380px; align-content: start;
        }
        .grid-container::-webkit-scrollbar { width: 5px; }
        .grid-container::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

        /* Карточки предметов */
        .skin-card {
            background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 14px;
            padding: 12px; position: relative; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            height: 155px; box-sizing: border-box; transition: all 0.2s;
        }
        .skin-card:hover { border-color: #475569; transform: translateY(-2px); }
        .skin-card.selected { border-color: var(--accent-gold); background: #1a2642; box-shadow: 0 0 15px rgba(255, 202, 0, 0.2); }
        
        .rarity-line { position: absolute; top: 0; left: 0; width: 100%; height: 4px; border-radius: 14px 14px 0 0; }
        .card-price { width: 100%; text-align: right; font-size: 11px; font-weight: 700; color: var(--accent-gold); }
        .gift-img-small { width: 60px; height: 60px; object-fit: contain; filter: drop-shadow(0 6px 10px rgba(0,0,0,0.4)); margin: 4px 0; }
        .skin-card .name { font-size: 11px; color: #f1f5f9; font-weight: 600; text-align: center; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Кнопка купить прямо на карточке */
        .btn-buy-product {
            width: 100%; background: #1e293b; color: #fff; border: 1px solid var(--border-color);
            padding: 4px 0; border-radius: 6px; font-size: 10px; font-weight: 700; margin-top: 6px;
            cursor: pointer; transition: all 0.15s;
        }
        .btn-buy-product:hover { background: var(--accent-blue); border-color: var(--accent-blue); }

        .empty-slot { background: rgba(17, 26, 48, 0.1); border: 2px dashed rgba(255,255,255,0.02); border-radius: 14px; height: 155px; }

        .result-banner {
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%) scale(0.9);
            padding: 12px 32px; border-radius: 10px; font-weight: 900; font-size: 14px;
            opacity: 0; transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 20; text-transform: uppercase; letter-spacing: 1.5px; pointer-events: none;
        }
        .result-banner.win { opacity: 1; transform: translateX(-50%) scale(1); background: var(--accent-green); color: #000; box-shadow: var(--shadow-win); }
        .result-banner.lose { opacity: 1; transform: translateX(-50%) scale(1); background: var(--accent-red); color: #fff; box-shadow: var(--shadow-lose); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="app-header">
        <div class="brand">🚀 UPGRADER<span>.TG</span></div>
        <div class="header-controls">
            <button class="btn-audio active" id="audio-toggle" onclick="toggleAudio()">🔊 Звук</button>
        </div>
    </div>

    <div class="live-history-ribbon" id="live-ribbon-container">
        </div>

    <div class="top-section">
        <div class="panel" id="panel-input">
            <div class="panel-title">Ваш Предмет</div>
            <div id="preview-left-content" class="item-preview" style="display: none;">
                <img src="" class="gift-img-large" id="input-img" alt="">
                <div class="item-name" id="input-title">Название</div>
                <div class="item-price" id="input-price">0 ⭐️</div>
            </div>
            <div id="preview-left-empty" class="empty-state">

                <span>из инвентаря снизу для начала</span>
            </div>
            
            <div class="balance-slider-container">
                <div class="slider-header">
                    <span>Добавить баланс:</span>
                    <span><span id="slider-val">0</span> ⭐️</span>
                </div>
                <input type="range" min="0" max="0" value="0" class="custom-slider" id="balance-slider" oninput="updateSliderAmount()">
            </div>
        </div>

        <div class="panel center-panel">
            <div class="result-banner" id="res-banner">УСПЕХ!</div>
            <div class="circle-container">
                <canvas id="wheel-canvas-render" width="280" height="280" style="position:absolute; top:0; left:0; z-index:2; border-radius:50%; pointer-events:none;"></canvas>
                <div class="upgrader-wheel" id="wheel-base">
                    <div class="wheel-ticker-orbit" id="wheel-ticker-mover">
                        <div class="ticker-arrow-element"></div>
                    </div>
                    <div class="wheel-inner">
                        <div class="wheel-percent" id="chance-display">0.00%</div>
                        <div class="wheel-text" id="chance-status">выберите цели</div>
                    </div>
                </div>
            </div>
            <button class="btn-upgrade" id="btn-upgrade-main" disabled onclick="startUpgrade()">Попытаться улучшить</button>
        </div>

        <div class="panel" id="panel-target">
            <div class="panel-title">Целевой Предмет</div>
            <div id="preview-right-content" class="item-preview" style="display: none;">
                <img src="" class="gift-img-large" id="target-img" alt="">
                <div class="item-name" id="target-title">Название</div>
                <div class="item-price" id="target-price">0 ⭐️</div>
            </div>
            <div id="preview-right-empty" class="empty-state">
                ВЫБЕРИТЕ ЦЕЛЬ
                <span>из витрины наград справа</span>
            </div>

            <div class="multiplier-container">
                <div class="multiplier-grid">
                    <button class="btn-mult" id="m-x2" onclick="applyQuickMultiplier(2, false)">x2</button>
                    <button class="btn-mult" id="m-x5" onclick="applyQuickMultiplier(5, false)">x5</button>
                    <button class="btn-mult" id="m-x10" onclick="applyQuickMultiplier(10, false)">x10</button>
                    <button class="btn-mult" id="m-25" onclick="applyQuickMultiplier(25, true)">25%</button>
                    <button class="btn-mult" id="m-50" onclick="applyQuickMultiplier(50, true)">50%</button>
                    <button class="btn-mult" id="m-75" onclick="applyQuickMultiplier(75, true)">75%</button>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-section">
        <div class="panel">
            <div class="inventory-header">
                <div class="inventory-title">🗃 Мой инвентарь <span id="inv-count">(0)</span></div>
                <div class="balance-badge"><span id="balance-amount">25000</span> ⭐️</div>
            </div>
            <div class="grid-container" id="my-inventory-grid"></div>
        </div>

        <div class="panel">
            <div class="inventory-header">
                <div class="inventory-title">🛍 Магазин (Купить Подарки)</div>
                <div class="shop-filter-bar">
                    <input type="text" class="search-input" id="shop-search" placeholder="Поиск..." oninput="renderShop()">
                </div>
            </div>
            <div class="grid-container" id="shop-grid"></div>
        </div>
    </div>
</div>

<script>
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    let isSoundEnabled = true;

    function initAudio() {
        if (!audioCtx) audioCtx = new AudioContext();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function toggleAudio() {
        isSoundEnabled = !isSoundEnabled;
        const btn = document.getElementById("audio-toggle");
        btn.classList.toggle("active", isSoundEnabled);
        btn.innerText = isSoundEnabled ? "🔊 Звук" : "🔇 Мут";
        if (isSoundEnabled) initAudio();
    }

    // ПРОФЕССИОНАЛЬНЫЙ СИНТЕЗАТОР ЗВУКОВ
    function playSound(type) {
        if (!audioCtx || !isSoundEnabled) return;
        const now = audioCtx.currentTime;
        
        if (type === 'click') {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(500, now); gain.gain.setValueAtTime(0.05, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.04); osc.start(now); osc.stop(now + 0.04);
        } else if (type === 'tick') {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'triangle';
            osc.frequency.setValueAtTime(850, now); gain.gain.setValueAtTime(0.03, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.015); osc.start(now); osc.stop(now + 0.015);
        } else if (type === 'win') {
            [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => {
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.frequency.setValueAtTime(f, now + i*0.06); g.gain.setValueAtTime(0.08, now + i*0.06);
                g.gain.exponentialRampToValueAtTime(0.001, now + i*0.06 + 0.2); o.connect(g); g.connect(audioCtx.destination);
                o.start(now + i*0.06); o.stop(now + i*0.06 + 0.2);
            });
        } else if (type === 'lose') {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(140, now); osc.frequency.linearRampToValueAtTime(40, now + 0.4);
            gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0.001, now + 0.4);
            osc.start(now); osc.stop(now + 0.4);
        }
    }

    // УДВОЕННАЯ БАЗА ПРЕМИУМ ПОДАРКОВ TELEGRAM
    const NFT_DATABASE = {
        "lollipop": { name: "Lollipop", img: "https://i.postimg.cc/k47vYg7k/lollipop.png", price: 50, rarity: "var(--tier-common)" },
        "pigeon": { name: "Letter Pigeon", img: "https://i.postimg.cc/g0gDcgL4/pigeon.png", price: 120, rarity: "var(--tier-common)" },
        "rose": { name: "Red Rose", img: "https://i.postimg.cc/PqMvMDp6/heart.png", price: 250, rarity: "var(--tier-common)" },
        "cake": { name: "Birthday Cake", img: "https://i.postimg.cc/0jXm8Yf1/cake.png", price: 500, rarity: "var(--tier-common)" },
        "coffee": { name: "Cappuccino", img: "https://i.postimg.cc/hGvXbXbY/cap.png", price: 950, rarity: "var(--tier-rare)" },
        "duck": { name: "Rubber Duck", img: "https://i.postimg.cc/N0fL8vWh/duck.png", price: 1800, rarity: "var(--tier-rare)" },
        "star_bottle": { name: "Star Bottle", img: "https://i.postimg.cc/85zXbXfG/star.png", price: 3500, rarity: "var(--tier-rare)" },
        "hamster": { name: "Plush Hamster", img: "https://i.postimg.cc/HkWZzX9S/hotdog.png", price: 6800, rarity: "var(--tier-epic)" },
        "ton_coin": { name: "Crypto TON", img: "https://i.postimg.cc/PqMvMDp6/heart.png", price: 14000, rarity: "var(--tier-epic)" },
        "leopard": { name: "Snow Leopard", img: "https://i.postimg.cc/fyXbXbF3/crystal.png", price: 29000, rarity: "var(--tier-epic)" },
        "durov": { name: "CEO Durov", img: "https://i.postimg.cc/hGvXbXbY/cap.png", price: 65000, rarity: "var(--tier-legendary)" },
        "magic_crystal": { name: "Magic Orb", img: "https://i.postimg.cc/fyXbXbF3/crystal.png", price: 135000, rarity: "var(--tier-legendary)" },
        "rocket": { name: "Space Shuttle", img: "https://i.postimg.cc/9QvXbXb8/crown.png", price: 280000, rarity: "var(--tier-immortal)" },
        "telegram_bear": { name: "Golden Bear", img: "https://i.postimg.cc/9QvXbXb8/crown.png", price: 600000, rarity: "var(--tier-immortal)" }
    };

    let freebetBalance = 45000;
    let userInventory = ["lollipop", "pigeon", "rose", "cake"]; 
    let selectedInvIdx = null;
    let selectedShopKey = null;
    let addedBalance = 0;
    let calculatedChance = 0;
    let isUpgrading = false;

    document.body.addEventListener('click', initAudio, { once: true });

    window.onload = function() { init(); };

    function init() { 
        renderInventory(); 
        renderShop(); 
        updateWorkspace(); 
    }

    // ПОКУПКА ПРЕДМЕТОВ В ИНВЕНТАРЬ ВМЕСТО ХАЛЯВЫ
    function buyItemDirectly(key, e) {
        e.stopPropagation();
        const item = NFT_DATABASE[key];
        if (!item) return;

        if (freebetBalance >= item.price) {
            freebetBalance -= item.price;
            userInventory.push(key);
            playSound('win');
            init();
        } else {
            playSound('lose');
            alert("Недостаточно ⭐️ для покупки этого подарка!");
        }
    }

    function renderInventory() {
        const grid = document.getElementById("my-inventory-grid");
        grid.innerHTML = "";
        document.getElementById("inv-count").innerText = `(${userInventory.length})`;
        document.getElementById("balance-amount").innerText = freebetBalance.toLocaleString();

        userInventory.forEach((key, idx) => {
            const item = NFT_DATABASE[key];
            if(!item) return;
            const card = document.createElement("div");
            card.className = `skin-card ${selectedInvIdx === idx ? 'selected' : ''}`;
            card.onclick = () => { if(!isUpgrading) { playSound('click'); selectInventoryItem(idx); } };
            card.innerHTML = `
                <div class="rarity-line" style="background: ${item.rarity}"></div>
                <div class="card-price">${item.price.toLocaleString()} ⭐️</div>
                <img src="${item.img}" class="gift-img-small">
                <div class="name">${item.name}</div>
            `;
            grid.appendChild(card);
        });

        for(let i = 0; i < Math.max(0, 8 - userInventory.length); i++) {
            const slot = document.createElement("div"); slot.className = "empty-slot"; grid.appendChild(slot);
        }
    }

    function renderShop() {
        const grid = document.getElementById("shop-grid");
        const searchQuery = document.getElementById("shop-search").value.toLowerCase();
        grid.innerHTML = "";
        
        Object.keys(NFT_DATABASE).forEach(key => {
            const item = NFT_DATABASE[key];
            if (!item.name.toLowerCase().includes(searchQuery)) return;

            const card = document.createElement("div");
            card.className = `skin-card ${selectedShopKey === key ? 'selected' : ''}`;
            card.onclick = () => { if(!isUpgrading) { playSound('click'); selectShopItem(key); } };
            card.innerHTML = `
                <div class="rarity-line" style="background: ${item.rarity}"></div>
                <div class="card-price">${item.price.toLocaleString()} ⭐️</div>
                <img src="${item.img}" class="gift-img-small">
                <div class="name">${item.name}</div>
                <button class="btn-buy-product" onclick="buyItemDirectly('${key}', event)">Купить за ${item.price} ⭐️</button>
            `;
            grid.appendChild(card);
        });
    }

    function selectInventoryItem(idx) { 
        selectedInvIdx = (selectedInvIdx === idx) ? null : idx;
        addedBalance = 0;
        resetMultipliers();
        updateWorkspace(); 
        renderInventory();
    }

    function selectShopItem(key) { 
        selectedShopKey = (selectedShopKey === key) ? null : key;
        resetMultipliers();
        updateWorkspace(); 
        renderShop();
    }

    function resetMultipliers() { document.querySelectorAll('.btn-mult').forEach(b => b.classList.remove('active')); }

    function updateSliderAmount() {
        const slider = document.getElementById("balance-slider");
        addedBalance = parseInt(slider.value);
        document.getElementById("slider-val").innerText = addedBalance.toLocaleString();
        updateWorkspace(false);
    }

    function applyQuickMultiplier(value, isPercentage = false) {
        if (selectedInvIdx === null || isUpgrading) return;
        playSound('click');
        
        const inputItem = NFT_DATABASE[userInventory[selectedInvIdx]];
        const currentTotalInput = inputItem.price + addedBalance;
        let targetTargetPrice = isPercentage ? currentTotalInput / (value / 100) : currentTotalInput * value;

        let bestKey = null; let minDiff = Infinity;
        Object.keys(NFT_DATABASE).forEach(key => {
            const item = NFT_DATABASE[key];
            if (item.price > inputItem.price) {
                const diff = Math.abs(item.price - targetTargetPrice);
                if (diff < minDiff) { minDiff = diff; bestKey = key; }
            }
        });

        if (bestKey) {
            selectedShopKey = bestKey;
            renderShop();
            updateWorkspace(false);
            resetMultipliers();
            document.getElementById(isPercentage ? `m-${value}` : `m-x${value}`)?.classList.add('active');
        }
    }

    // СЕКТОР ВСЕГДА ВНИЗУ (СТАТИЧЕН НА 6 ЧАСОВ)
    function drawWheelSector(chance) {
        const canvas = document.getElementById("wheel-canvas-render");
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (chance <= 0) return;

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius = canvas.width / 2 - 8;
        const totalRads = (chance / 100) * Math.PI * 2;
        
        // Сектор симметрично выравнивается относительно нижней точки (90 градусов / Math.PI/2)
        const startAngle = (Math.PI / 2) - (totalRads / 2);
        const endAngle = (Math.PI / 2) + (totalRads / 2);

        ctx.beginPath(); ctx.moveTo(centerX, centerY);
        ctx.arc(centerX, centerY, radius, startAngle, endAngle);
        ctx.closePath();

        ctx.fillStyle = "rgba(0, 240, 255, 0.12)"; ctx.fill();
        ctx.strokeStyle = "var(--accent-yellow)"; ctx.lineWidth = 4; ctx.stroke();
    }

    function updateWorkspace(resetSlider = true) {
        const pLeftContent = document.getElementById("preview-left-content");
        const pLeftEmpty = document.getElementById("preview-left-empty");
        const slider = document.getElementById("balance-slider");

        if (selectedInvIdx !== null) {
            const item = NFT_DATABASE[userInventory[selectedInvIdx]];
            pLeftEmpty.style.display = "none"; pLeftContent.style.display = "flex";
            document.getElementById("input-img").src = item.img;
            document.getElementById("input-title").innerText = item.name;
            document.getElementById("input-price").innerText = item.price.toLocaleString() + " ⭐️";
            slider.max = freebetBalance;
            if (resetSlider) { slider.value = addedBalance; document.getElementById("slider-val").innerText = addedBalance.toLocaleString(); }
        } else { 
            pLeftContent.style.display = "none"; pLeftEmpty.style.display = "block"; slider.max = 0; slider.value = 0;
            document.getElementById("slider-val").innerText = 0;
        }

        const pRightContent = document.getElementById("preview-right-content");
        const pRightEmpty = document.getElementById("preview-right-empty");
        
        if (selectedShopKey !== null) {
            const item = NFT_DATABASE[selectedShopKey];
            pRightEmpty.style.display = "none"; pRightContent.style.display = "flex";
            document.getElementById("target-img").src = item.img;
            document.getElementById("target-title").innerText = item.name;
            document.getElementById("target-price").innerText = item.price.toLocaleString() + " ⭐️";
        } else { pRightContent.style.display = "none"; pRightEmpty.style.display = "block"; }

        const btnUpgrade = document.getElementById("btn-upgrade-main");
        
        if (selectedInvIdx !== null && selectedShopKey !== null) {
            const costFrom = NFT_DATABASE[userInventory[selectedInvIdx]].price + addedBalance;
            const costTo = NFT_DATABASE[selectedShopKey].price;
            calculatedChance = Math.min((costFrom / costTo) * 100, 100);
            
            const displayChance = document.getElementById("chance-display");
            displayChance.innerText = calculatedChance.toFixed(2) + "%";
            displayChance.style.color = calculatedChance >= 65 ? "var(--accent-green)" : (calculatedChance >= 30 ? "var(--accent-gold)" : "var(--accent-red)");
            document.getElementById("chance-status").innerText = calculatedChance >= 65 ? "высокий шанс" : (calculatedChance >= 30 ? "средний шанс" : "низкий шанс");
            
            if (costTo <= NFT_DATABASE[userInventory[selectedInvIdx]].price) {
                displayChance.innerText = "0.00%"; document.getElementById("chance-status").innerText = "цель должна быть дороже";
                btnUpgrade.disabled = true; drawWheelSector(0);
            } else { btnUpgrade.disabled = false; drawWheelSector(calculatedChance); }
        } else {
            document.getElementById("chance-display").innerText = "0.00%"; document.getElementById("chance-display").style.color = "var(--accent-gold)";
            document.getElementById("chance-status").innerText = "выберите цели"; btnUpgrade.disabled = true; drawWheelSector(0);
        }
    }

    // КИНЕТИЧЕСКАЯ АНИМАЦИЯ КРУЧЕНИЯ СТРЕЛКИ
    function startUpgrade() {
        if(isUpgrading || selectedInvIdx === null || selectedShopKey === null) return;
        isUpgrading = true;
        document.getElementById("btn-upgrade-main").disabled = true;

        freebetBalance -= addedBalance;
        document.getElementById("balance-amount").innerText = freebetBalance.toLocaleString();

        const itemFrom = NFT_DATABASE[userInventory[selectedInvIdx]];
        const itemTo = NFT_DATABASE[selectedShopKey];

        const isWin = (Math.random() * 100) <= calculatedChance;
        
        // Высчитываем угол покоя сектора выигрыша (сектор находится внизу, т.е. от 90-degWidth до 90+degWidth)
        const sectorHalfDeg = (calculatedChance * 3.6) / 2;
        let finalPointerAngle = 0;

        if (isWin) {
            // Стрелка останавливается внутри нижнего сектора
            finalPointerAngle = 180 + (Math.random() * (sectorHalfDeg * 2) - sectorHalfDeg);
        } else {
            // Стрелка останавливается вне нижнего сектора
            const leftZone = (180 - sectorHalfDeg);
            finalPointerAngle = (180 + sectorHalfDeg) + Math.random() * (360 - sectorHalfDeg * 2);
        }

        const spinRounds = 360 * 6; // 6 полных кругов
        const totalTargetRotation = spinRounds + finalPointerAngle;
        
        const tickerMover = document.getElementById("wheel-ticker-mover");
        let startTimestamp = null;
        const duration = 3800; // Повышенная плавность движения
        let lastTickThreshold = 0;

        function stepAnimation(timestamp) {
            if (!startTimestamp) startTimestamp = timestamp;
            const elapsed = timestamp - startTimestamp;
            const progress = Math.min(elapsed / duration, 1);
            
            // Физичный кубический аут-эффект замедления
            const easeOut = 1 - Math.pow(1 - progress, 3);
            const currentDegree = easeOut * totalTargetRotation;
            
            tickerMover.style.transform = `rotate(${currentDegree}deg)`;
            
            // Расчет аудио-кликов прохождения зубцов
            if (currentDegree - lastTickThreshold > 15) {
                playSound('tick');
                lastTickThreshold = currentDegree;
            }

            if (progress < 1) {
                requestAnimationFrame(stepAnimation);
            } else {
                finishUpgradeProcess(isWin, itemFrom, itemTo);
            }
        }
        requestAnimationFrame(stepAnimation);
    }

    function finishUpgradeProcess(isWin, itemFrom, itemTo) {
        const banner = document.getElementById("res-banner");
        
        if (isWin) {
            playSound('win'); banner.innerText = "УСПЕХ!"; banner.className = "result-banner win";
            userInventory[selectedInvIdx] = selectedShopKey;
        } else {
            playSound('lose'); banner.innerText = "НЕУДАЧА"; banner.className = "result-banner lose";
            userInventory.splice(selectedInvIdx, 1);
        }

        // Пушим результат в горизонтальную Живую Ленту
        pushToLiveRibbon(itemTo, isWin);

        selectedInvIdx = null; selectedShopKey = null; addedBalance = 0;
        setTimeout(() => {
            banner.className = "result-banner"; isUpgrading = false;
            init();
        }, 2200);
    }

    // ДОБАВЛЕНИЕ ЭЛЕМЕНТА В ЖИВУЮ ЛЕНТУ
    function pushToLiveRibbon(item, isWin) {
        const container = document.getElementById("live-ribbon-container");
        const node = document.createElement("div");
        node.className = `ribbon-item ${isWin ? 'win' : 'lose'}`;
        node.innerHTML = `
            <img src="${item.img}" class="ribbon-img">
            <div class="ribbon-info">
                <span class="ribbon-name">${item.name}</span>
                <span class="ribbon-status ${isWin ? 'win' : 'lose'}">${isWin ? 'Успех' : 'Сгорел'}</span>
            </div>
        `;
        container.insertBefore(node, container.firstChild);
        
        // Лимитируем до 12 последних дропов на панели, чтобы не перегружать DOM
        if(container.children.length > 12) { container.removeChild(container.lastChild); }
    }
</script>
