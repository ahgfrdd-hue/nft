<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FlashUpgrader LUXE | Telegram Gifts</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0b0f14;
            --bg-sec: #12171f;
            --bg-card: #1a212c;
            --tg-blue: #0088cc;
            --accent-glow: rgba(0, 136, 204, 0.5);
            --accent-star: #fac031;
            --text-main: #ffffff;
            --text-muted: #707a89;
            --accent-green: #2ecc71;
            --accent-red: #e74c3c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; user-select: none; }
        body { background-color: var(--bg-main); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }

        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; height: 70px; background: var(--bg-sec); padding: 0 30px; border-bottom: 2px solid #1c2533; }
        .logo { font-weight: 900; font-size: 24px; text-transform: uppercase; letter-spacing: 1px; color: #fff; text-shadow: 0 0 10px var(--accent-glow); }
        .logo span { color: var(--tg-blue); }
        .online { color: var(--accent-green); font-size: 13px; font-weight: 700; background: rgba(46, 204, 113, 0.1); padding: 8px 15px; border-radius: 20px; border: 1px solid rgba(46, 204, 113, 0.2); }

        /* LIVE DROPS */
        .live-drops { display: flex; gap: 15px; padding: 15px; background: var(--bg-main); overflow-x: hidden; border-bottom: 1px solid #1c2533; }
        .drop-card { background: var(--bg-card); padding: 10px 15px; border-radius: 12px; display: flex; align-items: center; gap: 10px; border: 1px solid #2a3547; min-width: 180px; animation: slideDrop 0.5s ease; }
        .drop-icon { font-size: 20px; }
        .drop-name { font-size: 11px; font-weight: 800; color: #fff; }
        .drop-user { font-size: 10px; color: var(--tg-blue); }

        /* UPGRADER ARENA */
        .arena { display: flex; justify-content: center; align-items: center; gap: 60px; padding: 60px 20px; flex-wrap: wrap; perspective: 1000px; }

        .slot { width: 280px; height: 350px; background: var(--bg-card); border-radius: 24px; border: 2px solid #2a3547; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; transition: 0.4s; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .slot.active { border-color: var(--tg-blue); box-shadow: 0 0 40px var(--accent-glow); transform: translateY(-5px); }
        .slot-label { position: absolute; top: 20px; font-size: 12px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .slot-icon { font-size: 100px; margin-bottom: 20px; filter: drop-shadow(0 0 15px rgba(255,255,255,0.2)); }
        .slot-name { font-size: 16px; font-weight: 800; text-align: center; padding: 0 20px; }
        .slot-price { margin-top: 10px; color: var(--accent-star); font-weight: 900; font-size: 20px; }

        /* CIRCLE & POINTER */
        .upgrade-center { display: flex; flex-direction: column; align-items: center; gap: 30px; }
        .circle-wrap { width: 220px; height: 220px; position: relative; display: flex; justify-content: center; align-items: center; }
        .circle-svg { width: 100%; height: 100%; transform: rotate(-90deg); filter: drop-shadow(0 0 10px var(--accent-glow)); }
        .circle-bg { fill: none; stroke: #1c2533; stroke-width: 12; }
        .circle-progress { fill: none; stroke: var(--tg-blue); stroke-width: 12; stroke-dasharray: 0 100; transition: stroke-dasharray 0.3s ease; stroke-linecap: round; }
        
        .pointer-container { position: absolute; width: 100%; height: 100%; top: 0; left: 0; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); z-index: 10; }
        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 4px; height: 30px; background: #fff; box-shadow: 0 0 15px #fff; border-radius: 2px; }
        .pointer::after { content: ''; position: absolute; top: -5px; left: 50%; transform: translateX(-50%); border-left: 8px solid transparent; border-right: 8px solid transparent; border-top: 12px solid #fff; }

        .chance-data { position: absolute; text-align: center; z-index: 5; }
        .chance-num { font-size: 40px; font-weight: 900; color: #fff; text-shadow: 0 0 15px var(--accent-glow); }
        .chance-txt { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }

        .btn-upgrade { background: var(--tg-blue); color: #fff; width: 220px; height: 60px; border-radius: 15px; font-weight: 900; font-size: 16px; text-transform: uppercase; cursor: pointer; border: none; box-shadow: 0 0 20px var(--accent-glow); transition: 0.3s; position: relative; overflow: hidden; }
        .btn-upgrade:hover { transform: scale(1.05); filter: brightness(1.2); }
        .btn-upgrade:disabled { background: #2a3547; box-shadow: none; cursor: not-allowed; opacity: 0.5; }
        .btn-upgrade.spinning { animation: pulseBtn 1s infinite; }

        /* INVENTORY & SHOP */
        .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; padding: 0 30px 50px; max-width: 1300px; margin: 0 auto; }
        .panel { background: var(--bg-sec); border-radius: 24px; padding: 25px; border: 1px solid #1c2533; min-height: 500px; }
        .panel-h { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .panel-title { font-size: 18px; font-weight: 900; letter-spacing: 0.5px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .item { background: var(--bg-card); border-radius: 18px; padding: 15px; text-align: center; border: 2px solid transparent; cursor: pointer; transition: 0.3s; position: relative; }
        .item:hover { transform: translateY(-5px); border-color: #34495e; }
        .item.selected { border-color: var(--tg-blue); background: rgba(0, 136, 204, 0.05); box-shadow: 0 0 20px rgba(0, 136, 204, 0.2); }
        .item-icon { font-size: 45px; margin-bottom: 10px; }
        .item-name { font-size: 12px; font-weight: 700; margin-bottom: 8px; color: #eee; }
        .item-price { font-size: 14px; font-weight: 900; color: var(--accent-star); }
        .btn-buy { margin-top: 12px; background: rgba(46, 204, 113, 0.1); color: var(--accent-green); border: 1px solid var(--accent-green); width: 100%; padding: 8px; border-radius: 10px; font-size: 11px; font-weight: 800; }
        .btn-buy:hover { background: var(--accent-green); color: #fff; }

        @keyframes slideDrop { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes pulseBtn { 0% { box-shadow: 0 0 20px var(--accent-glow); } 50% { box-shadow: 0 0 40px var(--accent-glow); } 100% { box-shadow: 0 0 20px var(--accent-glow); } }

        @media (max-width: 900px) { .panels { grid-template-columns: 1fr; } .arena { gap: 30px; } }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">FLASH<span>UPGRADER</span></div>
        <div style="display: flex; gap: 20px; align-items: center;">
            <div class="online">● <span id="online-val">3 142</span> ONLINE</div>
            <div id="user-display"></div>
        </div>
    </header>

    <div class="live-drops" id="drops-line"></div>

    <div class="arena">
        <div class="slot" id="slot-my">
            <div class="slot-label">Ваш предмет</div>
            <div class="slot-icon" id="my-icon">🎁</div>
            <div class="slot-name" id="my-name">ВЫБЕРИТЕ ПРЕДМЕТ</div>
            <div class="slot-price" id="my-price">0 ⭐️</div>
        </div>

        <div class="upgrade-center">
            <div class="circle-wrap">
                <svg class="circle-svg" viewBox="0 0 100 100">
                    <circle class="circle-bg" cx="50" cy="50" r="42" />
                    <circle class="circle-progress" id="circle-arc" cx="50" cy="50" r="42" pathLength="100" />
                </svg>
                <div class="pointer-container" id="pointer-anim">
                    <div class="pointer"></div>
                </div>
                <div class="chance-data">
                    <div class="chance-num" id="chance-val">0%</div>
                    <div class="chance-txt">ШАНС</div>
                </div>
            </div>
            <button class="btn-upgrade" id="btn-up" onclick="startUpgrade()" disabled>АПГРЕЙД</button>
        </div>

        <div class="slot" id="slot-target">
            <div class="slot-label">Цель</div>
            <div class="slot-icon" id="tg-icon">🎯</div>
            <div class="slot-name" id="tg-name">ВЫБЕРИТЕ ЦЕЛЬ</div>
            <div class="slot-price" id="tg-price">0 ⭐️</div>
        </div>
    </div>

    <div class="panels">
        <div class="panel">
            <div class="panel-h">
                <div class="panel-title">📦 ИНВЕНТАРЬ</div>
                <div style="color: var(--accent-star); font-weight: 800;" id="inv-count">0 ПРЕДМЕТОВ</div>
            </div>
            <div class="grid" id="my-grid"></div>
        </div>

        <div class="panel">
            <div class="panel-h">
                <div class="panel-title">🛒 МАГАЗИН</div>
                <div style="font-size: 12px; color: var(--text-muted);">TG GIFTS 2026</div>
            </div>
            <div class="grid" id="shop-grid"></div>
        </div>
    </div>

    <audio id="snd-tick" src="https://www.soundjay.com/buttons/button-50.mp3"></audio>
    <audio id="snd-win" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>
    <audio id="snd-lose" src="https://www.soundjay.com/buttons/button-10.mp3"></audio>

    <script>
        const shopItems = [
            { id: 1, name: "Plush Pepe", price: 925000, icon: "🐸" },
            { id: 2, name: "Magic Mirror", price: 450000, icon: "🪞" },
            { id: 3, name: "Golden Duck", price: 210000, icon: "🦆" },
            { id: 4, name: "Cyber Dragon", price: 1500000, icon: "🐲" },
            { id: 5, name: "Eternal Star", price: 85000, icon: "⭐" },
            { id: 6, name: "Moon Stone", price: 320000, icon: "💎" }
        ];

        let user = { balance: 2500000, name: "sn1kersevo", inv: [] };
        let selectedMyIdx = null;
        let selectedTarget = null;
        let isSpinning = false;
        let currentRotation = 0;

        function init() {
            renderShop();
            updateBalance();
            startLiveStats();
            // Даем один подарок в начале для теста
            user.inv.push({...shopItems[4], invId: Date.now()});
            renderInv();
        }

        function updateBalance() {
            document.getElementById('user-display').innerHTML = `
                <div style="background: var(--bg-card); padding: 8px 20px; border-radius: 15px; border: 1px solid #2a3547; display: flex; align-items: center; gap: 10px;">
                    <div style="text-align: right;"><div style="font-size: 10px; color: var(--text-muted);">БАЛАНС</div>
                    <div style="font-size: 16px; font-weight: 900; color: var(--accent-star);">${user.balance.toLocaleString()} ⭐️</div></div>
                    <div style="width: 35px; height: 35px; background: var(--tg-blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900;">S</div>
                </div>`;
        }

        function renderShop() {
            const g = document.getElementById('shop-grid');
            g.innerHTML = shopItems.map(i => `
                <div class="item ${selectedTarget?.id === i.id ? 'selected' : ''}" onclick="setTarget(${i.id})">
                    <div class="item-icon">${i.icon}</div>
                    <div class="item-name">${i.name}</div>
                    <div class="item-price">${i.price.toLocaleString()}</div>
                    <button class="btn-buy" onclick="buyItem(event, ${i.id})">КУПИТЬ</button>
                </div>`).join('');
        }

        function renderInv() {
            const g = document.getElementById('my-grid');
            document.getElementById('inv-count').innerText = `${user.inv.length} ПРЕДМЕТОВ`;
            if(user.inv.length === 0) g.innerHTML = '<div style="grid-column:1/-1; color:var(--text-muted); text-align:center;">Пусто</div>';
            else g.innerHTML = user.inv.map((i, idx) => `
                <div class="item ${selectedMyIdx === idx ? 'selected' : ''}" onclick="setMyItem(${idx})">
                    <div class="item-icon">${i.icon}</div>
                    <div class="item-name">${i.name}</div>
                    <div class="item-price">${i.price.toLocaleString()}</div>
                </div>`).join('');
        }

        function buyItem(e, id) {
            e.stopPropagation();
            const i = shopItems.find(x => x.id === id);
            if(user.balance >= i.price) {
                user.balance -= i.price;
                user.inv.push({...i, invId: Date.now()});
                updateBalance();
                renderInv();
            }
        }

        function setMyItem(idx) {
            if(isSpinning) return;
            selectedMyIdx = idx;
            const item = user.inv[idx];
            document.getElementById('my-icon').innerText = item.icon;
            document.getElementById('my-name').innerText = item.name;
            document.getElementById('my-price').innerText = item.price.toLocaleString() + ' ⭐️';
            document.getElementById('slot-my').classList.add('active');
            renderInv();
            calc();
        }

        function setTarget(id) {
            if(isSpinning) return;
            selectedTarget = shopItems.find(x => x.id === id);
            document.getElementById('tg-icon').innerText = selectedTarget.icon;
            document.getElementById('tg-name').innerText = selectedTarget.name;
            document.getElementById('tg-price').innerText = selectedTarget.price.toLocaleString() + ' ⭐️';
            document.getElementById('slot-target').classList.add('active');
            renderShop();
            calc();
        }

        function calc() {
            if(selectedMyIdx === null || !selectedTarget) return;
            const chance = Math.min(95, (user.inv[selectedMyIdx].price / selectedTarget.price) * 100);
            document.getElementById('circle-arc').style.strokeDasharray = `${chance} 100`;
            document.getElementById('chance-val').innerText = chance.toFixed(2) + '%';
            document.getElementById('btn-up').disabled = false;
        }

        function startUpgrade() {
            if(isSpinning) return;
            isSpinning = true;
            const btn = document.getElementById('btn-up');
            btn.classList.add('spinning');
            btn.innerText = 'УЛУЧШАЕМ...';
            btn.disabled = true;

            const chance = parseFloat(document.getElementById('chance-val').innerText);
            const isWin = Math.random() * 100 <= chance;
            
            // Расчет вращения стрелки
            const extraSpins = 5 + Math.random() * 5;
            const finalAngle = isWin ? (chance * 3.6 * Math.random()) : (chance * 3.6 + Math.random() * (360 - chance * 3.6));
            currentRotation += (extraSpins * 360) + finalAngle;
            
            document.getElementById('pointer-anim').style.transform = `rotate(${currentRotation}deg)`;

            // Звук тиканья (имитация)
            const tickInterval = setInterval(() => {
                document.getElementById('snd-tick').currentTime = 0;
                document.getElementById('snd-tick').play();
            }, 150);

            setTimeout(() => {
                clearInterval(tickInterval);
                isSpinning = false;
                btn.classList.remove('spinning');
                
                if(isWin) {
                    document.getElementById('snd-win').play();
                    user.inv.push({...selectedTarget, invId: Date.now()});
                    user.inv.splice(selectedMyIdx, 1);
                    alert("УСПЕХ! Предмет получен!");
                } else {
                    document.getElementById('snd-lose').play();
                    user.inv.splice(selectedMyIdx, 1);
                    alert("КРАШ! Предмет сгорел!");
                }
                
                selectedMyIdx = null;
                renderInv();
                updateSlotsReset();
                btn.innerText = 'АПГРЕЙД';
            }, 4000);
        }

        function updateSlotsReset() {
            document.getElementById('my-icon').innerText = '🎁';
            document.getElementById('my-name').innerText = 'ВЫБЕРИТЕ ПРЕДМЕТ';
            document.getElementById('my-price').innerText = '0 ⭐️';
            document.getElementById('slot-my').classList.remove('active');
            document.getElementById('circle-arc').style.strokeDasharray = `0 100`;
            document.getElementById('chance-val').innerText = '0%';
        }

        function startLiveStats() {
            setInterval(() => {
                document.getElementById('online-val').innerText = (3000 + Math.floor(Math.random()*500)).toLocaleString();
            }, 3000);

            const names = ["Dmitry", "Alex", "User_77", "RichBot", "Whale"];
            setInterval(() => {
                const item = shopItems[Math.floor(Math.random()*shopItems.length)];
                const n = names[Math.floor(Math.random()*names.length)];
                const d = document.createElement('div');
                d.className = 'drop-card';
                d.innerHTML = `<div class="drop-icon">${item.icon}</div><div><div class="drop-name">${item.name}</div><div class="drop-user">${n}</div></div>`;
                const line = document.getElementById('drops-line');
                line.prepend(d);
                if(line.children.length > 10) line.lastElementChild.remove();
            }, 2500);
        }

        init();
    </script>
</body>
</html>
