<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Premium Gifts Upgrader</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap');

        :root {
            --bg-main: #0b0e14;
            --bg-panel: #101422;
            --bg-card: #141929;
            --text-main: #ffffff;
            --text-muted: #525c74;
            --accent-yellow: #ffca00;
            --accent-green: #20f155;
            --accent-red: #ff2a4b;
            --border-color: #1c2336;

            /* Редкости предметов */
            --tier-common: linear-gradient(135deg, #2a47e6, #182ba6);
            --tier-rare: linear-gradient(135deg, #823ae6, #4e1ba6);
            --tier-epic: linear-gradient(135deg, #e62ae0, #961ba6);
            --tier-legendary: linear-gradient(135deg, #ff3a3a, #a61b1b);
            --tier-immortal: linear-gradient(135deg, #ffca00, #a68000);
        }

        body {
            margin: 0; padding: 20px;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            box-sizing: border-box; user-select: none;
            display: flex; flex-direction: column; align-items: center;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        .app-container {
            width: 100%; max-width: 1280px;
            display: flex; flex-direction: column; gap: 20px;
        }

        /* ВЕРХНЯЯ ЗОНА (АПГРЕЙДЕР) */
        .top-section {
            display: grid; grid-template-columns: 1fr 1.1fr 1fr; gap: 20px; min-height: 380px;
        }

        .panel {
            background-color: var(--bg-panel); border-radius: 16px;
            position: relative; display: flex; flex-direction: column;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            padding: 24px; box-sizing: border-box;
        }

        .panel-title {
            font-size: 12px; font-weight: 700; color: #fff; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 15px; text-align: center; opacity: 0.9;
        }

        /* Слоты предметов */
        .item-preview {
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center;
        }
        
        .gift-img-large {
            width: 140px; height: 140px; object-fit: contain; margin: 15px 0;
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.6));
            animation: float 4s ease-in-out infinite;
        }
        
        .item-name { color: #fff; font-size: 20px; font-weight: 800; margin-top: 5px; }
        .item-price { font-size: 18px; font-weight: 800; color: var(--accent-yellow); margin-top: 6px; }
        
        .empty-state { color: var(--text-muted); font-size: 13px; font-weight: 600; text-align: center; margin: auto; line-height: 1.6; }
        .empty-state span { display: block; margin-top: 6px; font-size: 11px; color: #3d465a; }

        /* Ползунок баланса слева */
        .balance-slider-container {
            margin-top: auto; display: flex; flex-direction: column; gap: 8px;
            border-top: 1px solid var(--border-color); padding-top: 15px;
        }
        .slider-header { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); font-weight: 600; }
        .slider-header span b { color: var(--accent-yellow); }
        .custom-slider {
            width: 100%; -webkit-appearance: none; background: #181f33; height: 6px; border-radius: 3px; outline: none;
        }
        .custom-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--accent-yellow); cursor: pointer;
        }

        /* ЦЕНТРАЛЬНОЕ КОЛЕСО */
        .center-panel { align-items: center; justify-content: space-between; background: transparent; border: none; box-shadow: none; padding: 0; }
        
        .circle-container { position: relative; width: 260px; height: 260px; margin-bottom: 10px; }
        
        .upgrader-wheel {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%; background: #151a29;
            display: flex; align-items: center; justify-content: center;
            z-index: 1; transition: background 0.3s ease;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
        }

        .wheel-inner {
            width: 210px; height: 210px;
            background: var(--bg-main); border-radius: 50%;
            z-index: 3; display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.9);
        }

        .wheel-percent { font-size: 38px; font-weight: 800; color: var(--accent-yellow); letter-spacing: -0.5px; }
        .wheel-text { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; margin-top: 4px; }

        .wheel-ticker {
            position: absolute; bottom: 0; left: 50%; width: 4px; height: 100%;
            transform-origin: center center; transform: translateX(-50%) rotate(0deg);
            z-index: 4; pointer-events: none;
        }
        .ticker-arrow {
            position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 10px solid transparent; border-right: 10px solid transparent;
            border-bottom: 16px solid var(--accent-yellow);
            filter: drop-shadow(0 0 8px var(--accent-yellow));
        }

        .btn-upgrade {
            width: 100%; background: var(--accent-yellow); color: #000; border: none;
            padding: 18px; font-size: 16px; font-weight: 800; border-radius: 12px; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s ease;
        }
        .btn-upgrade:hover:not(:disabled) { background: #ffe100; transform: translateY(-1px); }
        .btn-upgrade:disabled { background: #171c2b; color: #3d465a; cursor: not-allowed; }

        /* МНОЖИТЕЛИ СПРАВА */
        .multiplier-grid {
            margin-top: auto; display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px;
            border-top: 1px solid var(--border-color); padding-top: 15px; width: 100%;
        }
        .btn-mult {
            background: #171d2e; border: 1px solid var(--border-color); color: #8a96b3;
            padding: 8px 0; font-size: 11px; font-weight: 700; border-radius: 6px; cursor: pointer;
            transition: all 0.15s ease; text-align: center;
        }
        .btn-mult:hover:not(:disabled) { background: #212942; color: #fff; border-color: #3b486e; }
        .btn-mult.active { background: rgba(255, 202, 0, 0.1); border-color: var(--accent-yellow); color: var(--accent-yellow); }
        .btn-mult:disabled { opacity: 0.4; cursor: not-allowed; }

        /* НИЖНЯЯ ЗОНА (ИНВЕНТАРИ) */
        .bottom-section { display: grid; grid-template-columns: 1fr 1.2fr; gap: 20px; min-height: 480px; }

        .inventory-header {
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 14px; border-bottom: 1px solid var(--border-color); margin-bottom: 16px;
        }
        .inventory-title { font-weight: 800; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; color: #fff; display: flex; align-items: center; gap: 8px;}
        .inventory-title span { color: var(--text-muted); font-weight: 600; }
        
        .balance-badge {
            background: #151b2c; border: 1px solid var(--border-color);
            padding: 6px 14px; border-radius: 8px; font-size: 14px; font-weight: 700; color: var(--accent-yellow);
        }

        .grid-container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(115px, 1fr));
            gap: 10px; overflow-y: auto; height: 380px; align-content: start; padding-right: 4px;
        }
        .grid-container::-webkit-scrollbar { width: 6px; }
        .grid-container::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

        /* Карточки предметов */
        .skin-card {
            background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px;
            padding: 12px; position: relative; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            height: 140px; box-sizing: border-box; transition: all 0.2s ease;
        }
        .skin-card:hover { background: #1b2237; border-color: #2c3754; transform: translateY(-2px); }
        .skin-card.selected { border-color: var(--accent-yellow); background: #192135; box-shadow: 0 0 15px rgba(255, 202, 0, 0.15); }
        
        .rarity-line { position: absolute; top: 0; left: 0; width: 100%; height: 3px; border-radius: 12px 12px 0 0; }
        .card-price { width: 100%; text-align: right; font-size: 11px; font-weight: 700; color: var(--accent-yellow); }
        
        .gift-img-small { width: 60px; height: 60px; object-fit: contain; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3)); transition: transform 0.2s ease; margin: 5px 0;}
        .skin-card:hover .gift-img-small { transform: scale(1.06); }

        .skin-card .name { font-size: 11px; color: #e1e6f0; font-weight: 600; text-align: center; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .empty-slot { background: rgba(20, 25, 41, 0.25); border: 1px dashed rgba(255,255,255,0.02); border-radius: 12px; height: 140px; }

        /* Плашка результата */
        .result-banner {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            padding: 10px 24px; border-radius: 8px; font-weight: 800; font-size: 14px;
            opacity: 0; transition: all 0.3s ease; z-index: 20; text-transform: uppercase; letter-spacing: 1px; pointer-events: none;
        }
        .result-banner.win { opacity: 1; background: var(--accent-green); color: #000; box-shadow: 0 0 20px rgba(32, 241, 85, 0.4); }
        .result-banner.lose { opacity: 1; background: var(--accent-red); color: #fff; box-shadow: 0 0 20px rgba(255, 42, 75, 0.4); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="top-section">
        
        <div class="panel">
            <div class="panel-title">Выбор предметов и баланса</div>
            <div id="preview-left-content" class="item-preview" style="display: none;">
                <img src="" class="gift-img-large" id="input-img" alt="">
                <div class="item-name" id="input-title">Название</div>
                <div class="item-price" id="input-price">0 ⭐️</div>
            </div>
            <div id="preview-left-empty" class="empty-state">
                ВЫБЕРИТЕ ПРЕДМЕТ
                <span>из вашего инвентаря ниже</span>
            </div>
            
            <div class="balance-slider-container">
                <div class="slider-header">
                    <span>Использовать баланс:</span>
                    <span><span id="slider-val">0</span> ⭐️</span>
                </div>
                <input type="range" min="0" max="0" value="0" class="custom-slider" id="balance-slider" oninput="updateSliderAmount()">
            </div>
        </div>

        <div class="panel center-panel">
            <div class="result-banner" id="res-banner">УСПЕХ!</div>
            <div class="circle-container">
                <div class="upgrader-wheel" id="wheel-canvas">
                    <div class="wheel-ticker" id="wheel-ticker">
                        <div class="ticker-arrow"></div>
                    </div>
                    <div class="wheel-inner">
                        <div class="wheel-percent" id="chance-display">50.00%</div>
                        <div class="wheel-text" id="chance-status">medium chance</div>
                    </div>
                </div>
            </div>
            <button class="btn-upgrade" id="btn-upgrade-main" disabled onclick="startUpgrade()">Upgrade</button>
        </div>

        <div class="panel">
            <div class="panel-title">Целевой апгрейд</div>
            <div id="preview-right-content" class="item-preview" style="display: none;">
                <img src="" class="gift-img-large" id="target-img" alt="">
                <div class="item-name" id="target-title">Название</div>
                <div class="item-price" id="target-price">0 ⭐️</div>
            </div>
            <div id="preview-right-empty" class="empty-state">
                ВЫБЕРИТЕ ЦЕЛЬ
                <span>из магазина наград справа</span>
            </div>

            <div class="multiplier-grid">
                <button class="btn-mult" id="m-x4" onclick="applyQuickMultiplier(4, false)">x4</button>
                <button class="btn-mult" id="m-x8" onclick="applyQuickMultiplier(8, false)">x8</button>
                <button class="btn-mult" id="m-x25" onclick="applyQuickMultiplier(25, false)">x25</button>
                <button class="btn-mult" id="m-35" onclick="applyQuickMultiplier(35, true)">35%</button>
                <button class="btn-mult" id="m-40" onclick="applyQuickMultiplier(40, true)">40%</button>
                <button class="btn-mult" id="m-75" onclick="applyQuickMultiplier(75, true)">75%</button>
            </div>
        </div>
    </div>

    <div class="bottom-section">
        <div class="panel">
            <div class="inventory-header">
                <div class="inventory-title">🗃 Мои подарки <span id="inv-count">(0)</span></div>
                <div class="balance-badge"><span id="balance-amount">5000</span> ⭐️</div>
            </div>
            <div class="grid-container" id="my-inventory-grid"></div>
        </div>

        <div class="panel">
            <div class="inventory-header">
                <div class="inventory-title">🛍 Выберите цель для улучшения</div>
            </div>
            <div class="grid-container" id="shop-grid"></div>
        </div>
    </div>
</div>

<script>
    // --- ЗВУКОВОЙ ДВИЖОК ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    function initAudio() {
        if (!audioCtx) audioCtx = new AudioContext();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playSound(type) {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        
        if (type === 'click') {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(400, now);
            gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
            osc.start(now); osc.stop(now + 0.05);
        } else if (type === 'tick') {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'triangle'; osc.frequency.setValueAtTime(220, now);
            gain.gain.setValueAtTime(0.08, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.02);
            osc.start(now); osc.stop(now + 0.02);
        } else if (type === 'win') {
            [523.25, 659.25, 783.99].forEach((freq, i) => {
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.frequency.setValueAtTime(freq, now + i*0.06);
                g.gain.setValueAtTime(0.1, now + i*0.06); g.gain.exponentialRampToValueAtTime(0.01, now + i*0.06 + 0.2);
                o.connect(g); g.connect(audioCtx.destination); o.start(now + i*0.06); o.stop(now + i*0.06 + 0.2);
            });
        } else if (type === 'lose') {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(120, now); osc.frequency.linearRampToValueAtTime(50, now + 0.4);
            gain.gain.setValueAtTime(0.15, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.4);
            osc.start(now); osc.stop(now + 0.4);
        }
    }

    // --- ОБНОВЛЕННАЯ БАЗА РЕАЛЬНЫХ ПОДАРКОВ TELEGRAM (БЕЗ ЭМОДЗИ) ---
    const NFT_DATABASE = {
        "lollipop": { name: "Lollipop", img: "https://i.postimg.cc/k47vYg7k/lollipop.png", price: 50, rarity: "var(--tier-common)" },
        "pigeon": { name: "Letter Pigeon", img: "https://i.postimg.cc/g0gDcgL4/pigeon.png", price: 150, rarity: "var(--tier-common)" },
        "cake": { name: "Birthday Cake", img: "https://i.postimg.cc/0jXm8Yf1/cake.png", price: 400, rarity: "var(--tier-common)" },
        "duck": { name: "Rubber Duck", img: "https://i.postimg.cc/N0fL8vWh/duck.png", price: 1000, rarity: "var(--tier-rare)" },
        "star_bottle": { name: "Star Bottle", img: "https://i.postimg.cc/85zXbXfG/star.png", price: 2500, rarity: "var(--tier-rare)" },
        "plush_pepe": { name: "Plush Pepe", img: "https://i.postimg.cc/HkWZzX9S/hotdog.png", price: 6000, rarity: "var(--tier-epic)" },
        "cyber_heart": { name: "Cyber Heart", img: "https://i.postimg.cc/PqMvMDp6/heart.png", price: 15000, rarity: "var(--tier-epic)" },
        "pavel_durov": { name: "Pavel Durov", img: "https://i.postimg.cc/hGvXbXbY/cap.png", price: 40000, rarity: "var(--tier-epic)" },
        "magic_crystal": { name: "Magic Crystal", img: "https://i.postimg.cc/fyXbXbF3/crystal.png", price: 100000, rarity: "var(--tier-legendary)" },
        "telegram_bear": { name: "Telegram Bear", img: "https://i.postimg.cc/9QvXbXb8/crown.png", price: 250000, rarity: "var(--tier-immortal)" }
    };

    // Состояние игры
    let freebetBalance = 15000;
    let userInventory = ["lollipop", "pigeon", "cake", "duck", "star_bottle"]; 
    let selectedInvIdx = null;
    let selectedShopKey = null;
    let addedBalance = 0;
    let calculatedChance = 0;
    let isUpgrading = false;
    let activeMultId = null;

    document.body.addEventListener('click', initAudio, { once: true });

    function init() { 
        renderInventory(); 
        renderShop(); 
        updateWorkspace(); 
    }

    function renderInventory() {
        const grid = document.getElementById("my-inventory-grid");
        grid.innerHTML = "";
        document.getElementById("inv-count").innerText = `(${userInventory.length})`;
        document.getElementById("balance-amount").innerText = freebetBalance;

        userInventory.forEach((key, idx) => {
            const item = NFT_DATABASE[key];
            if(!item) return;
            const card = document.createElement("div");
            card.className = `skin-card ${selectedInvIdx === idx ? 'selected' : ''}`;
            card.onclick = () => { if(!isUpgrading) { playSound('click'); selectInventoryItem(idx); } };
            card.innerHTML = `
                <div class="rarity-line" style="background: ${item.rarity}"></div>
                <div class="card-price">${item.price} ⭐️</div>
                <img src="${item.img}" class="gift-img-small" alt="">
                <div class="name">${item.name}</div>
            `;
            grid.appendChild(card);
        });

        for(let i = 0; i < Math.max(0, 8 - userInventory.length); i++) {
            const slot = document.createElement("div"); slot.className = "empty-slot"; grid.appendChild(slot);
        }
    }

    function renderShop() {
        const grid = document.getElementById("shop-grid");
        grid.innerHTML = "";
        Object.keys(NFT_DATABASE).forEach(key => {
            const item = NFT_DATABASE[key];
            const card = document.createElement("div");
            card.className = `skin-card ${selectedShopKey === key ? 'selected' : ''}`;
            card.onclick = () => { if(!isUpgrading) { playSound('click'); selectShopItem(key); } };
            card.innerHTML = `
                <div class="rarity-line" style="background: ${item.rarity}"></div>
                <div class="card-price">${item.price} ⭐️</div>
                <img src="${item.img}" class="gift-img-small" alt="">
                <div class="name">${item.name}</div>
            `;
            grid.appendChild(card);
        });
    }

    function selectInventoryItem(idx) { 
        if(selectedInvIdx === idx) {
            selectedInvIdx = null;
        } else {
            selectedInvIdx = idx;
        }
        addedBalance = 0;
        resetMultipliers();
        updateWorkspace(); 
        renderInventory();
    }

    function selectShopItem(key) { 
        if(selectedShopKey === key) {
            selectedShopKey = null;
        } else {
            selectedShopKey = key;
        }
        resetMultipliers();
        updateWorkspace(); 
        renderShop();
    }

    function resetMultipliers() {
        activeMultId = null;
        document.querySelectorAll('.btn-mult').forEach(b => b.classList.remove('active'));
    }

    function updateSliderAmount() {
        const slider = document.getElementById("balance-slider");
        addedBalance = parseInt(slider.value);
        document.getElementById("slider-val").innerText = addedBalance;
        updateWorkspace(false); // Не сбрасываем слайдер рекурсивно
    }

    // --- КНОПКИ МГНОВЕННЫХ МНОЖИТЕЛЕЙ (МЕХАНИКА АПГРЕЙДЕРА) ---
    function applyQuickMultiplier(value, isPercentage = false) {
        if (selectedInvIdx === null || isUpgrading) return;
        playSound('click');
        
        const inputItem = NFT_DATABASE[userInventory[selectedInvIdx]];
        let neededTargetPrice = 0;

        if (!isPercentage) {
            neededTargetPrice = inputItem.price * value;
            activeMultId = `m-x${value}`;
        } else {
            neededTargetPrice = (inputItem.price + addedBalance) / (value / 100);
            activeMultId = `m-${value}`;
        }

        // Поиск ближайшего подходящего подарка в магазине
        let bestKey = null;
        let minDiff = Infinity;

        Object.keys(NFT_DATABASE).forEach(key => {
            const item = NFT_DATABASE[key];
            if (item.price > inputItem.price) {
                const diff = Math.abs(item.price - neededTargetPrice);
                if (diff < minDiff) {
                    minDiff = diff;
                    bestKey = key;
                }
            }
        });

        if (bestKey) {
            selectedShopKey = bestKey;
            renderShop();
            updateWorkspace(false);
            
            // Подсвечиваем активную кнопку множителя
            document.querySelectorAll('.btn-mult').forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById(activeMultId);
            if (activeBtn) activeBtn.classList.add('active');
        }
    }

    // Расчет шансов и обновление UI элементов
    function updateWorkspace(resetSlider = true) {
        const pLeftContent = document.getElementById("preview-left-content");
        const pLeftEmpty = document.getElementById("preview-left-empty");
        const slider = document.getElementById("balance-slider");

        if (selectedInvIdx !== null) {
            const item = NFT_DATABASE[userInventory[selectedInvIdx]];
            pLeftEmpty.style.display = "none"; pLeftContent.style.display = "flex";
            document.getElementById("input-img").src = item.img;
            document.getElementById("input-title").innerText = item.name;
            document.getElementById("input-price").innerText = item.price + " ⭐️";
            
            slider.max = freebetBalance;
            if (resetSlider) {
                slider.value = addedBalance;
                document.getElementById("slider-val").innerText = addedBalance;
            }
        } else { 
            pLeftContent.style.display = "none"; pLeftEmpty.style.display = "block"; 
            slider.max = 0; slider.value = 0;
            document.getElementById("slider-val").innerText = 0;
        }

        const pRightContent = document.getElementById("preview-right-content");
        const pRightEmpty = document.getElementById("preview-right-empty");
        
        if (selectedShopKey !== null) {
            const item = NFT_DATABASE[selectedShopKey];
            pRightEmpty.style.display = "none"; pRightContent.style.display = "flex";
            document.getElementById("target-img").src = item.img;
            document.getElementById("target-title").innerText = item.name;
            document.getElementById("target-price").innerText = item.price + " ⭐️";
        } else { pRightContent.style.display = "none"; pRightEmpty.style.display = "block"; }

        // Расчет финального процента
        const btnUpgrade = document.getElementById("btn-upgrade-main");
        
        if (selectedInvIdx !== null && selectedShopKey !== null) {
            const costFrom = NFT_DATABASE[userInventory[selectedInvIdx]].price + addedBalance;
            const costTo = NFT_DATABASE[selectedShopKey].price;
            
            calculatedChance = Math.min((costFrom / costTo) * 100, 100);
            
            const displayChance = document.getElementById("chance-display");
            displayChance.innerText = calculatedChance.toFixed(2) + "%";
            
            if (calculatedChance >= 70) {
                document.getElementById("chance-status").innerText = "высокий шанс";
                displayChance.style.color = "var(--accent-green)";
            } else if (calculatedChance >= 30) {
                document.getElementById("chance-status").innerText = "средний шанс";
                displayChance.style.color = "var(--accent-yellow)";
            } else {
                document.getElementById("chance-status").innerText = "низкий шанс";
                displayChance.style.color = "var(--accent-red)";
            }
            
            // Если выбран тот же или более дешевый предмет, апгрейд невозможен
            if (costTo <= NFT_DATABASE[userInventory[selectedInvIdx]].price) {
                displayChance.innerText = "0.00%";
                document.getElementById("chance-status").innerText = "выберите цель выше";
                btnUpgrade.disabled = true;
                drawWheelSector(0);
            } else {
                btnUpgrade.disabled = false;
                drawWheelSector(calculatedChance);
            }
        } else {
            calculatedChance = 0;
            document.getElementById("chance-display").innerText = "0.00%";
            document.getElementById("chance-display").style.color = "var(--accent-yellow)";
            document.getElementById("chance-status").innerText = "выберите цели";
            btnUpgrade.disabled = true;
            drawWheelSector(0);
        }
    }

    function drawWheelSector(chance) {
        const wheel = document.getElementById("wheel-canvas");
        if (chance <= 0) { wheel.style.background = `#151a29`; return; }
        
        const arcDegrees = (chance / 100) * 360;
        // Сектор победы располагается внизу, центрируясь по стрелке (180 градусов)
        const startDeg = 180 - (arcDegrees / 2);
        const endDeg = 180 + (arcDegrees / 2);
        
        wheel.style.background = `conic-gradient(from 0deg, 
            #151a29 0deg, #151a29 ${startDeg}deg, 
            var(--accent-yellow) ${startDeg}deg, var(--accent-yellow) ${endDeg}deg, 
            #151a29 ${endDeg}deg, #151a29 360deg
        )`;
    }

    // --- ИСПРАВЛЕННАЯ АНИМАЦИЯ И ЛОГИКА ВРАЩЕНИЯ ---
    function startUpgrade() {
        if (isUpgrading || selectedInvIdx === null || selectedShopKey === null) return;
        
        isUpgrading = true;
        playSound('click');
        document.getElementById("btn-upgrade-main").disabled = true;
        document.querySelectorAll('.btn-mult').forEach(b => b.disabled = true);
        document.getElementById("balance-slider").disabled = true;

        const isWin = (Math.random() * 100) <= calculatedChance;
        const arcDegrees = (calculatedChance / 100) * 360;
        
        let targetAngle = 0;
        if (isWin) {
            // Попадание в желтый сектор победы (внизу)
            const half = arcDegrees / 2; 
            targetAngle = 180 + (Math.random() * (half * 0.9) * (Math.random() > 0.5 ? 1 : -1));
        } else {
            // Промах мимо сектора
            const half = arcDegrees / 2;
            if (Math.random() > 0.5) { 
                targetAngle = Math.random() * (180 - half - 10); 
            } else { 
                targetAngle = (180 + half + 10) + (Math.random() * (180 - half - 10)); 
            }
        }

        const totalSpins = 2160; // Ровно 6 полных кругов для динамики
        const finalRotation = totalSpins + targetAngle;
        
        const ticker = document.getElementById("wheel-ticker");
        document.getElementById("res-banner").style.opacity = "0";

        let startTimestamp = null;
        const duration = 4000; 
        let lastTickAngle = 0;

        function animate(timestamp) {
            if (!startTimestamp) startTimestamp = timestamp;
            const elapsed = timestamp - startTimestamp;
            const progress = Math.min(elapsed / duration, 1);
            
            // Плавное замедление (Cubic Out)
            const easeOut = 1 - Math.pow(1 - progress, 3);
            const currentAngle = finalRotation * easeOut;

            ticker.style.transform = `translateX(-50%) rotate(${currentAngle}deg)`;

            // Звук трещотки колеса каждые 15 градусов прокрутки
            if (currentAngle - lastTickAngle > 15) {
                playSound('tick');
                lastTickAngle = currentAngle;
            }

            if (progress < 1) {
                requestAnimationFrame(animate);
            } else {
                finishUpgrade(isWin);
            }
        }
        requestAnimationFrame(animate);
    }

    function finishUpgrade(isWin) {
        const banner = document.getElementById("res-banner");
        
        // Списываем использованный баланс и предмет
        freebetBalance -= addedBalance;
        userInventory.splice(selectedInvIdx, 1);

        if (isWin) {
            userInventory.push(selectedShopKey);
            banner.innerText = "🎉 Успешный апгрейд!";
            banner.className = "result-banner win";
            playSound('win');
        } else {
            banner.innerText = "💥 Подарок сгорел";
            banner.className = "result-banner lose";
            playSound('lose');
        }

        // Сброс состояния
        selectedInvIdx = null;
        selectedShopKey = null;
        addedBalance = 0;
        isUpgrading = false;
        
        document.querySelectorAll('.btn-mult').forEach(b => b.disabled = false);
        document.getElementById("balance-slider").disabled = false;
        
        resetMultipliers();
        renderInventory(); 
        renderShop();
        updateWorkspace();

        setTimeout(() => { banner.className = "result-banner"; }, 3000);
    }

    window.onload = init;
</script>
