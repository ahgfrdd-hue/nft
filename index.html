<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashUpgrader - Premium</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; user-select: none; }
        
        body { 
            background-color: #0b0d12; 
            background-image: linear-gradient(to bottom, rgba(11, 13, 18, 0.9), rgba(11, 13, 18, 0.95)), url('16148.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #eceff4; 
            display: flex; 
            min-height: 100vh; 
            overflow-x: hidden; 
        }

        /* --- ЛАЙВ ЛЕНТА СЛЕВА --- */
        .live-feed { width: 80px; height: 100vh; background: #0f1118; border-right: 1px solid #1a1c26; position: fixed; left: 0; top: 0; display: flex; flex-direction: column; align-items: center; padding-top: 15px; z-index: 100; overflow: hidden; box-shadow: 5px 0 20px rgba(0,0,0,0.5); }
        .live-item { width: 56px; height: 56px; background: #161923; border: 1px solid #232736; margin-bottom: 10px; display: flex; justify-content: center; align-items: center; animation: slideDown 0.6s cubic-bezier(0.1, 0.9, 0.2, 1); font-size: 28px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); border-radius: 4px; }
        @keyframes slideDown { from { transform: translateY(-80px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* --- ОСНОВНАЯ ЗОНА --- */
        .main-wrapper { margin-left: 80px; width: calc(100% - 80px); display: flex; flex-direction: column; align-items: center; padding-bottom: 60px; }

        header { width: 100%; padding: 15px 40px; background: #0f1118; border-bottom: 1px solid #1a1c26; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
        .logo { color: #00ff88; font-size: 20px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; }
        .btn-profile { background: transparent; border: 1px solid #232736; color: #eceff4; padding: 10px 24px; border-radius: 4px; font-weight: 700; cursor: pointer; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; font-size: 12px; }
        .btn-profile:hover { background: #161923; border-color: #00ff88; color: #00ff88; }

        /* --- ЗОНА АПГРЕЙДА --- */
        .upgrade-section { display: flex; justify-content: center; align-items: center; gap: 60px; margin-top: 80px; width: 100%; max-width: 1000px; }

        .item-box { width: 220px; height: 300px; background: #0f1118; border: 1px solid #1a1c26; border-radius: 6px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.7); transition: 0.3s; }
        .item-box.active { border-color: #00ff88; background: #12151e; box-shadow: 0 0 30px rgba(0, 255, 136, 0.1); }
        .box-title { position: absolute; top: 15px; font-size: 10px; color: #6a718c; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }
        .item-emoji { font-size: 80px; margin: 30px 0 15px 0; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.4)); }
        .item-price { font-size: 20px; font-weight: 900; color: #00ff88; }
        .item-name { color: #8a92b6; font-size: 12px; margin-top: 10px; text-align: center; text-transform: uppercase; font-weight: 500; letter-spacing: 1px; }

        /* --- РУЛЕТКА --- */
        .center-module { display: flex; flex-direction: column; align-items: center; width: 320px; }
        
        .roulette-circle { width: 260px; height: 260px; border-radius: 50%; background: #0b0d12; border: 4px solid #161923; position: relative; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 40px rgba(0,0,0,0.8); }
        /* Зеленый фон теперь стартует СНИЗУ (from 180deg) */
        .chance-fill { position: absolute; width: 100%; height: 100%; border-radius: 50%; z-index: 1; transition: background 0.4s ease; }
        .inner-hole { position: absolute; width: 200px; height: 200px; background: #0b0d12; border-radius: 50%; z-index: 2; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 4px solid #161923; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); }
        
        .arrow-spinner { position: absolute; width: 100%; height: 100%; z-index: 3; transition: transform 8s cubic-bezier(0.05, 0.95, 0.1, 1); }
        /* Стрелка теперь ВНИЗУ и смотрит ВВЕРХ */
        .arrow-indicator { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 30px solid #eceff4; filter: drop-shadow(0 0 10px rgba(236, 239, 244, 0.4)); }

        .chance-text { font-size: 38px; font-weight: 900; z-index: 4; color: #eceff4; letter-spacing: -1px; }
        .chance-sub { font-size: 10px; color: #6a718c; z-index: 4; text-transform: uppercase; font-weight: 700; letter-spacing: 3px; margin-top: 5px; }

        .btn-play { background: #00ff88; color: #0b0d12; border: none; padding: 20px 0; width: 100%; border-radius: 4px; font-size: 16px; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 30px; transition: 0.2s; letter-spacing: 2px; }
        .btn-play:hover:not(:disabled) { background: #00e67a; box-shadow: 0 0 20px rgba(0, 255, 136, 0.3); }
        .btn-play:disabled { background: #161923; color: #4a506b; cursor: not-allowed; }

        /* Зеленые множители внизу под кругом */
        .multiplier-bar { display: flex; justify-content: center; gap: 6px; margin-top: 15px; width: 100%; }
        .mult-btn { background: transparent; border: 1px solid #232736; color: #6a718c; padding: 10px 18px; border-radius: 4px; font-size: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .mult-btn:hover { background: #161923; border-color: #00ff88; color: #00ff88; }

        /* --- ВКЛАДКИ И ИНВЕНТАРЬ --- */
        .tabs-section { margin-top: 80px; width: 100%; max-width: 1000px; }
        .tabs-header { display: flex; gap: 5px; border-bottom: 1px solid #1a1c26; padding-bottom: 15px; margin-bottom: 30px; }
        .tab-btn { background: transparent; border: 1px solid transparent; color: #6a718c; font-size: 13px; font-weight: 700; cursor: pointer; padding: 12px 24px; transition: 0.2s; border-radius: 4px; text-transform: uppercase; letter-spacing: 1px; }
        .tab-btn:hover { color: #eceff4; }
        .tab-btn.active { color: #00ff88; border-color: #232736; background: #0f1118; }
        
        .tab-balance { margin-left: auto; display: flex; align-items: center; color: #00ff88; font-weight: 900; font-size: 18px; background: #0f1118; padding: 0 20px; border-radius: 4px; border: 1px solid #1a1c26; }

        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .grid-card { background: #0f1118; border: 1px solid #1a1c26; border-radius: 4px; padding: 25px 15px; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.2s; position: relative; }
        .grid-card:hover { border-color: #4a506b; background: #12151e; }
        .grid-card.selected { border-color: #00ff88; background: #12151e; }
        .card-emoji { font-size: 40px; margin-bottom: 15px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5)); }
        .card-price { font-weight: 900; color: #eceff4; font-size: 14px; }
        .card-name { font-size: 10px; color: #6a718c; margin-top: 8px; text-align: center; text-transform: uppercase; font-weight: 700; }
        .buy-action { margin-top: 15px; width: 100%; background: #161923; color: #eceff4; border: 1px solid #232736; padding: 8px; border-radius: 2px; font-size: 10px; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .grid-card:hover .buy-action { background: #00ff88; color: #0b0d12; border-color: #00ff88; }

        /* --- МОДАЛКА УТЕШИТЕЛЬНОГО КЕЙСА (LOSER CASE) --- */
        .case-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; flex-direction: column; z-index: 300; }
        .case-title { color: #fff; font-size: 24px; font-weight: 900; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 30px; text-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .case-window { width: 800px; height: 160px; background: #0f1118; border: 2px solid #1a1c26; position: relative; overflow: hidden; display: flex; align-items: center; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .case-center-line { position: absolute; left: 50%; transform: translateX(-50%); width: 2px; height: 100%; background: #00ff88; z-index: 10; box-shadow: 0 0 15px #00ff88; }
        .case-track { display: flex; gap: 10px; padding: 0 10px; transition: transform 5s cubic-bezier(0.1, 0.9, 0.2, 1); will-change: transform; }
        .case-item { width: 120px; height: 120px; flex-shrink: 0; background: #161923; border: 1px solid #232736; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 4px; }
        .case-item-emoji { font-size: 45px; margin-bottom: 10px; }
        .case-item-name { font-size: 10px; color: #8a92b6; font-weight: 700; text-transform: uppercase; }

        /* --- ПРОФИЛЬ МОДАЛКА --- */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 200; }
        .modal-content { background: #0f1118; border: 1px solid #1a1c26; border-radius: 4px; width: 400px; padding: 40px; position: relative; }
        .close-btn { position: absolute; top: 15px; right: 20px; background: none; border: none; color: #6a718c; font-size: 24px; cursor: pointer; }
        .stat-line { display: flex; justify-content: space-between; border-bottom: 1px solid #1a1c26; padding: 12px 0; color: #8a92b6; font-size: 13px; font-weight: 500; }
        .stat-line b { color: #eceff4; font-weight: 700; }
        .deposit-zone { margin-top: 30px; padding: 25px; background: #0b0d12; border: 1px solid #1a1c26; border-radius: 4px; text-align: center; }
        .btn-tg { background: #eceff4; color: #0b0d12; text-decoration: none; padding: 12px 24px; border-radius: 2px; font-weight: 900; display: inline-block; margin-top: 15px; font-size: 12px; text-transform: uppercase; transition: 0.2s; }
        .btn-tg:hover { background: #00ff88; }
    </style>
</head>
<body>

    <audio id="s-spin" src="spin.mp3"></audio>
    <audio id="s-win" src="win.mp3"></audio>
    <audio id="s-lose" src="lose.mp3"></audio>

    <div class="live-feed" id="live-feed"></div>

    <div class="main-wrapper">
        <header>
            <div class="logo">FLASH<span style="color:#eceff4;">UPGRADER</span></div>
            <button class="btn-profile" onclick="document.getElementById('profileModal').style.display='flex'">Профиль</button>
        </header>

        <div class="upgrade-section">
            <div class="item-box" id="box-src">
                <div class="box-title">Ваш предмет</div>
                <div class="item-emoji" id="src-img">❓</div>
                <div class="item-price" id="src-price">-</div>
                <div class="item-name" id="src-name">Выберите инвентарь</div>
            </div>

            <div class="center-module">
                <div class="roulette-circle">
                    <div class="chance-fill" id="chance-bg"></div>
                    <div class="inner-hole">
                        <div class="chance-text" id="chance-val">0%</div>
                        <div class="chance-sub">Шанс успеха</div>
                    </div>
                    <div class="arrow-spinner" id="arrow">
                        <div class="arrow-indicator"></div>
                    </div>
                </div>
                
                <button class="btn-play" id="btn-play" onclick="startPlay()" disabled>Запустить</button>
                
                <div class="multiplier-bar">
                    <button class="mult-btn" onclick="calcTarget(1.5)">1.5X</button>
                    <button class="mult-btn" onclick="calcTarget(2)">2X</button>
                    <button class="mult-btn" onclick="calcTarget(5)">5X</button>
                    <button class="mult-btn" onclick="calcTarget(10)">10X</button>
                </div>
            </div>

            <div class="item-box" id="box-tgt">
                <div class="box-title">Цель апгрейда</div>
                <div class="item-emoji" id="tgt-img">❓</div>
                <div class="item-price" id="tgt-price">-</div>
                <div class="item-name" id="tgt-name">Выберите в магазине</div>
            </div>
        </div>

        <div class="tabs-section">
            <div class="tabs-header">
                <button class="tab-btn active" id="tab1" onclick="switchTab('inv')">Инвентарь</button>
                <button class="tab-btn" id="tab2" onclick="switchTab('shop')">Магазин</button>
                <button class="tab-btn" id="tab3" onclick="switchTab('targets')">Все предметы (Выбор цели)</button>
                <div class="tab-balance" id="ui-balance">0 ⭐️</div>
            </div>
            <div class="items-grid" id="grid-content"></div>
        </div>
    </div>

    <div class="modal" id="profileModal">
        <div class="modal-content">
            <button class="close-btn" onclick="document.getElementById('profileModal').style.display='none'">✖</button>
            <h2 style="margin-bottom: 25px; font-weight: 900; color: #fff; text-transform: uppercase;">Профиль</h2>
            
            <div class="stat-line">Никнейм: <b id="p-name"></b></div>
            <div class="stat-line">Игр сыграно: <b id="p-games"></b></div>
            <div class="stat-line">Успешных: <b id="p-wins" style="color:#00ff88;"></b></div>
            
            <div class="deposit-zone">
                <div style="font-size: 14px; color: #fff; font-weight: 700; margin-bottom: 10px; text-transform: uppercase;">Пополнение</div>
                <div style="font-size: 11px; color: #6a718c; line-height: 1.6; text-transform: uppercase;">
                    Подарок во Flashgram от 5.000 звезд. Для зачисления пишите в поддержку.
                </div>
                <a href="https://t.me/om1a2" target="_blank" class="btn-tg">Поддержка @om1a2</a>
            </div>
        </div>
    </div>

    <div class="case-overlay" id="loserCaseModal">
        <div class="case-title">Утешительный дроп</div>
        <div class="case-window">
            <div class="case-center-line"></div>
            <div class="case-track" id="caseTrack">
                </div>
        </div>
    </div>

    <script>
        // База дешевых предметов (для утешительного кейса)
        const CHEAP_ITEMS = [
            { name: "Уголек", price: 5, img: "🌑" },
            { name: "Печенье", price: 10, img: "🍪" },
            { name: "Медяк", price: 25, img: "🪙" },
            { name: "Свиток", price: 50, img: "📜" },
            { name: "Зелье", price: 75, img: "🧪" }
        ];

        // Основная база предметов (расширенная)
        const DB = [
            { id: 1, name: "Обычная Звезда", price: 100, img: "⭐️" },
            { id: 2, name: "Новогодняя Елка", price: 250, img: "🎄" },
            { id: 3, name: "Сладкая Конфета", price: 500, img: "🍬" },
            { id: 4, name: "Золотое Сердце", price: 1000, img: "💛" },
            { id: 5, name: "Ключ от Сундука", price: 2500, img: "🗝️" },
            { id: 6, name: "Желейная Лягушка", price: 5000, img: "🐸" },
            { id: 7, name: "Магический Кристалл", price: 10000, img: "🔮" },
            { id: 8, name: "Премиум Корона", price: 15000, img: "👑" },
            { id: 9, name: "Красный Дракон", price: 25000, img: "🐉" },
            { id: 10, name: "Святой Грааль", price: 35000, img: "🏆" },
            { id: 11, name: "Синий Алмаз", price: 50000, img: "💎" },
            { id: 12, name: "Золотой Слиток", price: 75000, img: "💰" },
            { id: 13, name: "Космическая Ракета", price: 100000, img: "🚀" },
            { id: 14, name: "Глаз Дракона", price: 150000, img: "👁️" },
            { id: 15, name: "Секретный Подарок", price: 250000, img: "🎁" },
            { id: 16, name: "Черная Дыра", price: 500000, img: "🌌" },
            { id: 17, name: "Корона Императора", price: 1000000, img: "🔱" },
            { id: 18, name: "Абсолютная Власть", price: 5000000, img: "⚡" }
        ];

        let user = { name: "Игрок", balance: 0, inv: [], games: 0, wins: 0 };
        let activeTab = 'inv';
        let srcItem = null;
        let tgtItem = null;
        let spinning = false;
        let currentDeg = 0;

        window.onload = () => {
            let s = localStorage.getItem('upgPro');
            if(s) {
                user = JSON.parse(s);
            } else {
                user.name = prompt("Введите никнейм:") || "Игрок";
                user.balance = 10000;
                alert("Добро пожаловать! Вам выдан стартовый баланс 10.000 ⭐️");
                save();
            }
            updateView();
            switchTab('inv');
        };

        function save() { localStorage.setItem('upgPro', JSON.stringify(user)); }

        function updateView() {
            document.getElementById('ui-balance').innerText = user.balance.toLocaleString() + " ⭐️";
            document.getElementById('p-name').innerText = user.name;
            document.getElementById('p-games').innerText = user.games;
            document.getElementById('p-wins').innerText = user.wins;

            // Левый блок
            if(srcItem) {
                document.getElementById('src-img').innerText = srcItem.img;
                document.getElementById('src-price').innerText = srcItem.price.toLocaleString() + " ⭐️";
                document.getElementById('src-name').innerText = srcItem.name;
                document.getElementById('box-src').classList.add('active');
            } else {
                document.getElementById('src-img').innerText = "❓";
                document.getElementById('src-price').innerText = "-";
                document.getElementById('src-name').innerText = "Выберите инвентарь";
                document.getElementById('box-src').classList.remove('active');
            }

            // Правый блок
            if(tgtItem) {
                document.getElementById('tgt-img').innerText = tgtItem.img;
                document.getElementById('tgt-price').innerText = tgtItem.price.toLocaleString() + " ⭐️";
                document.getElementById('tgt-name').innerText = tgtItem.name;
                document.getElementById('box-tgt').classList.add('active');
            } else {
                document.getElementById('tgt-img').innerText = "❓";
                document.getElementById('tgt-price').innerText = "-";
                document.getElementById('tgt-name').innerText = "Выберите цель";
                document.getElementById('box-tgt').classList.remove('active');
            }

            // Рулетка
            const btn = document.getElementById('btn-play');
            const bg = document.getElementById('chance-bg');
            if(srcItem && tgtItem) {
                let chance = (srcItem.price / tgtItem.price) * 100;
                if(chance > 100) chance = 100;
                document.getElementById('chance-val').innerText = chance.toFixed(2) + "%";
                
                // ЗЕЛЕНАЯ ЗОНА СНИЗУ (from 180deg)
                bg.style.background = `conic-gradient(from 180deg, #00ff88 ${(chance/100)*360}deg, transparent 0deg)`;
                
                btn.disabled = srcItem.price >= tgtItem.price;
            } else {
                document.getElementById('chance-val').innerText = "0%";
                bg.style.background = 'transparent';
                btn.disabled = true;
            }
        }

        function switchTab(tab) {
            if(spinning) return;
            activeTab = tab;
            document.getElementById('tab1').className = `tab-btn ${tab==='inv'?'active':''}`;
            document.getElementById('tab2').className = `tab-btn ${tab==='shop'?'active':''}`;
            document.getElementById('tab3').className = `tab-btn ${tab==='targets'?'active':''}`;
            
            const grid = document.getElementById('grid-content');
            grid.innerHTML = '';

            if(tab === 'inv') {
                if(user.inv.length === 0) grid.innerHTML = '<div style="color:#4a506b; grid-column:1/-1; font-weight: 700; text-transform: uppercase;">Ваш инвентарь пуст.</div>';
                user.inv.forEach(i => {
                    const d = document.createElement('div');
                    d.className = `grid-card ${srcItem && srcItem.uid === i.uid ? 'selected' : ''}`;
                    d.innerHTML = `<div class="card-emoji">${i.img}</div><div class="card-price">${i.price.toLocaleString()} ⭐️</div><div class="card-name">${i.name}</div>`;
                    d.onclick = () => { srcItem = i; updateView(); switchTab('inv'); };
                    grid.appendChild(d);
                });
            } else if (tab === 'shop') {
                DB.forEach(i => {
                    const d = document.createElement('div');
                    d.className = 'grid-card';
                    d.innerHTML = `<div class="card-emoji">${i.img}</div><div class="card-price">${i.price.toLocaleString()} ⭐️</div><div class="card-name">${i.name}</div><button class="buy-action" onclick="buy(${i.id}, event)">Купить</button>`;
                    grid.appendChild(d);
                });
            } else if (tab === 'targets') {
                DB.forEach(i => {
                    const d = document.createElement('div');
                    d.className = `grid-card ${tgtItem && tgtItem.id === i.id ? 'selected' : ''}`;
                    d.innerHTML = `<div class="card-emoji">${i.img}</div><div class="card-price">${i.price.toLocaleString()} ⭐️</div><div class="card-name">${i.name}</div>`;
                    d.onclick = () => { tgtItem = i; updateView(); switchTab('targets'); };
                    grid.appendChild(d);
                });
            }
        }

        function buy(id, e) {
            e.stopPropagation();
            const item = DB.find(x => x.id === id);
            if(user.balance >= item.price) {
                user.balance -= item.price;
                user.inv.push({...item, uid: Date.now() + Math.random()});
                save(); updateView();
            } else {
                alert("Недостаточно звезд!");
            }
        }

        function calcTarget(mult) {
            if(!srcItem) return alert("Выберите свой предмет в Инвентаре!");
            const target = srcItem.price * mult;
            tgtItem = DB.reduce((prev, curr) => Math.abs(curr.price - target) < Math.abs(prev.price - target) ? curr : prev);
            updateView();
            switchTab('targets');
        }

        function startPlay() {
            if(spinning || !srcItem || !tgtItem) return;
            spinning = true;
            document.getElementById('btn-play').disabled = true;

            try { document.getElementById('s-spin').currentTime = 0; document.getElementById('s-spin').play(); } catch(e){}

            let chanceVis = (srcItem.price / tgtItem.price) * 100;
            if(chanceVis > 100) chanceVis = 100;
            
            // Скрытая механика админа
            let chanceReal = chanceVis * 0.6; 
            let isWin = (Math.random() * 100) <= chanceReal;

            const arrow = document.getElementById('arrow');
            const winSector = (chanceVis / 100) * 360;
            const stopDeg = isWin ? (Math.random() * winSector) : (winSector + Math.random() * (360 - winSector));
            
            currentDeg += (360 * 7) + stopDeg; // 7 быстрых кругов + остановка
            arrow.style.transform = `rotate(${currentDeg}deg)`;

            user.games++;

            setTimeout(() => {
                if(isWin) {
                    try { document.getElementById('s-win').play(); } catch(e){}
                    user.wins++;
                    user.inv.push({...tgtItem, uid: Date.now()});
                    user.inv = user.inv.filter(x => x.uid !== srcItem.uid);
                    srcItem = null;
                    spinning = false;
                    save(); updateView(); switchTab(activeTab);
                } else {
                    try { document.getElementById('s-lose').play(); } catch(e){}
                    user.inv = user.inv.filter(x => x.uid !== srcItem.uid);
                    srcItem = null;
                    
                    // Запуск утешительного кейса
                    startLoserCase();
                }
            }, 8000);
        }

        function startLoserCase() {
            const modal = document.getElementById('loserCaseModal');
            const track = document.getElementById('caseTrack');
            modal.style.display = 'flex';
            
            // Генерация ленты предметов (60 штук)
            track.style.transition = 'none';
            track.style.transform = 'translateX(0)';
            track.innerHTML = '';
            
            let itemsHTML = '';
            let winnerItem = null;

            for(let i=0; i<60; i++) {
                // На 45 позиции - выигрышный предмет
                let drop = CHEAP_ITEMS[Math.floor(Math.random() * CHEAP_ITEMS.length)];
                if(i === 45) winnerItem = drop;
                
                itemsHTML += `<div class="case-item">
                    <div class="case-item-emoji">${drop.img}</div>
                    <div class="case-item-name">${drop.name}</div>
                </div>`;
            }
            track.innerHTML = itemsHTML;

            // Запуск анимации прокрутки
            setTimeout(() => {
                track.style.transition = 'transform 5s cubic-bezier(0.1, 0.9, 0.2, 1)';
                // 45 элементов * 130px (ширина + gap) - половина экрана для центровки
                const offset = (45 * 130) - 400 + 65 + (Math.random() * 80 - 40);
                track.style.transform = `translateX(-${offset}px)`;
            }, 50);

            // Выдача предмета после остановки
            setTimeout(() => {
                user.inv.push({...winnerItem, uid: Date.now()});
                save(); updateView(); switchTab(activeTab);
                
                setTimeout(() => {
                    modal.style.display = 'none';
                    spinning = false;
                }, 1500);
            }, 5200);
        }

        // Рандомная лайв-лента
        setInterval(() => {
            const feed = document.getElementById('live-feed');
            const d = document.createElement('div');
            d.className = 'live-item';
            d.innerText = DB[Math.floor(Math.random() * DB.length)].img;
            feed.prepend(d);
            if(feed.children.length > 15) feed.lastChild.remove();
        }, 1200);
    </script>
</body>
