<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Stars Upgrader Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2=family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

        :root {
            --bg-main: #060913;
            --bg-panel: #0b1120;
            --bg-card: #111a30;
            --bg-input: #0e1526;
            --text-main: #ffffff;
            --text-muted: #64748b;
            --accent-blue: #0088cc;
            --accent-yellow: #00f0ff; 
            --accent-gold: #ffca00;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --border-color: #1e293b;
            --border-hover: #334155;

            /* Редкости предметов с неоновым свечением */
            --tier-common: linear-gradient(135deg, #1e40af, #1e3a8a);
            --tier-rare: linear-gradient(135deg, #6d28d9, #4c1d95);
            --tier-epic: linear-gradient(135deg, #be185d, #701a75);
            --tier-legendary: linear-gradient(135deg, #b91c1c, #7f1d1d);
            --tier-immortal: linear-gradient(135deg, #b45309, #78350f);
            
            --glow-green: drop-shadow(0 0 15px rgba(16, 185, 129, 0.6));
            --glow-red: drop-shadow(0 0 15px rgba(239, 68, 68, 0.6));
            --glow-gold: drop-shadow(0 0 15px rgba(255, 202, 0, 0.5));
        }

        body {
            margin: 0; padding: 20px;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            box-sizing: border-box; user-select: none;
            display: flex; flex-direction: column; align-items: center;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(1deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .app-container {
            width: 100%; max-width: 1340px;
            display: flex; flex-direction: column; gap: 24px;
        }

        /* ХЕДЕР ПЛАТФОРМЫ */
        .app-header {
            display: flex; justify-content: space-between; align-items: center;
            background-color: var(--bg-panel); padding: 16px 24px;
            border-radius: 16px; border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .brand { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
        .brand span { color: var(--accent-blue); text-shadow: 0 0 10px rgba(0, 136, 204, 0.5); }
        .header-controls { display: flex; align-items: center; gap: 16px; }
        
        .btn-audio, .btn-gift-add {
            background: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-muted);
            padding: 10px 16px; border-radius: 10px; cursor: pointer; transition: all 0.2s; font-weight: 700;
        }
        .btn-audio.active { color: var(--accent-gold); border-color: rgba(255,202,0,0.3); box-shadow: 0 0 10px rgba(255,202,0,0.2); }
        .btn-gift-add { color: #fff; background: linear-gradient(135deg, #0284c7, #0369a1); border: none; }
        .btn-gift-add:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(3, 105, 161, 0.4); }

        /* ВЕРХНЯЯ ЗОНА (РАБОЧЕЕ ПРОСТРАНСТВО) */
        .top-section {
            display: grid; grid-template-columns: 1fr 1.2fr 1fr; gap: 24px; min-height: 420px;
        }

        .panel {
            background-color: var(--bg-panel); border-radius: 20px;
            position: relative; display: flex; flex-direction: column;
            border: 1px solid var(--border-color);
            padding: 24px; box-sizing: border-box; transition: all 0.3s;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .panel-title {
            font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase;
            letter-spacing: 1.5px; margin-bottom: 20px; text-align: center;
        }

        .item-preview {
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center;
        }
        
        .gift-img-large {
            width: 140px; height: 140px; object-fit: contain; margin-bottom: 15px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
            animation: float 4s ease-in-out infinite;
        }
        
        .item-name { color: #fff; font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
        .item-price { font-size: 16px; font-weight: 700; color: var(--accent-gold); margin-top: 8px; background: rgba(255,202,0,0.06); padding: 4px 12px; border-radius: 20px; border: 1px solid rgba(255,202,0,0.15); }
        
        .empty-state { color: var(--text-muted); font-size: 13px; font-weight: 600; text-align: center; margin: auto; line-height: 1.6; max-width: 200px; }
        .empty-state span { display: block; margin-top: 8px; font-size: 11px; color: #475569; }

        .balance-slider-container {
            margin-top: auto; display: flex; flex-direction: column; gap: 10px;
            background: var(--bg-input); padding: 16px; border-radius: 14px; border: 1px solid var(--border-color);
        }
        .slider-header { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-muted); font-weight: 600; }
        .slider-header span b { color: var(--accent-gold); }
        
        .custom-slider {
            width: 100%; -webkit-appearance: none; background: var(--border-color); height: 6px; border-radius: 10px; outline: none;
        }
        .custom-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--accent-gold); cursor: pointer; box-shadow: 0 0 10px rgba(255,202,0,0.5); transition: transform 0.1s;
        }
        .custom-slider::-webkit-slider-thumb:hover { transform: scale(1.15); }

        /* ЦЕНТРАЛЬНЫЙ ТРЭКЕР */
        .center-panel { align-items: center; justify-content: center; background: transparent; border: none; padding: 0; gap: 20px;}
        
        .circle-container { position: relative; width: 280px; height: 280px; }
        
        .upgrader-wheel {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%; background: #0f1524;
            display: flex; align-items: center; justify-content: center;
            z-index: 1; transition: background 0.3s;
            border: 4px solid var(--border-color); box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
        }

        .wheel-inner {
            width: 210px; height: 210px;
            background: var(--bg-panel); border-radius: 50%;
            z-index: 3; display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 2px solid var(--border-color); box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .wheel-percent { font-size: 42px; font-weight: 800; color: var(--accent-gold); letter-spacing: -1px; transition: color 0.3s; text-shadow: 0 0 15px rgba(255, 202, 0, 0.2); }
        .wheel-text { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; font-weight: 700; margin-top: 4px; text-align: center; max-width: 160px;}

        /* Стрелка теперь указывает СНИЗУ ВВЕРХ (на 6 часов) */
        .wheel-ticker {
            position: absolute; bottom: -12px; left: 50%; width: 4px; height: 40px;
            transform: translateX(-50%); z-index: 10; pointer-events: none;
        }
        .ticker-arrow {
            width: 0; height: 0;
            border-left: 14px solid transparent; border-right: 14px solid transparent;
            border-bottom: 22px solid var(--accent-gold);
            filter: drop-shadow(0 0 10px var(--accent-gold));
        }

        .btn-upgrade {
            width: 100%; background: linear-gradient(135deg, #ffca00, #e6b600); color: #000; border: none;
            padding: 18px; font-size: 15px; font-weight: 800; border-radius: 14px; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1.5px; transition: all 0.2s;
            box-shadow: 0 4px 20px rgba(255,202,0,0.2);
        }
        .btn-upgrade:hover:not(:disabled) { background: linear-gradient(135deg, #ffe100, #ffca00); transform: translateY(-2px); box-shadow: 0 0 25px rgba(255,202,0,0.4); }
        .btn-upgrade:disabled { background: #151c2e; color: #3b455e; cursor: not-allowed; box-shadow: none; border: 1px solid var(--border-color); }

        /* СЕТКА УМНОЖИТЕЛЕЙ */
        .multiplier-container { margin-top: auto; display: flex; flex-direction: column; gap: 8px; width: 100%; }
        .multiplier-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
        .btn-mult {
            background: var(--bg-input); border: 1px solid var(--border-color); color: #94a3b8;
            padding: 10px 0; font-size: 11px; font-weight: 700; border-radius: 8px; cursor: pointer;
            transition: all 0.15s; text-align: center;
        }
        .btn-mult:hover:not(:disabled) { background: #1e293b; color: #fff; border-color: var(--border-hover); }
        .btn-mult.active { background: rgba(0, 240, 255, 0.08); border-color: var(--accent-yellow); color: var(--accent-yellow); box-shadow: 0 0 10px rgba(0,240,255,0.2); }
        .btn-mult:disabled { opacity: 0.3; cursor: not-allowed; }

        /* ИНВЕНТАРНАЯ ЗОНА И ИСТОРИЯ */
        .bottom-section { display: grid; grid-template-columns: 1fr 1fr 0.8fr; gap: 24px; min-height: 480px; }

        .inventory-header {
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 16px; border-bottom: 1px solid var(--border-color); margin-bottom: 16px; gap: 12px;
        }
        .inventory-title { font-weight: 800; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: #fff; display: flex; align-items: center; gap: 8px;}
        .inventory-title span { color: var(--text-muted); font-weight: 600; font-size: 12px; }
        
        .balance-badge {
            background: rgba(255,202,0,0.08); border: 1px solid rgba(255,202,0,0.2);
            padding: 8px 14px; border-radius: 10px; font-size: 14px; font-weight: 700; color: var(--accent-gold);
        }

        .shop-filter-bar { display: flex; gap: 8px; width: 100%; max-width: 260px; }
        .search-input {
            width: 100%; background: var(--bg-input); border: 1px solid var(--border-color);
            border-radius: 10px; padding: 8px 12px; color: #fff; font-family: inherit; font-size: 12px; outline: none;
        }
        .select-sort {
            background: var(--bg-input); border: 1px solid var(--border-color);
            border-radius: 10px; padding: 0 8px; color: var(--text-muted); font-family: inherit; font-size: 11px; cursor: pointer; outline: none;
        }

        .grid-container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(115px, 1fr));
            gap: 12px; overflow-y: auto; height: 380px; align-content: start; padding-right: 4px;
        }
        .grid-container::-webkit-scrollbar, .history-log::-webkit-scrollbar { width: 6px; }
        .grid-container::-webkit-scrollbar-thumb, .history-log::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

        /* Премиальные карточки предметов с ГЛОУ эффектом */
        .skin-card {
            background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 14px;
            padding: 12px; position: relative; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            height: 145px; box-sizing: border-box; transition: all 0.25s;
        }
        .skin-card:hover { background: #16223d; border-color: #475569; transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .skin-card.selected { border-color: var(--accent-gold); background: #1a2642; box-shadow: 0 0 15px rgba(255, 202, 0, 0.25); }
        
        .rarity-line { position: absolute; top: 0; left: 0; width: 100%; height: 4px; border-radius: 14px 14px 0 0; }
        .card-price { width: 100%; text-align: right; font-size: 11px; font-weight: 700; color: var(--accent-gold); }
        
        .gift-img-small { width: 60px; height: 60px; object-fit: contain; filter: drop-shadow(0 6px 10px rgba(0,0,0,0.4)); transition: transform 0.25s; margin: 4px 0;}
        .skin-card:hover .gift-img-small { transform: scale(1.1); }
        .skin-card .name { font-size: 11px; color: #f1f5f9; font-weight: 600; text-align: center; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .empty-slot { background: rgba(17, 26, 48, 0.1); border: 2px dashed rgba(255,255,255,0.02); border-radius: 14px; height: 145px; }

        /* КРАСИВАЯ СТРУКТУРА ИСТОРИИ */
        .history-log { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; height: 380px; padding-right: 4px; }
        .history-item {
            background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px;
            padding: 12px; display: flex; flex-direction: column; gap: 6px; font-size: 12px;
            transition: all 0.2s; animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .history-meta { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--text-muted); }
        .history-badge { padding: 2px 8px; border-radius: 6px; font-weight: 800; text-transform: uppercase; font-size: 9px; }
        .history-badge.win { background: rgba(16, 185, 129, 0.15); color: var(--accent-green); border: 1px solid rgba(16, 185, 129, 0.3); }
        .history-badge.lose { background: rgba(239, 68, 68, 0.15); color: var(--accent-red); border: 1px solid rgba(239, 68, 68, 0.3); }
        
        .history-details { display: flex; align-items: center; justify-content: space-between; font-weight: 600; color: #e2e8f0; }
        .history-details span b { color: var(--accent-gold); }

        /* Баннер исхода апгрейда */
        .result-banner {
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%) scale(0.9);
            padding: 12px 32px; border-radius: 10px; font-weight: 800; font-size: 14px;
            opacity: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 20; text-transform: uppercase; letter-spacing: 1.5px; pointer-events: none;
        }
        .result-banner.win { opacity: 1; transform: translateX(-50%) scale(1); background: var(--accent-green); color: #000; box-shadow: 0 0 30px rgba(16, 185, 129, 0.6); }
        .result-banner.lose { opacity: 1; transform: translateX(-50%) scale(1); background: var(--accent-red); color: #fff; box-shadow: 0 0 30px rgba(239, 68, 68, 0.6); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="app-header">
        <div class="brand">🚀 UPGRADER<span>.TG</span></div>
        <div class="header-controls">
            <button class="btn-gift-add" onclick="getFreeGift()">🎁 Получить подарок</button>
            <button class="btn-audio active" id="audio-toggle" onclick="toggleAudio()" title="Вкл/Выкл звук">
                🔊 Звук
            </button>
        </div>
    </div>

    <div class="top-section">
        <div class="panel" id="panel-input">
            <div class="panel-title">Ваш Предмет</div>
            <div id="preview-left-content" class="item-preview" style="display: none;">
                <img src="" class="gift-img-large" id="input-img" alt="">
                <div class="item-name" id="input-title">Название</div>
                <div class="item-price" id="input-price">0 ⭐️</div>
            </div>
            <div id="preview-left-empty" class="empty-state">
                ВЫБЕРИТЕ ПРЕДМЕТ
                <span>из инвентаря снизу для начала</span>
            </div>
            
            <div class="balance-slider-container">
                <div class="slider-header">
                    <span>Добавить баланс:</span>
                    <span><span id="slider-val">0</span> ⭐️</span>
                </div>
                <input type="range" min="0" max="0" value="0" class="custom-slider" id="balance-slider" oninput="updateSliderAmount()">
            </div>
        </div>

        <div class="panel center-panel">
            <div class="result-banner" id="res-banner">УСПЕХ!</div>
            <div class="circle-container">
                <canvas id="wheel-canvas-render" width="280" height="280" style="position:absolute; top:0; left:0; z-index:2; border-radius:50%; pointer-events:none;"></canvas>
                <div class="upgrader-wheel" id="wheel-base">
                    <div class="wheel-ticker" id="wheel-ticker">
                        <div class="ticker-arrow"></div>
                    </div>
                    <div class="wheel-inner">
                        <div class="wheel-percent" id="chance-display">0.00%</div>
                        <div class="wheel-text" id="chance-status">выберите цели</div>
                    </div>
                </div>
            </div>
            <button class="btn-upgrade" id="btn-upgrade-main" disabled onclick="startUpgrade()">Попытаться улучшить</button>
        </div>

        <div class="panel" id="panel-target">
            <div class="panel-title">Целевой Предмет</div>
            <div id="preview-right-content" class="item-preview" style="display: none;">
                <img src="" class="gift-img-large" id="target-img" alt="">
                <div class="item-name" id="target-title">Название</div>
                <div class="item-price" id="target-price">0 ⭐️</div>
            </div>
            <div id="preview-right-empty" class="empty-state">
                ВЫБЕРИТЕ ЦЕЛЬ
                <span>из витрины наград справа</span>
            </div>

            <div class="multiplier-container">
                <div class="multiplier-grid">
                    <button class="btn-mult" id="m-x2" onclick="applyQuickMultiplier(2, false)">x2</button>
                    <button class="btn-mult" id="m-x5" onclick="applyQuickMultiplier(5, false)">x5</button>
                    <button class="btn-mult" id="m-x10" onclick="applyQuickMultiplier(10, false)">x10</button>
                    <button class="btn-mult" id="m-25" onclick="applyQuickMultiplier(25, true)">25%</button>
                    <button class="btn-mult" id="m-50" onclick="applyQuickMultiplier(50, true)">50%</button>
                    <button class="btn-mult" id="m-75" onclick="applyQuickMultiplier(75, true)">75%</button>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-section">
        <div class="panel">
            <div class="inventory-header">
                <div class="inventory-title">🗃 Мой инвентарь <span id="inv-count">(0)</span></div>
                <div class="balance-badge"><span id="balance-amount">25000</span> ⭐️</div>
            </div>
            <div class="grid-container" id="my-inventory-grid"></div>
        </div>

        <div class="panel">
            <div class="inventory-header">
                <div class="inventory-title">🛍 Магазин Наград</div>
                <div class="shop-filter-bar">
                    <input type="text" class="search-input" id="shop-search" placeholder="Поиск наград..." oninput="renderShop()">
                    <select class="select-sort" id="shop-sort" onchange="renderShop()">
                        <option value="asc">Сначала дешевые</option>
                        <option value="desc">Сначала дорогие</option>
                    </select>
                </div>
            </div>
            <div class="grid-container" id="shop-grid"></div>
        </div>

        <div class="panel">
            <div class="inventory-header">
                <div class="inventory-title">📜 История Апгрейдов</div>
            </div>
            <div class="history-log" id="history-log-container">
                <div style="color: var(--text-muted); text-align: center; margin-top: 40px; font-size: 13px;">История пуста</div>
            </div>
        </div>
    </div>
</div>

<script>
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    let isSoundEnabled = true;

    function initAudio() {
        if (!audioCtx) audioCtx = new AudioContext();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function toggleAudio() {
        isSoundEnabled = !isSoundEnabled;
        const btn = document.getElementById("audio-toggle");
        if(isSoundEnabled) {
            btn.classList.add("active");
            btn.innerText = "🔊 Звук";
            initAudio();
        } else {
            btn.classList.remove("active");
            btn.innerText = "🔇 Мут";
        }
    }

    function playSound(type) {
        if (!audioCtx || !isSoundEnabled) return;
        const now = audioCtx.currentTime;
        
        if (type === 'click') {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(450, now);
            gain.gain.setValueAtTime(0.08, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
            osc.start(now); osc.stop(now + 0.06);
        } else if (type === 'tick') {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'triangle'; osc.frequency.setValueAtTime(320, now);
            gain.gain.setValueAtTime(0.06, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.03);
            osc.start(now); osc.stop(now + 0.03);
        } else if (type === 'win') {
            [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.frequency.setValueAtTime(freq, now + i*0.07);
                g.gain.setValueAtTime(0.1, now + i*0.07); g.gain.exponentialRampToValueAtTime(0.001, now + i*0.07 + 0.25);
                o.connect(g); g.connect(audioCtx.destination); o.start(now + i*0.07); o.stop(now + i*0.07 + 0.25);
            });
        } else if (type === 'lose') {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(120, now); osc.frequency.linearRampToValueAtTime(50, now + 0.4);
            gain.gain.setValueAtTime(0.12, now); gain.gain.linearRampToValueAtTime(0.001, now + 0.4);
            osc.start(now); osc.stop(now + 0.4);
        }
    }

    // Рабочие иконки подарков Telegram
    const NFT_DATABASE = {
        "lollipop": { name: "Lollipop", img: "https://i.postimg.cc/k47vYg7k/lollipop.png", price: 50, rarity: "var(--tier-common)" },
        "pigeon": { name: "Letter Pigeon", img: "https://i.postimg.cc/g0gDcgL4/pigeon.png", price: 150, rarity: "var(--tier-common)" },
        "cake": { name: "Birthday Cake", img: "https://i.postimg.cc/0jXm8Yf1/cake.png", price: 400, rarity: "var(--tier-common)" },
        "duck": { name: "Rubber Duck", img: "https://i.postimg.cc/N0fL8vWh/duck.png", price: 1200, rarity: "var(--tier-rare)" },
        "star_bottle": { name: "Star Bottle", img: "https://i.postimg.cc/85zXbXfG/star.png", price: 3000, rarity: "var(--tier-rare)" },
        "plush_pepe": { name: "Plush Pepe", img: "https://i.postimg.cc/HkWZzX9S/hotdog.png", price: 7500, rarity: "var(--tier-epic)" },
        "ton_coin": { name: "Crypto TON Coin", img: "https://i.postimg.cc/PqMvMDp6/heart.png", price: 18000, rarity: "var(--tier-epic)" },
        "pavel_durov": { name: "Pavel Durov", img: "https://i.postimg.cc/hGvXbXbY/cap.png", price: 45000, rarity: "var(--tier-epic)" },
        "magic_crystal": { name: "Magic Crystal", img: "https://i.postimg.cc/fyXbXbF3/crystal.png", price: 120000, rarity: "var(--tier-legendary)" },
        "telegram_bear": { name: "Golden Crown Bear", img: "https://i.postimg.cc/9QvXbXb8/crown.png", price: 300000, rarity: "var(--tier-immortal)" }
    };

    let freebetBalance = 25000;
    let userInventory = ["lollipop", "pigeon", "cake", "duck", "star_bottle"]; 
    let selectedInvIdx = null;
    let selectedShopKey = null;
    let addedBalance = 0;
    let calculatedChance = 0;
    let isUpgrading = false;
    let upgradeHistory = [];

    document.body.addEventListener('click', initAudio, { once: true });

    window.onload = function() {
        init();
    };

    function init() { 
        renderInventory(); 
        renderShop(); 
        updateWorkspace(); 
    }

    function getFreeGift() {
        const keys = Object.keys(NFT_DATABASE);
        const randomKey = keys[Math.floor(Math.random() * 3)]; // Рандомим обычные вещи
        userInventory.push(randomKey);
        playSound('click');
        renderInventory();
    }

    function renderInventory() {
        const grid = document.getElementById("my-inventory-grid");
        grid.innerHTML = "";
        document.getElementById("inv-count").innerText = `(${userInventory.length})`;
        document.getElementById("balance-amount").innerText = freebetBalance.toLocaleString();

        userInventory.forEach((key, idx) => {
            const item = NFT_DATABASE[key];
            if(!item) return;
            const card = document.createElement("div");
            card.className = `skin-card ${selectedInvIdx === idx ? 'selected' : ''}`;
            card.onclick = () => { if(!isUpgrading) { playSound('click'); selectInventoryItem(idx); } };
            card.innerHTML = `
                <div class="rarity-line" style="background: ${item.rarity}"></div>
                <div class="card-price">${item.price.toLocaleString()} ⭐️</div>
                <img src="${item.img}" class="gift-img-small" alt="">
                <div class="name">${item.name}</div>
            `;
            grid.appendChild(card);
        });

        for(let i = 0; i < Math.max(0, 8 - userInventory.length); i++) {
            const slot = document.createElement("div"); slot.className = "empty-slot"; grid.appendChild(slot);
        }
    }

    function renderShop() {
        const grid = document.getElementById("shop-grid");
        const searchQuery = document.getElementById("shop-search").value.toLowerCase();
        const sortOrder = document.getElementById("shop-sort").value;
        grid.innerHTML = "";
        
        let keys = Object.keys(NFT_DATABASE);
        keys = keys.filter(k => NFT_DATABASE[k].name.toLowerCase().includes(searchQuery));
        keys.sort((a, b) => sortOrder === 'asc' ? NFT_DATABASE[a].price - NFT_DATABASE[b].price : NFT_DATABASE[b].price - NFT_DATABASE[a].price);

        keys.forEach(key => {
            const item = NFT_DATABASE[key];
            const card = document.createElement("div");
            card.className = `skin-card ${selectedShopKey === key ? 'selected' : ''}`;
            card.onclick = () => { if(!isUpgrading) { playSound('click'); selectShopItem(key); } };
            card.innerHTML = `
                <div class="rarity-line" style="background: ${item.rarity}"></div>
                <div class="card-price">${item.price.toLocaleString()} ⭐️</div>
                <img src="${item.img}" class="gift-img-small" alt="">
                <div class="name">${item.name}</div>
            `;
            grid.appendChild(card);
        });
    }

    function selectInventoryItem(idx) { 
        selectedInvIdx = (selectedInvIdx === idx) ? null : idx;
        addedBalance = 0;
        resetMultipliers();
        updateWorkspace(); 
        renderInventory();
    }

    function selectShopItem(key) { 
        selectedShopKey = (selectedShopKey === key) ? null : key;
        resetMultipliers();
        updateWorkspace(); 
        renderShop();
    }

    function resetMultipliers() {
        document.querySelectorAll('.btn-mult').forEach(b => b.classList.remove('active'));
    }

    function updateSliderAmount() {
        const slider = document.getElementById("balance-slider");
        addedBalance = parseInt(slider.value);
        document.getElementById("slider-val").innerText = addedBalance.toLocaleString();
        updateWorkspace(false);
    }

    function applyQuickMultiplier(value, isPercentage = false) {
        if (selectedInvIdx === null || isUpgrading) return;
        playSound('click');
        
        const inputItem = NFT_DATABASE[userInventory[selectedInvIdx]];
        const currentTotalInput = inputItem.price + addedBalance;
        let targetTargetPrice = 0;

        if (!isPercentage) {
            targetTargetPrice = currentTotalInput * value;
        } else {
            targetTargetPrice = currentTotalInput / (value / 100);
        }

        let bestKey = null;
        let minDiff = Infinity;

        Object.keys(NFT_DATABASE).forEach(key => {
            const item = NFT_DATABASE[key];
            if (item.price > inputItem.price) {
                const diff = Math.abs(item.price - targetTargetPrice);
                if (diff < minDiff) {
                    minDiff = diff;
                    bestKey = key;
                }
            }
        });

        if (bestKey) {
            selectedShopKey = bestKey;
            renderShop();
            updateWorkspace(false);
            
            resetMultipliers();
            const btnId = isPercentage ? `m-${value}` : `m-x${value}`;
            const activeBtn = document.getElementById(btnId);
            if (activeBtn) activeBtn.classList.add('active');
        }
    }

    // Отрисовка сектора шанса на Canvas (ЧЕТКО СНИЗУ НА 6 ЧАСОВ)
    function drawWheelSector(chance) {
        const canvas = document.getElementById("wheel-canvas-render");
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if (chance <= 0) return;

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius = canvas.width / 2 - 6;

        const totalRads = (chance / 100) * Math.PI * 2;
        
        // Математика: чтобы сектор был по центру внизу, 
        // стартовая точка должна быть зеркально сбалансирована относительно 90 градусов (Math.PI / 2)
        const startAngle = (Math.PI / 2) - (totalRads / 2);
        const endAngle = (Math.PI / 2) + (totalRads / 2);

        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.arc(centerX, centerY, radius, startAngle, endAngle);
        ctx.closePath();

        ctx.fillStyle = "rgba(0, 240, 255, 0.15)";
        ctx.fill();
        ctx.strokeStyle = "var(--accent-yellow)";
        ctx.lineWidth = 3;
        ctx.stroke();
    }

    function updateWorkspace(resetSlider = true) {
        const pLeftContent = document.getElementById("preview-left-content");
        const pLeftEmpty = document.getElementById("preview-left-empty");
        const slider = document.getElementById("balance-slider");
        const panelInput = document.getElementById("panel-input");
        const panelTarget = document.getElementById("panel-target");

        if (selectedInvIdx !== null) {
            const item = NFT_DATABASE[userInventory[selectedInvIdx]];
            pLeftEmpty.style.display = "none"; pLeftContent.style.display = "flex";
            document.getElementById("input-img").src = item.img;
            document.getElementById("input-title").innerText = item.name;
            document.getElementById("input-price").innerText = item.price.toLocaleString() + " ⭐️";
            panelInput.style.borderColor = "rgba(255,255,255,0.1)";
            
            slider.max = freebetBalance;
            if (resetSlider) {
                slider.value = addedBalance;
                document.getElementById("slider-val").innerText = addedBalance.toLocaleString();
            }
        } else { 
            pLeftContent.style.display = "none"; pLeftEmpty.style.display = "block"; 
            slider.max = 0; slider.value = 0;
            document.getElementById("slider-val").innerText = 0;
            panelInput.style.borderColor = "var(--border-color)";
        }

        const pRightContent = document.getElementById("preview-right-content");
        const pRightEmpty = document.getElementById("preview-right-empty");
        
        if (selectedShopKey !== null) {
            const item = NFT_DATABASE[selectedShopKey];
            pRightEmpty.style.display = "none"; pRightContent.style.display = "flex";
            document.getElementById("target-img").src = item.img;
            document.getElementById("target-title").innerText = item.name;
            document.getElementById("target-price").innerText = item.price.toLocaleString() + " ⭐️";
            panelTarget.style.borderColor = "rgba(255,255,255,0.1)";
        } else { 
            pRightContent.style.display = "none"; pRightEmpty.style.display = "block"; 
            panelTarget.style.borderColor = "var(--border-color)";
        }

        const btnUpgrade = document.getElementById("btn-upgrade-main");
        
        if (selectedInvIdx !== null && selectedShopKey !== null) {
            const costFrom = NFT_DATABASE[userInventory[selectedInvIdx]].price + addedBalance;
            const costTo = NFT_DATABASE[selectedShopKey].price;
            
            calculatedChance = Math.min((costFrom / costTo) * 100, 100);
            
            const displayChance = document.getElementById("chance-display");
            displayChance.innerText = calculatedChance.toFixed(2) + "%";
            
            if (calculatedChance >= 65) {
                document.getElementById("chance-status").innerText = "высокий шанс";
                displayChance.style.color = "var(--accent-green)";
            } else if (calculatedChance >= 30) {
                document.getElementById("chance-status").innerText = "средний шанс";
                displayChance.style.color = "var(--accent-gold)";
            } else {
                document.getElementById("chance-status").innerText = "низкий шанс";
                displayChance.style.color = "var(--accent-red)";
            }
            
            if (costTo <= NFT_DATABASE[userInventory[selectedInvIdx]].price) {
                displayChance.innerText = "0.00%";
                document.getElementById("chance-status").innerText = "цель должна быть дороже";
                btnUpgrade.disabled = true;
                drawWheelSector(0);
            } else {
                btnUpgrade.disabled = false;
                drawWheelSector(calculatedChance);
            }
        } else {
            document.getElementById("chance-display").innerText = "0.00%";
            document.getElementById("chance-display").style.color = "var(--accent-gold)";
            document.getElementById("chance-status").innerText = "выберите цели";
            btnUpgrade.disabled = true;
            drawWheelSector(0);
        }
    }

    // --- НАСТОЯЩИЙ ПОФИКСЕННЫЙ АПГРЕЙД ---
    function startUpgrade() {
        if(isUpgrading || selectedInvIdx === null || selectedShopKey === null) return;
        isUpgrading = true;
        
        const btnUpgrade = document.getElementById("btn-upgrade-main");
        btnUpgrade.disabled = true;

        // Минусуем добавленный баланс звезд
        freebetBalance -= addedBalance;
        document.getElementById("balance-amount").innerText = freebetBalance.toLocaleString();

        const itemFrom = NFT_DATABASE[userInventory[selectedInvIdx]];
        const itemTo = NFT_DATABASE[selectedShopKey];

        // Генерируем случайный угол финиша стрелки (в радианах)
        const randomSpins = 5 + Math.random() * 3; 
        const targetRad = Math.random() * Math.PI * 2;
        const totalRotation = randomSpins * Math.PI * 2 + targetRad;
        
        const canvas = document.getElementById("wheel-canvas-render");
        
        let startTimestamp = null;
        const duration = 3500; // 3.5 секунды кручения

        function animateWheel(timestamp) {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = timestamp - startTimestamp;
            const percentage = Math.min(progress / duration, 1);
            
            // Плавное замедление (Ease Out Cubic)
            const easeOutValue = 1 - Math.pow(1 - percentage, 3);
            const currentRad = easeOutValue * totalRotation;
            
            // Крутим сам канвас, имитируя движение колеса
            canvas.style.transform = `rotate(${currentRad}rad)`;
            
            // Воспроизводим тиканье звука во время прокрутки
            if (Math.floor(currentRad * 5) % 2 === 0) {
                playSound('tick');
            }

            if (percentage < 1) {
                requestAnimationFrame(animateWheel);
            } else {
                // Конец анимации — определяем исход
                // Так как сектор выигрыша находится СНИЗУ, финальный угол стрелки относительно сектора вычисляется так:
                const finalAngleOnWheel = (currentRad % (Math.PI * 2));
                
                // Переводим радианы сектора в углы
                const sectorHalfWidth = ((calculatedChance / 100) * Math.PI * 2) / 2;
                const winStart = (Math.PI / 2) - sectorHalfWidth;
                const winEnd = (Math.PI / 2) + sectorHalfWidth;

                // Считаем попала ли стрелка (которая стоит на 90 градусах снизу) в сектор
                // Но так как вращается колесо, а стрелка статична, мы смотрим на противоположный угол
                const relativeArrowAngle = (Math.PI * 2.5 - finalAngleOnWheel) % (Math.PI * 2);

                const isWin = (relativeArrowAngle >= winStart && relativeArrowAngle <= winEnd);
                finishUpgrade(isWin, itemFrom, itemTo);
            }
        }

        requestAnimationFrame(animateWheel);
    }

    function finishUpgrade(isWin, itemFrom, itemTo) {
        const banner = document.getElementById("res-banner");
        
        // Формируем объект для истории
        const historyItem = {
            from: itemFrom.name,
            to: itemTo.name,
            chance: calculatedChance.toFixed(2),
            win: isWin,
            time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'})
        };

        if (isWin) {
            playSound('win');
            banner.innerText = "УСПЕХ!";
            banner.className = "result-banner win";
            
            // Заменяем предмет в инвентаре на новый
            userInventory[selectedInvIdx] = selectedShopKey;
        } else {
            playSound('lose');
            banner.innerText = "НЕУДАЧА";
            banner.className = "result-banner lose";
            
            // Удаляем сгоревший предмет
            userInventory.splice(selectedInvIdx, 1);
        }

        // Добавляем в лог
        upgradeHistory.unshift(historyItem);
        renderHistory();

        selectedInvIdx = null;
        selectedShopKey = null;
        addedBalance = 0;

        setTimeout(() => {
            banner.className = "result-banner";
            isUpgrading = false;
            init();
        }, 2500);
    }

    // Рендер истории апгрейдов
    function renderHistory() {
        const container = document.getElementById("history-log-container");
        if(upgradeHistory.length === 0) {
            container.innerHTML = `<div style="color: var(--text-muted); text-align: center; margin-top: 40px; font-size: 13px;">История пуста</div>`;
            return;
        }

        container.innerHTML = "";
        upgradeHistory.forEach(item => {
            const el = document.createElement("div");
            el.className = "history-item";
            el.innerHTML = `
                <div class="history-meta">
                    <span>${item.time}</span>
                    <span class="history-badge ${item.win ? 'win' : 'lose'}">${item.win ? 'Успех' : 'Сгорел'}</span>
                </div>
                <div class="history-details">
                    <span>${item.from} ➔ <b>${item.to}</b></span>
                    <span style="color: ${item.win ? 'var(--accent-green)' : 'var(--accent-red)'}">${item.chance}%</span>
                </div>
            `;
            container.appendChild(el);
        });
    }
</script>
