<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashUpgrader</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; user-select: none; }
        body { background-color: #0b0d14; color: #ffffff; display: flex; min-height: 100vh; overflow-x: hidden; }

        /* ЛАЙВ ЛЕНТА (Как на upgrader.pro) */
        .live-feed { width: 100px; height: 100vh; background: #11131f; border-right: 2px solid #23273e; position: fixed; left: 0; top: 0; display: flex; flex-direction: column; align-items: center; padding-top: 15px; z-index: 100; box-shadow: 5px 0 15px rgba(0,0,0,0.5); overflow: hidden; }
        .live-item { width: 70px; height: 70px; background: #151828; border: 2px solid #23273e; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: center; align-items: center; animation: slideDown 0.5s ease-out; font-size: 35px; }
        @keyframes slideDown { from { transform: translateY(-100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* ОСНОВНОЙ КОНТЕНТ */
        .main-wrapper { margin-left: 100px; width: calc(100% - 100px); display: flex; flex-direction: column; align-items: center; padding-bottom: 50px; }

        header { width: 100%; padding: 15px 40px; background-color: #151828; border-bottom: 2px solid #23273e; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .logo { color: #00ff88; font-size: 26px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; }
        
        .header-menu { display: flex; gap: 15px; align-items: center; }
        .balance-badge { background: #11131f; border: 1px solid #23273e; padding: 10px 20px; border-radius: 12px; font-weight: 900; color: #ffd700; font-size: 16px; }
        .btn-header { background: #23273e; color: #fff; border: none; padding: 10px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-header:hover { background: #323859; }

        /* ЗОНА АПГРЕЙДА */
        .upgrade-container { display: flex; justify-content: center; align-items: center; gap: 50px; margin-top: 50px; width: 90%; max-width: 1100px; }

        .item-box { width: 260px; height: 360px; background: linear-gradient(180deg, #1a1d2d 0%, #11131f 100%); border-radius: 15px; border: 2px solid #23273e; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: 0.3s; }
        .item-box.selected { border-color: #00ff88; box-shadow: 0 0 20px rgba(0, 255, 136, 0.2); }
        .box-title { color: #6a7199; font-size: 14px; text-transform: uppercase; font-weight: 900; position: absolute; top: 20px; }
        .item-visual { font-size: 100px; margin: 40px 0 20px 0; filter: drop-shadow(0 0 15px rgba(255,255,255,0.1)); }
        .item-price { font-size: 26px; font-weight: 900; color: #ffd700; }
        .item-name { color: #a0a5c0; margin-top: 10px; font-size: 14px; text-align: center; padding: 0 15px; }

        /* ЦЕНТР И РУЛЕТКА */
        .central-block { display: flex; flex-direction: column; align-items: center; }
        .roulette-container { width: 220px; height: 220px; border-radius: 50%; background-color: #151828; border: 10px solid #1e2235; position: relative; margin-bottom: 20px; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 40px rgba(0,0,0,0.6); overflow: hidden; }
        .chance-bg { position: absolute; width: 100%; height: 100%; border-radius: 50%; z-index: 1; }
        .inner-circle { position: absolute; width: 170px; height: 170px; background-color: #11131f; border-radius: 50%; z-index: 2; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 4px solid #1e2235; }
        
        /* Стрелка и Анимация */
        .arrow-container { position: absolute; width: 100%; height: 100%; z-index: 3; transition: transform 8s cubic-bezier(0.1, 0.85, 0.15, 1); }
        .arrow { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-bottom: 35px solid #ffffff; filter: drop-shadow(0 0 5px rgba(255,255,255,0.8)); }
        
        .chance-value { font-size: 36px; font-weight: 900; z-index: 4; color: #fff; }
        .chance-label { font-size: 12px; color: #6a7199; text-transform: uppercase; z-index: 4; }

        .btn-upgrade { background: linear-gradient(90deg, #00ff88, #00cc6a); border: none; padding: 18px 50px; color: #0b0d14; font-size: 20px; font-weight: 900; border-radius: 40px; cursor: pointer; text-transform: uppercase; box-shadow: 0 5px 20px rgba(0, 255, 136, 0.4); transition: 0.2s; width: 100%; }
        .btn-upgrade:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0, 255, 136, 0.6); }
        .btn-upgrade:disabled { background: #23273e; color: #4d5373; box-shadow: none; cursor: not-allowed; }

        /* ЗЕЛЕНЫЕ МНОЖИТЕЛИ ВНИЗУ */
        .multipliers { display: flex; gap: 10px; margin-top: 15px; width: 100%; justify-content: center; }
        .btn-mult { background: #11131f; border: 2px solid #00ff88; color: #00ff88; padding: 8px 18px; font-weight: 900; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 14px; box-shadow: 0 0 10px rgba(0,255,136,0.1); }
        .btn-mult:hover { background: #00ff88; color: #11131f; box-shadow: 0 0 20px rgba(0,255,136,0.4); }

        /* ИНВЕНТАРЬ И МАГАЗИН */
        .tabs { display: flex; gap: 20px; margin-top: 60px; width: 90%; max-width: 1100px; border-bottom: 2px solid #23273e; padding-bottom: 10px; }
        .tab-btn { background: none; border: none; color: #6a7199; font-size: 20px; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .tab-btn.active { color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.3); }

        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; width: 90%; max-width: 1100px; margin-top: 20px; }
        .grid-item { background: #151828; border: 2px solid #23273e; border-radius: 12px; padding: 15px; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.2s; position: relative; }
        .grid-item:hover { border-color: #00ff88; transform: translateY(-5px); }
        .grid-item.active { border-color: #00ff88; box-shadow: 0 0 15px rgba(0, 255, 136, 0.2); }
        .grid-visual { font-size: 50px; margin-bottom: 10px; }
        .btn-buy { background: #00ff88; color: #0b0d14; border: none; padding: 8px 0; width: 100%; border-radius: 8px; margin-top: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn-buy:hover { background: #00cc6a; }

        /* ПРОФИЛЬ МОДАЛКА */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 200; }
        .modal-content { background: #151828; border: 2px solid #23273e; border-radius: 20px; width: 90%; max-width: 500px; padding: 30px; position: relative; }
        .close-btn { position: absolute; top: 20px; right: 20px; background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; }
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .stat-box { background: #11131f; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #23273e; }
        .stat-val { font-size: 24px; font-weight: 900; color: #00ff88; }
        
        .deposit-box { background: #1e2235; border: 1px dashed #00ff88; padding: 20px; border-radius: 10px; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

    <audio id="sound-spin" src="spin.mp3"></audio>
    <audio id="sound-win" src="win.mp3"></audio>
    <audio id="sound-lose" src="lose.mp3"></audio>

    <div class="live-feed" id="live-feed"></div>

    <div class="main-wrapper">
        <header>
            <div class="logo">FlashUpgrader</div>
            <div class="header-menu">
                <div class="balance-badge" id="header-balance">0 ⭐️</div>
                <button class="btn-header" onclick="openProfile()">ПРОФИЛЬ</button>
            </div>
        </header>

        <div class="upgrade-container">
            <div class="item-box selected" id="box-source">
                <div class="box-title">Ваш предмет</div>
                <div class="item-visual" id="src-img">❓</div>
                <div class="item-price" id="src-price">-</div>
                <div class="item-name" id="src-name">Выберите из инвентаря</div>
            </div>

            <div class="central-block">
                <div class="roulette-container">
                    <div class="chance-bg" id="chance-bg"></div>
                    <div class="inner-circle">
                        <div class="chance-value" id="chance-text">0%</div>
                        <div class="chance-label">Шанс</div>
                    </div>
                    <div class="arrow-container" id="roulette-arrow">
                        <div class="arrow"></div>
                    </div>
                </div>
                
                <button class="btn-upgrade" id="btn-upgrade" onclick="play()" disabled>UPGRADE</button>
                
                <div class="multipliers">
                    <button class="btn-mult" onclick="autoPickTarget(2)">2X</button>
                    <button class="btn-mult" onclick="autoPickTarget(5)">5X</button>
                    <button class="btn-mult" onclick="autoPickTarget(8)">8X</button>
                    <button class="btn-mult" onclick="autoPickTarget(10)">10X</button>
                </div>
            </div>

            <div class="item-box" id="box-target">
                <div class="box-title">Желаемый предмет</div>
                <div class="item-visual" id="tgt-img">❓</div>
                <div class="item-price" id="tgt-price">-</div>
                <div class="item-name" id="tgt-name">Выберите в магазине</div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="tab-inv" onclick="switchTab('inv')">Инвентарь</button>
            <button class="tab-btn" id="tab-shop" onclick="switchTab('shop')">Магазин</button>
        </div>

        <div class="items-grid" id="items-container"></div>
    </div>

    <div class="modal-overlay" id="profile-modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeProfile()">✖</button>
            <h2>Профиль: <span id="prof-name" style="color:#00ff88;"></span></h2>
            
            <div class="stat-grid">
                <div class="stat-box">Всего игр<br><span class="stat-val" id="prof-games">0</span></div>
                <div class="stat-box">Побед<br><span class="stat-val" id="prof-wins" style="color:#ffd700;">0</span></div>
            </div>

            <div class="deposit-box">
                <h3 style="margin-bottom: 10px;">ПОПОЛНЕНИЕ</h3>
                <p style="font-size: 14px; color: #a0a5c0; margin-bottom: 15px;">
                    Чтобы пополнить баланс, надо кинуть подарок в Флешграм от суммы 5.000 звезд. О пополнении писать в Telegram.
                </p>
                <button class="btn-upgrade" style="padding: 10px; font-size: 16px;" onclick="window.open('https://t.me/om1a2', '_blank')">Связаться с @om1a2</button>
            </div>
        </div>
    </div>

    <script>
        const ALL_ITEMS = [
            { id: 1, name: "Обычная Звезда", price: 100, img: "⭐️" },
            { id: 2, name: "Новогодняя Елка", price: 250, img: "🎄" },
            { id: 3, name: "Золотое Сердце", price: 1000, img: "💛" },
            { id: 4, name: "Желейная Лягушка", price: 5000, img: "🐸" },
            { id: 5, name: "Премиум Корона", price: 15000, img: "👑" },
            { id: 6, name: "Красный Дракон", price: 25000, img: "🐉" },
            { id: 7, name: "Синий Алмаз", price: 50000, img: "💎" },
            { id: 8, name: "Космическая Ракета", price: 100000, img: "🚀" }
        ];

        let userData = {
            name: "Гость", balance: 0, inventory: [], games: 0, wins: 0, initialized: false
        };

        let currentTab = 'inv';
        let selSrc = null;
        let selTgt = null;
        let isPlaying = false;
        let currentDeg = 0;

        // Инициализация
        window.onload = () => {
            let saved = localStorage.getItem('upgData');
            if(saved) {
                userData = JSON.parse(saved);
            } else {
                let nick = prompt("Введите ваш никнейм для входа:");
                userData.name = nick || "Игрок";
                userData.balance = 5000;
                userData.initialized = true;
                alert("Добро пожаловать! Вам начислен ФРИБЕТ 5.000 ⭐️");
                saveData();
            }
            updateUI();
            switchTab('inv');
        };

        function saveData() { localStorage.setItem('upgData', JSON.stringify(userData)); }

        // Обновление интерфейса
        function updateUI() {
            document.getElementById('header-balance').innerText = userData.balance.toLocaleString() + " ⭐️";
            document.getElementById('prof-name').innerText = userData.name;
            document.getElementById('prof-games').innerText = userData.games;
            document.getElementById('prof-wins').innerText = userData.wins;

            // Блок источника
            if(selSrc) {
                document.getElementById('src-img').innerText = selSrc.img;
                document.getElementById('src-price').innerText = selSrc.price + " ⭐️";
                document.getElementById('src-name').innerText = selSrc.name;
            } else {
                document.getElementById('src-img').innerText = "❓";
                document.getElementById('src-price').innerText = "-";
                document.getElementById('src-name').innerText = "Выберите из инвентаря";
            }

            // Блок цели
            if(selTgt) {
                document.getElementById('tgt-img').innerText = selTgt.img;
                document.getElementById('tgt-price').innerText = selTgt.price + " ⭐️";
                document.getElementById('tgt-name').innerText = selTgt.name;
            } else {
                document.getElementById('tgt-img').innerText = "❓";
                document.getElementById('tgt-price').innerText = "-";
                document.getElementById('tgt-name').innerText = "Выберите в магазине";
            }

            // Шанс
            const btn = document.getElementById('btn-upgrade');
            const bg = document.getElementById('chance-bg');
            if(selSrc && selTgt) {
                let chance = (selSrc.price / selTgt.price) * 100;
                if(chance > 100) chance = 100;
                document.getElementById('chance-text').innerText = chance.toFixed(2) + "%";
                bg.style.background = `conic-gradient(#00ff88 ${(chance/100)*360}deg, #151828 0deg)`;
                
                btn.disabled = selSrc.price >= selTgt.price;
                btn.innerText = btn.disabled ? "НЕДОСТУПНО" : "UPGRADE";
            } else {
                document.getElementById('chance-text').innerText = "0%";
                bg.style.background = 'none';
                btn.disabled = true;
                btn.innerText = "ВЫБЕРИТЕ ПРЕДМЕТЫ";
            }
        }

        // Вкладки
        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-inv').classList.toggle('active', tab === 'inv');
            document.getElementById('tab-shop').classList.toggle('active', tab === 'shop');
            const container = document.getElementById('items-container');
            container.innerHTML = '';

            if(tab === 'inv') {
                if(userData.inventory.length === 0) container.innerHTML = '<div style="color:#6a7199; grid-column:1/-1;">Пусто. Зайдите в магазин!</div>';
                userData.inventory.forEach(item => {
                    const div = document.createElement('div');
                    div.className = `grid-item ${selSrc && selSrc.uid === item.uid ? 'active' : ''}`;
                    div.innerHTML = `<div class="grid-visual">${item.img}</div><div style="color:#ffd700; font-weight:900;">${item.price} ⭐️</div><div style="font-size:12px; color:#a0a5c0;">${item.name}</div>`;
                    div.onclick = () => { if(!isPlaying) { selSrc = item; updateUI(); switchTab('inv'); } };
                    container.appendChild(div);
                });
            } else {
                ALL_ITEMS.forEach(item => {
                    const div = document.createElement('div');
                    div.className = `grid-item ${selTgt && selTgt.id === item.id ? 'active' : ''}`;
                    div.innerHTML = `<div class="grid-visual">${item.img}</div><div style="color:#ffd700; font-weight:900;">${item.price} ⭐️</div><div style="font-size:12px; color:#a0a5c0;">${item.name}</div><button class="btn-buy" onclick="buyItem(${item.id}, event)">КУПИТЬ</button>`;
                    div.onclick = () => { if(!isPlaying) { selTgt = item; updateUI(); switchTab('shop'); } };
                    container.appendChild(div);
                });
            }
        }

        function buyItem(id, event) {
            event.stopPropagation();
            const item = ALL_ITEMS.find(i => i.id === id);
            if(userData.balance >= item.price) {
                userData.balance -= item.price;
                userData.inventory.push({...item, uid: Date.now()});
                saveData(); updateUI(); switchTab('shop');
            } else {
                alert("Недостаточно звезд!");
            }
        }

        function autoPickTarget(mult) {
            if(!selSrc) return alert("Выберите свой предмет из инвентаря!");
            const targetPrice = selSrc.price * mult;
            selTgt = ALL_ITEMS.reduce((p, c) => Math.abs(c.price - targetPrice) < Math.abs(p.price - targetPrice) ? c : p);
            updateUI();
            if(currentTab === 'shop') switchTab('shop');
        }

        function playSound(id) { try { document.getElementById(id).currentTime = 0; document.getElementById(id).play().catch(()=>{}); } catch(e){} }

        function play() {
            if(isPlaying || !selSrc || !selTgt) return;
            isPlaying = true;
            document.getElementById('btn-upgrade').disabled = true;
            playSound('sound-spin');

            let displayChance = (selSrc.price / selTgt.price) * 100;
            if(displayChance > 100) displayChance = 100;
            
            // Скрытый нерф шансов из админки
            let actualChance = displayChance * 0.6; 
            const isWin = (Math.random() * 100) <= actualChance;

            const arrow = document.getElementById('roulette-arrow');
            const winDeg = (displayChance / 100) * 360;
            const extraDeg = isWin ? (Math.random() * winDeg) : (winDeg + Math.random() * (360 - winDeg));
            
            currentDeg += (360 * 6) + extraDeg; // 6 полных кругов + остановка
            arrow.style.transform = `rotate(${currentDeg}deg)`;

            userData.games++;

            // 8 секунд анимация
            setTimeout(() => {
                if(isWin) {
                    playSound('sound-win');
                    userData.wins++;
                    userData.inventory.push({...selTgt, uid: Date.now()});
                    alert("УСПЕХ! Предмет добавлен в инвентарь.");
                } else {
                    playSound('sound-lose');
                    alert("КРАШ! Предмет сгорел.");
                }
                
                userData.inventory = userData.inventory.filter(i => i.uid !== selSrc.uid);
                selSrc = null;
                isPlaying = false;
                saveData();
                updateUI();
                switchTab(currentTab);
            }, 8000);
        }

        // Лайв лента
        setInterval(() => {
            const feed = document.getElementById('live-feed');
            const div = document.createElement('div');
            div.className = 'live-item';
            div.innerText = ALL_ITEMS[Math.floor(Math.random() * ALL_ITEMS.length)].img;
            feed.prepend(div);
            if(feed.children.length > 10) feed.lastChild.remove();
        }, 2000);

        function openProfile() { document.getElementById('profile-modal').style.display = 'flex'; }
        function closeProfile() { document.getElementById('profile-modal').style.display = 'none'; }
    </script>
</body>
</html>
