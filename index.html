<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram NFT Upgrader</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0e1015;
            --panel-color: #161922;
            --accent-yellow: #ffb700;
            --accent-green: #00ff66;
            --accent-red: #ff3344;
            --text-main: #ffffff;
            --text-muted: #62687a;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 10px;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        .header {
            text-align: center;
            padding: 5px 0;
        }
        .header h1 {
            font-size: 18px; margin: 0; color: var(--accent-yellow);
            text-transform: uppercase; letter-spacing: 1px;
        }

        /* Главная рабочая зона */
        .workspace {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--panel-color);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            border: 1px solid #222735;
        }

        .slot {
            width: 30%;
            height: 110px;
            background: #1c202c;
            border: 2px dashed #31374a;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }
        .slot.active {
            border: 2px solid var(--accent-yellow);
            background: #232838;
        }
        .slot .emoji { font-size: 36px; margin-bottom: 4px; }
        .slot .name { font-size: 11px; color: var(--text-main); font-weight: bold; }
        .slot .price { font-size: 12px; color: var(--accent-yellow); font-weight: bold; }
        .slot .placeholder { font-size: 11px; color: var(--text-muted); padding: 5px; }

        /* Центр: Колесо и Вращающаяся СТРЕЛКА */
        .center-area {
            width: 35%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .circle-container {
            position: relative;
            width: 120px; height: 120px;
        }
        .circle-svg { transform: rotate(-90deg); }
        .circle-bg { fill: none; stroke: #232838; stroke-width: 10; }
        
        /* Сектор шанса (зеленый полукруг) */
        .circle-progress {
            fill: none; stroke: var(--accent-green); stroke-width: 10;
            stroke-dasharray: 314; stroke-dashoffset: 314;
            transition: stroke-dashoffset 0.3s ease;
        }

        /* Механика СТРЕЛКИ из видео */
        .arrow-ticker {
            position: absolute;
            top: 0; left: 50%;
            width: 4px; height: 60px; /* Радиус вращения */
            transform-origin: bottom center;
            transform: translateX(-50%) rotate(0deg);
            pointer-events: none;
            z-index: 10;
        }
        /* Сама стрелочка на конце оси */
        .arrow-head {
            width: 0; height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 14px solid var(--accent-yellow);
            position: absolute;
            top: -8px; left: -6px;
            filter: drop-shadow(0 0 4px rgba(255,183,0,0.8));
        }

        /* Шанс строго ВНИЗУ колеса */
        .chance-below {
            margin-top: 8px;
            font-size: 16px;
            font-weight: 800;
            color: #ffffff;
            background: #1c202c;
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid #31374a;
        }

        .btn-upgrade {
            width: 100%;
            background: linear-gradient(135deg, #ffc800, #ff9000);
            border: none; color: #000; font-weight: 800;
            padding: 10px; font-size: 13px; border-radius: 10px;
            cursor: pointer; margin-top: 10px;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-upgrade:disabled { background: #2e3344; color: #555; }

        /* Сетки */
        .section-title {
            font-size: 13px; font-weight: bold; margin: 12px 0 6px 5px;
            color: var(--text-muted); display: flex; justify-content: space-between;
        }
        .section-title span { color: var(--text-main); }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            max-height: 170px;
            overflow-y: auto;
        }

        /* Карточки предметов */
        .item-card {
            background: var(--panel-color);
            border: 1px solid #222735;
            border-radius: 10px;
            padding: 8px 4px;
            text-align: center;
        }
        .item-card.selected { border-color: var(--accent-yellow); background: #1f2433; }
        .item-card .item-emoji { font-size: 32px; }
        .item-card .item-name { font-size: 10px; color: var(--text-muted); margin: 4px 0 2px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-card .item-price { font-size: 11px; font-weight: bold; color: #ffb700; }

        /* Результат */
        .result-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10,12,18,0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .result-overlay.active { opacity: 1; pointer-events: auto; }
        .result-status { font-size: 28px; font-weight: 900; margin-bottom: 10px; }
        .result-gift { font-size: 80px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>NFT Gifts Upgrader</h1>
    </div>

    <div class="workspace">
        <div class="slot" id="slot-from">
            <div class="placeholder">Выбери свой подарок ниже 🎒</div>
        </div>

        <div class="center-area">
            <div class="circle-container">
                <div class="arrow-ticker" id="arrow-ticker">
                    <div class="arrow-head"></div>
                </div>
                <svg class="circle-svg" width="120" height="120">
                    <circle class="circle-bg" cx="60" cy="60" r="50"></circle>
                    <circle class="circle-progress" id="progress-bar" cx="60" cy="60" r="50"></circle>
                </svg>
            </div>
            
            <div class="chance-below" id="chance-display">0%</div>
            
            <button class="btn-upgrade" id="btn-start" disabled onclick="executeUpgrade()">Upgrade</button>
        </div>

        <div class="slot" id="slot-to">
            <div class="placeholder">Выбери цель справа 👑</div>
        </div>
    </div>

    <div class="section-title">🎒 МОИ NFT ПОДАРКИ <span id="inv-count">(0)</span></div>
    <div class="grid" id="inventory-grid"></div>

    <div class="section-title">👑 ВЫБЕРИТЕ ЦЕЛЬ АПГРЕЙДА</div>
    <div class="grid" id="shop-grid"></div>

    <div class="result-overlay" id="result-screen" onclick="closeResult()">
        <div style="text-align: center;">
            <div class="result-status" id="res-title">УСПЕХ!</div>
            <div class="result-gift" id="res-emoji">🧢</div>
            <div style="font-size: 16px;" id="res-desc">Вы прокачали предмет!</div>
            <div style="color: var(--text-muted); margin-top: 25px; font-size: 12px;">Нажмите, чтобы продолжить</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Обновленная база данных: Телеграм подарки и ЗВЕЗДЫ (⭐)
        const GIFT_DATABASE = {
            "candy": { name: "Candy Cane", emoji: "🍬", price: 50 },
            "frog": { name: "Toy Frog", emoji: "🐸", price: 150 },
            "pumpkin": { name: "Pumpkin", emoji: "🎃", price: 350 },
            "star_badge": { name: "Star Badge", emoji: "⭐", price: 800 },
            "dur_cap": { name: "Кепка Дурова", emoji: "🧢", price: 2000 },
            "matrix": { name: "Neo Matrix", emoji: "🫙", price: 5000 },
            "crystal": { name: "TON Crystal", emoji: "💎", price: 12000 },
            "dur_crown": { name: "Корона Дурова", emoji: "👑", price: 40000 }
        };

        let userInventory = ["candy", "candy", "frog", "pumpkin"]; 
        let selectedFromIdx = null;
        let selectedToKey = null;
        let calculatedChance = 0;

        function initApp() {
            renderInventory();
            renderShop();
            updateCircle(0);
        }

        function renderInventory() {
            const grid = document.getElementById("inventory-grid");
            grid.innerHTML = "";
            document.getElementById("inv-count").innerText = `(${userInventory.length})`;
            
            userInventory.forEach((key, idx) => {
                const item = GIFT_DATABASE[key];
                const card = document.createElement("div");
                card.className = `item-card ${selectedFromIdx === idx ? 'selected' : ''}`;
                card.onclick = () => selectFrom(idx);
                card.innerHTML = `
                    <div class="item-emoji">${item.emoji}</div>
                    <div class="item-name">${item.name}</div>
                    <div class="item-price">${item.price} ⭐</div>
                `;
                grid.appendChild(card);
            });
        }

        function renderShop() {
            const grid = document.getElementById("shop-grid");
            grid.innerHTML = "";
            
            Object.keys(GIFT_DATABASE).forEach(key => {
                const item = GIFT_DATABASE[key];
                const card = document.createElement("div");
                card.className = `item-card ${selectedToKey === key ? 'selected' : ''}`;
                card.onclick = () => selectTo(key);
                card.innerHTML = `
                    <div class="item-emoji">${item.emoji}</div>
                    <div class="item-name">${item.name}</div>
                    <div class="item-price">${item.price} ⭐</div>
                `;
                grid.appendChild(card);
            });
        }

        function selectFrom(idx) {
            selectedFromIdx = (selectedFromIdx === idx) ? null : idx;
            renderInventory();
            updateSlots();
        }

        function selectTo(key) {
            selectedToKey = (selectedToKey === key) ? null : key;
            renderShop();
            updateSlots();
        }

        function updateSlots() {
            const slotFrom = document.getElementById("slot-from");
            const slotTo = document.getElementById("slot-to");

            if (selectedFromIdx !== null) {
                const item = GIFT_DATABASE[userInventory[selectedFromIdx]];
                slotFrom.className = "slot active";
                slotFrom.innerHTML = `<div class="emoji">${item.emoji}</div><div class="name">${item.name}</div><div class="price">${item.price} ⭐</div>`;
            } else {
                slotFrom.className = "slot";
                slotFrom.innerHTML = `<div class="placeholder">Выбери свой подарок ниже 🎒</div>`;
            }

            if (selectedToKey !== null) {
                const item = GIFT_DATABASE[selectedToKey];
                slotTo.className = "slot active";
                slotTo.innerHTML = `<div class="emoji">${item.emoji}</div><div class="name">${item.name}</div><div class="price">${item.price} ⭐</div>`;
            } else {
                slotTo.className = "slot";
                slotTo.innerHTML = `<div class="placeholder">Выбери цель справа 👑</div>`;
            }

            if (selectedFromIdx !== null && selectedToKey !== null) {
                const priceFrom = GIFT_DATABASE[userInventory[selectedFromIdx]].price;
                const priceTo = GIFT_DATABASE[selectedToKey].price;
                
                calculatedChance = Math.min(((priceFrom / priceTo) * 100), 100).toFixed(2);
                document.getElementById("btn-start").disabled = false;
                updateCircle(calculatedChance);
            } else {
                calculatedChance = 0;
                document.getElementById("btn-start").disabled = true;
                updateCircle(0);
            }
        }

        function updateCircle(chance) {
            document.getElementById("chance-display").innerText = chance + "%";
            const circle = document.getElementById("progress-bar");
            // Длина окружности круга 2 * PI * 50 = 314
            const offset = 314 - (314 * chance) / 100;
            circle.style.strokeDashoffset = offset;
        }

        // РЕАЛИСТИЧНАЯ КРУТИЛКА СТРЕЛКИ
        function executeUpgrade() {
            const btn = document.getElementById("btn-start");
            const arrow = document.getElementById("arrow-ticker");
            btn.disabled = true;

            // Генерируем случайную точку остановки стрелки от 0 до 100%
            const rollResult = Math.random() * 100;
            
            // Вычисляем угол: 1% = 3.6 градуса. Делаем 5 полных оборотов (1800 градусов) для эффекта разгона
            const finalAngle = 1800 + (rollResult * 3.6);

            // Запускаем плавное вращение стрелки через CSS
            arrow.style.transition = "transform 3s cubic-bezier(0.25, 0.1, 0.1, 1)";
            arrow.style.transform = `translateX(-50%) rotate(${finalAngle}deg)`;

            setTimeout(() => {
                finalizeUpgrade(rollResult);
            }, 3100); // По окончании анимации выдаем результат
        }

        function finalizeUpgrade(rollResult) {
            const itemFromKey = userInventory[selectedFromIdx];
            const itemToKey = selectedToKey;

            // Удаляем предмет из инвентаря
            userInventory.splice(selectedFromIdx, 1);

            const overlay = document.getElementById("result-screen");
            const resTitle = document.getElementById("res-title");
            const resEmoji = document.getElementById("res-emoji");
            const resDesc = document.getElementById("res-desc");

            // Если стрелка остановилась внутри зеленой зоны (выиграл)
            if (rollResult <= calculatedChance) {
                userInventory.push(itemToKey);
                resTitle.innerText = "УСПЕХ!";
                resTitle.style.color = "var(--accent-green)";
                resEmoji.innerText = GIFT_DATABASE[itemToKey].emoji;
                resDesc.innerText = `Вы успешно апгрейднули в ${GIFT_DATABASE[itemToKey].name}!`;
            } else {
                resTitle.innerText = "СГОРЕЛ!";
                resTitle.style.color = "var(--accent-red)";
                resEmoji.innerText = "💥";
                resDesc.innerText = `${GIFT_DATABASE[itemFromKey].name} уничтожен при транзакции.`;
            }

            // Сброс позиций
            selectedFromIdx = null;
            selectedToKey = null;
            
            // Возвращаем стрелку в начальное положение без анимации для следующего раза
            const arrow = document.getElementById("arrow-ticker");
            arrow.style.transition = "none";
            arrow.style.transform = "translateX(-50%) rotate(0deg)";

            updateSlots();
            initApp();
            overlay.classList.add("active");
        }

        function closeResult() {
            document.getElementById("result-screen").classList.remove("active");
            if (userInventory.length === 0) {
                userInventory.push("candy");
                initApp();
            }
        }

        window.onload = initApp;
    </script>
</body>
</html>
