<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Upgrader Mobile Remastered</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* === ПЕРЕМЕННЫЕ И БАЗОВЫЕ НАСТРОЙКИ === */
        :root {
            --bg-main: #0b0b0d;
            --bg-panel: #111114;
            --bg-card: #17171c;
            --accent-gold: #f4c21a;
            --accent-gold-glow: rgba(244, 194, 26, 0.25);
            --text-main: #ffffff;
            --text-muted: #8b8b93;
            --border-color: #222227;
            
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 10px;
            --transition-smooth: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            --transition-fast: all 0.2s ease;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at 50% 0%, #1c1c24 0%, var(--bg-main) 70%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* ЭФФЕКТ МЯГКОГО ВСПОЛОХА ЭКРАНА */
        .flash-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 9999; pointer-events: none; opacity: 0;
            transition: opacity 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .flash-overlay.success {
            background: radial-gradient(circle, rgba(46, 204, 113, 0.35) 0%, rgba(0,0,0,0) 80%);
            opacity: 1;
        }
        .flash-overlay.fail {
            background: radial-gradient(circle, rgba(231, 76, 60, 0.35) 0%, rgba(0,0,0,0) 80%);
            opacity: 1;
        }

        /* === ХЕДЕР === */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 20px;
            background: rgba(17, 17, 20, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            position: sticky; top: 0; z-index: 100;
        }

        .logo-area { display: flex; flex-direction: column; }
        .logo { font-size: 22px; font-weight: 900; color: var(--accent-gold); letter-spacing: 0.5px; }
        .logo span { color: var(--text-main); }
        .online-count { font-size: 11px; color: var(--text-muted); margin-top: 3px; font-weight: 500; }
        .online-count span { color: #2ecc71; font-weight: 700; }

        .user-area { display: flex; align-items: center; gap: 10px; }
        .balance { font-size: 15px; font-weight: 800; color: var(--accent-gold); letter-spacing: 0.5px; margin-right: 4px; }
        
        .header-buttons { display: flex; gap: 6px; }
        .btn-action {
            background: linear-gradient(135deg, #f5c524, #dca209);
            color: #000; padding: 8px 14px; border: none; border-radius: var(--radius-sm);
            font-size: 12px; font-weight: 800; cursor: pointer; transition: var(--transition-fast);
            box-shadow: 0 4px 12px rgba(244, 194, 26, 0.2);
        }
        .btn-action.withdraw {
            background: linear-gradient(135deg, #2c2c35, #1c1c22);
            color: #fff; border: 1px solid var(--border-color);
            box-shadow: none;
        }
        .btn-action:active { transform: scale(0.95); }

        /* === ОСНОВНОЙ КОНТЕНТ === */
        main {
            flex: 1; display: flex; flex-direction: column;
            padding: 16px; gap: 16px; max-width: 480px; width: 100%; margin: 0 auto;
        }

        /* === ЛЕНТА LIVE === */
        .live-ticker {
            display: flex; gap: 8px; overflow-x: auto; white-space: nowrap; padding-bottom: 4px;
        }
        .live-ticker::-webkit-scrollbar { display: none; }
        .ticker-item {
            display: inline-flex; align-items: center; gap: 6px;
            background: var(--bg-panel); padding: 8px 12px; border-radius: var(--radius-sm);
            font-size: 12px; font-weight: 700; border: 1px solid var(--border-color);
            border-left: 3px solid var(--accent-gold);
        }
        .ticker-item.fail { border-left-color: #e74c3c; opacity: 0.6; }

        /* === АРЕНА АПГРЕЙДА === */
        .upgrade-arena {
            background: linear-gradient(180deg, var(--bg-panel) 0%, #0d0d10 100%);
            border: 1px solid var(--border-color); border-radius: var(--radius-lg);
            padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 20px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.5);
            position: relative;
        }

        .slots-container { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; width: 100%; }
        .item-slot {
            background: var(--bg-card); border: 1px solid rgba(244, 194, 26, 0.15); border-radius: var(--radius-md);
            height: 125px; display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 12px; text-align: center; transition: var(--transition-smooth); position: relative;
        }
        .item-slot.active { border-color: var(--accent-gold); background: rgba(244, 194, 26, 0.02); box-shadow: 0 0 25px rgba(244, 194, 26, 0.1); }
        .slot-hint { font-size: 11px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

        /* КРУГ И ВНЕШНЯЯ ПЛОТНАЯ СТРЕЛКА */
        .wheel-box { position: relative; width: 200px; height: 200px; margin: 10px 0; }
        
        /* Разворачиваем круг, чтобы отсчет шел строго СНИЗУ (на 6 часов) */
        .wheel-svg { transform: rotate(90deg); width: 100%; height: 100%; }
        .wheel-track { fill: none; stroke: #16161c; stroke-width: 12; }
        .wheel-progress {
            fill: none; stroke-width: 12;
            stroke-dasharray: 565.48; stroke-dashoffset: 565.48; stroke-linecap: round;
            transition: stroke-dashoffset 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 0 6px var(--accent-gold-glow));
        }
        
        /* СТРЕЛОЧКА ВПЛОТНУЮ СНАРУЖИ */
        .wheel-arrow {
            position: absolute;
            top: -11px; /* Прижата вплотную к внешнему краю круга */
            left: calc(50% - 10px);
            width: 0; height: 0; 
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 14px solid var(--text-main);
            transform-origin: 10px 111px; /* Идеальный центр вращения вокруг круга */
            z-index: 10;
            transition: transform 3.5s cubic-bezier(0.15, 0.85, 0.1, 1); /* Ультра-плавное замедление */
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.5));
        }

        .wheel-center-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 5;
        }
        .wheel-center-text h1 { font-size: 32px; font-weight: 900; color: var(--accent-gold); text-shadow: 0 0 15px var(--accent-gold-glow); }
        .wheel-center-text p { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; margin-top: -2px; }

        /* Кнопка активации */
        .action-block { width: 100%; }
        .btn-upgrade {
            width: 100%; background: linear-gradient(135deg, var(--accent-gold), #e0ad0b);
            color: #000; border: none; padding: 15px; font-size: 16px; font-weight: 900;
            border-radius: var(--radius-md); cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 6px 25px rgba(244, 194, 26, 0.25); transition: var(--transition-fast);
        }
        .btn-upgrade:active { transform: scale(0.98); }

        /* === ИНВЕНТАРИ И ТАБЫ === */
        .inventory-section {
            background: var(--bg-panel); border: 1px solid var(--border-color);
            border-radius: var(--radius-lg); display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 6px 25px rgba(0,0,0,0.3);
        }
        .tabs-header { display: flex; background: var(--bg-card); padding: 4px; gap: 4px; border-bottom: 1px solid var(--border-color); overflow-x: auto; }
        .tabs-header::-webkit-scrollbar { display: none; }
        
        .tab-btn {
            flex: 1; padding: 12px 6px; background: transparent; border: none; color: var(--text-muted);
            font-size: 11px; font-weight: 800; cursor: pointer; border-radius: var(--radius-sm); transition: var(--transition-fast); text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap;
        }
        .tab-btn.active { color: #000; background: var(--accent-gold); box-shadow: 0 4px 12px var(--accent-gold-glow); }

        .items-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 14px;
            max-height: 340px; overflow-y: auto;
        }

        /* КАРТОЧКИ ИЗ СКРИНШОТА */
        .item-card {
            background: var(--bg-card); border: 1px solid rgba(244, 194, 26, 0.15); border-radius: var(--radius-md);
            padding: 8px; display: flex; flex-direction: column; align-items: center; position: relative;
            cursor: pointer; transition: var(--transition-fast);
        }
        .item-card:hover { border-color: var(--accent-gold); background: rgba(244,194,26,0.01); }
        .item-card:active { transform: scale(0.95); }
        
        .item-price {
            font-size: 10px; font-weight: 800; color: var(--accent-gold); align-self: flex-end;
            background: rgba(0,0,0,0.4); padding: 2px 5px; border-radius: 5px; border: 1px solid rgba(244,194,26,0.1);
        }
        
        .item-img-container { width: 100%; height: 65px; display: flex; align-items: center; justify-content: center; margin: 4px 0; }
        .item-img-container svg { width: 50px; height: 50px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); transition: var(--transition-fast); }
        .item-card:hover .item-img-container svg { transform: scale(1.08); }

        .item-info { text-align: center; width: 100%; }
        .item-title { font-size: 9px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; letter-spacing: 0.3px; }
        .item-sub { font-size: 11px; font-weight: 800; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* ИНТЕРФЕЙС ПРОФИЛЯ */
        .profile-container { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-box { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 12px; text-align: center; }
        .stat-box .num { font-size: 20px; font-weight: 900; color: var(--accent-gold); }
        .stat-box .lbl { font-size: 11px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; margin-top: 2px; }
        
        .btn-sell-all {
            background: linear-gradient(135deg, #e74c3c, #c0392b); color: #fff;
            border: none; padding: 14px; border-radius: var(--radius-md); font-weight: 800;
            font-size: 13px; text-transform: uppercase; cursor: pointer; transition: var(--transition-fast);
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.2); margin-top: 5px;
        }
        .btn-sell-all:active { transform: scale(0.97); }

        /* ОКНО ВЫВОДА СРЕДСТВ */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            z-index: 1000; display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: var(--transition-fast);
        }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: var(--bg-panel); border: 1px solid var(--border-color);
            border-radius: var(--radius-lg); padding: 24px; width: 90%; max-width: 360px;
            display: flex; flex-direction: column; gap: 16px; box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }
        .modal-title { font-size: 18px; font-weight: 900; color: var(--accent-gold); text-transform: uppercase; }
        .modal-input {
            background: var(--bg-main); border: 1px solid var(--border-color); padding: 12px;
            border-radius: var(--radius-sm); color: #fff; font-size: 16px; font-weight: 700; outline: none;
        }
        .modal-input:focus { border-color: var(--accent-gold); }
        .modal-buttons { display: flex; gap: 10px; }
        .modal-btn {
            flex: 1; padding: 12px; border: none; border-radius: var(--radius-sm);
            font-size: 13px; font-weight: 800; cursor: pointer; text-transform: uppercase;
        }
        .modal-btn.confirm { background: var(--accent-gold); color: #000; }
        .modal-btn.cancel { background: #222; color: #fff; }

        /* ТОСТЫ И КОНТАКТЫ */
        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: #2ecc71; color: #000; padding: 12px 24px; border-radius: var(--radius-sm);
            font-weight: 800; font-size: 13px; z-index: 10000; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 25px rgba(46, 204, 113, 0.3);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.err { background: #e74c3c; color: #fff; box-shadow: 0 8px 25px rgba(231, 76, 60, 0.3); }

        footer {
            text-align: center; padding: 15px; font-size: 11px; color: var(--text-muted);
            border-top: 1px solid var(--border-color); background: rgba(10,10,13,0.5); margin-top: auto;
        }
        footer a { color: var(--accent-gold); text-decoration: none; font-weight: 700; }

        .spinning .wheel-progress { animation: pulseGlow 0.3s infinite alternate; }
        @keyframes pulseGlow { 0% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="screenFlash" class="flash-overlay"></div>
    <div id="toast" class="toast">Успешно!</div>

    <div class="modal-overlay" id="withdrawModal">
        <div class="modal-content">
            <div class="modal-title">Вывод баланса</div>
            <p style="font-size: 12px; color: var(--text-muted);">Введите сумму для списания средств с аккаунта:</p>
            <input type="number" class="modal-input" id="withdrawInput" placeholder="0.00" min="1">
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="toggleWithdrawModal(false)">Отмена</button>
                <button class="modal-btn confirm" onclick="confirmWithdraw()">Вывести</button>
            </div>
        </div>
    </div>

    <header>
        <div class="logo-area">
            <div class="logo">UP<span>GRADER</span></div>
            <div class="online-count">Онлайн: <span>1 878</span></div>
        </div>
        <div class="user-area">
            <div class="balance" id="userBalance">23 543.51 ₽</div>
            <div class="header-buttons">
                <button class="btn-action withdraw" onclick="toggleWithdrawModal(true)">Вывод</button>
                <button class="btn-action">Пополнить</button>
            </div>
        </div>
    </header>

    <main>
        <div class="live-ticker" id="liveTicker"></div>

        <section class="upgrade-arena" id="arenaBox">
            <div class="slots-container">
                <div class="item-slot" id="slotLeft"><span class="slot-hint">Твой подарок</span></div>
                <div class="item-slot" id="slotRight"><span class="slot-hint">Желаемый подарок</span></div>
            </div>

            <div class="wheel-box">
                <svg class="wheel-svg">
                    <defs>
                        <linearGradient id="pepeGrad" x1="0%" y1="100%" x2="0%" y2="0%">
                            <stop offset="0%" stop-color="#ff3333" />
                            <stop offset="30%" stop-color="#f4c21a" />
                            <stop offset="100%" stop-color="#2ecc71" />
                        </linearGradient>
                    </defs>
                    <circle class="wheel-track" cx="100" cy="100" r="90"></circle>
                    <circle class="wheel-progress" id="wheelCircle" cx="100" cy="100" r="90" stroke="url(#pepeGrad)"></circle>
                </svg>
                <div class="wheel-arrow" id="wheelArrow"></div>
                
                <div class="wheel-center-text">
                    <h1 id="chanceText">0.00%</h1>
                    <p>шанс</p>
                </div>
            </div>

            <div class="action-block">
                <button class="btn-upgrade" id="btnUpgrade" onclick="executeUpgrade()">Прокачать</button>
            </div>
        </section>

        <section class="inventory-section">
            <div class="tabs-header">
                <button class="tab-btn active" id="tabMy" onclick="switchTab('my')">Мои подарки</button>
                <button class="tab-btn" id="tabShop" onclick="switchTab('shop')">Желаемый подарок</button>
                <button class="tab-btn" id="tabBuy" onclick="switchTab('buy')">Купить Пепе</button>
                <button class="tab-btn" id="tabProfile" onclick="switchTab('profile')">Профиль</button>
            </div>
            <div class="items-grid" id="gridContent"></div>
        </section>
    </main>

    <footer>
        Разработка: <a href="https://github.com/ahgfrdd-hue" target="_blank">ahgfrdd-hue</a> | Upgrader Mobile © 2026
    </footer>

    <script>
        // Встроенные SVG шаблоны для Пепе, чтобы они никогда не ломались (разные цвета сердец)
        function getPepeSvg(heartColor) {
            return `
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <ellipse cx="50" cy="55" rx="32" ry="26" fill="#2ecc71"/>
                <path d="M 25 65 Q 50 80 75 65" stroke="#1e7e34" stroke-width="3" fill="none"/>
                <circle cx="36" cy="36" r="11" fill="#fff" stroke="#1e7e34" stroke-width="2"/>
                <circle cx="36" cy="36" r="5" fill="#000"/>
                <circle cx="38" cy="34" r="2" fill="#fff"/>
                <circle cx="64" cy="36" r="11" fill="#fff" stroke="#1e7e34" stroke-width="2"/>
                <circle cx="64" cy="36" r="5" fill="#000"/>
                <circle cx="66" cy="34" r="2" fill="#fff"/>
                <path d="M 28 58 Q 50 72 72 58" stroke="#e74c3c" stroke-width="4" fill="none" stroke-linecap="round"/>
                <path d="M 50 62 C 50 62 42 52 42 46 C 42 41 46 38 50 42 C 54 38 58 41 58 46 C 58 52 50 62 50 62 Z" fill="${heartColor}"/>
            </svg>`;
        }

        const customItems = [
            { id: 'pepe_blue', title: 'Подарок', sub: 'Бирюзовый Лав', price: '4500.00', color: '#00d2d3' },
            { id: 'pepe_purple', title: 'Подарок', sub: 'Аметистовый Харт', price: '8900.00', color: '#9b59b6' },
            { id: 'pepe_red', title: 'Подарок', sub: 'Влюбленный Пепе', price: '12500.00', color: '#ff4757' },
            { id: 'pepe_gold', title: 'Подарок', sub: 'Звездный Блеск', price: '24000.00', color: '#ffa502' }
        ];

        let balance = 23543.51;
        let currentTab = 'my';
        let selectedLeft = null;
        let selectedRight = null;
        let isProcessing = false;
        let currentRotation = 0;

        // Статистика аккаунта
        let stats = { total: 14, win: 5, fail: 9 };

        let myInventoryData = [Object.assign({}, customItems[0])]; 
        let shopInventoryData = [customItems[1], customItems[2], customItems[3]];
        let buyMarketData = [...customItems];

        function updateBalanceDisplay() {
            document.getElementById('userBalance').innerText = balance.toLocaleString('ru-RU', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' ₽';
        }

        function showToast(text, isError = false) {
            const toast = document.getElementById('toast');
            toast.innerText = text;
            toast.className = isError ? 'toast show err' : 'toast show';
            setTimeout(() => toast.classList.remove('show'), 2200);
        }

        function toggleWithdrawModal(show) {
            if (isProcessing) return;
            document.getElementById('withdrawModal').classList.toggle('open', show);
            if(show) document.getElementById('withdrawInput').value = '';
        }

        function confirmWithdraw() {
            const input = document.getElementById('withdrawInput');
            const amount = parseFloat(input.value);
            if (isNaN(amount) || amount <= 0) {
                showToast('Введите корректную сумму!', true);
                return;
            }
            if (amount > balance) {
                showToast('Недостаточно средств на балансе!', true);
                return;
            }
            balance -= amount;
            updateBalanceDisplay();
            toggleWithdrawModal(false);
            showToast(`Успешный вывод: ${amount.toFixed(2)} ₽`);
        }

        function sellAllItems() {
            if (isProcessing) return;
            if (myInventoryData.length === 0) {
                showToast('У вас нет подарков для продажи!', true);
                return;
            }
            let income = 0;
            myInventoryData.forEach(item => income += parseFloat(item.price));
            balance += income;
            myInventoryData = [];
            selectedLeft = null;
            
            updateBalanceDisplay();
            renderSlot('slotLeft', null, 'Твой подарок');
            updateChance();
            renderGrid();
            showToast(`Продано на сумму + ${income.toFixed(2)} ₽`);
        }

        function renderGrid() {
            const grid = document.getElementById('gridContent');
            grid.innerHTML = '';
            
            if (currentTab === 'profile') {
                let winrate = stats.total > 0 ? ((stats.win / stats.total) * 100).toFixed(1) : 0;
                grid.parentNode.classList.add('profile-active');
                grid.innerHTML = `
                    <div class="profile-container" style="grid-column: 1/-1;">
                        <div class="stats-grid">
                            <div class="stat-box"><div class="num">${stats.total}</div><div class="lbl">Апгрейдов</div></div>
                            <div class="stat-box"><div class="num" style="color:#2ecc71">${stats.win}</div><div class="lbl">Успешных</div></div>
                            <div class="stat-box"><div class="num" style="color:#e74c3c">${stats.fail}</div><div class="lbl">Сгорело</div></div>
                            <div class="stat-box"><div class="num" style="color:#3498db">${winrate}%</div><div class="lbl">Винрейт</div></div>
                        </div>
                        <button class="btn-sell-all" onclick="sellAllItems()">Продать все подарки 🎁</button>
                    </div>`;
                return;
            }

            let data = currentTab === 'my' ? myInventoryData : (currentTab === 'shop' ? shopInventoryData : buyMarketData);

            if (data.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align:center; color:var(--text-muted); font-size:12px; padding: 30px 10px;">Инвентарь пуст...</div>`;
                return;
            }

            data.forEach((item, index) => {
                grid.innerHTML += `
                    <div class="item-card" onclick="handleItemClick(${index})">
                        <div class="item-price">${Math.round(item.price)} ₽</div>
                        <div class="item-img-container">${getPepeSvg(item.color)}</div>
                        <div class="item-info">
                            <div class="item-title">${item.title}</div>
                            <div class="item-sub">${item.sub}</div>
                        </div>
                    </div>`;
            });
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tabMy').classList.toggle('active', tab === 'my');
            document.getElementById('tabShop').classList.toggle('active', tab === 'shop');
            document.getElementById('tabBuy').classList.toggle('active', tab === 'buy');
            document.getElementById('tabProfile').classList.toggle('active', tab === 'profile');
            renderGrid();
        }

        function handleItemClick(index) {
            if (isProcessing) return;

            if (currentTab === 'buy') {
                const item = buyMarketData[index];
                if (balance >= parseFloat(item.price)) {
                    balance -= parseFloat(item.price);
                    myInventoryData.push(Object.assign({}, item));
                    updateBalanceDisplay();
                    showToast(`Куплен: ${item.sub}`);
                } else {
                    showToast('Недостаточно денег на балансе!', true);
                }
                return;
            }

            const item = currentTab === 'my' ? myInventoryData[index] : shopInventoryData[index];
            if (currentTab === 'my') {
                selectedLeft = item;
                renderSlot('slotLeft', item, 'Твой подарок');
            } else {
                selectedRight = item;
                renderSlot('slotRight', item, 'Желаемый подарок');
            }
            updateChance();
        }

        function renderSlot(slotId, item, hint) {
            const slot = document.getElementById(slotId);
            if (!item) {
                slot.classList.remove('active');
                slot.innerHTML = `<span class="slot-hint">${hint}</span>`;
                return;
            }
            slot.classList.add('active');
            slot.innerHTML = `
                <div style="font-size:11px;font-weight:800;color:var(--accent-gold); position:absolute; top:8px; right:10px;">${Math.round(item.price)} ₽</div>
                <div style="margin-top:12px; width:45px; height:45px;">${getPepeSvg(item.color)}</div>
                <div style="font-size:11px;font-weight:800;margin-top:8px;width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 4px;">${item.sub}</div>
            `;
        }

        function updateChance() {
            if (!selectedLeft || !selectedRight) {
                document.getElementById('chanceText').innerText = '0.00%';
                document.getElementById('wheelCircle').style.strokeDashoffset = 565.48;
                return;
            }
            let chance = (parseFloat(selectedLeft.price) / parseFloat(selectedRight.price)) * 100;
            if (chance > 95) chance = 95;
            if (chance < 1) chance = 1;

            document.getElementById('chanceText').innerText = chance.toFixed(2) + '%';
            
            const maxOffset = 565.48; 
            document.getElementById('wheelCircle').style.strokeDashoffset = maxOffset - (maxOffset * (chance / 100));
        }

        function executeUpgrade() {
            if (isProcessing) return;
            if (!selectedLeft || !selectedRight) {
                showToast('Выберите подарки для начала!', true);
                return;
            }

            isProcessing = true;
            const btn = document.getElementById('btnUpgrade');
            const arena = document.getElementById('arenaBox');
            const arrow = document.getElementById('wheelArrow');
            const flash = document.getElementById('screenFlash');
            
            btn.innerText = 'Улучшаем...';
            arena.classList.add('spinning');

            // Рассчитываем плавный оборот наружной стрелочки
            const spins = Math.floor(Math.random() * 3) + 5; 
            const randomDegree = Math.floor(Math.random() * 360);
            currentRotation += (spins * 360) + randomDegree;
            arrow.style.transform = `rotate(${currentRotation}deg)`;

            let chance = (parseFloat(selectedLeft.price) / parseFloat(selectedRight.price)) * 100;
            if (chance > 95) chance = 95;
            if (chance < 1) chance = 1;
            
            let roll = Math.random() * 100;
            let isWin = roll <= chance;

            stats.total += 1;

            setTimeout(() => {
                arena.classList.remove('spinning');
                
                if (isWin) {
                    stats.win += 1;
                    btn.style.background = '#2ecc71';
                    btn.style.color = '#000';
                    btn.innerText = 'УСПЕШНО!';
                    flash.className = 'flash-overlay success';

                    // НАПРАВЛЕННЫЙ САЛЮТ ИЗ СЛОТА ЖЕЛАЕМОГО ПОДАРКА (ПРАВЫЙ СЛОТ)
                    const rightSlot = document.getElementById('slotRight').getBoundingClientRect();
                    const posX = (rightSlot.left + rightSlot.width / 2) / window.innerWidth;
                    const posY = (rightSlot.top + rightSlot.height / 2) / window.innerHeight;

                    confetti({
                        particleCount: 120,
                        spread: 60,
                        origin: { x: posX, y: posY },
                        colors: [selectedRight.color, '#f4c21a', '#ffffff']
                    });

                    myInventoryData.push(Object.assign({}, selectedRight));
                    myInventoryData = myInventoryData.filter(i => i !== selectedLeft);
                } else {
                    stats.fail += 1;
                    btn.style.background = '#e74c3c';
                    btn.style.color = '#fff';
                    btn.innerText = 'СГОРЕЛО!';
                    flash.className = 'flash-overlay fail';
                    
                    myInventoryData = myInventoryData.filter(i => i !== selectedLeft);
                }

                // Плавное исчезновение вспышки экрана
                setTimeout(() => { flash.className = 'flash-overlay'; }, 1500);

                // Очистка стола после завершения анимации
                setTimeout(() => {
                    btn.style.background = '';
                    btn.style.color = '';
                    btn.innerText = 'Прокачать';
                    
                    selectedLeft = null; selectedRight = null;
                    renderSlot('slotLeft', null, 'Твой подарок');
                    renderSlot('slotRight', null, 'Желаемый подарок');
                    updateChance();
                    renderGrid();
                    isProcessing = false;
                }, 2200);

            }, 3500);
        }

        function updateTicker() {
            const ticker = document.getElementById('liveTicker');
            const randItem = customItems[Math.floor(Math.random() * customItems.length)];
            const isWin = Math.random() > 0.5;
            const html = `<div class="ticker-item ${isWin ? '' : 'fail'}">${randItem.sub} &nbsp;➔&nbsp; ${isWin ? '🔥' : '❌'}</div>`;
            ticker.insertAdjacentHTML('afterbegin', html);
            if (ticker.children.length > 5) ticker.removeChild(ticker.lastChild);
        }

        setInterval(updateTicker, 3000);
        updateBalanceDisplay();
        renderGrid();
    </script>
</body>
</html>
