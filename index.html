<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <title>FLASHUPGRADER — Premium Edition</title>
    <style>
        /* === НОВЫЙ ДИЗАЙН === */
        :root {
            --bg-main: #0a0a0f;
            --bg-panel: #13131c;
            --bg-card: #1a1a24;
            --bg-card-hover: #22222e;
            --accent-main: #8a2be2; 
            --accent-glow: rgba(138, 43, 226, 0.4);
            --accent-secondary: #00e5ff;
            --text-main: #ffffff;
            --text-muted: #8b8b9e;
            --border-color: #272736;
            
            --rarity-epic: #a55eea;
            --rarity-legendary: #fd9644;
            --rarity-mythic: #fc5c65;
            --rarity-immortal: #2bcbba;
            
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
            min-width: 0; 
        }

        button:active, .item-slot:active, .item-card:active, .profile-avatar:active, .modal-close:active, .payment-method:active {
            transform: scale(0.95) !important;
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }

        .item-sub, .item-title, .p-item-name, .bd-name, #profileEmailDisplay, .ticker-item span {
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%;
        }
        .p-item-info, .item-info {
            min-width: 0; width: 100%; display: flex; flex-direction: column; align-items: center;
        }

        body {
            background: var(--bg-main); color: var(--text-main);
            min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* === ХЕДЕР === */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 20px; background: rgba(19, 19, 28, 0.95); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100;
        }

        .logo-area { display: flex; flex-direction: column; }
        .logo { font-size: 20px; font-weight: 900; color: var(--accent-main); letter-spacing: 0.5px; transition: var(--transition); text-shadow: 0 0 10px var(--accent-glow); animation: neonPulse 3s infinite; }
        .logo span { color: var(--text-main); text-shadow: none; }
        .online-count { font-size: 11px; color: var(--text-muted); margin-top: 2px; font-weight: 600; }
        .online-count span { color: var(--text-muted); font-weight: bold; }

        @keyframes neonPulse {
            0%, 100% { text-shadow: 0 0 10px var(--accent-glow); }
            50% { text-shadow: 0 0 20px var(--accent-main), 0 0 5px var(--accent-glow); }
        }

        .user-area { display: flex; align-items: center; gap: 12px; min-height: 38px;}
        .balance-block { display: flex; flex-direction: column; align-items: flex-end; justify-content: center; }
        .balance-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; }
        .balance { font-size: 15px; font-weight: 800; color: var(--text-main); }
        
        .btn-deposit {
            background: var(--accent-main); color: #fff;
            padding: 8px 14px; border: none; border-radius: var(--radius-sm);
            font-size: 13px; font-weight: 700; cursor: pointer; transition: var(--transition);
            box-shadow: 0 0 10px rgba(138, 43, 226, 0.3);
        }
        .btn-deposit:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 0 15px rgba(138, 43, 226, 0.6); }
        
        .profile-avatar {
            width: 36px; height: 36px; background: var(--bg-card); border: 2px solid var(--border-color);
            border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: var(--transition); overflow: hidden; flex-shrink: 0;
        }
        .profile-avatar:hover { border-color: var(--accent-main); box-shadow: 0 0 10px var(--accent-glow); }

        /* === ОСНОВНОЙ КОНТЕНТ === */
        main { flex: 1; display: flex; flex-direction: column; padding: 20px 14px; gap: 20px; max-width: 1300px; width: 100%; margin: 0 auto; }
        .main-content { display: flex; flex-direction: column; gap: 24px; flex: 1; max-width: 950px; margin: 0 auto; width: 100%; }

        .live-ticker {
            background: var(--bg-panel); border: 1px solid var(--border-color);
            border-radius: var(--radius-md); padding: 8px; display: flex; align-items: center; gap: 8px;
            overflow-x: auto; white-space: nowrap; scrollbar-width: none; min-height: 52px;
            scroll-behavior: smooth; position: relative;
        }
        .live-ticker::-webkit-scrollbar { display: none; }
        
        .ticker-item {
            display: inline-flex; align-items: center; gap: 8px; background: var(--bg-card);
            padding: 6px 10px; border-radius: var(--radius-sm); font-size: 11px; font-weight: 600; 
            min-width: 150px; max-width: 200px; border-left: 3px solid transparent; transition: var(--transition);
            animation: fadeIn 0.5s ease forwards;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        
        .ticker-img { width: 20px; height: 20px; object-fit: contain; flex-shrink: 0; }
        .ticker-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .ticker-chance { margin-left: auto; font-weight: 800; font-size: 10px; padding: 2px 5px; border-radius: 4px; flex-shrink: 0; }
        .ticker-user { font-size: 10px; color: var(--text-muted); opacity: 0.8; margin-right: 4px; flex-shrink: 0; }

        @media (min-width: 900px) {
            main { flex-direction: row; align-items: flex-start; justify-content: center; }
            .live-ticker { flex-direction: column; align-items: stretch; width: 220px; height: auto; max-height: 80vh; overflow-y: auto; overflow-x: hidden; white-space: normal; padding: 10px; }
            .ticker-item { width: 100%; justify-content: flex-start; max-width: 100%; }
            .main-content { margin: 0; }
        }

        /* === АРЕНА АПГРЕЙДА === */
        .upgrade-arena {
            background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: var(--radius-lg);
            padding: 30px 20px; display: flex; flex-direction: column; align-items: center; gap: 24px;
            position: relative; transition: var(--transition); overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        
        .top-left-controls { position: absolute; top: 12px; left: 12px; z-index: 20; display: flex; gap: 8px; align-items: center; }
        .fast-upgrade-label { cursor: pointer; display: flex; align-items: center; background: var(--bg-card); padding: 6px; border-radius: 8px; border: 1px solid var(--border-color); }
        .fast-upgrade-label input { display: none; }
        .lightning-icon { width: 12px; height: 12px; fill: #5a5a6e; transition: var(--transition); }
        .fast-upgrade-label input:checked + .lightning-icon { fill: #ffcc00; filter: drop-shadow(0 0 6px rgba(255, 204, 0, 0.6)); }

        .arena-row { display: flex; align-items: center; justify-content: center; width: 100%; z-index: 2; margin-top: 10px; gap: 30px; flex-wrap: nowrap; }

        /* Идеальная симметрия слотов */
        .left-slot-wrapper, .right-slot-wrapper {
            display: flex; flex-direction: column; flex: 1; max-width: 260px; width: 100%; min-width: 110px; gap: 10px; justify-content: space-between;
        }

        .item-slot {
            background: var(--bg-card); border: 1px dashed var(--border-color); border-radius: var(--radius-md);
            height: 220px; display: flex; flex-direction: column; justify-content: space-between; align-items: center;
            padding: 16px; text-align: center; transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.4s, box-shadow 0.4s; cursor: pointer;
            position: relative; overflow: hidden; width: 100%; flex-shrink: 0;
        }
        .slot-confetti { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .item-slot:hover { border-color: var(--text-muted); background: var(--bg-card-hover); transform: translateY(-4px); box-shadow: 0 6px 16px rgba(0,0,0,0.4); }
        .item-slot.active { border-style: solid; border-width: 2px; }
        .item-slot.active.rarity-epic { border-color: var(--rarity-epic); background: rgba(165, 94, 234, 0.05); box-shadow: 0 0 15px rgba(165, 94, 234, 0.25); }
        .item-slot.active.rarity-legendary { border-color: var(--rarity-legendary); background: rgba(253, 150, 68, 0.05); box-shadow: 0 0 15px rgba(253, 150, 68, 0.25); }
        .item-slot.active.rarity-mythic { border-color: var(--rarity-mythic); background: rgba(252, 92, 101, 0.05); box-shadow: 0 0 15px rgba(252, 92, 101, 0.25); }
        .item-slot.active.rarity-immortal { border-color: var(--rarity-immortal); background: rgba(43, 203, 186, 0.05); box-shadow: 0 0 15px rgba(43, 203, 186, 0.25); }

        .slot-bg-pepe { position: absolute; width: 65%; height: 65%; object-fit: contain; filter: brightness(0) opacity(0.3); z-index: 1; pointer-events: none; animation: floatEffect 5s ease-in-out infinite; }
        
        .slot-chevron-container { position: relative; z-index: 2; margin: auto 0; display: flex; align-items: center; justify-content: center; height: 50px; }
        .slot-hint { font-size: 11px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; position: relative; z-index: 2; margin-top: auto; }

        .arrow-1 { animation: arrowPulse 1.5s infinite; animation-delay: 0s; }
        .arrow-2 { animation: arrowPulse 1.5s infinite; animation-delay: 0.2s; }
        .arrow-3 { animation: arrowPulse 1.5s infinite; animation-delay: 0.4s; }
        .chevron-up .arrow-1 { animation-delay: 0.4s; }
        .chevron-up .arrow-2 { animation-delay: 0.2s; }
        .chevron-up .arrow-3 { animation-delay: 0s; }
        
        @keyframes arrowPulse {
            0%, 100% { opacity: 0.2; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(2px); filter: drop-shadow(0 0 5px var(--accent-main)); }
        }

        /* === БЛОК СНИЗУ: БУСТ И ИКСЫ (Точная копия) === */
        .bottom-control-block {
            height: 65px; width: 100%; border-radius: var(--radius-md); 
            display: flex; align-items: stretch;
        }

        /* 1 фото: Буст баланса */
        .balance-boost-container {
            display: flex; flex-direction: column; justify-content: center; gap: 8px; background: #18181c; 
            padding: 0 16px; border-radius: var(--radius-md); border: 1px solid var(--border-color); 
            transition: var(--transition); width: 100%; height: 100%;
        }
        .boost-slider {
            -webkit-appearance: none; width: 100%; height: 4px; background: #2f2f38; border-radius: 4px; outline: none; opacity: 0.9; transition: var(--transition);
        }
        .boost-slider::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #ad9440; cursor: pointer; box-shadow: 0 0 8px rgba(173, 148, 64, 0.6); transition: transform 0.2s;
        }
        .boost-slider::-webkit-slider-thumb:hover { transform: scale(1.15); }

        /* 2 фото: Панель иксов */
        .multiplier-bar-new {
            display: flex; gap: 6px; background: transparent; 
            width: 100%; height: 100%; align-items: center; justify-content: space-between;
        }
        .mult-btn {
            flex: 1; height: 45px; position: relative; background: #13131a;
            border: 1px solid #333344; transform: skewX(-15deg); border-radius: 4px; 
            cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center;
            color: var(--text-muted); font-weight: 800; font-size: 14px;
        }
        .mult-btn span { transform: skewX(15deg); display: block; pointer-events: none; }
        
        .mult-btn[data-val="35"] { border-color: rgba(255, 77, 77, 0.4); }
        .mult-btn[data-val="55"] { border-color: rgba(255, 204, 0, 0.4); }
        .mult-btn[data-val="75"] { border-color: rgba(0, 204, 102, 0.4); }

        /* Active Effects */
        .mult-btn.active { background: rgba(138, 43, 226, 0.15); border-color: var(--accent-main); color: #fff; box-shadow: 0 0 10px var(--accent-glow); }
        .mult-btn[data-val="35"].active { background: rgba(255, 77, 77, 0.15); border-color: #ff4d4d; color: #fff; box-shadow: 0 0 10px rgba(255, 77, 77, 0.4); }
        .mult-btn[data-val="55"].active { background: rgba(255, 204, 0, 0.15); border-color: #ffcc00; color: #fff; box-shadow: 0 0 10px rgba(255, 204, 0, 0.4); }
        .mult-btn[data-val="75"].active { background: rgba(0, 204, 102, 0.15); border-color: #00cc66; color: #fff; box-shadow: 0 0 10px rgba(0, 204, 102, 0.4); }

        .mult-settings { width: 45px; flex: none; transform: skewX(0); border-radius: 8px; border-color: #333344; background: #1a1a24; }
        .mult-settings:hover { background: #22222e; }

        /* === КОЛЕСО И СТРЕЛКА === */
        .wheel-container { position: relative; width: 220px; height: 220px; margin: 0; display: flex; align-items: center; justify-content: center; z-index: 2; flex-shrink: 0; transition: var(--transition); }
        .wheel-box { width: 100%; height: 100%; position: relative; filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); }
        .wheel-svg { width: 100%; height: 100%; }
        .wheel-progress { stroke-dasharray: 534; stroke-dashoffset: 534; transition: stroke-dashoffset 0.8s cubic-bezier(0.3, 1, 0.3, 1); filter: drop-shadow(0 0 10px var(--accent-main)); }

        .wheel-marker { position: absolute; font-size: 9px; font-weight: 800; color: var(--text-muted); z-index: 10; pointer-events: none; opacity: 0.6; }
        .marker-top { top: 38px; left: 50%; transform: translateX(-50%); }
        .marker-bottom { bottom: 38px; left: 50%; transform: translateX(-50%); }
        .marker-left { top: 50%; left: 38px; transform: translateY(-50%); }
        .marker-right { top: 50%; right: 38px; transform: translateY(-50%); }
        
        .arrow-spinner-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 15; will-change: transform; }
        
        .wheel-arrow { 
            position: absolute; top: 25px; left: 50%; transform: translateX(-50%) rotate(180deg);
            width: 14px; height: 22px; fill: var(--accent-main); filter: drop-shadow(0 0 6px var(--accent-glow));
        }

        .wheel-center-content { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            width: 85%; height: 85%; z-index: 5; text-align: center; pointer-events: none; 
        }

        @keyframes slowBarsAnim { 0%, 100% { opacity: 1; transform: translateY(0); } 50% { opacity: 0.6; transform: translateY(-2px); } }
        .bars-anim { animation: slowBarsAnim 2s ease-in-out infinite; }

        #chanceDisplay { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
        #chanceDisplay h1 { font-size: 24px; font-weight: 900; color: #ffffff; letter-spacing: -0.5px; transition: var(--transition); line-height: 1; margin: 0; text-shadow: 0 0 15px rgba(255,255,255,0.4); white-space: nowrap; }
        #chanceDisplay p { font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 800; margin-top: 4px; transition: var(--transition); }

        .action-block { width: 100%; display: flex; flex-direction: column; gap: 10px; z-index: 2; margin-top: 10px; }

        .btn-upgrade { background: var(--accent-main); color: #fff; border: none; padding: 16px; font-size: 14px; font-weight: 800; border-radius: var(--radius-md); cursor: pointer; text-transform: uppercase; transition: var(--transition); }
        .btn-upgrade:not(:disabled) { box-shadow: 0 0 15px var(--accent-glow); }
        .btn-upgrade:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.1); box-shadow: 0 0 25px rgba(138, 43, 226, 0.6); }
        .btn-upgrade:disabled { background: var(--bg-card); color: var(--text-muted); cursor: not-allowed; border: 1px solid var(--border-color); transform: none; filter: none; box-shadow: none; }
        
        .btn-loss-state { background: #ff4d4d !important; box-shadow: 0 0 25px rgba(255, 77, 77, 0.6) !important; color: #fff !important; border-color: transparent !important; }

        /* Взрыв при победе */
        @keyframes winBurst {
            0% { transform: scale(0.5) rotate(0deg); opacity: 0; }
            30% { opacity: 1; }
            100% { transform: scale(2.5) rotate(90deg); opacity: 0; }
        }
        .win-burst {
            position: absolute; width: 150%; height: 150%;
            background: radial-gradient(circle, rgba(255,50,50,0.7) 0%, rgba(255,165,0,0.4) 40%, transparent 70%);
            top: -25%; left: -25%; z-index: 1; pointer-events: none;
            animation: winBurst 1.2s ease-out forwards;
        }

        @keyframes floatEffect { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-4px); } }
        @keyframes winItemPop { 0% { transform: scale(1); filter: drop-shadow(0 0 0 transparent); } 50% { transform: scale(1.2); filter: drop-shadow(0 0 25px var(--accent-main)); } 100% { transform: scale(1.1); filter: drop-shadow(0 0 15px var(--accent-main)); } }
        .win-item-anim { animation: winItemPop 1.2s cubic-bezier(0.3, 1, 0.3, 1) forwards !important; z-index: 20; position: relative;}

        @media (max-width: 650px) {
            .arena-row { flex-direction: row; flex-wrap: wrap; gap: 12px; }
            .left-slot-wrapper, .right-slot-wrapper { max-width: 100%; flex: 1; }
            .item-slot { height: 160px; padding: 8px; }
            .bottom-control-block { height: 50px; }
            .mult-btn { font-size: 11px; height: 35px; }
            .mult-settings { width: 35px; height: 35px; }
            .wheel-container { width: 150px; height: 150px; margin: 0 auto; }
            .wheel-svg { width: 150px; height: 150px; }
            .wheel-center-content { width: 90%; height: 90%; }
            #chanceDisplay h1 { font-size: 18px; }
            #chanceDisplay p { font-size: 10px; }
            .slot-item-img { max-height: 55px; }
            .wheel-arrow { top: 15px; width: 12px; height: 18px; }
            .marker-top { top: 25px; } .marker-bottom { bottom: 25px; }
            .marker-left { left: 25px; } .marker-right { right: 25px; }
        }

        /* === ИНВЕНТАРЬ И МАГАЗИН === */
        .inventory-section { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: var(--radius-lg); display: flex; flex-direction: column; overflow: hidden; padding: 20px; }
        .inventory-split { display: flex; gap: 24px; align-items: flex-start; }
        .inv-col { flex: 1; min-width: 0; display: flex; flex-direction: column; }
        @media (max-width: 768px) { .inventory-split { flex-direction: column; } }

        .inv-header-title { font-size: 16px; font-weight: 900; color: #fff; margin: 0 0 16px; text-transform: uppercase; border-left: 4px solid var(--accent-main); padding-left: 10px; letter-spacing: 0.5px; }
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 12px; align-items: stretch; max-height: 600px; overflow-y: auto; padding-right: 6px; padding-bottom: 10px; }
        .items-grid::-webkit-scrollbar { width: 4px; }
        .items-grid::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        
        .item-card { 
            background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-sm); 
            padding: 12px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; 
            cursor: pointer; transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.4s, box-shadow 0.4s, background 0.4s; 
            height: 165px; position: relative; overflow: hidden; width: 100%; 
        }
        .item-card:hover:not(.empty-slot) { background: var(--bg-card-hover); transform: translateY(-4px); border-color: #3a3a4d; box-shadow: 0 6px 16px rgba(0,0,0,0.4); }
        .item-price { font-size: 11px; font-weight: 800; color: #fff; align-self: flex-end; background: var(--bg-panel); padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border-color); }
        .item-img-container { width: 100%; height: 60px; display: flex; align-items: center; justify-content: center; margin: auto 0; }
        .item-img-container img { max-width: 85%; max-height: 100%; object-fit: contain; transition: var(--transition); }
        .item-card:hover:not(.empty-slot) .item-img-container img { transform: scale(1.1); }
        .item-rarity-text { font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 2px; }
        .item-title { font-size: 12px; font-weight: 800; color: #fff; }

        /* Модалки (Сжато) */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 10, 15, 0.8); backdrop-filter: blur(5px); z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-card { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: var(--radius-lg); width: 100%; max-width: 420px; padding: 24px; position: relative; transform: translateY(20px); transition: transform 0.5s ease; }
        .modal-overlay.active .modal-card { transform: translateY(0); }
        .modal-close { position: absolute; top: 16px; right: 16px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; width: 30px; height: 30px; display:flex; align-items:center; justify-content:center; color: var(--text-muted); font-size: 18px; cursor: pointer; transition: var(--transition); }
        .modal-title { font-size: 18px; font-weight: 800; margin-bottom: 16px; color: #fff; text-transform: uppercase; }
        .modal-input { width: 100%; background: var(--bg-card); border: 1px solid var(--border-color); padding: 12px; border-radius: var(--radius-sm); color: #fff; font-size: 14px; margin-bottom: 12px; outline: none; }
        .modal-btn { background: var(--accent-main); color: #fff; border: none; padding: 12px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 800; width: 100%; cursor: pointer; transition: var(--transition); }

        footer { display: flex; justify-content: space-between; padding: 20px; border-top: 1px solid var(--border-color); background: var(--bg-panel); font-size: 12px; color: var(--text-muted); }
        .footer-contacts { display: flex; align-items: center; gap: 8px; color: var(--text-main); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <audio id="sfx-click" src="click.mp3" preload="auto"></audio>
    <audio id="sfx-spin" src="spin.mp3" preload="auto"></audio>
    <audio id="sfx-win" src="win.mp3" preload="auto"></audio>
    <audio id="sfx-lose" src="lose.mp3" preload="auto"></audio>

    <header>
        <div class="logo-area">
            <div class="logo">FLASH<span>UPGRADER</span></div>
            <div class="online-count">Онлайн: <span>1 337</span></div>
        </div>
        <div class="user-area" id="headerUserArea">
            <div class="balance-block">
                <span class="balance-label">Баланс</span>
                <span class="balance" id="headerBalance">0 ⭐</span>
            </div>
            <button class="btn-deposit" onclick="openModal('depositModal')">Пополнить</button>
            <div class="profile-avatar" onclick="openModal('profileModal')">
                <img src="16201.png" style="width: 100%; height: 100%; object-fit: cover;" id="headerAvatar">
            </div>
        </div>
        <button class="btn-deposit" id="headerLoginBtn" style="display:none;" onclick="openModal('authModal')">ВОЙТИ</button>
    </header>

    <main>
        <div class="live-ticker" id="liveTicker"></div>

        <div class="main-content">
            <section class="upgrade-arena">
                <div class="top-left-controls">
                    <label class="fast-upgrade-label" title="Быстрый Апгрейд">
                        <input type="checkbox" id="fastUpgradeCheck">
                        <svg class="lightning-icon" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                    </label>
                </div>

                <div class="arena-row">
                    <div class="left-slot-wrapper">
                        <div class="item-slot" id="slotLeft">
                            <img src="16201.png" class="slot-bg-pepe">
                            <div class="slot-chevron-container chevron-up">
                                <svg width="24" height="24" viewBox="0 0 50 60" fill="var(--text-muted)">
                                    <path class="arrow-1" d="M25 0 L45 15 L25 30 L5 15 Z" />
                                    <path class="arrow-2" d="M25 15 L45 30 L25 45 L5 30 Z" />
                                    <path class="arrow-3" d="M25 30 L45 45 L25 60 L5 45 Z" />
                                </svg>
                            </div>
                            <span class="slot-hint">Ваш предмет</span>
                        </div>
                        
                        <div class="bottom-control-block">
                            <div class="balance-boost-container" id="boostContainer">
                                <div style="display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--text-muted); font-weight: 600;">
                                    <span>Сумма баланса:</span>
                                    <div style="display: flex; align-items: center; gap: 6px;">
                                        <span id="boostValDisplay" style="color: #ad9440; font-size: 15px; font-weight: 800;">0.00</span>
                                        <span style="font-size: 12px; color: #5a5a6e;">(max 0,00)</span>
                                    </div>
                                </div>
                                <input type="range" id="balanceBoostSlider" min="0" max="0" value="0" step="1" class="boost-slider">
                            </div>
                        </div>
                    </div>

                    <div class="wheel-container">
                        <div class="wheel-marker marker-top">100%</div>
                        <div class="wheel-marker marker-bottom">0%</div>
                        <div class="wheel-marker marker-left">50%</div>
                        <div class="wheel-marker marker-right">50%</div>
                        <div class="arrow-spinner-wrapper" id="arrowSpinner">
                            <svg class="wheel-arrow" viewBox="0 0 24 50"><path d="M12 0 L24 20 L16 18 L16 50 L8 50 L8 18 L0 20 Z" /></svg>
                        </div>
                        <div class="wheel-box">
                            <svg class="wheel-svg" viewBox="0 0 200 200">
                                <circle cx="100" cy="100" r="90" fill="none" stroke="#272736" stroke-width="3" stroke-dasharray="2 8" />
                                <circle cx="100" cy="100" r="75" fill="#13131c" />
                                <circle cx="100" cy="100" r="65" fill="none" stroke="#1a1a24" stroke-width="4" />
                                <circle cx="100" cy="100" r="65" fill="none" stroke="var(--accent-main)" stroke-width="6" class="wheel-progress" id="wheelCircle" />
                            </svg>
                        </div>
                        <div class="wheel-center-content">
                            <div id="chanceBars" class="bars-anim">
                                <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="var(--accent-main)" stroke-width="2"><path d="M12 20V10M18 20V4M6 20v-4"/></svg>
                            </div>
                            <div id="chanceDisplay" style="display:none;">
                                <h1 id="chanceText">0.00%</h1>
                                <p id="chanceLabel">шанс</p>
                            </div>
                        </div>
                    </div>

                    <div class="right-slot-wrapper">
                        <div class="item-slot" id="slotRight">
                            <img src="16201.png" class="slot-bg-pepe">
                            <div class="slot-chevron-container chevron-down">
                                <svg width="24" height="24" viewBox="0 0 50 60" fill="var(--text-muted)" style="transform: rotate(180deg);">
                                    <path class="arrow-1" d="M25 0 L45 15 L25 30 L5 15 Z" />
                                    <path class="arrow-2" d="M25 15 L45 30 L25 45 L5 30 Z" />
                                    <path class="arrow-3" d="M25 30 L45 45 L25 60 L5 45 Z" />
                                </svg>
                            </div>
                            <span class="slot-hint">Желаемый подарок</span>
                        </div>

                        <div class="bottom-control-block">
                            <div class="multiplier-bar-new">
                                <button class="mult-btn" data-val="2" onclick="setMultiplier(2)"><span>x2</span></button>
                                <button class="mult-btn" data-val="4" onclick="setMultiplier(4)"><span>x4</span></button>
                                <button class="mult-btn" data-val="8" onclick="setMultiplier(8)"><span>x8</span></button>
                                <button class="mult-btn" data-val="35" onclick="setMultiplier(35)"><span>35%</span></button>
                                <button class="mult-btn" data-val="55" onclick="setMultiplier(55)"><span>55%</span></button>
                                <button class="mult-btn" data-val="75" onclick="setMultiplier(75)"><span>75%</span></button>
                                <button class="mult-settings" onclick="openModal('settingsModal')">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8b8b9e" stroke-width="2" style="display:block; margin:auto;"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="action-block">
                    <button class="btn-upgrade" id="btnUpgrade" onclick="executeUpgrade()" disabled>ВЫБЕРИТЕ ПРЕДМЕТЫ</button>
                </div>
            </section>

            <section class="inventory-section">
                <div class="inventory-split">
                    <div class="inv-col">
                        <div class="inv-header-title">Твой инвентарь</div>
                        <div class="items-grid" id="gridMyContent"></div>
                    </div>
                    <div class="inv-col">
                        <div class="inv-header-title">Магазин предметов</div>
                        <div class="items-grid" id="gridShopContent"></div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <footer>
        <div>Premium Flash Upgrader © 2026</div>
        <a href="https://t.me/om1a2" target="_blank" class="footer-contacts">Поддержка: @om1a2</a>
    </footer>

    <div class="modal-overlay" id="authModal">
        <div class="modal-card">
            <div class="modal-close" onclick="closeModal('authModal')">✕</div>
            <div class="modal-title">ВХОД В АККАУНТ</div>
            <button class="modal-btn" onclick="loginFake()">ВОЙТИ ЧЕРЕЗ GOOGLE</button>
        </div>
    </div>

    <div class="modal-overlay" id="depositModal">
        <div class="modal-card">
            <div class="modal-close" onclick="closeModal('depositModal')">✕</div>
            <div class="modal-title">ПОПОЛНЕНИЕ</div>
            <input type="number" id="depositAmount" class="modal-input" placeholder="Сумма (от 15 ⭐)">
            <button class="modal-btn" onclick="processDeposit()">ОПЛАТИТЬ</button>
        </div>
    </div>

    <script>
        // ИНИЦИАЛИЗАЦИЯ ДАННЫХ (LOCAL STORAGE)
        let balance = parseFloat(localStorage.getItem('local_balance')) || 1000000;
        let myInventoryData = JSON.parse(localStorage.getItem('local_inv')) || [];
        let stats = JSON.parse(localStorage.getItem('local_stats')) || { wins: 0, losses: 0, total: 0, bestDrop: null, nickname: null };
        window.isUserLoggedIn = localStorage.getItem('ub_logged_in') === 'true';

        let giftPool = [
            { id: '1', title: 'Обычный', sub: 'Bear', price: '15', rarity: 'rarity-epic', img: '1779384748829.png' },
            { id: '2', title: 'Обычный', sub: 'Rose', price: '25', rarity: 'rarity-epic', img: '1779384763664.png' },
            { id: '3', title: 'Редкий', sub: 'Cake', price: '50', rarity: 'rarity-epic', img: '1779384784150.png' },
            { id: '4', title: 'Эпический', sub: 'Cup', price: '100', rarity: 'rarity-legendary', img: '1779384804515.png' },
            { id: '5', title: 'Легендарный', sub: 'SurfBoard', price: '2500', rarity: 'rarity-mythic', img: '1779384818636.png' },
            { id: '6', title: 'Мифический', sub: 'Durovs Boots', price: '10000', rarity: 'rarity-immortal', img: '1779384968361.png' }
        ];

        let selectedLeft = null;
        let selectedRight = null;
        let isProcessing = false;
        const circleCircumference = 2 * Math.PI * 65;

        // ЗВУКИ
        function playSound(id) { document.getElementById('sfx-' + id)?.play().catch(()=>{}); }

        // СОХРАНЕНИЕ
        function saveData() {
            localStorage.setItem('local_balance', balance);
            localStorage.setItem('local_inv', JSON.stringify(myInventoryData));
            localStorage.setItem('local_stats', JSON.stringify(stats));
            updateBalanceUI();
        }

        function updateBalanceUI() {
            document.getElementById('headerBalance').innerText = Math.round(balance) + ' ⭐';
            if(window.isUserLoggedIn) {
                document.getElementById('headerLoginBtn').style.display = 'none';
                document.getElementById('headerUserArea').style.display = 'flex';
            } else {
                document.getElementById('headerLoginBtn').style.display = 'block';
                document.getElementById('headerUserArea').style.display = 'none';
            }
            updateChance();
        }

        // РЕНДЕР ИНВЕНТАРЯ И МАГАЗИНА (с фильтром 80%)
        function renderGrid() {
            const gridMy = document.getElementById('gridMyContent');
            const gridShop = document.getElementById('gridShopContent');
            gridMy.innerHTML = ''; gridShop.innerHTML = '';

            let currentBoostVal = parseFloat(document.getElementById('balanceBoostSlider')?.value) || 0;
            let leftVal = selectedLeft ? (parseFloat(selectedLeft.price) + currentBoostVal) : 0;

            myInventoryData.forEach((item, idx) => {
                gridMy.innerHTML += `
                    <div class="item-card ${item.rarity}" onclick="selectItem(${idx}, 'my')">
                        <div class="item-price">${Math.round(item.price)} ⭐</div>
                        <div class="item-img-container"><img src="${item.img}" onerror="this.src='16201.png'"></div>
                        <div class="item-info">
                            <div class="item-rarity-text">${item.title}</div>
                            <div class="item-title">${item.sub}</div>
                        </div>
                    </div>`;
            });

            giftPool.forEach((item, idx) => {
                // ФИЛЬТР: скрываем вещи, на которые шанс >= 80%
                if (selectedLeft) {
                    let chance = (leftVal / parseFloat(item.price)) * 100;
                    if (chance >= 80) return; // Скрываем
                }

                gridShop.innerHTML += `
                    <div class="item-card ${item.rarity}" onclick="selectItem(${idx}, 'shop')">
                        <div class="item-price">${Math.round(item.price)} ⭐</div>
                        <div class="item-img-container"><img src="${item.img}" onerror="this.src='16201.png'"></div>
                        <div class="item-info">
                            <div class="item-rarity-text">${item.title}</div>
                            <div class="item-title">${item.sub}</div>
                        </div>
                    </div>`;
            });
        }

        function selectItem(idx, type) {
            if(isProcessing) return;
            playSound('click');
            
            document.getElementById('btnUpgrade').classList.remove('btn-loss-state'); // Сброс красной кнопки

            if(type === 'my') {
                selectedLeft = myInventoryData[idx];
                document.getElementById('slotLeft').innerHTML = `
                    <canvas class="slot-confetti"></canvas>
                    <img src="${selectedLeft.img}" class="slot-item-img win-item-anim" style="max-height: 120px; z-index:5;" onerror="this.src='16201.png'">
                    <span class="slot-hint">${selectedLeft.sub}</span>`;
                document.getElementById('slotLeft').className = `item-slot active ${selectedLeft.rarity}`;
            } else {
                selectedRight = giftPool[idx];
                document.getElementById('slotRight').innerHTML = `
                    <canvas class="slot-confetti"></canvas>
                    <img src="${selectedRight.img}" class="slot-item-img win-item-anim" style="max-height: 120px; z-index:5;" onerror="this.src='16201.png'">
                    <span class="slot-hint">${selectedRight.sub}</span>`;
                document.getElementById('slotRight').className = `item-slot active ${selectedRight.rarity}`;
            }
            renderGrid(); // Перерендер для скрытия/показа подходящих предметов в магазине
            updateChance();
        }

        // ОБНОВЛЕНИЕ ШАНСА
        function updateChance() {
            const btn = document.getElementById('btnUpgrade');
            const boostSlider = document.getElementById('balanceBoostSlider');
            const boostValDisplay = document.getElementById('boostValDisplay');
            
            if(!selectedLeft || !selectedRight) {
                btn.disabled = true; btn.innerText = 'ВЫБЕРИТЕ ПРЕДМЕТЫ';
                document.getElementById('chanceBars').style.display = 'block';
                document.getElementById('chanceDisplay').style.display = 'none';
                document.getElementById('wheelCircle').style.strokeDashoffset = circleCircumference;
                boostSlider.disabled = true; return;
            }

            boostSlider.disabled = false;
            let neededFor80 = (parseFloat(selectedRight.price) * 0.8) - parseFloat(selectedLeft.price);
            if (neededFor80 < 0) neededFor80 = 0;
            
            let maxAllowed = Math.min(balance, neededFor80);
            
            if (boostSlider.dataset.leftId !== selectedLeft.sub || boostSlider.dataset.rightId !== selectedRight.sub) {
                boostSlider.max = Math.floor(maxAllowed);
                boostSlider.value = 0;
                boostSlider.dataset.leftId = selectedLeft.sub;
                boostSlider.dataset.rightId = selectedRight.sub;
            } else {
                boostSlider.max = Math.floor(maxAllowed);
            }

            let currentBoost = parseFloat(boostSlider.value) || 0;
            boostValDisplay.innerText = currentBoost + ' ⭐';
            
            let totalLeftVal = parseFloat(selectedLeft.price) + currentBoost;
            let chance = (totalLeftVal / parseFloat(selectedRight.price)) * 100;
            
            btn.disabled = false; btn.innerText = 'АПГРЕЙД ЗА ' + totalLeftVal.toFixed(2) + ' ⭐';
            document.getElementById('chanceBars').style.display = 'none';
            document.getElementById('chanceDisplay').style.display = 'flex';
            document.getElementById('chanceText').innerText = chance.toFixed(2) + '%';
            
            let offset = circleCircumference - (chance / 100) * circleCircumference;
            document.getElementById('wheelCircle').style.strokeDashoffset = Math.max(0, offset);

            renderGrid(); // Динамическое обновление магазина при скролле буста
        }

        document.getElementById('balanceBoostSlider').addEventListener('input', updateChance);

        // ПАНЕЛЬ ИКСОВ (Быстрый выбор)
        function setMultiplier(val) {
            document.querySelectorAll('.mult-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');

            if(!selectedLeft) return alert("Сначала выберите ваш предмет!");

            let leftPrice = parseFloat(selectedLeft.price) + (parseFloat(document.getElementById('balanceBoostSlider').value) || 0);
            let targetPrice = [2, 4, 8].includes(val) ? leftPrice * val : leftPrice / (val / 100);

            // Ищем ближайший предмет, шанс на который < 80%
            let closest = null;
            let minDiff = Infinity;
            giftPool.forEach((item, idx) => {
                let chance = (leftPrice / parseFloat(item.price)) * 100;
                let diff = Math.abs(parseFloat(item.price) - targetPrice);
                if (chance < 80 && diff < minDiff) {
                    minDiff = diff;
                    closest = idx;
                }
            });

            if (closest !== null) {
                selectItem(closest, 'shop');
            } else {
                alert("Подходящий предмет не найден!");
            }
        }

        // АПГРЕЙД
        function executeUpgrade() {
            if(!window.isUserLoggedIn) return openModal('authModal');
            if(isProcessing || !selectedLeft || !selectedRight) return;

            let currentBoost = parseFloat(document.getElementById('balanceBoostSlider').value) || 0;
            let chance = ((parseFloat(selectedLeft.price) + currentBoost) / parseFloat(selectedRight.price)) * 100;
            
            if(chance > 80) return alert('Максимальный шанс 80%!');
            
            balance -= currentBoost;
            isProcessing = true; playSound('spin');
            
            const btn = document.getElementById('btnUpgrade');
            btn.classList.remove('btn-loss-state');
            btn.innerText = 'УЛУЧШЕНИЕ...';
            document.getElementById('balanceBoostSlider').disabled = true;

            let isWin = Math.random() * 100 <= chance;
            let animDuration = document.getElementById('fastUpgradeCheck').checked ? 800 : 3800;
            
            document.getElementById('arrowSpinner').style.transition = `transform ${animDuration}ms cubic-bezier(0.25, 0.1, 0.15, 1)`;
            let extraRotations = 5 * 360;
            let winAngle = Math.random() * (chance / 100 * 360);
            let loseAngle = (chance / 100 * 360) + Math.random() * ((100 - chance) / 100 * 360);
            let finalAngle = extraRotations + (isWin ? winAngle : loseAngle);
            document.getElementById('arrowSpinner').style.transform = `rotate(${finalAngle}deg)`;

            // Удаляем левый предмет из инвентаря
            let leftIdx = myInventoryData.indexOf(selectedLeft);
            if(leftIdx > -1) myInventoryData.splice(leftIdx, 1);
            saveData();

            setTimeout(() => {
                isProcessing = false;
                stats.total++;
                document.getElementById('arrowSpinner').style.transition = 'none';
                document.getElementById('arrowSpinner').style.transform = `rotate(${finalAngle % 360}deg)`;

                if(isWin) {
                    playSound('win'); stats.wins++;
                    btn.innerText = 'ВЫИГРЫШ!';
                    
                    let rightSlot = document.getElementById('slotRight');
                    let img = rightSlot.querySelector('.slot-item-img');
                    if(img) img.classList.add('win-item-anim');
                    
                    // ДОБАВЛЯЕМ ВЗРЫВ
                    let burst = document.createElement('div');
                    burst.className = 'win-burst';
                    rightSlot.appendChild(burst);
                    setTimeout(() => burst.remove(), 1500);

                    myInventoryData.push(selectedRight);
                } else {
                    playSound('lose'); stats.losses++;
                    btn.classList.add('btn-loss-state');
                    btn.innerText = 'СГОРЕЛО!';
                    document.getElementById('chanceText').innerText = '0.00%';
                }
                
                saveData();
                renderGrid();
                
                setTimeout(() => {
                    btn.innerText = 'ВЫБЕРИТЕ ПРЕДМЕТЫ'; btn.disabled = true;
                    btn.classList.remove('btn-loss-state');
                    selectedLeft = null; selectedRight = null;
                    document.getElementById('slotLeft').innerHTML = '<img src="16201.png" class="slot-bg-pepe"><span class="slot-hint">Ваш предмет</span>';
                    document.getElementById('slotRight').innerHTML = '<img src="16201.png" class="slot-bg-pepe"><span class="slot-hint">Желаемый подарок</span>';
                    document.getElementById('slotLeft').className = 'item-slot';
                    document.getElementById('slotRight').className = 'item-slot';
                    updateChance();
                }, 2000);

            }, animDuration);
        }

        // МОДАЛКИ
        function openModal(id) { document.getElementById(id).classList.add('active'); playSound('click'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        // ДЕПОЗИТ (МИН 15 ЗВЕЗД)
        function processDeposit() {
            let amount = parseFloat(document.getElementById('depositAmount').value);
            if(isNaN(amount) || amount < 15) {
                alert("Минимальная сумма пополнения 15 ⭐");
                return;
            }
            balance += amount;
            saveData();
            closeModal('depositModal');
            alert(`Баланс успешно пополнен на ${amount} ⭐`);
        }

        // ЛОГИН (ФЕЙК ДЛЯ ДЕМО)
        function loginFake() {
            window.isUserLoggedIn = true;
            localStorage.setItem('ub_logged_in', 'true');
            if(myInventoryData.length === 0) {
                myInventoryData.push(giftPool[0]); // Выдаем стартовый предмет
            }
            saveData();
            closeModal('authModal');
        }

        // ИНИЦИАЛИЗАЦИЯ
        updateBalanceUI();
        renderGrid();
    </script>
</body>
</html>
